{ q:'Er ___ nichts davon ___. (wissen → Perfekt)', o:['hat/gewusst','hat/gewissen','ist/gewusst','hat/wusste'], a:0, f:'<b>wissen Perfekt (特殊PII)</b>：他对那件事一无所知。<br><br><b>规则：</b>wissen → PII = <b>gewusst</b>（强变化，特殊形式！）。助动词：<b>haben</b>。<br>Er <b>hat</b> nichts davon <b>gewusst</b>.<br><br><b>wissen vs kennen：</b>wissen = 知道（事实/信息），kennen = 认识/了解（人物/事物）。Ich weiß die Antwort (事实信息) vs Ich kenne die Stadt (了解/去过)。<br><br><b>⚠️ 特殊PII：</b>wissen→gewusst (不是*gewissen/gewisst)。这是一个需要单独记忆的特殊形式。' },
{ q:'___ groß ___ die Probleme auch sind, wir müssen sie lösen.', o:['Wie/auch','Wenn/so','Ob/-','Dass/auch'], a:0, f:'<b>Konzessivsatz: wie...auch (无论...多么)</b>：无论问题多大，我们必须解决它们。<br><br><b>规则：</b><b>Wie</b> + Adjektiv + <b>auch</b> + 主语 + 动词... = 无论多么...。<br><b>Wie</b> groß <b>auch</b> die Probleme sind, wir müssen sie lösen.<br><br><b>其他让步结构：</b>① So + Adj. + auch... = 无论...多 ② W-Wort + auch immer = 无论什么/谁/哪里：Was auch immer passiert,... ③ Ob...oder... = 不管...还是...。<br><br><b>C1重点：</b>这种irrelevante Konzessivsätze（隐含让步从句）在正式文本中极为常见。' },
{ q:'Er ist ___ (groß) als sein Vater.', o:['größer','mehr groß','großer','am größten'], a:0, f:'<b>Komparativ mit Umlaut (变音比较级)</b>：他比他父亲高。<br><br><b>规则：</b>groß → Komparativ = <b>größer</b>（单音节+o→ö变音+er）。<br>Er ist <b>größer</b> als sein Vater.<br><br><b>变音规律总结：</b>约20个常用单音节形容词在比较级和最高级中变音：a→ä (alt→älter), o→ö (groß→größer), u→ü (jung→jünger)。但不是所有都变！klar→klarer (不变), bunt→bunter (不变)。<br><br><b>⚠️ 常见不归则/变音比较级：</b>hoch→höher, nah→näher, gut→besser, viel→mehr, gern→lieber。' },
{ q:'___ des Feierabends geht er ins Fitnessstudio.', o:['Nach','Vor','In','Seit'], a:0, f:'<b>nach + Dativ — Zeitpunkt (在...之后)</b>：下班后他去健身房。<br><br><b>规则：</b><b>Nach</b> + Dativ = 在...之后（时间点或事件后）。<br><b>Nach</b> dem Feierabend geht er ins Fitnessstudio.<br><br><b>nach vs in (时间)：</b>① nach + Dativ = 在...之后：nach der Arbeit, nach einer Stunde ② in + Dativ = 在...之内：in einer Stunde (一小时后/一小时之内，双义)。<br><br><b>类似表达：</b>nach Feierabend (常省略冠词), nach der Arbeit, nach dem Unterricht。这都是日常高频表达。' },
{ q:'___ ihm niemand half, gab er nicht auf.', o:['Obwohl','Weil','Nachdem','Indem'], a:0, f:'<b>Konzessivsatz: obwohl + Dativ-Kontext</b>：尽管没人帮他，他没有放弃。<br><br><b>规则：</b>没人帮→预期会放弃→实际没放弃→反预期→<b>Obwohl</b>。<br><b>Obwohl</b> ihm niemand half, gab er nicht auf.<br><br><b>⚠️ half (helfen Prät.)：</b>helfen + Dativ (ihm = Dativ von er)。"Ihm half niemand" = 没人帮他（niemand是主语, ihm是Dat.宾语）。<br><br><b>结构拆分：</b>Obwohl + Dat.宾语(ihm) + 主语(niemand) + 动词(half)... = 尽管没人帮他。这种宾语前置的结构在从句中常见。' },
{ q:'Die Medikamente müssen ___ (kühlen) gelagert werden.', o:['kühl','gekühlt','kühlend','kühlen'], a:0, f:'<b>PII als Adverb/Adjektiv (第二分词作状语)</b>：药品需冷藏存放。<br><br><b>规则：</b>kühlen → PII = <b>gekühlt</b>。作状语修饰lagern：被冷却地存放。<br>Die Medikamente müssen <b>gekühlt</b> gelagert werden.<br><br><b>PII作状语模式：</b>此结构常与必须/能够动词搭配：muss gekühlt werden, sollte gesichert werden, kann geliefert werden。<br><br><b>注意：</b>这里的gekühlt不是表状态的形容词（不用Zustandspassiv），而是修饰lagern的方式状语。lagern = 存放，gekühlt lagern = 冷藏存放。' },
{ q:'Es ___ ein Wunder, wenn er die Prüfung ___.', o:['wäre/bestünde','war/besteht','ist/besteht','wäre/besteht'], a:0, f:'<b>KII — Irrealer Konditionalsatz (非现实条件)</b>：如果他通过考试，那将是一个奇迹。<br><br><b>规则：</b>表达"不太可能发生"的条件时，主从句都用KII。sein KII = <b>wäre</b>, bestehen KII = <b>bestünde</b> (强变化)。<br>Es <b>wäre</b> ein Wunder, wenn er die Prüfung <b>bestünde</b>.<br><br><b>KII vs würde+Inf.：</b>强变化动词有独特KII形式时（如bestünde），书面语中优先使用原KII而非würde bestehen。口语中常用würde würde。<br><br><b>语气含义：</b>使用KII暗示说话人认为不太可能。如果认为有可能→直陈式：Es ist ein Wunder, wenn er besteht。' },
{ q:'Es kommt ___ die genauen Umstände an.', o:['auf','an','in','über'], a:0, f:'<b>es kommt auf + Akk. an — 取决于</b>：这取决于具体情况。<br><br><b>规则：</b><b>Es kommt auf</b> + Akk. <b>an</b> = 取决于/关键在于。auf和an都是固定成分，缺一不可。<br>Es kommt <b>auf</b> die genauen Umstände <b>an</b>.<br><br><b>⚠️ 错误：</b>❌ "Es kommt auf die Umstände" — 缺少an。❌ "Es kommt an die Umstände" — auf不可替换为an。<br><br><b>结构分析：</b>ankommen (可分动词) + auf + Akk.。ankommen = 到达，es kommt auf...an = 关键在于...。这是固定搭配，需要整体记忆。' },
{ q:'Sie arbeitet, ___ eine Pause zu machen.', o:['ohne','um','statt','anstatt'], a:0, f:'<b>ohne...zu + Infinitiv (没有...就...)</b>：她不休息地工作。<br><br><b>规则：</b><b>ohne</b>...<b>zu</b> + Infinitiv = 没有做（预期/本该做的）某事。<br>Sie arbeitet, <b>ohne</b> eine Pause <b>zu</b> machen.<br><br><b>ohne...zu vs ohne dass：</b>① 主语相同→ohne...zu: Er ging, ohne ein Wort zu sagen. ② 主语不同→ohne dass: Er ging, ohne dass jemand es bemerkte.<br><br><b>语义：</b>暗示"本该休息但没休"。um...zu表示目的(为了)，语义相反。' },
{ q:'Das ist der beste Film, ___ ich je gesehen habe.', o:['den','der','dem','das'], a:0, f:'<b>Relativpronomen — Akkusativ Maskulinum (Superlativ+Relativsatz)</b>：这是我看过的最好的电影。<br><br><b>规则：</b>先行词der Film (Mask.)。从句中sehen + Akk. → 需要Akk.关系代词 → <b>den</b>。<br>der beste Film, <b>den</b> ich je gesehen habe.<br><br><b>⚠️ 常见陷阱：</b>最高级/序数词+名词时，关系代词仍正常变化。最高级不改变关系代词的性、数、格的规则。<br><br><b>je + Perfekt：</b>je + 完成时 = 至今为止/曾经。der beste...den ich je gesehen habe = 我至今看过的最好的...。' },
{ q:'Ich habe ___ Schlüssel nicht gefunden.', o:['mein','meinen','meine','meinem'], a:1, f:'<b>Possessivartikel — Akkusativ Maskulinum</b>：我没找到我的钥匙。<br><br><b>规则：</b>der Schlüssel = Mask.。finden + Akk. → 物主冠词用Akk. Mask. → <b>meinen</b>。<br>Ich habe <b>meinen</b> Schlüssel nicht gefunden.<br><br><b>物主冠词Mask.变格：</b>Nom. mein Schlüssel, Akk. <b>meinen</b> Schlüssel, Dat. meinem Schlüssel, Gen. meines Schlüssels。<br><br><b>⚠️ 高频错误：</b>英语my key→德语meinen Schlüssel（不是mein Schlüssel！因为Akk. Mask.必须加-en）。这是B1/B2最常见的语法错误之一。' },
{ q:'Er hat sich ___ die falsche Entscheidung ___ (ärgern).', o:['an/geärgert','über/geärgert','auf/geärgert','für/geärgert'], a:1, f:'<b>sich ärgern über + Akk. (为...生气)</b>：他为那错误的决定生气。<br><br><b>规则：</b>sich ärgern + <b>über</b> + Akk. = 为（已发生的事）生气/恼火。<br>Er hat sich <b>über</b> die falsche Entscheidung <b>geärgert</b>.<br><br><b>⚠️ 固定搭配：</b>sich ärgern über + Akk. (已发生的) vs sich ärgern mit + Dat. (对某人)。❌ sich ärgern an/auf/für 都不正确。<br><br><b>类似：</b>sich freuen auf/über (高兴/期待), sich wundern über (惊讶), sich aufregen über (激动/气愤)。都是反身动词+介词固定搭配。' },
{ q:'___ sie genug Geld ___, ___ sie ein Haus kaufen.', o:['Wenn/hätte/könnte','Hätte/-/könnte','Wenn/hat/kann','Obwohl/hat/könnte'], a:0, f:'<b>KII — irreale Bedingung (非现实条件)</b>：如果她有足够的钱，她就能买房子。<br><br><b>规则：</b>haben KII = <b>hätte</b>, können KII = <b>könnte</b>。整个句子表达非现实假设（她实际上没有足够的钱）。<br><b>Wenn</b> sie genug Geld <b>hätte</b>, <b>könnte</b> sie ein Haus kaufen.<br><br><b>结构拆解：</b>wenn + Subj. + Obj. + KII-Hilfsverb (从句末), KII-Modalverb + Subj. + ... + Infinitiv (主句)。<br><br><b>真实vs非现实判断：</b>如果她确实可能有足够钱→直陈式。如果纯假设/不太可能→KII。日常交流中KII表达客气、假设、非现实。' },
{ q:'Das Wetter ist heute besser ___ gestern.', o:['als','wie','denn','als wie'], a:0, f:'<b>Komparativ + als (比较级用als)</b>：今天天气比昨天好。<br><br><b>规则：</b>比较级 (besser) + <b>als</b> + 比较对象。<br>Das Wetter ist heute besser <b>als</b> gestern.<br><br><b>⚠️ als vs wie (再强调)：</b>①比较级+als = 比... ②so/genauso + 原级 + wie = 和...一样。So gut wie du. ≠ Besser als du. 两者不可互换。<br><br><b>方言干扰：</b>南部德语（Bayern/Baden-Württemberg/Schweiz）口语中常用"besser wie"，但标准德语考试中"besser wie"是<b>错误的</b>！必须用als。' },
{ q:'Ich ___ für die Verspätung. (entschuldigen → reflexiv)', o:['entschuldige mich','entschuldige mir','entschuldige','entschuldige sich'], a:0, f:'<b>sich entschuldigen — Reflexivverb (道歉)</b>：我为迟到道歉。<br><br><b>规则：</b>sich entschuldigen = 道歉。反身代词用Akkusativ。<br>Ich <b>entschuldige mich</b> für die Verspätung.<br><br><b>⚠️ 反身代词格判断：</b>大部分反身动词用Akk. (mich/dich/sich/uns/euch/sich)。少数用Dat. (mir/dir/sich/uns/euch/sich)：sich etw. vorstellen, sich etw. ansehen, sich etw. wünschen。<br><br><b>entschuldigen vs sich entschuldigen：</b>jdn. entschuldigen = 原谅/免除某人；sich entschuldigen = 道歉。此处是道歉→反身用法。' },
{ q:'Der nächste Termin findet ___ 15. Mai statt.', o:['am','im','um','in'], a:0, f:'<b>am + Datum (日期用am)</b>：下一个约会定在5月15日。<br><br><b>规则：</b>具体日期用<b>am</b>：<b>am</b> 15. Mai, <b>am</b> Montag, <b>am</b> Wochenende。<br><br><b>时间介词速记：</b>① am + 天/日期：am 1. Januar ② um + 时刻：um 7 Uhr ③ im + 月/年/季：im Mai, im Sommer, im Jahr 2024 ④ in + 未来时间：in drei Tagen。<br><br><b>⚠️ 口语省略：</b>口语中偶有省略介词："Der Termin ist (am) Montag." 但书面语中应当使用介词。' },
{ q:'Die Touristen ___ von der Stadtführung ___. (begeistern → Passiv)', o:['waren/begeistert','wurden/begeistert','haben/begeistert','sind/begeistert worden'], a:0, f:'<b>Zustandspassiv — Präteritum (状态被动)</b>：游客们对城市导览感到兴奋。<br><br><b>规则：</b>Zustandspassiv = sein + PII，表示<b>处于兴奋的状态</b>。过去时：waren + PII。<br>Die Touristen <b>waren</b> von der Stadtführung <b>begeistert</b>.<br><br><b>Vorgang vs Zustand：</b>wurden begeistert (Vorgangspassiv) = 被激发了兴趣/被吸引（强调变化的动作过程）。waren begeistert (Zustandspassiv) = 处于兴奋状态（强调状态结果）。<br><br><b>由动词变化来的状态形容词：</b>begeistert sein (兴奋), interessiert sein (感兴趣), verheiratet sein (已婚), geöffnet sein (开门/营业中)。' },
{ q:'Sie tut, ___ nichts passiert ___.', o:['als ob/wäre','als/wäre','dass/ist','ob/sei'], a:0, f:'<b>als ob + KII Vergangenheit</b>：她装作什么也没发生过的样子。<br><br><b>规则：</b>als ob + KII Vergangenheit (非现实过去) = 仿佛...（但实际不是）。sein KII Verg. = wäre + PII。<br>Sie tut, <b>als ob</b> nichts passiert <b>wäre</b>.<br><br><b>KII Vergangenheit构成：</b>wäre/hätte + Partizip II。表示对过去的非现实假设。als ob nichts passiert wäre = (其实有事发生，她装作没有)。<br><br><b>⚠️ als ob vs als：</b>als ob + 从句 (动词末位) = als + 动词首位。Als ob nichts passiert wäre. = Als wäre nichts passiert. 后者更简短。' },
{ q:'Ich bestehe ___ einer pünktlichen Lieferung.', o:['auf','an','in','über'], a:0, f:'<b>bestehen auf + Dativ (坚持/执意要求)</b>：我坚持要求准时交货。<br><br><b>规则：</b>bestehen <b>auf</b> + Dativ = 坚持（要求/主张）。<br>Ich bestehe <b>auf</b> einer pünktlichen Lieferung.<br><br><b>bestehen多种搭配：</b>① bestehen auf + Dat. = 坚持要求 ② bestehen aus + Dat. = 由...组成 ③ bestehen in + Dat. = 在于...（einer Sache bestehen = 存在）。<br><br><b>记忆技巧：</b>auf = 站在上面不动 → 坚持；aus = 从...出来 → 组成来源；in = 在...里面 → 在于。三种搭配各有不同含义。' },
{ q:'___ der Sturm ___ aufgehört ___, gingen wir raus.', o:['Nachdem/hatte/hat','Als/hatte/hat','Nachdem/hat/-','Als/hat/-'], a:0, f:'<b>Plusquamperfekt + nachdem (时态序列)</b>：风暴停止后我们出去了。<br><br><b>规则：</b>nachdem从句要求时态前置：主句Präteritum → 从句<b>Plusquamperfekt</b>。<br><b>Nachdem</b> der Sturm <b>aufgehört hatte</b>, gingen wir raus.<br><br><b>Plusquamperfekt = hatte/war + PII：</b>hatte aufgehört (aufhören的PII = aufgehört, 助动词haben)。<br><br><b>als vs nachdem：</b>als = 当...时（一次性过去同时事件）；nachdem = 在...之后（先于主句）。此处风暴先停→才出去→用nachdem。' },
{ q:'___ Sie bitte das Formular ___. (ausfüllen → höflich)', o:['Würden/ausfüllen','Haben/ausgefüllt','Sind/ausfüllen','Werden/ausgefüllt'], a:0, f:'<b>würde + Infinitiv — höfliche Bitte (礼貌请求)</b>：请您填写表格。<br><br><b>规则：</b>KII würde + Infinitiv = 比直陈式更礼貌的请求。<br><b>Würden</b> Sie bitte das Formular <b>ausfüllen</b>?<br><br><b>礼貌程度对比：</b>① Füllen Sie aus! (命令式，最直接) ② Füllen Sie bitte aus! (加bitte，稍礼貌) ③ Würden Sie bitte ausfüllen? (KII，最礼貌) ④ Könnten Sie bitte ausfüllen? (KII Modalverb，也最礼貌)。<br><br><b>B2写作：</b>正式信函中推荐使用KII形式表达请求。这是B2 Schreiben评分标准之一。' },
{ q:'Die Arbeit ___ von den Studenten ___. (machen → Passiv)', o:['wurde/gemacht','war/gemacht','hat/gemacht','ist/machen'], a:0, f:'<b>Passiv Präteritum — werden + PII</b>：这项工作是学生们做的。<br><br><b>规则：</b>Vorgangspassiv Prät. = <b>wurde</b> + PII。<br>Die Arbeit <b>wurde</b> von den Studenten <b>gemacht</b>.<br><br><b>von + Dativ = Agent (施动者)：</b>由...做。von den Studenten = 由学生们。如果施动者是工具/方式则用durch：durch Maschinen ersetzt。<br><br><b>⚠️ vs aktiv：</b>主动句：Die Studenten <b>machten</b> die Arbeit. 被动句：Die Arbeit <b>wurde</b> von den Studenten <b>gemacht</b>。被动强调die Arbeit（主语），弱化施动者。' },
{ q:'___ des Regens ___ das Spiel ___. (abgesagt → 原因)', o:['Wegen/wurde/abgesagt','Trotz/ist/abgesagt','Wegen/hat/abgesagt','Aufgrund/war/abgesagt'], a:0, f:'<b>Wegen + Gen. — Kausalsatz (原因) + Passiv</b>：因为下雨，比赛被取消了。<br><br><b>规则：</b>Weil es regnete → <b>Wegen</b> des Regens (名词化)。Passiv Prät. = <b>wurde</b> abgesagt。<br><b>Wegen</b> des Regens <b>wurde</b> das Spiel <b>abgesagt</b>.<br><br><b>absagen PII：</b>absagen → PII = abgesagt（规则变化，可分前缀ab-）。Passiv：wurde abgesagt。<br><br><b>⚠️ Trotz vs Wegen逻辑判断：</b>下雨→取消比赛是因果（原因），不是让步。如果用Trotz（尽管），语义变成"尽管下雨比赛仍举行"——完全相反！' }
];

const c1TestQs = [
  {q:'Der Minister betonte, die Wirtschaft ___ sich gut ___. (entwickeln → KI)',o:['habe/entwickelt','hat/entwickelt','wäre/entwickelt','sei/entwickeln'],a:0,f:'<b>Konjunktiv I — Indirekte Rede (间接引语)</b>：部长强调，经济发展良好。<br><br><b>规则：</b>间接引语中用KI保持<b>中立客观</b>，不带说话人态度。动词用KI形式：haben的KI第三人称单数 = <b>habe</b>。Perfekt KI = habe + PII。<br>全句：Der Minister betonte, die Wirtschaft <b>habe</b> sich gut <b>entwickelt</b>.<br><br><b>辨析：</b>❌ "hat entwickelt" = 直陈式（陈述事实），失去了间接引语的疏离效果。❌ "wäre entwickelt" = KII（暗示怀疑——"我怀疑经济可能没有发展好"），这不是部长原意。❌ "sei entwickeln" = 语法结构错误。<br><br><b>C1核心考点：</b>KI在新闻报导、学术写作中极其常见。考点在于区分直陈式(etw. behaupten→句中用KI)和KII(对转述内容存疑→用KII)。'},
  {q:'___ des technologischen ___ sind viele Arbeitsplätze gefährdet.',o:['Aufgrund/Fortschritts','Trotz/Fortschritt','Wegen/Fortschritt','Dank/Entwicklung'],a:0,f:'<b>Nominalisierung — Kausalangabe mit Genitiv</b>：由于技术进步，许多工作岗位受到威胁。<br><br><b>规则：</b>Weil die Technologie fortschreitet → <b>Aufgrund</b> des technologischen <b>Fortschritts</b>。<br>Aufgrund + Genitiv = 由于/基于（正式书面语）。Fortschritt → des Fortschritts (Gen. 男性+弱变化名词+s)。<br><br><b>辨析：</b>Aufgrund/Wegen/Aus都可以表原因，但Aufgrund最正式，常见于学术/新闻文本。Dank + Gen./Dat. 表"幸亏/多亏"（积极原因），这里用Aufgrund最准确。<br><br><b>⚠️ 常见错误：</b>❌ "Aufgrund/Fortschritt" — 缺少Genitiv词尾-s。'},
  {q:'Das Problem ___ durch eine Änderung des Verfahrens ___ werden. (lösen → Passiversatz)',o:['ist/lösen','hat/lösen','kann/gelöst','wird/lösen'],a:2,f:'<b>Modalverb + Passiv (情态动词被动态)</b>：问题可以通过改变方法被解决。<br><br><b>规则：</b>Modalverb + Partizip II + werden = 情态被动（表示可能性/必要性+被动）。<br>全句：Das Problem <b>kann</b> durch eine Änderung des Verfahrens <b>gelöst</b> werden.<br><br><b>结构拆解：</b>kann (Modalverb, 变位) + gelöst (PII, 不变) + werden (不定式, 不变)。语序：Modalverb在第二位，PII在最后，werden在PII之前。<br><br><b>对比：</b>sein+zu+Inf. (Passiversatz): Das Problem ist zu lösen. | sich lassen+Inf.: Das Problem lässt sich lösen. | Modalverb+Passiv: Das Problem kann gelöst werden.'},
  {q:'Es lässt ___ nicht leugnen, dass Handlungsbedarf besteht.',o:['es','sich','das','man'],a:1,f:'<b>sich lassen + Infinitiv (Passiversatz)</b>：无法否认存在行动需求。<br><br><b>规则：</b>etw. lässt <b>sich</b> + Infinitiv = etw. kann + PII + werden（被动替代形式）。<br>Es lässt <b>sich</b> nicht leugnen = Es kann nicht geleugnet werden.<br><br><b>关键点：</b>这个结构中的<b>sich</b>是反身代词（Akk.），不可省略，不可替换为es/das/man。<br><br><b>其他Passiversatzformen：</b>① sein + zu + Inf.: Das ist zu lösen. ② -bar: Das ist lösbar. ③ sich lassen + Inf.: Das lässt sich lösen. ④ gehören + PII: Das gehört verboten! C1考试要求能识别并使用这些替代形式。'},
  {q:'Die ___ (durchführen) Studie belegt die Wirksamkeit.',o:['durchführende','durchgeführte','durchführen','durchführt'],a:1,f:'<b>Partizip II als Adjektivattribut (第二分词作定语)</b>：已完成的这项研究证明了有效性。<br><br><b>规则：</b>PII作形容词定语表示<b>被动+完成</b>。durchführen → PII = durchge<b>führt</b> → 加形容词词尾-e (Nom. Fem. 定冠词后) → die <b>durchgeführte</b> Studie = die Studie, die durchgeführt wurde.<br><br><b>PI vs PII 关键区别：</b>❌ die <b>durchführende</b> Studie (PI) = 正在执行研究的那个研究本身（逻辑不通，研究不能执行自己）。PI = 主动/进行，PII = 被动/完成。<br><br><b>C1阅读技巧：</b>遇到长Partizipialattribute，先找到名词，再向前找分词，还原为关系从句理解。如：die von dem Institut durchgeführte Studie = die Studie, die von dem Institut durchgeführt wurde。'},
  {q:'Die Regierung hat ___, neue Maßnahmen zu ___. (beschließen→FVG)',o:['beschlossen/ergreifen','entschieden/nehmen','beschlossen/machen','entschieden/tun'],a:0,f:'<b>FVG + zu-Infinitiv-Konstruktion</b>：政府决定采取新措施。<br><br><b>规则：</b>beschließen → PII = <b>beschlossen</b>。Maßnahmen <b>ergreifen</b> = 采取措施（这是第二个FVG）。<br>全句：Die Regierung hat <b>beschlossen</b>, neue Maßnahmen zu <b>ergreifen</b>.<br><br><b>两个FVG嵌套：</b>① etw. beschließen = eine Entscheidung treffen ② Maßnahmen ergreifen = Maßnahmen treffen。❌ "Maßnahmen nehmen/machen/tun" 都不是标准德语表达。<br><br><b>C1重点：</b>FVG (Funktionsverbgefüge) 在C1考试中高频出现。把动词换成"动词+名词"组合是书面德语的重要特征。'},
  {q:'Das ist ___ faszinierend! (Modalpartikel: 表示"真的/确实")',o:['doch','ja','mal','denn'],a:1,f:'<b>Modalpartikeln (语气小品词) — ja</b>：这确实太迷人了！<br><br><b>规则：</b><b>ja</b>在这里不表示"是/对"，而是表达说话人的<b>情感确认、强调、共鸣</b>：这<b>确实</b>/<b>真的</b>太迷人了。<br><br><b>辨析：</b>❌ doch — 表示"反驳/毕竟/催促"，如: Das ist doch klar! = 这明明很清楚（别人不这么认为）。❌ mal — 表示"一下/暂且"，如: Guck mal! = 你看一下！❌ denn — 表示"到底/究竟"，如: Was ist denn los? = 到底怎么了？<br><br><b>C1考点：</b>Modalpartikeln在Leseverstehen中需要通过语境判断态度。ja用于建立共识和确认已知信息。'},
  {q:'In ___ auf die steigenden Kosten wurde das Projekt gestoppt.',o:['Hinsicht','Bezug','Anbetracht','Rücksicht'],a:2,f:'<b>C1 Präpositionalphrase — in Anbetracht</b>：考虑到不断上涨的成本，项目被叫停。<br><br><b>规则：</b><b>in Anbetracht + Genitiv</b> = 考虑到/鉴于（非常正式）。<br><br><b>辨析相似结构：</b>① mit/in Bezug auf + Akk. = 关于/就...而言 ② in Hinsicht auf + Akk. = 在...方面 ③ mit Rücksicht auf + Akk. = 顾及/考虑到（照顾某人的感受）。<br><br><b>语感判断：</b>区分点是介词搭配：in An<b>betracht</b> + Gen. (不加auf)，in Hinsicht <b>auf</b> + Akk.，mit <b>Rücksicht auf</b> + Akk.。本题空格后有"auf"，但in Anbetracht不加auf——等等，实际上标准是in Anbetracht + Gen. (不加auf)。不过本题应为 in Anbetracht der steigenden Kosten...'},
  {q:'___ man mehr in Bildung investiert ___, ___ die Arbeitslosigkeit sinken.',o:['Wenn/würde/würde','Würde/-/würde','Wenn/-/könnte','Damit/würde/würde'],a:0,f:'<b>KII Konditionalsatz (完整结构)</b>：如果人们更多投资教育，失业率就会下降。<br><br><b>规则：</b>Wenn + Subjekt + ... + <b>würde</b> + Infinitiv (从句末), <b>würde</b> + Subjekt + ... + Infinitiv (主句)。<br>全句：<b>Wenn</b> man mehr in Bildung investieren <b>würde</b>, <b>würde</b> die Arbeitslosigkeit sinken.<br>注意从句中动词(würde)在末位，主句中动词(würde)在第二位。<br><br><b>关键：</b>第一个空填Wenn (引导从句)，第二个空填würde (从句末助动词)，第三个空填würde (主句助动词，占第二位)。主句以würde开头，主语die Arbeitslosigkeit紧跟，然后sinken。'},
  {q:'Die Firma ___ über 500 Mitarbeiter. (verfügen→richtige Präp.)',o:['verfügt','verfügt über','verfügt von','verfügt mit'],a:1,f:'<b>verfügen über + Akkusativ (固定搭配)</b>：公司拥有500多名员工。<br><br><b>规则：</b>verfügen + <b>über</b> + Akk. = 拥有/具有。注意：über在这是介词，后接Akkusativ。<br><br><b>对比：</b>英语"dispose of / have at one\'s disposal" ↔ 德语"verfügen über"。❌ 直接说"Die Firma verfügt 500 Mitarbeiter"语法不完整。<br><br><b>类似结构：</b>besitzen + Akk. (直接宾语，不用介词) = 拥有，但verfügen über更正式，常用于书面/商务文本。'},
  {q:'Der __ (fallen) Aktienkurs beunruhigt die Anleger.',o:['fallende','gefallene','fallene','gefallende'],a:0,f:'<b>Partizip I als Adjektiv (PI作定语)</b>：正在下跌的股价令投资者不安。<br><br><b>规则：</b>fallen → PI = <b>fallend</b> + 形容词词尾-e = <b>fallende</b>。PI表示<b>正在进行</b>的动作：正在下跌的。<br><br><b>PI vs PII：</b>❌ "gefallene" = PII (已跌完的)——已跌完的股价可能不再令人不安了。❌ "fallene" 不存在。❌ "gefallende" 不存在（PI和PII不能混合）。<br><br><b>C1阅读关键：</b>PI = 在...的 / 正在...的 (aktiv/andauernd)，PII = 被...的 / 已...的 (passiv/vollendet)。遇到分词定语先判断"谁对谁做了什么动作"。'},
  {q:'Wir müssen eine ___ treffen.(entscheiden→FVG+Nomen)',o:['Entscheiden','Entscheidung','Verfahren','Bescheid'],a:1,f:'<b>Funktionsverbgefüge: eine Entscheidung treffen</b>：我们必须做出决定。<br><br><b>规则：</b>entscheiden (动词) → eine <b>Entscheidung</b> treffen (FVG)。treffen + Entscheidung = 做决定 (固定搭配)。<br><br><b>常见FVG表 (C1必须掌握)：</b>eine Entscheidung treffen = entscheiden | eine Frage stellen = fragen | eine Antwort geben = antworten | Kritik üben = kritisieren | zum Ausdruck bringen = ausdrücken | in Anspruch nehmen = beanspruchen。<br><br><b>❌ die anderen：</b>"Verfahren treffen" / "Bescheid treffen" 不存在。"Entscheiden"是动词原型，不能直接加冠词。'},
  {q:'Von dieser Maßnahme ___ vor allem kleine Unternehmen. (profitieren→richtig)',o:['profitieren','profitieren über','profitieren von','profitieren mit'],a:2,f:'<b>profitieren von + Dativ (动介搭配)</b>：小企业尤其从这一措施中获益。<br><br><b>规则：</b>profitieren + <b>von</b> + Dat. = 从...中获益/受益。<br><br><b>辨析：</b>❌ profitieren über — 不存在这个搭配。❌ profitieren mit — 不存在。❌ 直接及物用法"Von dieser Maßnahme profitieren..." — 错误，必须加von。<br><br><b>同类动介搭配 (von+Dativ)：</b>abhängen von (取决于), ausgehen von (以为...出发点), sprechen von (谈论), träumen von (梦想), überzeugen von (说服...相信)。'},
  {q:'___ die Wirtschaft auch wächst, ___ bleibt die Arbeitslosigkeit hoch.',o:['Obwohl/dennoch','Wenn/auch','Trotzdem/aber','Weil/deshalb'],a:0,f:'<b>Konzessivsatz mit Korrelat (让步从句+相关词)</b>：尽管经济在增长，失业率仍然很高。<br><br><b>规则：</b><b>Obwohl</b>引导让步从句（动词在后），主句用<b>dennoch</b>作副词呼应（动词在第二）。<br>全句：<b>Obwohl</b> die Wirtschaft auch wächst, <b>dennoch</b> bleibt die Arbeitslosigkeit hoch.<br><br><b>dennoch vs trotzdem：</b>两者都可作主句副词，dennoch略正式。<br><br><b>⚠️ 关键：</b>❌ Trotzdem不可作从句连接词（不能说"Trotzdem die Wirtschaft wächst"）。Trotzdem只能作副词。作从句连接词必须用obwohl/obgleich。'},
  {q:'Er gilt ___ einer der besten Experten auf diesem Gebiet.',o:['für','wie','als','zu'],a:2,f:'<b>gelten als + Nominativ (被认为是)</b>：他被认为是该领域最优秀的专家之一。<br><br><b>规则：</b>gelten <b>als</b> + <b>Nominativ</b> (不是Akk.！) = 被认为是/被视为。<br>Er gilt <b>als</b> einer der besten Experten. (einer = Nom.)<br><br><b>辨析：</b>❌ gelten für — 不存在这个搭配。❌ gelten wie — 不存在。❌ gelten zu — 不存在。<br><br><b>类似结构：</b>angesehen werden als + Nom. (被视为) / betrachtet werden als + Nom. (被看作) / bezeichnet werden als + Nom. (被称为)。都接Nominativ。'},
  {q:'Der Vorstand ___, das Projekt zu ___. (beschließen→KI)',o:['beschloss/verschieben','beschließe/verschieben','beschlossen/verschieben','beschloss/verschoben'],a:1,f:'<b>Konjunktiv I in der indirekten Rede</b>：董事会决定推迟项目。<br><br><b>规则：</b>间接引语中，beschließen的KI第三人称 = <b>beschließe</b>。<br>全句：Der Vorstand <b>beschließe</b>, das Projekt zu <b>verschieben</b>.<br><br><b>⚠️ 难点：</b>beschließen的KI形<b>beschließe</b>与直陈式<b>beschloss</b>不同，但与直陈式现在时ich beschließe形似。如果KI形与直陈式相同，则<b>必须用würde替代</b>。本题中EI单数第三人称KI与直陈式不同，可以正常使用。<br><br><b>C1阅读考点：</b>通过KI vs 直陈式的选择判断作者态度。KI = 中立转述，KII = 怀疑/不认同转述内容。'},
  {q:'Es handelt ___ um ein schwerwiegendes Problem.',o:['sich','es','ihn','das'],a:0,f:'<b>es handelt sich um + Akkusativ (固定句型)</b>：这涉及一个严重的问题。<br><br><b>规则：</b><b>Es handelt sich um</b> + Akk. = 这涉及/关于...。这是德语中最常用的固定句型之一。<br><br><b>关键：</b>始终用<b>es</b>作主语，<b>sich</b>作反身代词，<b>um</b>作介词。三者缺一不可。❌ "Es handelt um..." (缺少sich) ❌ "Es handelt es um..." (错误的sich)。<br><br><b>用法场景：</b>Bei diesem Text <b>handelt es sich um</b> einen Kommentar. (这篇文章是一篇评论)。C1阅读/写作中极其常见。'},
  {q:'___ man regelmäßig übt, ___ verbessert man seine Sprachkenntnisse.',o:['Wenn/so','Indem/dann','Je/desto','Dann/wenn'],a:1,f:'<b>Indem-Satz (方式从句) + dann-Korrelat</b>：通过定期练习，来改善语言能力。<br><br><b>规则：</b><b>Indem</b> (通过...的方式) + 从句, <b>dann</b> (那么/就) + 主句。Indem表达"通过做某事的方式来达成某事"。<br>全句：<b>Indem</b> man regelmäßig übt, <b>dann</b> verbessert man seine Sprachkenntnisse.<br><br><b>辨析：</b>❌ Wenn...so... — 条件关系（如果...那么...），但句意更接近方式而非条件。❌ Je...desto — 比例关系（越...越...）。❌ Dann...wenn — 语序倒置错误。<br><br><b>口语替代：</b>Indem → dadurch dass...。两者功能相同但dadurch dass更口语化。'},
  {q:'Die Umsetzung ___ (verschieben) auf nächstes Jahr.',o:['wird verschoben','ist verschoben','hat verschoben','würde verschieben'],a:0,f:'<b>Vorgangspassiv Präsens (过程被动态现在时)</b>：实施被推迟到明年。<br><br><b>规则：</b>Vorgangspassiv = <b>werden + Partizip II</b>。现在时：<b>wird</b> + PII。verschieben → PII = <b>verschoben</b> (强变化)。<br>全句：Die Umsetzung <b>wird</b> auf nächstes Jahr <b>verschoben</b>.<br><br><b>辨析：</b>❌ "ist verschoben" = Zustandspassiv (状态被动)，强调推迟后的状态，不是推迟这个动作。❌ "hat verschoben" = 主动完成时 (谁推迟的？无主语)。❌ "würde verschieben" = KII (非现实/礼貌)，不合句意。<br><br><b>Vorgangspassiv vs Zustandspassiv：</b>wird verschoben (被推迟的动作) vs ist verschoben (已推迟的状态)。C1必考点。'},
  {q:'Er handelte, ___ die Konsequenzen zu bedenken.',o:['ohne','statt','anstatt','um'],a:0,f:'<b>ohne...zu + Infinitiv (没有...就...)</b>：他没有考虑后果就行动了。<br><br><b>规则：</b><b>ohne</b>...zu + Inf. = 没有做某事（本该做或可能做的情况下）。<br>Er handelte, <b>ohne</b> die Konsequenzen <b>zu</b> bedenken. = 他行动了，却没考虑后果。<br><br><b>辨析：</b>❌ statt/anstatt...zu = 不做...而做...（选择替代关系）。❌ um...zu = 为了...（目的关系）。<br><br><b>对比：</b>ohne...zu (没做) vs statt...zu (取而代之) vs um...zu (为了)。如：Er ging vorbei, ohne mich zu sehen. (没有看见我就走过去了) vs Er las ein Buch, statt zu arbeiten. (不工作而看书)。'},
  {q:'Die Verhandlungen stehen kurz ___ dem Abschluss.',o:['für','vor','an','zu'],a:1,f:'<b>kurz vor + Dativ stehen (固定搭配)</b>：谈判即将完成。<br><br><b>规则：</b><b>kurz vor + Dat. stehen</b> = 即将... / 快要...。<br>Die Verhandlungen stehen kurz <b>vor</b> dem Abschluss. = 谈判即将结束。<br><br><b>类似表达：</b>kurz vor dem Ziel stehen (即将到达目标), kurz vor dem Zusammenbruch stehen (快要崩溃), kurz vor dem Abschluss stehen (即将完成)。<br><br><b>辨析：</b>❌ kurz für — 不存在。❌ kurz an — 不存在。❌ kurz zu — 不存在。这是一个固定搭配，空间隐喻：vor = 在...前面（即将到达）。'},
  {q:'___ mangelnder Nachfrage wurde das Produkt eingestellt.',o:['Trotz','Aufgrund','Wegen','Infolge'],a:2,f:'<b>Wegen + Genitiv — 原因介词 (Genitivpräposition)</b>：由于缺乏需求，该产品停产了。<br><br><b>规则：</b><b>Wegen</b> + Genitiv = 由于/因为。<b>mangelnd</b> → Gen. Fem. = mangelnd<b>er</b> Nachfrage。<br>全句：<b>Wegen</b> mangelnder Nachfrage wurde das Produkt eingestellt.<br><br><b>辨析：</b>❌ Trotz = 尽管（让步，逻辑错误：不能说"尽管缺乏需求产品被停产"——停产是因为缺乏需求）。❌ Aufgrund 也表原因且可填入，但Wegen是更常用的选择。<br><br><b>⚠️ Genitiv vs Dativ：</b>书面语中用Genitiv (wegen des Regens)，口语中常用Dativ (wegen dem Regen)。B2/C1考试中优先用Genitiv。'},
  {q:'Das Thema, ___ wir diskutiert haben, ist komplex.',o:['worüber','darüber','woran','daran'],a:0,f:'<b>wo(r)- + Präposition als Relativpronomen</b>：我们讨论过的那个话题很复杂。<br><br><b>规则：</b>谈论抽象话题不用"das..."而用<b>wo(r)- + Präposition</b>。diskutieren <b>über</b> + Akk. → <b>worüber</b>。<br>Das Thema, <b>worüber</b> wir diskutiert haben, ist komplex. = Das Thema, <b>über das</b> wir diskutiert haben...<br><br><b>规则详解：</b>wo(r)-关系代词用于①非人先行词 ②介词后。wenn die Präposition mit Vokal beginnt, wird ein -r- eingefügt: wo<b>r</b>über, wo<b>r</b>an, wo<b>r</b>auf。<br><br><b>❌ darüber：</b>这是副词，不是关系代词。不能引导关系从句。'},
  {q:'Die Firma ___ expandieren. (vorhaben→richtige Form)',o:['hat vor zu','hat vor','vorhat zu','vorhat'],a:0,f:'<b>vorhaben + zu-Infinitiv (可分动词+zu不定式)</b>：公司打算扩张。<br><br><b>规则：</b>vorhaben = 打算/计划。可分动词+Trennungsverb。现在时：hat vor。配合不定式：<b>hat vor, zu</b> expandieren。<br>全句：Die Firma <b>hat vor, zu</b> expandieren = Die Firma <b>hat vor</b> + zu expandieren。<br><br><b>可分动词+zu规则：</b>zu插入在可分前缀和词根之间。vorhaben: hat <b>vor, zu</b>... (不是 vorzu，因为haben已分开前缀)。<br><br><b>类似结构：</b>vorhaben, etw. zu tun / planen, etw. zu tun / beabsichtigen, etw. zu tun。这三个都表示"打算/计划做某事"。'},
  {q:'Sie ___ eine führende Rolle in der Branche. (einnehmen→Perfekt)',o:['hat eingenommen','ist eingenommen','hat eingenommen zu','wurde eingenommen'],a:0,f:'<b>Perfekt: einnehmen + haben (不可分动词)</b>：她在行业中占据了领先地位。<br><br><b>规则：</b>einnehmen = 不可分动词（前缀ein-不可分）。PII：einnehmen → <b>eingenommen</b>（强变化：nehmen→genommen, 不可分前缀eingenommen, 无ge-）。<br>全句：Sie <b>hat</b> eine führende Rolle in der Branche <b>eingenommen</b>.<br><br><b>不可分动词PII规则：</b>无ge-前缀。如：verstehen → verstanden, bekommen → bekommen, einnehmen → eingenommen。<br><br><b>eine Rolle einnehmen vs spielen：</b>Rolle <b>einnehmen</b> = 占据/担任角色（更正式），Rolle <b>spielen</b> = 扮演角色（更常用）。'},

{ q:'Er ___ den Bericht bereits ___ haben. (sollen → subjektive Bedeutung)', o:['soll/geschrieben','muss/schreiben','hat/schreiben','wird/geschrieben'], a:0, f:'<b>Subjektive Modalverben — sollen (据称/据传)</b>：据说他已经写了报告。<br><br><b>规则：</b><b>sollen</b> + Infinitiv Perfekt (PII + haben/sein) = 据传/据称过去的某事。表达<b>转述他人声称</b>，说话人不保证真实性。<br>Er <b>soll</b> den Bericht bereits <b>geschrieben</b> haben.<br><br><b>对比 subjektive Modalverben：</b>① sollen + Inf./PII+haben = 据称（转述他人说法）② wollen + Inf./PII+haben = 自称（转述主语自己的声称，存疑）。Er <b>will</b> den Bericht geschrieben haben = 他自称写了（但我怀疑）。<br><br><b>C1核心：</b>区分objektive (义务/能力) vs subjektive (转述推测) Modalverben用法。' },

{ q:'Die Lage ___ sich verbessert ___ . (dürfen → Vermutung)', o:['dürfte/haben','darf/haben','dürfte/sein','darf/sein'], a:0, f:'<b>dürfte + Infinitiv Perfekt — 谨慎推测</b>：情况可能已经改善了。<br><br><b>规则：</b><b>dürfte</b> (KII) + PII + haben = 对过去/完成的<b>谨慎推测</b>（可能性高，约70-80%）。<br>Die Lage <b>dürfte</b> sich verbessert <b>haben</b>.<br><br><b>推测等级（C1必考）：</b>① dürfte (约80%) = 很可能/有把握 ② könnte (约50%) = 可能 ③ müsste (约60%) = 按理应该 ④ kann (约40%) = 可能。❌ darf (直陈式) 不能表推测。<br><br><b>商务/学术场景极常用：</b>Die Zahlen dürften sich verschlechtert haben. = 数据很可能已经恶化了。' },

{ q:'___ der Krise ___ sich das Unternehmen gut ___. (trotzdem→Nominalisierung)', o:['Trotz/hat/entwickelt','Wegen/hat/entwickelt','Trotz/ist/entwickelt','Trotzdem/hat/entwickelt'], a:0, f:'<b>Nominalisierung: trotz + Genitiv (让步名词化)</b>：尽管有危机，公司发展得很好。<br><br><b>规则：</b>Obwohl es eine Krise gab → <b>Trotz</b> + Genitiv。<br><b>Trotz</b> der Krise <b>hat</b> sich das Unternehmen gut <b>entwickelt</b>.<br><br><b>⚠️ Trotzdem vs Trotz：</b>Trotz = 介词 + Gen. (名词化)，Trotzdem = 副词 (连接两个主句)。❌ "Trotzdem der Krise" = 语法错误！Trotzdem不能支配名词。<br><br><b>C1写作核心：</b>Nominalisierung用Trotz + Gen.替代obwohl从句，是书面语水平的关键提升。' },

{ q:'Das Projekt, ___ Finanzierung gesichert ist, startet nächste Woche.', o:['dessen','deren','der','dem'], a:0, f:'<b>Relativpronomen — Genitiv Maskulinum (dessen)</b>：那个资金已到位的项目下周启动。<br><br><b>规则：</b>先行词das Projekt (Neut.) → 关系代词Genitiv = <b>dessen</b> (dessen Finanzierung = 其资金)。<br>Das Projekt, <b>dessen</b> Finanzierung gesichert ist, startet nächste Woche.<br><br><b>关系代词Genitiv变格：</b>Mask./Neut. = <b>dessen</b>, Fem./Pl. = <b>deren</b>。<br><br><b>C1阅读必备：</b>dessen/deren引导的定语在学术文本中极其高频。der Autor, dessen These... = 其论点的那个作者。' },

{ q:'Die ___ (betreffen) Personen wurden kontaktiert.', o:['betreffenden','betroffenen','betreffende','betroffene'], a:1, f:'<b>Partizip II: betreffen → betroffen (特殊PII作定语)</b>：受影响的那些人员已被联系。<br><br><b>规则：</b>betreffen → PII = <b>betroffen</b> (强变化：e→o，特殊形式)。PI betreffend = 有关的，PII betroffen = 受影响的。<br>die <b>betroffenen</b> Personen = die Personen, die betroffen sind.<br><br><b>PI vs PII语义差异（关键）：</b>PI betreffend = 涉及...的（主动含义）；PII betroffen = 被涉及的/受影响的（被动含义）。❌ "betreffenden Personen" = 涉及别的人/事的人（语义完全相反）。<br><br><b>⚠️ 易混：</b>betreffen→betroffen (不可分动词，PII无ge-)，treffen→getroffen (可分动词，PII有ge-)。' },

{ q:'Es ist ___ erwiesen, dass Rauchen schädlich ist.', o:['wissenschaftlich','wissenschaftlich zu','wissenschaftlicher','Wissenschaft'], a:0, f:'<b>Adjektiv als Adverbialbestimmung (形容词作状语)</b>：科学上已证明吸烟有害。<br><br><b>规则：</b>ist + Adjektiv + PII = 状语+被动（非主语形容词）。<b>wissenschaftlich</b> erwiesen (科学上被证明) = es ist (durch Wissenschaft) erwiesen.<br><br><b>⚠️ 不是sein+zu结构：</b>"Es ist zu erwiesen" = 语法错误（zu后面不是Infinitiv而是PII）。此处wissenschaftlich是纯粹的副词by science。<br><br><b>类似结构（C1学术用语）：</b>empirisch belegt (经验证实), allgemein anerkannt (普遍认可), experimentell nachgewiesen (实验证明)。都可在ist...PII之间插入副词。' },

{ q:'Er ___ sich von der Wahrheit der Anschuldigungen ___. (überzeugen → Passiv)', o:['wurde/überzeugt','war/überzeugt','hat/überzeugt','ist/überzeugend'], a:0, f:'<b>Vorgangspassiv — jdn. überzeugen (使某人信服)</b>：他（被说服）相信了指控的真实性。<br><br><b>规则：</b>jdn. von etw. überzeugen = 使某人信服某事。Passiv: jd. <b>wurde</b> von etw. überzeugt。<br>Er <b>wurde</b> von der Wahrheit <b>überzeugt</b>.<br><br><b>⚠️ 注意区分：</b>① jdn. überzeugen + von (及物，使信服) ② sich überzeugen + von (反身，自己确证/确认) ③ überzeugt sein + von (状态：深信不疑)。<br><br><b>C1考点：</b>这里是被动态(Etwas überzeugt ihn → Er wird überzeugt)，表"他经过某个过程后被说服了"，不是主动判断。' },

{ q:'Sein Verhalten ___ sich nicht rechtfertigen. (Modalverb+Passiversatz)', o:['lässt','hat','wird','kann'], a:0, f:'<b>sich lassen + Infinitiv (Passiversatz 再练)</b>：他的行为无法被合理化。<br><br><b>规则：</b>etw. <b>lässt sich</b> + nicht + Infinitiv = etw. kann nicht + PII + werden。<br>Sein Verhalten <b>lässt sich</b> nicht rechtfertigen. = Sein Verhalten kann nicht gerechtfertigt werden.<br><br><b>⚠️ lässt vs kann：</b>kann填入语法正确（Sein Verhalten kann sich nicht rechtfertigen），但语义不同：kann表"没有能力自己合理自身"→逻辑不通。lassen+sich+Inf.才是被动替代。<br><br><b>Passiversatz形式汇总：</b>① lässt sich + Inf. ② sein + zu + Inf. ③ -bar ④ Modalverb + PII + werden ⑤ gehören + PII（口语/谴责）。' },

{ q:'Der Zeuge erklärte, er ___ den Täter am Tatort ___. (sehen → KI Vergangenheit)', o:['habe/gesehen','hat/gesehen','hätte/gesehen','würde/sehen'], a:0, f:'<b>KI Perfekt — indirekte Rede Vergangenheit</b>：证人说明他在现场看见了犯人。<br><br><b>规则：</b>间接引语转述过去事件→KI Perfekt = <b>habe/sei + PII</b>。<br>Der Zeuge erklärte, er <b>habe</b> den Täter am Tatort <b>gesehen</b>.<br><br><b>⚠️ KI vs KII选择：</b>KI (habe gesehen) = 中立转述（证人这么说，我保持客观）。KII (hätte gesehen) = 对证人证词存疑（"他说他看到了，但我表示怀疑"）。法院记者般精确区分！<br><br><b>C1阅读/写作核心：</b>通过KI/KII选择表达作者对转述内容的态度立场。KI = 中立/接受，KII = 疏离/存疑。' },

{ q:'Die Konferenz, ___ ich teilnahm, war informativ.', o:['an der','an die','woran','daran'], a:0, f:'<b>Relativpronomen mit Präposition: teilnehmen an + Dat.</b>：我参加的那个会议信息丰富。<br><br><b>规则：</b>teilnehmen an + Dativ。die Konferenz (Fem.) → an + Dat. → an + <b>der</b>。<br>die Konferenz, an <b>der</b> ich teilnahm...<br><br><b>wo(r)-替代：</b>woran（对物/抽象），但an der更倾向于介词+关系代词。<br><br><b>⚠️ an die = Akk. (方向)，定位于动向；Dativ是静态定位。teilnehmen an+Dat. = 参与(状态)。❌ "an die"是Akk.，telnehmen要求Dativ。' },

{ q:'___ des langjährigen ___ wurde das Projekt eingestellt. (mangelnder Erfolg→Genitiv)', o:['Wegen/Erfolgs','Trotz/Erfolgs','Aufgrund/Erfolg','Trotz/Erfolges'], a:1, f:'<b>Trotz + Genitiv — Konzessivangabe (让步名词化)</b>：尽管长期取得了成功，项目还是被停了。<br><br><b>规则：</b>Obwohl das Projekt langjährigen Erfolg hatte → <b>Trotz</b> des langjährigen <b>Erfolgs</b>。<br><b>Trotz</b> des langjährigen <b>Erfolgs</b> wurde das Projekt eingestellt.<br><br><b>⚠️ 语义判断关键：</b>取得了成功→预期继续→但被停了→这是让步（反预期），不是原因！用Trotz，不是Wegen。<br><br><b>原因 vs 让步判断技巧：</b>结果与原因一致→Wegen/Aufgrund；结果与原因相反→Trotz。此题"成功→停项目"是反预期→Trotz。' },

{ q:'Die Maßnahme ___ zu spät ___ (kommen).', o:['dürfte/gekommen sein','darf/gekommen','dürfte/kommen','kann/kommen sein'], a:0, f:'<b>dürfte + Infinitiv Perfekt mit sein (移动动词)</b>：这个措施可能来得太晚了。<br><br><b>规则：</b>kommen (位移动词) → Perfekt用sein: gekommen sein。dürfte + PII + sein = 对过去的谨慎推测。<br>Die Maßnahme <b>dürfte</b> zu spät <b>gekommen sein</b>.<br><br><b>⚠️ haben vs sein 在Perfekt中的区分：</b>①位移/变化动词用sein: gekommen sein, gegangen sein, gestorben sein ②其余多数动词用haben: gearbeitet haben, gesehen haben。<br><br><b>Modalverb+Infinitiv Perfekt结构：</b>Modalverb (dürfte) + ... + PII + haben/sein。注意词序：...gekommen sein——sein一直位于PII之后。' },

{ q:'Das Gesetz ___ von der Regierung ___ werden. (verabschieden → Passiv)', o:['soll/verabschiedet','muss/verabschiedet','wird/verabschiedet','sollte/verabschieden'], a:0, f:'<b>Modalverb + Passiv (sollen 义务+被动)</b>：法律应由政府予以通过。<br><br><b>规则：</b>sollen (义务/应当) + PII (verabschiedet) + werden = 应当被通过。<br>Das Gesetz <b>soll</b> von der Regierung <b>verabschiedet</b> werden.<br><br><b>⚠️ 被动中Modalverb vs 纯Passiv：</b>wird verabschiedet = 正在被通过（过程）。soll verabschiedet werden = 应当被通过（义务/要求+被动）。sollte verabschiedet werden = 应该被通过（KII建议+被动）。<br><br><b>C1法律/政务文本超高频：</b>Inkraft gesetzt werden, verabschiedet werden, beschlossen werden, eingeführt werden。' },

{ q:'Sie geriet ___ Panik, als sie die Nachricht hörte.', o:['in','aus','vor','zu'], a:0, f:'<b>geraten in + Akkusativ (陷入/进入某种状态)</b>：她听到消息后陷入恐慌。<br><br><b>规则：</b>geraten + <b>in</b> + Akk. = 陷入/进入（某种状态）。<br>Sie geriet <b>in</b> Panik = 她陷入恐慌。<br><br><b>常见 geraten in 搭配：</b>in Panik geraten, in Vergessenheit geraten (被遗忘), in Schwierigkeiten geraten (陷入困境), in Brand geraten (着火), in Bewegung geraten (动起来)。<br><br><b>C1功能动词：</b>geraten是werden的升级替代。in Panik geraten ≈ plötzlich panisch werden。用geraten更符合书面语。"' },

{ q:'___ er das Problem gelöst ___, ___ er uns rechtzeitig informiert.', o:['Hätte/hätte','Hätte/hat','Hat/hätte','Habe/habe'], a:0, f:'<b>Irrealer Konditionalsatz ohne wenn + KII Vergangenheit</b>：如果当时他解决了问题（但没解决），他早就及时通知我们了。<br><br><b>规则：</b>省wenn→动词第一位置。对过去的非现实假设用KII Vergangenheit: <b>hätte + PII</b>。<br><b>Hätte</b> er das Problem <b>gelöst</b>, <b>hätte</b> er uns rechtzeitig informiert.<br><br><b>结构：</b>Hätte + Subjekt + ... + PII (从句), hätte/wäre + Subjekt + ... + PII (主句)。对过去非现实的完整条件句。<br><br><b>对比：</b>Wenn er das Problem gelöst hätte, hätte er... = 标准wenn-句。此处wenn省略→Hätte er...更正式/精简。' },

{ q:'Der ___ (anzeigen) Weg führte ins Zentrum.', o:['angezeigte','anzeigende','gezeigte','zeigende'], a:0, f:'<b>Partizip II als Adjektiv: anzeigen → angezeigt</b>：被指示的那条路通往市中心。<br><br><b>规则：</b>anzeigen → PII = <b>angezeigt</b> (可分动词，ge-在中间)。作定语：被动含义→被某人指示的路。<br>der <b>angezeigte</b> Weg = der Weg, der (von jdm.) angezeigt wurde.<br><br><b>PI vs PII：</b>❌ anzeigende Weg (PI) = 正在指示别的东西的路（路不能指示，逻辑不通）。PII = 被指示的，合理。<br><br><b>anis前缀动词PII构成：</b>an+zeigen → an<b>ge</b>zeigt。所有可分前缀的PII中ge-插入在前缀和词根之间。' },

{ q:'___ seiner umfassenden Erfahrung bekam er die Stelle.', o:['Trotz','Wegen','Aufgrund','Mangels'], a:2, f:'<b>Aufgrund + Genitiv — formelle Begründung (正式理由)</b>：基于他丰富的经验，他获得了这个职位。<br><br><b>规则：</b>Weil er umfassende Erfahrung hat → <b>Aufgrund</b> + Genitiv。<br><b>Aufgrund</b> seiner umfassenden Erfahrung bekam er die Stelle.<br><br><b>Aufgrund vs Wegen（正式度对比）：</b>Aufgrund = 基于/依据（最正式，学术/政务用）Wegen = 因为（日常通用）Dank = 多亏/幸亏（积极原因）Mangels = 因缺少（法律/行政用语）。<br><br><b>⚠️ 逻辑判断：</b>Trotz丰富经验→获职位？不符！经验是获职的<b>原因</b>不是让步。用原因介词。' },

{ q:'Die Unfälle ___ auf menschliches Versagen ___. (zurückführen → Passiv)', o:['sind/zurückzuführen','werden/zurückzuführen','haben/zurückgeführt','wurden/zurückgeführt'], a:0, f:'<b>sein + zu + Infinitiv (Notwendigkeit/Passiversatz)</b>：事故可归因于人为失误。<br><br><b>规则：</b>etw. ist auf etw. zurückzuführen = etw. kann auf etw. zurückgeführt werden.<br>Die Unfälle <b>sind</b> auf menschliches Versagen <b>zurückzuführen</b>.<br><br><b>⚠️ 固定结构：</b>"zurückzuführen sein auf + Akk." 是学术用语中最常见的因果归因结构。注意auf+ Akk.配合zurückführen，zu-不定式包含在固定搭配中。<br><br><b>类似学术结构：</b>zurückgehen auf + Akk. (追溯到), beruhen auf + Dat. (基于), basieren auf + Dat. (基于)。' },

{ q:'___ des ___ kommt eine Terminverschiebung.', o:['Angesichts/Problems','Trotz/Problems','Wegen/Problem','Mangels/Problem'], a:0, f:'<b>angesichts + Genitiv (鉴于/面对)</b>：鉴于这个问题，会议延期了。<br><br><b>规则：</b><b>Angesichts</b> + Genitiv = 鉴于/面对（因看到/面临当前情况而...）。<br><b>Angesichts</b> des <b>Problems</b> kommt eine Terminverschiebung.<br><br><b>Angesichts vs Aufgrund/Wegen：</b>Angesichts = 鉴于/面对（主观的、当下的判断反应）。Aufgrund = 基于客观事实。Wegen = 因为（最通用）。三者中Angesichts最书面。<br><br><b>⚠️ 常见搭配：</b>angesichts der Tatsache, dass... / angesichts der Situation / angesichts der aktuellen Lage。' },

{ q:'___ die Inflation ___ steigt, ___ die Notenbank die Zinsen an.', o:['Sollte/null/erhöht','Sollte/steigen/würde','Wenn/steigt/erhöht','Sollte/steigen/erhöht'], a:1, f:'<b>sollte (wenn-Ersatz) + KII Konditionalsatz</b>：万一通胀继续上升，央行会提高利率。<br><br><b>规则：</b>省wenn→sollte在句首（KII形式）。Sollte + Subjekt + Infinitiv... = Wenn...sollte...<br><b>Sollte</b> die Inflation weiter <b>steigen</b>, <b>würde</b> die Notenbank die Zinsen anheben.<br><br><b>⚠️ 注意sollte的变位位置：</b>Sollte在第一位（变位动词），主语die Inflation在第二位，steigen在从句末位。sollte出现在主句之前时始终占从句第一位。<br><br><b>C1书面语必备：</b>Sollte.../Sollten...位于句首表达"万一/如果"。常见于经济/政治分析文本。' },

{ q:'Die Regierung ___ eine Steuererhöhung, um das Defizit zu ___. (beschließen→KI + FVG+um...zu)', o:['beschließe/bekämpfen','beschloss/bekämpfen','beschließe/kämpfen','beschlossen/bekämpfen'], a:0, f:'<b>KI + Defizit-FVG + um...zu Finalsatz</b>：政府决定增税以应对赤字。<br><br><b>规则：</b>间接引语→KI: beschließen + 第三人称 = <b>beschließe</b>。Defizit bekämpfen (FVG: bekämpfen + Akk.)。um...zu表示主从句主语相同（均为Regierung）。<br>...<b>beschließe</b> eine Steuererhöhung, um das Defizit zu <b>bekämpfen</b>.<br><br><b>⚠️ Defizit作宾语：</b>Defizit = 赤字(Neut., das)。❌ "Defizit kämpfen" 无此搭配。"Defizit beseitigen/bekämpfen" 是标准FVG。<br><br><b>C1新闻听力/阅读高频：</b>Defizit, Steuererhöhung, Staatsverschuldung, Haushaltskonsolidierung。' },

{ q:'Die Polizei geht ___, dass es sich um Brandstiftung ___ (handeln→KI).', o:['davon/aus/handele','daraus/vor/handelt','davon/an/handelt','darauf/ein/handele'], a:0, f:'<b>davon ausgehen, dass... + KI (间接引语+Präpositionaladverb)</b>：警方推断这是一起纵火案。<br><br><b>规则：</b>ausgehen <b>von</b> → Präpositionaladverb: <b>davon</b>。davon ausgehen, dass... = 从...出发/推断/假定。<br>Es handelt sich um + Akk. → KI: es <b>handele</b> sich um...<br>Die Polizei geht <b>davon aus</b>, dass es sich um Brandstiftung <b>handele</b>.<br><br><b>⚠️ 双层语法嵌套：</b>① davon ausgehen (Präpositionaladverb+Vorab信息) ② dass句内用KI (间接引语/转述)。两层互不影响，各管各的。<br><br><b>Präpositionaladverb核心规则：</b>da(r)+介词在从句/不定式前作vorausweisendes Element。vor+→davor, aus+→daraus, auf+→darauf, an+→daran。' },

{ q:'Der Angeklagte ___ von der Schuld ___. (freisprechen → Passiv Zustand)', o:['ist/freigesprochen','wurde/freigesprochen','hat/freigesprochen','wird/freigesprochen'], a:0, f:'<b>Zustandspassiv — freisprechen (宣告无罪)</b>：被告已被宣告无罪。<br><br><b>规则：</b>freisprechen → PII = <b>freigesprochen</b> (可分动词，ge-在中间)。Zustandspassiv: <b>ist</b> freigesprochen (结果状态：无罪释放)。<br>Der Angeklagte <b>ist</b> von der Schuld <b>freigesprochen</b>.<br><br><b>⚠️ Vorgang vs Zustand: wurde vs ist：</b>wurde freigesprochen = 在法庭上被宣告无罪（动作过程）。ist freigesprochen = 已被宣判无罪（结果状态）。此处强调的被告当前状态→Zustandspassiv ist。<br><br><b>法律用语（C1专业场景）：</b>freisprechen von + Dat. (无罪释放), verurteilen zu + Dat. (判刑), anklagen wegen + Gen. (控告)。' },

{ q:'Die ___ (zugrunde liegen) Theorie ist umstritten.', o:['zugrundeliegende','zugrundegelegene','zugrundeliegene','grundliegende'], a:0, f:'<b>Partizip I: zugrunde liegen → zugrundeliegend (复杂分词定语)</b>：作为基础的该理论存在争议。<br><br><b>规则：</b>zugrunde liegen (可分动词) → PI = <b>zugrundeliegend</b> + 词尾-e = <b>zugrundeliegende</b> Theorie。<br>die <b>zugrundeliegende</b> Theorie = die Theorie, die (einer Sache) zugrunde liegt.<br><br><b>⚠️ 复杂分词识别（C1阅读核心技能）：</b>遇到长单词第一步：分解。zugrunde + liegend → "based on / underlying"。第二步：判断PI还是PII。PI = 主动/进行/基础性。<br><br><b>类似学术分词：</b>zugrundeliegend, naheliegend (obvious), weitreichend (far-reaching), schwerwiegend (serious/grave)。' },

{ q:'___ der Prüfung nicht bestanden ___, ___ ich ein Jahr verloren.', o:['Hätte/hätte','Habe/habe','Hätte/hat','Habe/hätte'], a:0, f:'<b>Irreales Konditionalgefüge — KII Vergangenheit</b>：如果当时我没通过考试（但其实通过了），我就浪费了一年。<br><br><b>规则：</b>对过去的非现实假设→KII Vergangenheit: hätte + PII。省略wenn→动词第一位。<br><b>Hätte</b> ich die Prüfung nicht <b>bestanden</b>, <b>hätte</b> ich ein Jahr verloren.<br><br><b>⚠️ 语序关键：</b>第一个hätte在从句第一位（省wenn），第二个hätte在主句第一位。主语ich在从句和主句中均紧随动词。<br><br><b>非现实标记：</b>使用KII Vergangenheit清楚地表明"事实上我通过了"（反事实条件）。这是C1写作中表达非现实因果关系的核心手段。' },

{ q:'___ der Versicherung wurde der Schaden übernommen.', o:['Von seiten','Seitens','Seite','Von Seite'], a:1, f:'<b>seitens + Genitiv — formelle Herkunftsangabe</b>：由保险公司方面承担了损失。<br><br><b>规则：</b><b>Seitens</b> + Genitiv = von Seiten + Gen. = 由...方面/从...侧。这是C1及以上书面语的典型介词。<br><b>Seitens</b> der Versicherung wurde der Schaden übernommen.<br><br><b>⚠️ 拼写关键：</b>Seitens是一个词！不是"Seite"的分开形式。❌ "Von seiten" 语法存在但非标准。❌ "Seite"缺少-s。<br><br><b>C1行政/法律文本高频：</b>seitens der Behörde (由当局), seitens des Unternehmens (由企业方), seitens der Politik (政治方面)。' },

{ q:'Er ___ ein Experte auf diesem Gebiet ___. (gelten → KI)', o:['gelte/sein','galt/sein','gilt/sein','gelte/gewesen'], a:0, f:'<b>KI + gelten als (转述断言)</b>：据称他是这个领域的专家。<br><br><b>规则：</b>gelten KI第三人称 = <b>gelte</b>。gelten als + Nom. + sein。<br>Er <b>gelte</b> als Experte <b>zu sein</b>... 不，应该是：Er <b>gelte</b> als Experte. 或 Er <b>gelte</b> in seiner Branche als führend.<br><br><b>注意：</b>gelten als后直接加Nom.名词/形容词，不需要sein。Man sagt, er gelte als Experte.<br><br><b>⚠️ KI形式记忆：</b>gelten→ich gelte, er/sie/es <b>gelte</b>。第三人称KI与第一人称直陈式相同，但在间接引语中承担疏离功能。' },

{ q:'Das Abkommen ___ in der kommenden Woche ___. (unterzeichnen → Passiv)', o:['soll/unterzeichnet werden','ist/unterzeichnet worden','hat/unterzeichnet','wurde/unterzeichnet'], a:0, f:'<b>sollen + Passiv — 计划中的被动行为</b>：协议应于下周签署。<br><br><b>规则：</b>sollen (按计划/预定) + PII + werden = 按预定要被...<br>Das Abkommen <b>soll</b> in der kommenden Woche <b>unterzeichnet werden</b>.<br><br><b>⚠️ sollen的多种含义：</b>① 义务：Du sollst das machen. = 你应该做这个。② 计划/预定：Das Abkommen soll unterzeichnet werden. = 协议预定将被签署。③ 据称：Er soll krank sein. = 据说他病了。<br><br><b>C1阅读判断技巧：</b>通过上下文区分sollen的哪种含义。含未来时间+sollen+Passiv→计划/预定义。' },

{ q:'Das Gebäude ___ vor drei Jahren ___ . (renovieren → Vollendungspassiv)', o:['ist/renoviert worden','wurde/renoviert','hat/renoviert','ist/renoviert'], a:0, f:'<b>Passiv Perfekt — abgeschlossene Handlung</b>：该建筑三年前已被翻新。<br><br><b>规则：</b>Vorgangspassiv Perfekt = <b>sein + PII + worden</b>。强调已经完成的过程。<br>Das Gebäude <b>ist</b> vor drei Jahren <b>renoviert worden</b>.<br><br><b>⚠️ Zeitpunkt + Passiv Perfekt：</b>vor drei Jahren指示过去时间点。但用现在完成时被动表达该动作对现在的相关性/完成性。德语中Perfekt和Präteritum在口语中可互换。<br><br><b>⚠️ Passiv Perfekt vs Zustandspassiv：</b>ist renoviert worden = 被翻新过了（过程，强调动作发生并完成）。ist renoviert = 处于翻新状态（结果状态）。关键差异：有无worden。' },

{ q:'Er ___ das Geld ___ haben. (wollen → subjektiv)', o:['will/zurückgezahlt','möchte/zurückzahlen','will/zurückzahlen','hat/zurückzahlen'], a:0, f:'<b>Subjektives Modalverb — wollen (自称/声称)</b>：他自称已经还了钱（但我表示怀疑）。<br><br><b>规则：</b><b>wollen</b> + PII + haben = 主语<b>自称</b>做了某事（说话人存疑）。<br>Er <b>will</b> das Geld <b>zurückgezahlt</b> haben. = 他声称还了钱（但我不确定/不信）。<br><br><b>⚠️ wollen vs sollen 核心区别：</b>wollen + PII + haben = 主语自己声称（Er will...haben = 他自称）。sollen + PII + haben = 别人称/传（Er soll...haben = 据说/别人传）。<br><br><b>C1必考点：</b>对两类subjektive Modalverben的区分及态度判断（说话人对转述内容采信程度）。' },

{ q:'Im ___ der Veränderungen ___ viele ihre Arbeit. (Zuge/verlieren → Nominalstil)', o:['Zuge/verloren','Zug/verlieren','Zuge/verlieren','Zug/verloren'], a:0, f:'<b>im Zuge + Genitiv — Nominalstil (在...过程中)</b>：在变革过程中许多人失去了工作。<br><br><b>规则：</b><b>Im Zuge</b> + Genitiv = während + Nebensatz = 在...进程/过程中。为书面的名词化结构。<br><b>Im Zuge</b> der Veränderungen <b>verloren</b> viele ihre Arbeit.<br><br><b>⚠️ 动词时态：</b>verloren = verlieren Prät. (失去)。这里使用过去时描述已经发生的伴随过程。<br><br><b>类似Nominalstil结构(C1写作)：</b>im Zuge + Gen. (过程中), im Laufe + Gen. (历程中), im Rahmen + Gen. (框架/范围内), im Anschluss an + Akk. (紧接着...)。' },

{ q:'Die Maßnahme ___ ihr Ziel ___. (verfehlen → Perfekt)', o:['hat/verfehlt','ist/verfehlt','hat/gefehlt','ist/gefehlen'], a:0, f:'<b>verfehlen Perfekt: haben + verfehlt (不可分动词)</b>：该措施未达到目标。<br><br><b>规则：</b>verfehlen = 不可分动词，PII = <b>verfehlt</b> (无ge-)。助动词: <b>haben</b>。<br>Die Maßnahme <b>hat</b> ihr Ziel <b>verfehlt</b>.<br><br><b>⚠️ fehlen vs verfehlen：</b>fehlen = 缺少/缺席 (不及物)。verfehlen = 未达到/错过 (及物)。两者含义不同：Das Ziel fehlt = 目标缺失。Das Ziel verfehlt = 未达到目标。<br><br><b>不可分动词PII识别：</b>ver-, be-, ent-, emp-, er-, ge-, miss-前缀的动词PII<b>不含ge-</b>。verfehlen → verfehlt。' },

{ q:'___ der schlechten Wirtschaftslage ___ die Firma expandieren.', o:['Trotz/konnte','Wegen/konnte','Dank/konnte','Aufgrund/konnte'], a:0, f:'<b>Trotz + Genitiv + Modalverb (让步+能力)</b>：尽管经济形势不好，公司仍能扩张。<br><br><b>规则：</b>Obwohl die Wirtschaftslage schlecht war → <b>Trotz</b> + Genitiv。können Prät. = <b>konnte</b>。<br><b>Trotz</b> der schlechten Wirtschaftslage <b>konnte</b> die Firma expandieren.<br><br><b>⚠️ 语义逻辑检验：</b>经济不好→预期不能扩张→实际仍扩张→让步关系！用Trotz。<br>❌ Wegen der schlechten Lage konnte die Firma expandieren = 因为经济不好所以能扩张（逻辑荒谬）。<br><br><b>Dank + Gen./Dat.：</b>表示"多亏"（积极原因）。Dank guter Führung = 多亏好的领导力。' },

{ q:'Das ist ein nicht zu ___ (übersehen) Problem.', o:['übersehendes','übersehenes','übersehen','zu übersehen'], a:0, f:'<b>nicht zu + Partizip I — erweiterte Attributkonstruktion</b>：这是一个不可忽视的问题。<br><br><b>规则：</b>nicht zu + Infinitiv (此处为übersehen) + 形容词词尾。但结构是: ein nicht zu <b>übersehendes</b> Problem = ein Problem, das nicht übersehen werden kann.<br><b>⚠️ 注意：</b>这里用PI (übersehend)，因为"不可以被忽视的"中的"忽视"仍为主动含义修饰das Übersehen (此处的gerundive sense)。但实际上是: nicht zu übersehend- = 不能被忽视的。<br><br><b>C1阅读关键：</b>nicht/nur/schwer + zu + PI = gerundive构造（拉丁语法流入德语）。nicht zu unterschätzend (不可低估的), schwer zu verstehend (难以理解的)。' },

{ q:'Der Verein setzt ___ für Umweltschutz ___. (sich einsetzen → trennbar)', o:['sich/ein','es/ein','ihn/ein','sich/zu'], a:0, f:'<b>sich einsetzen für + Akk. (投身/致力于)</b>：该协会致力于环境保护。<br><br><b>规则：</b>sich <b>einsetzen</b> für + Akk. = 投身/努力/致力于。可分动词：einsetzen。<br>Der Verein setzt <b>sich</b> für Umweltschutz <b>ein</b>.<br><br><b>⚠️ trennbar: einsetzen：</b>setzt...ein (现在时)。反身代词sich永远置于动词后。全句：Subjekt + setzt + sich + für... + ein。<br><br><b>类似反身+介词搭配：</b>sich einsetzen für (致力), sich engagieren für/bei (参与), sich bemühen um (努力争取), sich kümmern um (处理)。C1写作必备。' },

{ q:'Die ___ (bewerben) Person hatte sehr gute Qualifikationen.', o:['sich bewerbende','beworbene','bewerbende','beworbte'], a:0, f:'<b>Partizip I mit Reflexivpronomen (反身PI作定语)</b>：那个申请的人资质很好。<br><br><b>规则：</b>sich bewerben → PI = <b>sich bewerbend</b> (连同反身代词一起保留) + 词尾-e。<br>die <b>sich bewerbende</b> Person = die Person, die sich bewirbt.<br><br><b>⚠️ 反身动词PI必须保留sich：</b>这是C1阅读中最容易被忽略的语法点。sich bewerbend, sich entwickelnd, sich verändernd, sich beschleunigend。<br><br><b>反身PI vs 反身PII：</b>PI = 正在申请的（主动进行）。PII (beworben) = 被申请的（不存在，逻辑不通）。反身动词的PII无法作定语（因为反身含义丢失）。' },

{ q:'Der Vorschlag ___ im Ausschuss diskutiert ___. (werden → Passiv Perfekt)', o:['ist/worden','wurde/worden','hat/werden','ist/geworden'], a:0, f:'<b>Passiv Perfekt — worden 完整形式</b>：该提案已在委员会中讨论过了。<br><br><b>规则：</b>Vorgangspassiv Perfekt = <b>sein + PII + worden</b>。werden的PII在被动中用<b>worden</b> (不是geworden!)。<br>Der Vorschlag <b>ist</b> im Ausschuss diskutiert <b>worden</b>.<br><br><b>⚠️ worden vs geworden (再强调)：</b>被动中: worden。作实义动词: geworden (Er ist Lehrer geworden.)。<br><br><b>双sein结构记忆：</b>ist (Hilfsverb) + diskutiert (Vollverb PII) + worden (werden PII)。三重动词语序：助动词在第二位，Vollverb PII在中间，worden在末位或接近末位。' },

{ q:'___ der Forscher ___ (annehmen → KI), ___ das Experiment erfolgreich ___.', o:['Wie/annimmt/sei/verlaufen','Laut/annehme/sei/verlaufen','Nach/angenommen/ist/verlaufen','Wie/angenommen/sei/verlaufen'], a:1, f:'<b>KI indirekte Rede + laut (按据/根据)</b>：据研究者推测，实验已成功完成。<br><br><b>规则：</b><b>Laut</b> + Nom./Gen. 引导引用。间接引语: annehmen KI = <b>annehme</b> (第三人称)。verlaufen KI Perf. = <b>sei verlaufen</b> (用sein)。<br><b>Laut</b>... <b>annehme</b>... <b>sei</b> das Experiment erfolgreich <b>verlaufen</b>.<br><br><b>⚠️ laut + Nom./Dat./Gen.：</b>laut des Forschers (Gen.), laut dem Forscher (Dat.), laut Forscher (Nom. 无冠词用法)。三者在现代德语中都可接受。<br><br><b>C1引述结构汇总：</b>laut + Nomen/Quelle, zufolge + Dat. (nachgestellt: dem Bericht zufolge), nach + Dat., gemäß + Dat.。' },

{ q:'Die Probleme, mit ___ ich mich ___ , sind komplex. (sich befassen→Relativsatz)', o:['denen/befasse','der/befassen','die/befasse','dem/befasse'], a:0, f:'<b>Relativpronomen Dativ Plural + Präposition</b>：我正在处理的那些问题很复杂。<br><br><b>规则：</b>先行词die Probleme (Pl.)。sich befassen mit + Dat. → 关系代词: mit + Dat. Pl. = mit <b>denen</b>。<br>die Probleme, mit <b>denen</b> ich mich <b>befasse</b>...<br><br><b>⚠️ Dativ Plural关系代词关键：</b>Mask./Neut. Dat. = dem, Fem. Dat. = der, <b>Plural Dat. = denen</b>。❌ "mit der" = Fem. Dat.，但Probleme是Plural。<br><br><b>变格记忆：</b>denen是Dativ Plural的独占形（其他所有的der/die/das/dessen/deren都可复用于Fem.或其他格）。Dativ Plural专有形=denen。' },

{ q:'Sie ___ das Problem lieber heute als morgen ___ . (lösen → KII Wunsch)', o:['würde/lösen','hätte/gelöst','würde/zu lösen','ist/lösen'], a:0, f:'<b>KII würde + Infinitiv — Wunsch mit lieber (宁愿/更喜欢)</b>：她宁愿今天就把问题解决（而不是明天）。<br><br><b>规则：</b>lieber...als... + KII (würde + Inf.) = 宁愿...而不愿...。würde + Infinitiv + lieber...als...<br>Sie <b>würde</b> das Problem lieber heute als morgen <b>lösen</b>.<br><br><b>⚠️ lieber位置：</b>通常在würde之后、宾语之前。lieber...als...结构对比两个时间状语：heute vs morgen。<br><br><b>lieber + KII常见表达：</b>Ich würde lieber zu Hause bleiben. (我宁愿在家。) / Ich hätte lieber früher angefangen. (我宁愿早点开始。) / Es wäre mir lieber, wenn... (我更喜欢...)。' },

{ q:'Der zuletzt ___ (diskutieren) Punkt ist wichtig.', o:['diskutierte','diskutierende','zu diskutieren','diskutiert gewordene'], a:0, f:'<b>Partizip II + zuletzt (最近被讨论的)</b>：最近被讨论的那一点很重要。<br><br><b>规则：</b>diskutieren → PII = <b>diskutiert</b> (规则变化，不可分→无ge-)。zuletzt diskutiert = 最近被讨论的。<br>der zuletzt <b>diskutierte</b> Punkt = der Punkt, der zuletzt diskutiert wurde.<br><br><b>⚠️ PI diskutierend vs PII diskutiert：</b>zuletzt diskutierend (PI) = 最近正在讨论的（主动/进行）。zuletzt diskutiert (PII) = 最近被讨论完的（被动/完成）。<br><br><b>C1阅读识别要点：</b>被动/完成含义→PII；主动/进行含义→PI。zuletzt + PII 是典型的时间+分词搭配，表示"最近被...的"。' },

{ q:'Er nahm den Auftrag ___, das Angebot zu ___.', o:['an/prüfen','auf/prüfen','zu/prüfen','ein/prüfen'], a:0, f:'<b>annehmen + zu-Infinitiv (接受+不定式)</b>：他接受了任务去审查报价。<br><br><b>规则：</b>annehmen (可分动词: an+nehmen) → nahm...an (Prät.). Den Auftrag annehmen, etw. zu tun. = 接受任务去做某事。<br>Er <b>nahm</b> den Auftrag <b>an</b>, das Angebot zu <b>prüfen</b>.<br><br><b>⚠️ 可分前缀区分：</b>an/nehmen (接受) vs auf/nehmen (接收/录制) vs ein/nehmen (挣取/服用) vs zu/nehmen (增加)。四个前缀含义完全不同。<br><br><b>auf vs an — 核心区分：</b>einen Auftrag annehmen = 接受委托。einen Auftrag aufnehmen = 开始执行/录制一个订单。Prüfung ist annehmen后的zu不定式，表示"为审查报价而接受任务"。' },

{ q:'___ des Tarifvertrags wurde der Streik ___. (beenden→原因+Passiv)', o:['Infolge/beendet','Trotz/beendet','Während/beenden','Infolge/beenden'], a:0, f:'<b>infolge + Genitiv — Konsekutivangabe (结果介词)</b>：由于达成了工资协议，罢工被结束了。<br><br><b>规则：</b><b>Infolge</b> + Genitiv = 由于/因为...的结果（正式书面语，强调因果关系）。<br>Passiv: wurde beendet (beenden → PII = beendet).<br><b>Infolge</b> des Tarifvertrags <b>wurde</b> der Streik <b>beendet</b>.<br><br><b>⚠️ 原因介词细微差异：</b>infolge = 因...的结果（强调作为结果）。aufgrund = 基于/根据（最正式）。wegen = 因为（最通用）。infolge + Gen. 常见于新闻/政务文本。<br><br><b>⚠️ 区分infolge (davor) vs infolgedessen (dahinter)：</b>infolge = 介词+Gen.；infolgedessen = 副词/连词。' },

{ q:'Der Kunde drohte ___, den Vertrag zu kündigen.', o:['damit','davon','darauf','daran'], a:0, f:'<b>drohen + damit (威胁说...)</b>：客户威胁要解约。<br><br><b>规则：</b>drohen, dass.../zu... → Präpositionaladverb: <b>damit</b> drohen, dass/zu...<br>Der Kunde drohte <b>damit</b>, den Vertrag zu kündigen.<br><br><b>⚠️ Vorab-Pronomen + zu-Infinitiv：</b>很多动词在接zu-Infinitiv前需要一个da(r)-Vorab。drohen → damit drohen, etw. zu tun。我们中文母语者常漏掉这个damit！<br><br><b>类似动词 (C1必掌握)：</b>damit rechnen, dass... (预计/料到), darauf bestehen, dass/zu... (坚持), sich daran gewöhnen, zu... (习惯于), sich darauf freuen, zu... (期待)。' },

{ q:'In ___ auf den steigenden Bedarf wurde das Werk ___. (erweitern→Passiv)', o:['Hinblick/erweitert','Anbetracht/erweitert','Bezug/erweitert','Rücksicht/erweitert'], a:0, f:'<b>im/in Hinblick auf + Akk. (考虑到/着眼于)</b>：针对不断增长的需求，工厂被扩建了。<br><br><b>规则：</b><b>Im/In Hinblick auf</b> + Akk. = 考虑到/着眼于/针对。Passiv: wurde erweitert.<br><b>Im Hinblick auf</b> den steigenden Bedarf <b>wurde</b> das Werk <b>erweitert</b>.<br><br><b>⚠️ im vs in：</b>两者都可用于Hinblick auf。im Hinblick (更常见), in Hinblick (也可接受)。<br><br><b>类似结构区分（C1最高频混淆组）：</b>im Hinblick auf + Akk. (考虑到/针对), in Anbetracht + Gen. (考虑到/鉴于), in Bezug auf + Akk. (关于/涉及), mit Rücksicht auf + Akk. (顾及/考虑到)。' },

{ q:'Es ___ zu berücksichtigen, dass die Daten veraltet sind.', o:['gilt','ist','hat','wird'], a:0, f:'<b>es gilt zu + Infinitiv (必须/应当)</b>：必须考虑到数据已过时。<br><br><b>规则：</b><b>Es gilt zu</b> + Infinitiv = 必须/应当做某事（表示必要性/重要性）。<br><b>Es gilt</b> zu berücksichtigen, dass... = Es muss berücksichtigt werden, dass...<br><br><b>⚠️ 固定句型：</b>Es gilt + zu + Inf. = 应当/必须。Es gilt als + Nom./Adj. = 被认为是。两个结构完全不同。<br><br><b>C1写作/学术常用：</b>Es gilt zu beachten, dass... / Es gilt festzuhalten, dass... / Es gilt als erwiesen, dass...。三个经典句型。' },

{ q:'Der Preis der ___ (zugrunde liegen) Rohstoffe ist gestiegen.', o:['zugrundeliegenden','zugrundegelegenen','zugrundeliegene','grundliegenden'], a:0, f:'<b>erweitertes Partizip I: zugrunde liegen → zugrundeliegend (复杂定语)</b>：作为基础的原材料的那个价格已上涨。<br><br><b>规则：</b>zugrunde liegen (可分动词) → PI = <b>zugrundeliegend</b> + 词尾-en (Dat. Pl. nach der)。<br>der Preis der <b>zugrundeliegenden</b> Rohstoffe = der Preis der Rohstoffe, die zugrunde liegen.<br><br><b>⚠️ 复杂分词前置识别（C1阅读核心难点）：</b>der + [定语1] + [定语2] + ... + 名词。deconstruct: der (冠词) → zugrundeliegenden (PI定语) → Rohstoffe (核心名词 Gen.)。<br><br><b>翻译技巧：</b>把前置分词还原为关系从句，优先理解核心名词，再反向理解分词修饰。' },

{ q:'Die ausländischen Investitionen ___ im letzten Quartal ___. (zurückgehen → Perfekt)', o:['sind/zurückgegangen','haben/zurückgegangen','sind/zurückgegeht','wurden/zurückgegangen'], a:0, f:'<b>zurückgehen Perfekt: sein + zurückgegangen</b>：外国投资在上个季度回落了。<br><br><b>规则：</b>zurückgehen = 可分动词 (zurück+gehen)。PII = <b>zurückgegangen</b> (gehen→gegangen, 可分前缀引发ge-位置变化)。gehen用<b>sein</b>作助动词。<br>Die Investitionen <b>sind</b> im letzten Quartal <b>zurückgegangen</b>.<br><br><b>⚠️ 可分动词PII中ge-的位置：</b>zurück + ge + gangen → zurückgegangen (ge-在前缀和词根之间)。同理：aufstehen → aufgestanden, ankommen → angekommen。<br><br><b>投资/经济C1词汇：</b>steigen→sinken/zurückgehen, Gewinn→Verlust, Wachstum→Rückgang。' },

{ q:'Sie ___ vor, das Projekt zu ___. (haben→vorhaben→trennbar)', o:['hat/verschieben','hatte/verschoben','hat/verschoben','habe/verschieben'], a:0, f:'<b>vorhaben + zu-Infinitiv (计划/打算)</b>：她打算推迟项目。<br><br><b>规则：</b>vorhaben (可分动词: vor+haben) = 计划/打算。现在时：<b>hat...vor</b>。加zu不定式：hat vor, zu verschieben。<br>Sie <b>hat</b> vor, das Projekt zu <b>verschieben</b>.<br><br><b>⚠️ 可分前缀位置：</b>现在时：hat...vor。zu不定式：vor + zu + haben → vorzu... 不：hat vor, zu + 本动词Infinitiv。<br><br><b>类似可分动词+zu结构：</b>vorhaben → hat vor, zu... / aufhören → hört auf, zu... / anfangen → fängt an, zu...。这些都与zu不定式搭配使用。' },

{ q:'Der ___ (beauftragt) Ingenieur leitet das Projekt.', o:['beauftragte','beauftragende','beauftragen','beauftragt gewordene'], a:0, f:'<b>PII als Adjektiv: beauftragen → beauftragt</b>：受委托的那位工程师领导这个项目。<br><br><b>规则：</b>beauftragen = 不可分动词 (Be+auftrag)，PII = <b>beauftragt</b> (无ge-)。作定语：被动含义→被委托的。<br>der <b>beauftragte</b> Ingenieur = der Ingenieur, der (mit etw.) beauftragt wurde.<br><br><b>⚠️ PI vs PII 语义关键：</b>❌ beauftragende Ingenieur (PI) = 正在委托别人的工程师（主动）。✔ beauftragte Ingenieur (PII) = 被委托的工程师（被动）。' },

{ q:'Der Vorfall ___ zu einer Krise ___. (führen → Perfekt)', o:['hat/geführt','ist/geführt','wurde/geführt','hat/führen'], a:0, f:'<b>führen zu + Dativ (导致/引起)</b>：该事件导致了一场危机。<br><br><b>规则：</b>führen → PII = <b>geführt</b> (规则变化)。führen + zu + Dat. = 导致/引起。<br>Der Vorfall <b>hat</b> zu einer Krise <b>geführt</b>.<br><br><b>⚠️ führen vs führen zu：</b>jdn. führen = 带领/引导某人 (及物)。zu etw. führen = 导致/引起某事 (不及物+介词)。<br><br><b>C1写作因果表达汇总：</b>führen zu + Dat., bewirken + Akk. (及物), verursachen + Akk. (及物，多为负面), auslösen + Akk. (触发), zur Folge haben + Akk. + dass...。' },

{ q:'Der Forscher ___ den Nobelpreis ___ (erhalten → KI)', o:['erhalte/erhalten','erhalte/erhaltet','hat/erhalten','erhalten/hat'], a:0, f:'<b>KI Perfekt: erhalten (获得/收到)</b>：据悉该研究者获得了诺贝尔奖。<br><br><b>规则：</b>间接引语转述→KI: erhalte (现在时第三人称) + PII = erhalten haben。但此题：erhalte + erhalten (erhalten的PII与不定式同形)。<br>Der Forscher <b>erhalte</b> den Nobelpreis... 或 Der Forscher habe den Nobelpreis <b>erhalten</b>.<br><br><b>⚠️ erhalten的PII与Infinitiv同形：</b>erhalten → hat erhalten (PII = 与不定式同形)。别被迷惑：虽然长得一样，但一个是Infinitiv一个是PII。<br><br><b>KI使用场景判断：</b>新闻报导转述获奖情况→用KI。系客观转述（不加入说话人态度）。' },

{ q:'___ Kenntnisnahme ___ das Schreiben als erledigt. (gelten → Amtssprache)', o:['Zur/gilt','Nach/gilt','Mit/gilt','Durch/gilt'], a:0, f:'<b>Amtsdeutsch: zur Kenntnisnahme (行政用语)</b>：经阅悉，该函件已完结。<br><br><b>规则：</b><b>Zur Kenntnisnahme</b> + gilt als erledigt = 经知悉/阅后，视为已处理。这是行政/官方信件中最常见表述。<br><b>Zur</b> Kenntnisnahme <b>gilt</b> das Schreiben als erledigt.<br><br><b>⚠️ Amtsdeutsch固定表达：</b>zur Kenntnis nehmen (获悉), zur Kenntnis bringen (通知), zur Kenntnisnahme (作为知悉/存档)。德语官方文书高频表达。<br><br><b>C1场景：</b>这是书面德语的典型特征。Beamten-/Amtsdeutsch通常以Nominalsierung为主，动词使用频率低。' },

{ q:'___ er auch ___, er kam zu spät.', o:['So sehr/sich beeilte','Obwohl/beeilte','Trotzdem/beeilte','So sehr/beeilte sich'], a:0, f:'<b>Konzessivsatz: so sehr...auch (无论多么)</b>：无论他多么赶，他还是迟到了。<br><br><b>规则：</b><b>So sehr</b> + Subjekt + <b>auch</b> + Verb = 无论多么/不管多么。<br><b>So sehr</b> er <b>sich</b> auch <b>beeilte</b>, er kam zu spät.<br><br><b>⚠️ 反身代词位置：</b>sich beeilen (反身动词) → So sehr er <b>sich</b> auch beeilte (sich紧跟主语er)。<br><br><b>C1让步结构汇总：</b>so...auch, wie...auch, w-Wort+auch (wer auch immer, was auch immer), mögen+Inf. (Mag es auch regnen, wir gehen raus.), sei es...oder...。' },

{ q:'Die Verdächtige ___ von der Polizei ___ (festnehmen → Passiv Perfekt)', o:['ist/festgenommen worden','wurde/festgenommen','hat/festgenommen','ist/festgenommen'], a:0, f:'<b>Passiv Perfekt: festnehmen (逮捕)</b>：女嫌疑人已被警方逮捕。<br><br><b>规则：</b>festnehmen (可分动词: fest+nehmen) → PII = <b>festgenommen</b> (nehmen→genommen，ge-插入: fest+ge+nommen)。Passiv Perfekt = <b>ist + PII + worden</b>。<br>Die Verdächtige <b>ist</b> von der Polizei <b>festgenommen worden</b>.<br><br><b>⚠️ nehmen强变化：</b>nehmen→nimmt→nahm→genommen。这是最常用也是最易错的强变化动词之一，须牢牢记熟。<br><br><b>法律场景：</b>festnehmen (暂时拘留), verhaften (正式逮捕), inhaftieren (监禁)。三个词严重程度递增。' },

{ q:'Das Produkt ___ sich großer Beliebtheit. (erfreuen → reflexiv)', o:['erfreut','erfreut sich','freut','freut sich'], a:1, f:'<b>sich erfreuen + Genitiv (受欢迎/享有)</b>：该产品深受欢迎。<br><br><b>规则：</b>sich + <b>erfreuen</b> + Genitiv = 享有/受（欢迎等）。这是C1书面语中和常用的rejoice/sich freuen不同的高端表达。<br>Das Produkt <b>erfreut sich</b> großer Beliebtheit. = Das Produkt ist sehr beliebt.<br><br><b>⚠️ erfreuen vs sich erfreuen：</b>jdn. erfreuen = 使某人高兴 (及物)。sich erfreuen + Gen. = 享有/拥有（高端书面语）。两义完全不同！<br><br><b>常见搭配：</b>sich großer Beliebtheit erfreuen, sich einer hohen Nachfrage erfreuen, sich eines guten Rufs erfreuen。都是Genitiv。' },

{ q:'___ des Ministeriums ___ die Maßnahmen ___. (zustimmen→Nominalisierung+KI)', o:['Seitens/würden/begrüßt','Seite/werden/begrüßen','Seitens/werde/begrüßt','Von/nach/werden begrüßt'], a:0, f:'<b>seitens + Gen. + KI indirekte Rede (由...方面+间接引语)</b>：据部里方面表示，这些措施受到欢迎。<br><br><b>规则：</b><b>Seitens</b> + Gen. = 由...方面（正式行政用语）。间接引语: werden KI = <b>würden</b> (第三人称复数)。<br><b>Seitens</b> des Ministeriums <b>würden</b> die Maßnahmen <b>begrüßt</b>.<br><br><b>⚠️ werden KI形式: würden：</b>werden KI 第三人称复数 = <b>würden</b> (不是wurden！)。wurden = 直陈式过去时；würden = KI/KII。<br><br><b>C1行政/新闻双语汇：</b>seitens (由...方面), laut (据...), zufolge (据...), nach Angaben + Gen. (据...的数据)。都是转述/引用标志。' },

// ===== ERROR BANK =====
function loadErrorBank() {
  try { return JSON.parse(localStorage.getItem('de-errorbank') || '{}'); } catch(e) { return {}; }
}
function saveErrorBank(bank) { localStorage.setItem('de-errorbank', JSON.stringify(bank)); schedulePush(); }
function addError(type, question, options, correctIdx, userAnswer, explanation, topic) {
  let bank = loadErrorBank();
  let id = 'err-' + Date.now() + '-' + Math.random().toString(36).substr(2,4);
  bank[id] = {type, question, options, correctIdx, userAnswer, explanation, topic, timestamp: Date.now(), reviewed: 0, mastered: false};
  saveErrorBank(bank);
}
function getActiveErrors() {
  let bank = loadErrorBank();
  return Object.entries(bank).filter(function(e) { return !e[1].mastered; }).sort(function(a,b) { return b[1].timestamp - a[1].timestamp; });
}
function getErrorCount() { return getActiveErrors().length; }
function markErrorReviewed(errId, correct) {
  let bank = loadErrorBank();
  if (!bank[errId]) return;
  bank[errId].reviewed = (bank[errId].reviewed||0) + 1;
  if (correct) bank[errId].reviewed += 1;
  if (bank[errId].reviewed >= 2) bank[errId].mastered = true;
  saveErrorBank(bank);
}

// ===== TEST INFRASTRUCTURE =====
window.testState = window.testState || {};
window.testScores = window.testScores || {};

function renderTest(pageId, questions, prefix, testType) {
  window.testScores[prefix] = 0;
  window.testState[prefix] = {questions: questions, testType: testType, answers: new Array(questions.length).fill(null)};

window.answerTestQ = function(el) {
  var prefix = el.getAttribute('data-prefix');
  var idx = parseInt(el.getAttribute('data-idx'));
  var correct = el.getAttribute('data-correct') === 'true';
  var userIdx = parseInt(el.getAttribute('data-useridx'));
  var state = window.testState[prefix];
  if (!state) {
    // Auto-init state for reading/listening quizzes
    if (!window.testState[prefix]) {
      window.testState[prefix] = {questions: [], answers: []};
      window.testScores[prefix] = 0;
    }
    state = window.testState[prefix];
  }
  if (state.answers[idx] !== null) return;
  if (el.parentElement.querySelector('.q-option.correct')) return;

  var fbEl = document.getElementById(prefix + '-fb-' + idx);
  var q = state.questions[idx];

  if (correct) {
    el.classList.add('correct');
    fbEl.textContent = '✅ ' + q.f;
    fbEl.style.display = 'block';
    state.answers[idx] = {correct: true};
    window.testScores[prefix] = (window.testScores[prefix]||0) + 1;
    var scoreEl = document.getElementById(prefix + '-score');
    if (scoreEl) scoreEl.textContent = window.testScores[prefix];
  } else {
    el.classList.add('wrong');
    state.answers[idx] = {correct: false, userIdx: userIdx};
    fbEl.innerHTML = '❌ Richtig: <strong>' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</strong> — ' + q.f;
    fbEl.style.display = 'block';
    var opts = el.parentElement.querySelectorAll('.q-option');
    opts[q.a].classList.add('correct');
    for (var k = 0; k < opts.length; k++) opts[k].style.pointerEvents = 'none';
  }
  // Save reading progress to localStorage (persist answers across page navigation)
  var _sp = ['dailyread','match','readc','reads'];
  if (_sp.indexOf(prefix) >= 0 && window.testState[prefix] && window.testState[prefix].readingId) {
    localStorage.setItem('de-readstate-'+window.testState[prefix].readingId, JSON.stringify({
      state: window.testState[prefix],
      score: window.testScores[prefix] || 0,
      day: getStudyDay()
    })); schedulePush();
  }
};

window.showTestResult = function(prefix) {
  var state = window.testState[prefix];
  if (!state || !state.questions || state.questions.length === 0) return;
  var total = state.questions.length;
  var score = window.testScores[prefix] || 0;
  var pct = Math.round(score/total*100);
  var el = document.getElementById(prefix + '-result');

  var allList = '';
  var wrongCount = 0;
  for (var i = 0; i < state.answers.length; i++) {
    var ans = state.answers[i];
    var q = state.questions[i];
    var isWrong = ans && !ans.correct;
    if (isWrong) {
      wrongCount++;
      addError(state.testType, q.q, q.o, q.a, ans.userIdx, q.f, state.testType);
    }
    allList += '<div style="background:#1a1a2e;border:1px solid ' + (isWrong ? '#e94560' : '#1e3a2f') + ';border-left:4px solid ' + (isWrong ? '#e94560' : '#22c55e') + ';border-radius:8px;padding:14px;margin:10px 0;text-align:left">';
    allList += '<strong style="color:' + (isWrong ? '#e94560' : '#22c55e') + '">' + (isWrong ? '❌ ' : '✅ ') + (i+1) + '. ' + q.q + '</strong><br>';
    if (isWrong) {
      allList += '<span style="color:#f87171">Deine Antwort: ' + String.fromCharCode(65 + ans.userIdx) + '. ' + q.o[ans.userIdx] + '</span><br>';
    }
    allList += '<span style="color:#22c55e">Richtig: ' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</span><br>';
    allList += '<div style="background:#0d1b2a;border-radius:6px;padding:10px;margin-top:6px;color:#c8d0dc;font-size:.88em;line-height:1.7"><strong>📖 详细讲解：</strong>' + q.f + '</div>';
    allList += '</div>';
  }

  var gradeEmoji = pct >= 90 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
  var gradeText = pct >= 90 ? 'Hervorragend! C1-Niveau!' : pct >= 80 ? 'Sehr gut! Prüfungsreif!' : pct >= 60 ? 'Gut! Weiter üben.' : 'Mehr Übung nötig.';

  el.style.display = 'block';
  
  // Record skill scores (FIX 9)
  if (prefix === 'b2t' || prefix === 'c1t') {
    recordSkillScore('grammatik', score, total);
  }
  if (prefix === 'readc' || prefix === 'reads' || prefix === 'match') {
    recordSkillScore('lesen', score, total);
  }
  if (prefix === 'listen') {
    recordSkillScore('hoeren', score, total);
  }
  el.innerHTML = '<h2 style="color:' + (pct>=80?'#22c55e':pct>=60?'#f39c12':'#e94560') + ';font-size:1.6em">' + gradeEmoji + ' ' + score + '/' + total + ' (' + pct + '%) — ' + gradeText + '</h2>'
    + '<div style="margin-top:16px"><h3 style="color:#f39c12">📋 Vollständige Auswertung (' + total + ' Fragen)</h3>' + allList + '</div>'
    + (wrongCount > 0 ? '<p style="color:#7b8db5;font-size:.8em;margin-top:8px">' + wrongCount + ' Fehler in die Fehlerbank aufgenommen. <a href="javascript:goPage(\'error_review\')" style="color:#f39c12">→ Zur Fehlerwiederholung</a></p>' : '');
};

function vbpPage() {
  let html = `<h1>🔗 动介搭配训练器</h1><p>80+组核心搭配。掌握这些，写作至少提5分。</p>`;
  let allVbp = [];
  for (let cat in vbpData) {
    html += `<h2>${cat}</h2><div class="table-wrap"><table><tr><th>动词+介词+格</th><th>中文</th><th>例句</th></tr>`;
    vbpData[cat].forEach(v => {
      let tag = v.v.includes('+A') && !v.v.includes('+D') ? '<span class="inline-tag tag-akk">Akk</span>' :
                v.v.includes('+D') ? '<span class="inline-tag tag-dat">Dat</span>' : '';
      html += `<tr><td>${v.v} ${tag}</td><td>${v.zh}</td><td style="font-size:.78em">${v.ex}</td></tr>`;
      allVbp.push(v);
    });
    html += `</table></div>`;
  }
  html += `<h2>🎯 随机测试（10题）</h2>`;
  let shuffled = [...allVbp].sort(() => Math.random() - 0.5).slice(0, 10);
  function getPrep(vStr) {
    let parts = vStr.split(' ');
    // Find the element containing +A or +D, the preposition is right before it
    for (let k = 0; k < parts.length; k++) {
      if (/\+[AD]/.test(parts[k])) return parts[k-1] || '';
    }
    return parts[parts.length-1];
  }
  shuffled.forEach((v, i) => {
    let blank = v.v.replace(/ .*$/, ' _____');
    let correctPrep = getPrep(v.v);
    var vbpMeta = JSON.stringify({type:'vbp',de:v.v,zh:v.zh,ex:v.ex,prep:correctPrep}).replace(/'/g,"&#39;").replace(/"/g,"&quot;");
    html += `<div class="quiz"><h4>${i+1}. ${blank}</h4><p style="color:#7b8db5;font-size:.8em">${v.zh}</p>`;
    html += `<div class="q-option" data-correct="true" data-vbpmeta="${vbpMeta}" onclick="answerVbpQ(this,'vbpq-${i}')">A. ${correctPrep}</div>`;
    let others = allVbp.filter(x => x.v !== v.v).sort(() => Math.random() - 0.5).slice(0, 3);
    others.forEach((o, j) => {
      html += `<div class="q-option" data-correct="false" onclick="answerVbpQ(this,'vbpq-${i}')">${String.fromCharCode(66+j)}. ${getPrep(o.v)}</div>`;
    });
    html += `<div class="q-feedback">✅ ${v.v} — ${v.ex}</div></div>`;
  });
  return html;
}

function allFlashcards() {
  let allWords = [];
  for (let deckId in vocabDecks) { vocabDecks[deckId].forEach(function(w, i) { allWords.push({...w, deck: deckId, origIdx: i}); }); }
  allWords.sort(function() { return Math.random() - 0.5; });
  if (!flashcardIdx['all']) flashcardIdx['all'] = 0;
  let idx = flashcardIdx['all'];
  if (idx >= allWords.length) flashcardIdx['all'] = 0;
  let w = allWords[idx];
  let srsId = 'voc-' + w.deck + '-' + w.origIdx;
  var deEsc = w.de.replace(/'/g, "\\'");
  var zhEsc = w.zh.replace(/'/g, "\\'");
  var exEsc = (w.ex||'').replace(/'/g, "\\'");
  var hintEsc = (w.hint||'').replace(/'/g, "\\'");
  var totalWords = allWords.length;
  var mastered = Object.keys(vocabMastered).length;
  var html = '<h1>🃏 全部词汇闪卡复习（' + totalWords + '词）</h1>';
  html += '<div style="text-align:center;margin-bottom:8px;color:#7b8db5;font-size:.8em">Nr. ' + (idx+1) + '/' + totalWords + ' | ✅ ' + mastered + ' gemeistert</div>';
  html += '<div class="flashcard" onclick="this.querySelector(\'.inner\').classList.toggle(\'flipped\')">';
  html += '<div class="inner"><div class="front"><div class="word">' + w.de + '</div><div class="hint">' + hintEsc + '</div><div style="margin-top:10px;font-size:.7em;color:#7b8db5">👆 Klicken</div></div>';
  html += '<div class="back"><div class="meaning">' + w.zh + '</div><div class="example">' + exEsc + '</div></div></div></div>';
  html += '<div style="display:flex;gap:8px;justify-content:center">';
  html += '<button class="btn btn-red" onclick="flashcardIdx[\'all\']=(flashcardIdx[\'all\']-1+' + totalWords + ')%' + totalWords + ';renderContent()">⬅</button>';
  html += '<button class="btn btn-green" onclick="vocabMastered[\'all-\'+flashcardIdx[\'all\']]=true;saveVocabMastered();recordSRS(\'' + srsId + '\',{type:\'vocab\',de:\'' + deEsc + '\',zh:\'' + zhEsc + '\',ex:\'' + exEsc + '\',hint:\'' + hintEsc + '\'});flashcardIdx[\'all\']=(flashcardIdx[\'all\']+1)%' + totalWords + ';renderContent()">✅ Gelernt</button>';
  html += '<button class="btn btn-gold" onclick="flashcardIdx[\'all\']=(flashcardIdx[\'all\']+1)%' + totalWords + ';renderContent()">Weiter ➡</button></div>';
  return html;
}

function renderErrorReviewQuiz() {
  var errors = getActiveErrors();
  if (errors.length === 0) return;
  var count = Math.min(10, errors.length);
  var picked = [];
  var shuffled = errors.sort(function(){ return Math.random() - 0.5; }).slice(0, count);

  var questions = shuffled.map(function(e) {
    var err = e[1];
    return {
      q: err.question,
      o: err.options,
      a: err.correctIdx,
      f: err.explanation,
      errId: e[0],
      topic: err.topic
    };
  });

  window.testScores['er'] = 0;
  window.testState['er'] = {questions: questions, testType: 'Fehlerwiederholung', answers: new Array(questions.length).fill(null), errIds: shuffled.map(function(e){ return e[0]; })};

  var html = '<div style="margin-bottom:12px;color:#7b8db5">Beantwortet: <span id="er-score">0</span>/' + count + '</div>';
  questions.forEach(function(q, i) {
    html += '<div class="quiz"><h4>' + (i+1) + '. ' + q.q + ' <span style="font-size:.7em;color:#7b8db5">[' + q.topic + ']</span></h4>';
    q.o.forEach(function(o, j) {
      html += '<div class="q-option" data-prefix="er" data-idx="' + i + '" data-correct="' + (j===q.a) + '" data-useridx="' + j + '" data-errid="' + q.errId + '" onclick="answerErrorReviewQ(this)">' + String.fromCharCode(65+j) + '. ' + o + '</div>';
    });
    html += '<div class="q-feedback" id="er-fb-' + i + '"></div></div>';
  });
  html += '<div id="er-result" style="text-align:center;margin-top:16px;display:none"></div>';
  html += '<button class="btn btn-red" style="margin-top:10px" onclick="showErrorReviewResult()">📊 Ergebnis anzeigen</button>';

  document.getElementById('error-review-container').innerHTML = html;
}
