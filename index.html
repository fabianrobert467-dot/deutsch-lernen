<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch B2→C1 — 45天通关计划</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0dcd0;display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;background:#16213e;padding:12px;overflow-y:auto;border-right:1px solid #0f3460;flex-shrink:0}
.sidebar h2{font-size:.92em;color:#e94560;margin-bottom:8px;text-align:center}
.sidebar .mod{font-size:.7em;color:#7b8db5;margin:14px 0 2px 4px;text-transform:uppercase;letter-spacing:1.5px}
.sidebar .item{display:block;padding:7px 12px;margin:1px 0;border-radius:5px;cursor:pointer;font-size:.82em;transition:.2s;color:#a0b4d0;border:1px solid transparent}
.sidebar .item:hover{background:#1a1a3e;color:#e0dcd0}
.sidebar .item.active{background:#e94560;color:#fff;font-weight:bold}
.sidebar .item.done{border-left:3px solid #22c55e}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:10px 20px;background:#16213e;display:flex;align-items:center;gap:12px;border-bottom:1px solid #0f3460;flex-wrap:wrap}
.progress-wrap{flex:1;min-width:150px}
.progress-label{font-size:.75em;color:#7b8db5;margin-bottom:3px}
.progress-bar{height:6px;background:#0f3460;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#e94560,#f39c12);transition:.4s;border-radius:3px}
.badge{background:#0f3460;padding:5px 10px;border-radius:20px;font-size:.72em;color:#f39c12;white-space:nowrap}
.countdown-badge{font-size:.72em;padding:5px 10px;border-radius:20px;white-space:nowrap;font-weight:bold}
.cd-b2{background:#7c2d12;color:#fdba74}.cd-c1{background:#3b1f5e;color:#c4b5fd}
.content-area{flex:1;overflow-y:auto;padding:24px 32px}
.content-area h1{font-size:1.5em;margin-bottom:4px;color:#e94560}
.content-area h2{font-size:1.15em;margin:22px 0 8px;color:#f39c12}
.content-area h3{font-size:1em;margin:16px 0 5px;color:#7b8db5}
.content-area p{line-height:1.7;margin-bottom:8px;color:#c8d0dc}
.content-area ul,.content-area ol{margin:5px 0 12px 20px;line-height:1.7;color:#c8d0dc}
.content-area li{margin-bottom:2px}
.de{color:#f39c12;font-style:italic}
.zh{color:#7b8db5}
.code-block{background:#0d1b2a;border:1px solid #0f3460;border-radius:8px;padding:14px 18px;margin:12px 0;overflow-x:auto;position:relative}
.code-block pre{font-family:'Cascadia Code','Fira Code',monospace;font-size:.84em;line-height:1.6;color:#c8d0dc;white-space:pre-wrap}
.copy-btn{position:absolute;top:6px;right:10px;background:#0f3460;border:none;color:#7b8db5;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:.7em}
.copy-btn:hover{background:#1a4a7a;color:#fff}
.tip{background:#1a2e1a;border-left:4px solid #22c55e;padding:9px 13px;margin:12px 0;border-radius:0 7px 7px 0;font-size:.86em}
.warn{background:#2e1a1a;border-left:4px solid #ef4444;padding:9px 13px;margin:12px 0;border-radius:0 7px 7px 0;font-size:.86em}
.quiz{background:#16213e;border-radius:8px;padding:16px 18px;margin:16px 0;border:1px solid #0f3460}
.quiz h4{color:#f39c12;margin-bottom:8px}
.quiz .q-option{display:block;padding:7px 12px;margin:4px 0;background:#0d1b2a;border:1px solid #0f3460;border-radius:5px;cursor:pointer;transition:.2s;font-size:.86em}
.quiz .q-option:hover{border-color:#e94560}
.quiz .q-option.correct{background:#1a3a1a;border-color:#22c55e;pointer-events:none}
.quiz .q-option.wrong{background:#3a1a1a;border-color:#ef4444}
.quiz .q-feedback{margin-top:6px;font-size:.84em;display:none;color:#22c55e}
.btn{display:inline-block;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:.86em;transition:.2s;margin:3px}
.btn-red{background:#e94560;color:#fff}.btn-red:hover{background:#c23152}
.btn-gold{background:#f39c12;color:#1a1a2e}.btn-gold:hover{background:#d4890a}
.btn-green{background:#22c55e;color:#fff}.btn-green:hover{background:#16a34a}
.btn-outline{background:transparent;border:1px solid #e94560;color:#e94560}.btn-outline:hover{background:#e94560;color:#fff}
.nav-btns{display:flex;justify-content:space-between;margin-top:20px;padding-top:12px;border-top:1px solid #0f3460}
.flashcard{cursor:pointer;perspective:1000px;min-height:180px;margin:14px 0}
.flashcard .inner{position:relative;width:100%;min-height:180px;transition:transform .5s;transform-style:preserve-3d;border-radius:10px}
.flashcard .inner.flipped{transform:rotateY(180deg)}
.flashcard .front,.flashcard .back{position:absolute;width:100%;min-height:180px;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.flashcard .front{background:linear-gradient(135deg,#16213e,#1a1a3e);border:2px solid #e94560}
.flashcard .front .word{font-size:2em;color:#f39c12;margin-bottom:8px}
.flashcard .front .hint{font-size:.8em;color:#7b8db5}
.flashcard .back{background:linear-gradient(135deg,#1a2e1a,#0d1b2a);border:2px solid #22c55e;transform:rotateY(180deg)}
.flashcard .back .meaning{font-size:1.3em;color:#e0dcd0;margin-bottom:6px}
.flashcard .back .example{font-size:.9em;color:#a0b4d0;margin-top:8px}
.table-wrap{overflow-x:auto;margin:12px 0}
table{width:100%;border-collapse:collapse;font-size:.84em}
th{background:#0f3460;padding:7px 10px;text-align:left;font-size:.8em;color:#a0b4d0}
td{padding:7px 10px;border-bottom:1px solid #0f3460;color:#c8d0dc}
tr:hover td{background:#1a1a3e}
.inline-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72em;margin:2px}
.tag-akk{background:#7c2d12;color:#fdba74}
.tag-dat{background:#1e3a5f;color:#93c5fd}
.tag-b1{background:#0f3460;color:#60a5fa}
.tag-b2{background:#1e3a5f;color:#f39c12}
.tag-c1{background:#7c2d12;color:#fdba74}
input[type=text],textarea{background:#0d1b2a;border:1px solid #0f3460;padding:8px 12px;border-radius:5px;color:#e0dcd0;font-size:.86em;width:100%}
input[type=text]:focus,textarea:focus{outline:none;border-color:#e94560}
textarea{resize:vertical;min-height:80px}
.checklist{list-style:none;margin-left:0!important}
.checklist li{padding:8px 14px;margin:4px 0;background:#0d1b2a;border-radius:6px;border:1px solid #0f3460;display:flex;align-items:center;gap:8px;cursor:pointer}
.checklist li.done{background:#1a2e1a;border-color:#22c55e;text-decoration:line-through;color:#7b8db5}
.task-phase{display:inline-block;padding:3px 8px;border-radius:10px;font-size:.7em;font-weight:bold;margin-left:6px}
.ph-b2{background:#7c2d12;color:#fdba74}.ph-c1{background:#3b1f5e;color:#c4b5fd}
/* Mobile responsive */
.hamburger{display:none;background:none;border:none;color:#e0dcd0;font-size:1.5em;cursor:pointer;padding:4px 8px;line-height:1}
.sidebar-backdrop{display:none}
@media (max-width:768px){
  .hamburger{display:block}
  body{flex-direction:column}
  .sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;z-index:1000;transition:left .3s;box-shadow:2px 0 20px rgba(0,0,0,.5)}
  .sidebar.open{left:0}
  .sidebar-backdrop{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999}
  .sidebar-backdrop.open{display:block}
  .topbar{padding:8px 12px;gap:6px;flex-wrap:wrap}
  .topbar .badge,.topbar .countdown-badge{font-size:.65em;padding:3px 7px}
  .content-area{padding:16px 12px}
  .content-area h1{font-size:1.2em}
  .content-area h2{font-size:1em;margin:14px 0 6px}
  .content-area{padding:16px 12px}
  .flashcard .front .word{font-size:1.4em}
  .flashcard .back .meaning{font-size:1.1em}
  .flashcard .front,.flashcard .back{min-height:140px;padding:16px}
  .quiz{padding:12px}
  .quiz .q-option{font-size:.8em;padding:10px 12px}
  table{font-size:.72em}
  th,td{padding:5px 6px}
  .code-block{padding:10px 12px}
  .code-block pre{font-size:.74em}
  .btn{font-size:.78em;padding:8px 14px;width:100%;text-align:center;margin:2px 0}
  .btn+.btn{margin-left:0}
  .nav-btns{flex-direction:column;gap:6px}
  .nav-btns .btn{width:100%}
  input[type=text],textarea{font-size:.8em}
}
@media (max-width:480px){
  .topbar{gap:4px;padding:6px 8px}
  .topbar .badge,.topbar .countdown-badge{font-size:.6em;padding:2px 5px}
  .progress-label{font-size:.65em}
  .content-area{padding:10px 8px}
  .content-area h1{font-size:1.1em}
  .content-area h2{font-size:.95em}
  .flashcard{min-height:120px}
  .flashcard .front .word{font-size:1.2em}
}
</style>
</head>
<body>
<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar"><h2>🇩🇪 B2→C1 Trainer</h2><div id="nav-list"></div></div>
<div class="main">
<div class="topbar">
  <button class="hamburger" onclick="toggleSidebar()" title="Menu">☰</button>
  <div class="progress-wrap">
    <div class="progress-label">Gesamtfortschritt <span id="progress-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <span class="countdown-badge cd-b2" id="cd-b2">B2: -- Tage</span>
  <span class="countdown-badge cd-c1" id="cd-c1">C1: -- Tage</span>
  <div class="badge" id="badge-display">📚 Lernen</div>
  <span class="badge" style="background:#7c2d12;color:#fdba74">🔥 <span id="streak-text">0</span> Tage</span>
</div>
<div class="content-area" id="content"></div>
</div>

<script>
// ===== EXAM DATES =====
const B2_DATE = new Date();
B2_DATE.setDate(B2_DATE.getDate() + 15);
const C1_DATE = new Date();
C1_DATE.setDate(C1_DATE.getDate() + 45);
// ====== DAY MANAGEMENT ======
// Simple counter-based system: day number stored in localStorage
// Day only advances when user explicitly clicks "完成今日学习"
function getStudyDay() {
  try {
    var d = parseInt(localStorage.getItem('de-daynum'));
    if (d >= 1 && d <= 45) return d;
  } catch(e) {}
  localStorage.setItem('de-daynum', '1');
  return 1;
}
function setStudyDay(n) {
  n = Math.max(1, Math.min(45, parseInt(n)||1));
  localStorage.setItem('de-daynum', String(n));
  renderContent();
}
function advanceDay() {
  var d = getStudyDay();
  if (d < 45) setStudyDay(d+1);
}
function prevDay() { setStudyDay(getStudyDay() - 1); }
function nextDay() { setStudyDay(getStudyDay() + 1); }
function resetToToday() { setStudyDay(1); }

function getCountdown(date) {
  let diff = Math.ceil((date - new Date()) / 86400000);
  return diff > 0 ? diff + ' Tage' : (diff === 0 ? 'Heute!' : 'Vorbei');
}

function updateCountdowns() {
  let elB2 = document.getElementById('cd-b2');
  let elC1 = document.getElementById('cd-c1');
  if (elB2) {
    let dB2 = Math.ceil((B2_DATE - new Date()) / 86400000);
    elB2.textContent = '📅 B2: ' + (dB2 > 0 ? dB2 + ' Tage' : (dB2===0?'HEUTE!':'✓'));
  }
  if (elC1) {
    let dC1 = Math.ceil((C1_DATE - new Date()) / 86400000);
    elC1.textContent = '🎯 C1: ' + (dC1 > 0 ? dC1 + ' Tage' : (dC1===0?'HEUTE!':'✓'));
  }
}

// ===== NAVIGATION =====
const nav = [
  {id:'home',title:'🎯 学习仪表盘',mod:''},
  {id:'daily',title:'📅 今日任务（每日必看！）',mod:''},
  {id:'roadmap',title:'🗺️ 45天通关路线图',mod:''},
  {id:'vocab_b2_alltag',title:'🏠 B2词汇：日常生活',mod:'📝 B2 Wortschatz'},
  {id:'vocab_b2_gesund',title:'🏥 B2词汇：健康与饮食',mod:''},
  {id:'vocab_b2_reise',title:'✈️ B2词汇：旅行与交通',mod:''},
  {id:'vocab_b2_beruf',title:'💼 B2词汇：职业与工作',mod:''},
  {id:'vocab_b2_medien',title:'📱 B2词汇：媒体与通信',mod:''},
  {id:'vocab_wissenschaft',title:'🔬 C1词汇：科学与研究',mod:'📝 C1 Wortschatz'},
  {id:'vocab_politik',title:'🏛️ C1词汇：政治与社会',mod:''},
  {id:'vocab_umwelt',title:'🌱 C1词汇：环境与可持续',mod:''},
  {id:'vocab_medien',title:'📱 C1词汇：媒体与数字化',mod:''},
  {id:'vocab_arbeit',title:'💼 C1词汇：工作与经济',mod:''},
  {id:'vocab_flashcards',title:'🃏 全部词汇闪卡复习',mod:''},
  {id:'grammar_b2',title:'📖 B2语法速查',mod:'📐 Grammatik'},
  {id:'grammar_konjunktiv1',title:'📖 C1: Konjunktiv I',mod:''},
  {id:'grammar_konjunktiv2',title:'📖 C1: Konjunktiv II',mod:''},
  {id:'grammar_passiv',title:'📖 C1: Passiv & Ersatzformen',mod:''},
  {id:'grammar_nominal',title:'📖 C1: Nominalisierung',mod:''},
  {id:'grammar_partikeln',title:'📖 C1: Modalpartikeln',mod:''},
  {id:'grammar_partizip',title:'📖 C1: Partizipialattribute',mod:''},
  {id:'grammar_fvg',title:'📖 C1: Nomen-Verb-Verbindungen',mod:''},
  {id:'grammar_quiz',title:'📝 语法综合测试',mod:''},
  {id:'vbp',title:'🔗 动介搭配训练器',mod:'🔗 Verben mit Präp.'},
  {id:'reading1',title:'📰 阅读：Digitalisierung',mod:'📖 Leseverstehen'},
  {id:'reading2',title:'📰 阅读：Klimawandel',mod:''},
  {id:'reading3',title:'📰 阅读：Arbeitswelt 4.0',mod:''},
  {id:'reading_t1_1',title:'📰 阅读Teil1: Mediennutzung',mod:''},
  {id:'reading_t1_2',title:'📰 阅读Teil1: Wohnen & Leben',mod:''},
  {id:'reading_t1_3',title:'📰 阅读Teil1: Beruf & Karriere',mod:''},
  {id:'reading_t2_1',title:'📰 阅读Teil2: Gesundheitswesen',mod:''},
  {id:'reading_t2_2',title:'📰 阅读Teil2: Klimapolitik',mod:''},
  {id:'reading_t2_3',title:'📰 阅读Teil2: Arbeitswelt',mod:''},
  {id:'writing_b2',title:'✍️ B2写作：正式信函',mod:'✍️ Schreiben'},
  {id:'writing',title:'✍️ C1写作：Erörterung',mod:''},
  {id:'writing_redemittel',title:'💬 Redemittel宝库',mod:''},
  {id:'listening',title:'🎧 听力训练 (Hörverstehen)',mod:'🎧 Hören'},
  {id:'speaking',title:'💬 口语训练 (Sprechen)',mod:'💬 Sprechen'},
  {id:'writing_b2_prompt',title:'✍️ B2写作实战练习',mod:''},
  {id:'test_b2',title:'🧪 B2模拟测试',mod:'🎯 Prüfungssimulation'},
  {id:'test_c1',title:'🧪 C1模拟测试',mod:''},
  {id:'daily_test',title:'📝 今日测试',mod:'📋 Täglicher Test'},
  {id:'daily_reading',title:'📰 今日阅读',mod:'📖 Tägliches Lesen'},
  {id:'tomorrow_plan',title:'🔮 明日计划',mod:''},
  {id:'exam_tips',title:'🏆 考试通关策略',mod:''},
  {id:'error_review',title:'🔴 错题复习',mod:'📋 Fehlerbank'},
  {id:'srs_review',title:'🧠 间隔复习（长期记忆）',mod:''},
];

let currentPage = 'home';
let completed = new Set();
let streakDays = 0;
let lastStudyDate = '';
let quizState = {};
let flashcardIdx = {};
let vocabMastered = {};
let dailyChecklist = {}; // track which daily tasks are done

function renderNav() {
  let html = '', lastMod = '';
  nav.forEach(n => {
    if (n.mod && n.mod !== lastMod) { html += `<div class="mod">${n.mod}</div>`; lastMod = n.mod; }
    let cls = 'item';
    if (n.id === currentPage) cls += ' active';
    if (completed.has(n.id)) cls += ' done';
    html += `<div class="${cls}" onclick="goPage('${n.id}')">${n.title}</div>`;
  });
  html += '<div class="mod" style="margin-top:16px">💾 Sync</div>';
  html += '<div class="item" onclick="exportAllData()" style="color:#22c55e">📤 Daten exportieren</div>';
  html += '<div class="item" onclick="importAllData()" style="color:#60a5fa">📥 Daten importieren</div>';
  document.getElementById('nav-list').innerHTML = html;
}

function goPage(id) { currentPage = id; renderNav(); renderContent(); document.getElementById('content').scrollTop = 0; if (window.innerWidth <= 768) closeSidebar(); }
function toggleSidebar() { var sb = document.getElementById('sidebar'); var bd = document.getElementById('sidebar-backdrop'); if (sb.classList.contains('open')) { closeSidebar(); } else { sb.classList.add('open'); bd.classList.add('open'); } }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-backdrop').classList.remove('open'); }
function markDone(id) { completed.add(id); localStorage.setItem('de-done', JSON.stringify([...completed])); updateStreak(); renderNav(); updateProgress(); }
function updateProgress() {
  let studyPages = nav.filter(n => n.id !== 'home' && n.id !== 'roadmap' && n.id !== 'daily' && n.id !== 'exam_tips');
  let pct = Math.round((completed.size / studyPages.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  let lvl = pct < 35 ? '📚 Phase 1: B2' : pct < 70 ? '📖 Phase 2: C1' : '🏆 Prüfungsbereit!';
  document.getElementById('badge-display').textContent = lvl;
}
function updateStreak() {
  let today = new Date().toISOString().split('T')[0];
  if (lastStudyDate !== today) {
    let yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    if (lastStudyDate === yesterday) streakDays++; else if (lastStudyDate !== today) streakDays = 1;
    lastStudyDate = today;
    localStorage.setItem('de-streak', JSON.stringify({days:streakDays, date:lastStudyDate}));
  }
  let el = document.getElementById('streak-text'); if (el) el.textContent = streakDays;
}
function loadProgress() {
  try { JSON.parse(localStorage.getItem('de-done') || '[]').forEach(id => completed.add(id)); } catch(e) {}
  try { let s = JSON.parse(localStorage.getItem('de-streak') || '{}'); streakDays = s.days || 0; lastStudyDate = s.date || ''; } catch(e) {}
  try { vocabMastered = JSON.parse(localStorage.getItem('de-vocab') || '{}'); } catch(e) {}
  try { dailyChecklist = JSON.parse(localStorage.getItem('de-daily') || '{}'); } catch(e) {}
  loadSRS();
  updateProgress(); updateStreak();
  loadSkills();
}

// ====== SKILL TRACKING (FIX 9) ======
var skillScores = {}; // {lesen: {correct:0,total:0}, grammatik:{}, wortschatz:{}, hoeren:{}, schreiben:{}}
var weeklyHistory = []; // [{week:1, date:'...', skills:{...}, wordsLearned:0, errorsResolved:0}]

function loadSkills() {
  try { skillScores = JSON.parse(localStorage.getItem('de-skills') || '{}'); } catch(e) { skillScores = {}; }
  try { weeklyHistory = JSON.parse(localStorage.getItem('de-weekly') || '[]'); } catch(e) { weeklyHistory = []; }
}
function saveSkills() { localStorage.setItem('de-skills', JSON.stringify(skillScores)); }

function recordSkillScore(skill, correct, total) {
  if (!skillScores[skill]) skillScores[skill] = {correct:0, total:0};
  skillScores[skill].correct += correct;
  skillScores[skill].total += total;
  saveSkills();
}

function getSkillPct(skill) {
  var s = skillScores[skill];
  if (!s || s.total === 0) return -1; // no data yet
  return Math.round(s.correct / s.total * 100);
}

function getWeakestSkills() {
  var weak = [];
  ['grammatik','lesen','wortschatz','hoeren'].forEach(function(s) {
    var pct = getSkillPct(s);
    if (pct >= 0 && pct < 60) weak.push({skill:s, pct:pct});
    else if (pct >= 0 && pct < 80) weak.push({skill:s, pct:pct, level:'yellow'});
  });
  weak.sort(function(a,b){return a.pct - b.pct;});
  return weak;
}

function getSkillName(skill) {
  var m = {grammatik:'语法', lesen:'阅读', wortschatz:'词汇', hoeren:'听力', schreiben:'写作'};
  return m[skill] || skill;
}

function getSkillEmoji(pct) {
  if (pct < 0) return '⬜';
  if (pct < 40) return '🔴';
  if (pct < 60) return '🟠';
  if (pct < 80) return '🟡';
  return '🟢';
}

// ====== WEEKLY REPORT ======
function generateWeeklyReport() {
  var day = getStudyDay();
  if (day % 7 !== 0 && day !== 45) return null;
  var week = Math.ceil(day / 7);
  var wordsLearned = Object.keys(vocabMastered).length;
  var errorsTotal = Object.keys(loadErrorBank()).length;
  var errorsActive = getErrorCount();
  var skillSummary = {};
  ['grammatik','lesen','wortschatz','hoeren'].forEach(function(s) {
    var pct = getSkillPct(s);
    skillSummary[s] = pct >= 0 ? pct + '%' : 'keine Daten';
  });
  var report = {week:week, date: new Date().toISOString().split('T')[0], day:day, words:wordsLearned, errorsTotal:errorsTotal, errorsActive:errorsActive, skills:skillSummary};
  weeklyHistory.push(report);
  if (weeklyHistory.length > 15) weeklyHistory.shift();
  localStorage.setItem('de-weekly', JSON.stringify(weeklyHistory));
  return report;
}

// ===== SRS (Spaced Repetition System) =====
// Interval progression (days): 1→2→4→7→14→30→60
var SRS_INTERVALS = [1, 2, 4, 7, 14, 30, 60];
var srsData = {};

function loadWeeklyReport() {}

function loadSRS() {
  try { srsData = JSON.parse(localStorage.getItem('de-srs') || '{}'); } catch(e) { srsData = {}; }
}
function saveSRS() { localStorage.setItem('de-srs', JSON.stringify(srsData)); }
function srsNextInterval(stage) { return SRS_INTERVALS[Math.min(stage, SRS_INTERVALS.length - 1)]; }

// Called when user marks a word/VBP as learned or answers correctly
// meta: {type:'vocab'|'vbp', de, zh, ex, hint, prep} for review display
function recordSRS(itemId, meta) {
  var now = Date.now();
  var entry = srsData[itemId];
  if (!entry) {
    srsData[itemId] = { stage: 0, nextReview: now + SRS_INTERVALS[0] * 86400000, lastReview: now, correct: 1, meta: meta || null };
  } else {
    entry.correct = (entry.correct || 0) + 1;
    entry.stage = Math.min(entry.stage + 1, SRS_INTERVALS.length - 1);
    entry.lastReview = now;
    entry.nextReview = now + srsNextInterval(entry.stage) * 86400000;
    if (meta) entry.meta = meta;
  }
  saveSRS();
}

// Called when user gets a word/VBP wrong in review
function failSRS(itemId) {
  var now = Date.now();
  var entry = srsData[itemId];
  if (!entry) {
    srsData[itemId] = { stage: 0, nextReview: now + SRS_INTERVALS[0] * 86400000, lastReview: now, correct: 0 };
  } else {
    entry.stage = Math.max(0, entry.stage - 1); // drop one stage
    entry.lastReview = now;
    entry.nextReview = now + srsNextInterval(entry.stage) * 86400000;
  }
  saveSRS();
}

function getDueItems() {
  var now = Date.now();
  var due = [];
  for (var id in srsData) {
    if (srsData[id].nextReview <= now) {
      due.push({ id: id, entry: srsData[id] });
    }
  }
  return due;
}

function getDueCount() {
  var now = Date.now();
  var count = 0;
  for (var id in srsData) {
    if (srsData[id].nextReview <= now) count++;
  }
  return count;
}

function getSRSCount() {
  return getDueCount();
}

// Get total SRS-tracked items
function getSRSTotal() { return Object.keys(srsData).length; }

function renderFlashcard(deckId, words) {
  if (!flashcardIdx[deckId]) flashcardIdx[deckId] = 0;
  let idx = flashcardIdx[deckId];
  if (idx >= words.length) flashcardIdx[deckId] = 0;
  let w = words[flashcardIdx[deckId]];
  let html = `<div style="text-align:center;margin-bottom:8px;color:#7b8db5;font-size:.8em">${words.length} Wörter | Nr. ${idx+1} | ✅ ${Object.keys(vocabMastered).filter(k=>k.startsWith(deckId)).length} gemeistert</div>`;
  html += `<div class="flashcard" onclick="this.querySelector('.inner').classList.toggle('flipped')">
    <div class="inner"><div class="front"><div class="word">${w.de}</div><div class="hint">${w.hint||''}</div><div style="margin-top:10px;font-size:.7em;color:#7b8db5">👆 Klicken zum Umdrehen</div></div>
    <div class="back"><div class="meaning">${w.zh}</div><div class="example">${w.ex||''}</div></div></div></div>`;
  html += `<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-red" onclick="flashcardIdx['${deckId}']=(flashcardIdx['${deckId}']-1+${words.length})%${words.length};renderContent()">⬅ Zurück</button>
    <button class="btn btn-green" onclick="vocabMastered['${deckId}-'+flashcardIdx['${deckId}']]=true;saveVocabMastered();recordSRS('${deckId}-'+flashcardIdx['${deckId}'],{type:'vocab',de:'${w.de.replace(/'/g,"\\'")}',zh:'${w.zh.replace(/'/g,"\\'")}',ex:'${(w.ex||'').replace(/'/g,"\\'")}',hint:'${(w.hint||'').replace(/'/g,"\\'")}'});flashcardIdx['${deckId}']=(flashcardIdx['${deckId}']+1)%${words.length};renderContent()">✅ Gelernt</button>
    <button class="btn btn-gold" onclick="flashcardIdx['${deckId}']=(flashcardIdx['${deckId}']+1)%${words.length};renderContent()">Weiter ➡</button></div>`;
  return html;
}

function correctOpt(el, pid) { el.classList.add('correct'); el.parentElement.querySelector('.q-feedback').style.display = 'block'; quizState[pid] = true; checkAllDone(currentPage); }
function wrongOpt(el) { el.classList.add('wrong'); setTimeout(() => el.classList.remove('wrong'), 500); }
function checkAllDone(pageId) {
  let qs = document.querySelectorAll('.quiz'); if (qs.length === 0) return;
  let allOk = true; qs.forEach((q, i) => { if (!quizState[pageId + '-' + i]) allOk = false; });
  if (allOk) markDone(pageId);
}
function renderQuiz(opts) {
  let html = `<div class="quiz"><h4>${opts.q}</h4>`;
  opts.a.forEach((a, i) => { html += `<div class="q-option" data-correct="${a.correct||false}" onclick="if(this.getAttribute('data-correct')==='true'){this.classList.add('correct');this.parentElement.querySelector('.q-feedback').style.display='block';quizState['${opts.pid}-${opts.qid}']=true;checkAllDone('${opts.pid}')}else{this.classList.add('wrong');setTimeout(()=>this.classList.remove('wrong'),500)}">${String.fromCharCode(65+i)}. ${a.text}</div>`; });
  html += `<div class="q-feedback">✅ ${opts.fb||'Richtig!'}</div></div>`; return html;
}

function getDailyPlan() {
  let day = getStudyDay();
  let isB2 = day <= 15;
  let phase = isB2 ? 'B2' : 'C1';
  let tasks = [];
  let vocabTheme, grammarPage, readingPage, writingPage;

  if (isB2) {
    // B2 Phase: Day 1-15
    let vocabCycle = ((day-1) % 5);
    var b2Themes = ['vocab_b2_alltag','vocab_b2_gesund','vocab_b2_reise','vocab_b2_beruf','vocab_b2_medien'];
    vocabTheme = b2Themes[vocabCycle];

    if (day <= 3) grammarPage = 'grammar_b2';
    else if (day <= 6) grammarPage = 'grammar_konjunktiv2';
    else if (day <= 9) grammarPage = 'grammar_passiv';
    else if (day <= 12) grammarPage = 'grammar_nominal';
    else grammarPage = 'grammar_partizip';

    var b2Readings = ['reading1','reading2','reading3','reading_t1_1','reading_t2_1','reading_t1_2','reading_t2_2','reading_t1_3','reading_t2_3'];
    readingPage = 'daily_reading'; // Tägliche Leseübung
    if (day % 4 === 0) writingPage = (day % 8 === 4) ? 'writing_b2_prompt' : 'writing_b2';

    tasks = [
      {text:`背B2词汇：${getVocabName(vocabTheme)}（20词）`, type:'vocab', page:vocabTheme},
      {text:`B2语法复习：${getGrammarName(grammarPage)}`, type:'grammar', page:grammarPage},
      {text:'动介搭配练习（10组）', type:'vbp', page:'vbp'},
      {text:'用闪卡复习前一天的词汇（10分钟）', type:'review', page:'vocab_flashcards'},
    ];
    if (readingPage) tasks.push({text:'完成1篇阅读理解', type:'reading', page:readingPage});
    if (writingPage) tasks.push({text:'B2写作练习：正式信函（1篇，限时60分钟）', type:'writing', page:writingPage});
    if (day === 5 || day === 10) tasks.push({text:'🧪 B2半模测试（完成B2模拟测试的一半题目）', type:'test', page:'test_b2'});
    if (day === 14) tasks.push({text:'🧪 B2全真模拟（限时完成B2模拟测试全部）', type:'test', page:'test_b2'});
    if (day === 15) tasks.push({text:'🏆 今天考B2！只复习错题+Redemittel，不做新题', type:'exam', page:'exam_tips'});

    tasks.push({text:'🎧 听力训练：Hörverstehen mit Transkript（15分钟）', type:'listen', page:'listening'});
    tasks.push({text:'💬 口语：Vortrag vorbereiten & üben（10分钟）', type:'speak', page:'speaking'});
    tasks.push({text:'🔴 复习错题（' + getErrorCount() + '题待复习）', type:'error', page:'error_review'});
    tasks.push({text:'🧠 间隔复习到期内容（' + getDueCount() + '项）', type:'srs', page:'srs_review'});
    // Adaptive: add extra tasks based on weak skills
    var weakSkills = getWeakestSkills();
    if (weakSkills.length > 0) {
      var weakestSkill = weakSkills[0].skill;
      if (weakestSkill === 'grammatik' && weakSkills[0].pct < 60) tasks.push({text:'📖 弱项攻克：额外语法练习（系统推荐）', type:'grammar', page:'grammar_quiz'});
      if (weakestSkill === 'lesen' && weakSkills[0].pct < 60) tasks.push({text:'📰 弱项攻克：额外阅读训练1篇', type:'reading', page:'reading_t2_1'});
      if (weakestSkill === 'wortschatz' && weakSkills[0].pct < 60) tasks.push({text:'📝 弱项攻克：额外词汇复习（闪卡20词）', type:'vocab', page:'vocab_flashcards'});
    }
    tasks.push({text:'📝 今日生词本整理（5分钟）', type:'review', page:''});
  } else {
    // C1 Phase: Day 16-45
    let c1Day = day - 15;
    let vocabCycle = ((c1Day-1) % 5);
    let themes = ['vocab_wissenschaft','vocab_politik','vocab_umwelt','vocab_medien','vocab_arbeit'];
    vocabTheme = themes[vocabCycle];

    let grammarCycle = ((c1Day-1) % 7);
    let grammars = ['grammar_konjunktiv1','grammar_konjunktiv2','grammar_passiv','grammar_nominal','grammar_partizip','grammar_fvg','grammar_partikeln'];
    grammarPage = grammars[grammarCycle];

    var c1Readings = ['reading_t2_1','reading_t2_2','reading_t2_3','reading_t1_1','reading_t1_2','reading_t1_3','reading_t2_1','reading_t2_2'];
    readingPage = 'daily_reading'; // Tägliche Leseübung
    if (c1Day % 3 === 0) writingPage = 'writing';

    tasks = [
      {text:`背C1词汇：${getVocabName(vocabTheme)}（15词）`, type:'vocab', page:vocabTheme},
      {text:`C1语法专题：${getGrammarName(grammarPage)}`, type:'grammar', page:grammarPage},
      {text:'动介搭配训练（15组，含随机测试）', type:'vbp', page:'vbp'},
      {text:'用闪卡复习之前所有词汇（15分钟）', type:'review', page:'vocab_flashcards'},
    ];
    if (readingPage) tasks.push({text:'📰 今日阅读训练（Goethe Format）+精读分析', type:'reading', page:'daily_reading'});
    if (writingPage) tasks.push({text:'C1写作：Erörterung（1篇，限时80分钟）', type:'writing', page:writingPage});
    if (c1Day === 10 || c1Day === 20) tasks.push({text:'🧪 C1半模测试', type:'test', page:'test_c1'});
    if (c1Day === 25) tasks.push({text:'📊 中期评估：检查弱项，调整策略', type:'review', page:'roadmap'});
    if (c1Day >= 28) tasks.push({text:'🧪 C1全真模拟（限时完成全部）', type:'test', page:'test_c1'});
    if (c1Day === 30) tasks.push({text:'🏆 今天考C1！考前只看总结，不学新东西', type:'exam', page:'exam_tips'});

    tasks.push({text:'🎧 听力：Hörverstehen mit Transkript（20分钟）', type:'listen', page:'listening'});
    tasks.push({text:'💬 口语：C1 Vortrag vorbereiten & üben（15分钟）', type:'speak', page:'speaking'});
    tasks.push({text:'🔴 复习错题（' + getErrorCount() + '题待复习）', type:'error', page:'error_review'});
    tasks.push({text:'🧠 间隔复习到期内容（' + getDueCount() + '项）', type:'srs', page:'srs_review'});
    var weakSkillsC1 = getWeakestSkills();
    if (weakSkillsC1.length > 0) {
      var wsC1 = weakSkillsC1[0];
      if (wsC1.skill === 'grammatik' && wsC1.pct < 70) tasks.push({text:'📖 弱项攻克：额外C1语法练习', type:'grammar', page:'grammar_quiz'});
      if (wsC1.skill === 'lesen' && wsC1.pct < 70) tasks.push({text:'📰 弱项攻克：额外C1阅读训练', type:'reading', page:'reading_t2_3'});
      if (wsC1.skill === 'wortschatz' && wsC1.pct < 70) tasks.push({text:'📝 弱项攻克：额外词汇闪卡复习', type:'vocab', page:'vocab_flashcards'});
    }
    tasks.push({text:'📝 今日Redemittel收集（从阅读/听力中摘抄）', type:'review', page:''});
  }
  return {day, isB2, phase, tasks};
}

// Render the end-of-day test
function renderDailyTest() {
  var day = getStudyDay();
  var plan = getDailyPlan();

  // Build questions from today's content
  var questions = [];

  // 1. Vocab questions (5) — from today's vocab deck
  var vocabDeckId = '';
  plan.tasks.forEach(function(t) { if (t.type === 'vocab' && t.page) vocabDeckId = t.page; });
  if (vocabDeckId && vocabDecks[vocabDeckId]) {
    var words = vocabDecks[vocabDeckId];
    var used = {};
    for (var i = 0; i < 5 && i < words.length; i++) {
      var idx = Math.floor(Math.random() * words.length);
      while (used[idx] && Object.keys(used).length < words.length) idx = Math.floor(Math.random() * words.length);
      used[idx] = true;
      var w = words[idx];
      // Generate a wrong option
      var wrongPool = words.filter(function(_,j){return j !== idx;});
      var wrong = wrongPool[Math.floor(Math.random() * wrongPool.length)];
      var opts = [w.zh, (wrong||{}).zh || 'keine'].sort(function(){return Math.random() - 0.5;});
      var correctIdx = opts.indexOf(w.zh);
      questions.push({
        q: '🔤 ' + w.de + ' 的中文意思是？',
        o: opts.map(function(o){return o||'---';}),
        a: correctIdx,
        skill: 'wortschatz',
        f: w.de + ' = ' + w.zh + (w.hint ? ' ('+w.hint+')' : '') + (w.ex ? '<br>📖 ' + w.ex : '')
      });
    }
  }

  // 2. Grammar questions (5) — from grammar test bank
  if (typeof b2TestQs !== 'undefined') {
    var grammarQs = b2TestQs.slice(0, 15);
    var usedG = {};
    for (var j = 0; j < 5; j++) {
      var gi = Math.floor(Math.random() * grammarQs.length);
      while (usedG[gi]) gi = Math.floor(Math.random() * grammarQs.length);
      usedG[gi] = true;
      questions.push({
        q: '📖 ' + grammarQs[gi].q,
        o: grammarQs[gi].o,
        a: grammarQs[gi].a,
        skill: 'grammatik',
        f: grammarQs[gi].f
      });
    }
  }

  // Render test
  var prefix = 'dailytest';
  window.testScores[prefix] = 0;
  window.testState[prefix] = {questions: questions, answers: new Array(questions.length).fill(null), testType: 'daily', skills: {}};

  var html = '<div style="margin-bottom:12px;color:#7b8db5">Beantwortet: <span id="' + prefix + '-score">0</span>/' + questions.length + '</div>';
  questions.forEach(function(q, i) {
    html += '<div class="quiz"><h4>' + (i+1) + '. ' + q.q + '</h4>';
    q.o.forEach(function(o, j) {
      html += '<div class="q-option" data-prefix="' + prefix + '" data-idx="' + i + '" data-correct="' + (j===q.a) + '" data-useridx="' + j + '" data-skill="' + (q.skill||'') + '" onclick="answerDailyTestQ(this)">' + String.fromCharCode(65+j) + '. ' + o + '</div>';
    });
    html += '<div class="q-feedback" id="' + prefix + '-fb-' + i + '"></div></div>';
  });
  html += '<div id="' + prefix + '-result" style="text-align:center;margin-top:16px;display:none"></div>';
  html += '<button class="btn btn-red" style="margin-top:10px" onclick="showDailyTestResult()">📊 查看测试结果 & 明日规划</button>';

  var container = document.getElementById('daily-test-container');
  if (container) container.innerHTML = html;
}

// Answer handler for daily test (tracks skill scores)
window.answerDailyTestQ = function(el) {
  var prefix = 'dailytest';
  var idx = parseInt(el.getAttribute('data-idx'));
  var correct = el.getAttribute('data-correct') === 'true';
  var userIdx = parseInt(el.getAttribute('data-useridx'));
  var skill = el.getAttribute('data-skill') || 'grammatik';
  var state = window.testState[prefix];
  if (!state || state.answers[idx] !== null) return;
  if (el.parentElement.querySelector('.q-option.correct')) return;

  var fbEl = document.getElementById(prefix + '-fb-' + idx);
  var q = state.questions[idx];

  // Track skill
  if (!state.skills[skill]) state.skills[skill] = {c:0, t:0};
  state.skills[skill].t++;

  if (correct) {
    el.classList.add('correct');
    fbEl.textContent = '✅ ' + q.f;
    fbEl.style.display = 'block';
    state.answers[idx] = {correct: true};
    state.skills[skill].c++;
    window.testScores[prefix] = (window.testScores[prefix]||0) + 1;
    document.getElementById(prefix + '-score').textContent = window.testScores[prefix];
  } else {
    el.classList.add('wrong');
    state.answers[idx] = {correct: false, userIdx: userIdx};
    fbEl.innerHTML = '❌ Richtig: <strong>' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</strong> — ' + q.f;
    fbEl.style.display = 'block';
    var opts = el.parentElement.querySelectorAll('.q-option');
    opts[q.a].classList.add('correct');
    for (var k = 0; k < opts.length; k++) opts[k].style.pointerEvents = 'none';
  }
};

// ====== READING STRATEGY HELPERS ======
function classifyQuestionType(qText) {
  var qt = qText.toLowerCase();
  if (/hauptthema|hauptaussage|worum geht|der text insgesamt|das zentrale thema|kernaussage/i.test(qt)) return "main-idea";
  if (/schließen|folgern|ableiten|impliziert|kann man|worauf deutet|lässt sich/i.test(qt)) return "inference";
  if (/bedeutet|synonym|ersetzt|steht für|heißt|meint der autor|im kontext/i.test(qt)) return "vocabulary";
  return "detail";
}

function getErrorTypeName(type) {
  var m = {detail:"Detailfragen","main-idea":"Hauptaussage",inference:"Schlussfolgerungen",vocabulary:"Wortschatz",matching:"Zuordnung"};
  return m[type] || type;
}

function generateErrorDiagnosis(wrongTypes) {
  var counts = {};
  wrongTypes.forEach(function(t) { counts[t] = (counts[t]||0) + 1; });
  var sorted = Object.keys(counts).sort(function(a,b){return counts[b] - counts[a];});
  var total = wrongTypes.length;
  var html = "<p><strong>\uD83D\uDD0D " + total + " Fehler analysiert:</strong></p><ul style=\"margin-top:4px\">";
  sorted.forEach(function(t) { html += "<li><strong>" + getErrorTypeName(t) + ":</strong> " + counts[t] + " Fehler</li>"; });
  html += "</ul>";
  var mainType = sorted[0];
  if (mainType === "detail" && counts[mainType] >= 2) {
    html += "<p style=\"margin-top:8px\">\uD83D\uDCCC <strong>Muster:</strong> Du hast vor allem bei <strong>Detailfragen</strong> Fehler. Du suchst den Text nicht gründlich genug nach spezifischen Informationen — oder fällst auf Distraktoren herein.</p>";
    html += "<p>\uD83D\uDC8A <strong>Lösung:</strong> Lies die Fragen VOR dem Text. Unterstreiche Schlüsselwörter. Prüfe jede Option: Steht das WIRKLICH so im Text?</p>";
  } else if (mainType === "inference") {
    html += "<p style=\"margin-top:8px\">\uD83D\uDCCC <strong>Muster:</strong> Du hast Schwierigkeiten bei <strong>Schlussfolgerungen</strong>. Du nimmst Informationen zu wörtlich.</p>";
    html += "<p>\uD83D\uDC8A <strong>Lösung:</strong> Frage dich: Lässt sich das LOGISCH aus dem Text ableiten? Achte auf Konnektoren (daher, deshalb).</p>";
  } else if (mainType === "main-idea") {
    html += "<p style=\"margin-top:8px\">\uD83D\uDCCC <strong>Muster:</strong> Du hast das <strong>Hauptthema</strong> nicht erfasst. Konzentrierst du dich zu sehr auf Einzelheiten?</p>";
    html += "<p>\uD83D\uDC8A <strong>Lösung:</strong> Lies den Text zuerst komplett durch. Frage dich: Worüber spricht der Text von Anfang bis Ende?</p>";
  } else if (mainType === "vocabulary") {
    html += "<p style=\"margin-top:8px\">\uD83D\uDCCC <strong>Muster:</strong> Du hast <strong>Wortschatz im Kontext</strong> falsch interpretiert.</p>";
    html += "<p>\uD83D\uDC8A <strong>Lösung:</strong> Unbekannte Wörter aus dem Satzzusammenhang erschließen, nicht aus dem Wörterbuch.</p>";
  }
  return html;
}

function generateReadingStrategies(readingType, wrongTypes) {
  var html = "";
  var typeSet = {};
  wrongTypes.forEach(function(t) { typeSet[t] = true; });
  if (readingType === "match") {
    html += "<h4>\uD83D\uDCCB Teil 1: Zuordnungsaufgaben</h4><ul>";
    html += "<li><strong>Querlesen (30s/Text):</strong> Überfliege alle Texte. Notiere 2-3 Schlüsselwörter pro Person.</li>";
    html += "<li><strong>Synonyme erkennen:</strong> Die Aussagen verwenden fast nie die gleichen Wörter wie die Texte.</li>";
    html += "<li><strong>Ausschlussverfahren:</strong> Streiche die Personen, die definitiv NICHT passen.</li>";
    html += "<li><strong>Negationen beachten:</strong> \"nicht\", \"kein\", \"kaum\" ändern die Bedeutung komplett.</li>";
    html += "</ul>";
  } else {
    html += "<h4>\uD83D\uDCC4 Teil 2: Textverständnis</h4><ul>";
    html += "<li><strong>Fragen zuerst (ohne Optionen):</strong> Die 5 Fragen geben eine Landkarte des Textes.</li>";
    html += "<li><strong>1. Durchgang (5-7 Min):</strong> Text überfliegen, Hauptidee erfassen, relevante Stellen markieren.</li>";
    html += "<li><strong>2. Durchgang:</strong> Gezielt Antworten suchen. Fragen sind meist in Textreihenfolge.</li>";
    html += "<li><strong>Distraktoren erkennen:</strong> Falsche Optionen sind nie völlig unsinnig — oft verdrehen sie ein Detail.</li>";
    html += "</ul>";
  }
  if (typeSet["detail"]) {
    html += "<h4 style=\"margin-top:12px\">\uD83D\uDD0D Für Detailfragen:</h4><ul>";
    html += "<li>Unterstreiche <strong>Zahlen, Daten, Namen</strong> beim Lesen.</li>";
    html += "<li><strong>Distraktoren-Falle:</strong> Richtige Zahl aus dem Text, aber auf falsche Sache bezogen.</li>";
    html += "</ul>";
  }
  if (typeSet["inference"]) {
    html += "<h4 style=\"margin-top:12px\">\uD83E\uDDE0 Für Schlussfolgerungen:</h4><ul>";
    html += "<li>Achte auf <strong>Konnektoren:</strong> daher, deshalb (Folge), obwohl (Einschränkung), allerdings (Gegensatz).</li>";
    html += "<li><strong>Übertreibungen sind falsch:</strong> alle/immer/nie → im Text meist viele/oft/teilweise.</li>";
    html += "</ul>";
  }
  return html;
}

function generateGeneralReadingTips() {
  return "<div class=\"tip\" style=\"margin-top:12px\"><ul style=\"line-height:1.8\">" +
    "<li><strong>\u23F1\uFE0F Zeit (Goethe B2):</strong> Teil 1: 15 Min | Teil 2: 25 Min | Teil 3: 20 Min = 60 Min gesamt</li>" +
    "<li><strong>\uD83D\uDCD6 Zwei-Durchlauf-Methode:</strong> 1. Text überfliegen (5-7 Min). 2. Gezielt Antworten suchen (15-18 Min).</li>" +
    "<li><strong>\uD83D\uDEAB Häufige Fallen:</strong> Distraktoren mit richtigen Wörtern aber falscher Bedeutung | Absolute Aussagen (immer/nie/alle) | Antworten die logisch klingen aber nicht im Text stehen</li>" +
    "<li><strong>\uD83D\uDCDD Signalwörter:</strong> aber/jedoch/allerdings (Gegensatz) | deshalb/daher/folglich (Folge) | obwohl/trotzdem (Einschränkung) | besonders/vor allem (Hervorhebung)</li>" +
    "<li><strong>\uD83D\uDD24 Unbekannte Wörter:</strong> Aus dem Kontext erschließen, nicht im Wörterbuch nachschlagen!</li>" +
    "<li><strong>\u2705 Vor dem Abgeben:</strong> Jede Antwort nochmal mit der Textstelle vergleichen.</li>" +
    "</ul></div>";
}

  {q:'Das Gebäude ___ im Jahr 2010 ___. (bauen → Passiv)',o:['hat/gebaut','wurde/gebaut','ist/gebaut','wird/bauen'],a:1,f:'<b>Vorgangspassiv Präteritum (过程被动态过去时)</b>：大楼"在2010年被建"——强调建造这个动作在过去发生。<br><br><b>规则：</b>Vorgangspassiv = <b>werden + Partizip II</b>。过去时：werden → <b>wurde</b>。全句：Das Gebäude <b>wurde</b> im Jahr 2010 <b>gebaut</b>.<br><br><b>对比：</b>Zustandspassiv (状态被动态) 用sein：Das Gebäude <b>ist</b> gebaut. = 大楼已建成（强调建成后的状态）。❌ "hat/gebaut"是主动完成时，逻辑不通（大楼不能自己建自己）。'},
  {q:'___ des Regens fand das Konzert statt.',o:['Wegen','Trotz','Aufgrund','Während'],a:1,f:'<b>Nominalisierung (名词化) — 让步关系</b>：尽管下雨，音乐会仍然举行。<br><br><b>规则：</b>obwohl从句 → <b>Trotz + Genitiv</b>。原句：<b>Obwohl</b> es regnete, fand das Konzert statt. → <b>Trotz</b> des Regens fand das Konzert statt.<br><br><b>辨析：</b>❌ Wegen/Aufgrund + Gen. = 因为（表原因，逻辑相反）。❌ Während + Gen. = 在...期间（时间关系）。<br><br><b>C1重点：</b>Nominalisierung是B2→C1最关键的提升之一。写作中用Trotz+Gen.替代obwohl从句可以明显提高书面语水平。'},

  {q:'___ er krank war, ging er zur Arbeit.',o:['Weil','Obwohl','Wenn','Damit'],a:1,f:'<b>Konzessivsatz (让步从句)</b>：尽管他生病了，他还是去上班。<br><br><b>规则：</b><b>Obwohl</b>引导让步从句，表示"尽管/虽然"，从句动词在末尾。全句：<b>Obwohl</b> er krank war, ging er zur Arbeit.<br><br><b>辨析：</b>❌ Weil = 因为（因果倒置，逻辑错误：不能说"因为他病了所以去上班"）。❌ Wenn = 如果/当...时（条件或时间，不是让步）。❌ Damit = 为了（目的从句）。<br><br><b>B2考点：</b>Leseverstehen中经常通过连接词判断句子间的逻辑关系。'},
  {q:'Sie ___ seit 3 Jahren in Berlin. (leben → Perfekt)',o:['hat gelebt','ist gelebt','hat leben','ist leben'],a:0,f:'<b>Perfekt mit haben (完成时助动词)</b>：她已在柏林生活了3年。<br><br><b>规则：</b>leben构成完成时用助动词<b>haben</b>：Sie <b>hat</b> seit 3 Jahren in Berlin <b>gelebt</b>.<br><br><b>核心规则—haben vs sein：</b>大多数动词用<b>haben</b>。用<b>sein</b>的动词必须同时满足两个条件：①表示位置/状态变化（如gehen, fahren, aufstehen）②不及物。leben不表示变化，用haben。<br><br><b>常见错误：</b>❌ "ist gelebt" — leben不是位移动词，不用sein。'},

  {q:'Ich freue mich ___ das Konzert morgen.',o:['über','auf','an','für'],a:1,f:'<b>sich freuen auf vs über — 经典辨析</b>：我期待明天的音乐会。<br><br><b>规则：</b>sich freuen <b>auf</b> + Akk. = 期待<b>未来</b>的事（音乐会在明天，还没发生）→ Ich freue mich <b>auf</b> das Konzert.<br>sich freuen <b>über</b> + Akk. = 为<b>已发生/现在</b>的事高兴 → Ich freue mich <b>über</b> das Geschenk.（礼物已经收到了）<br><br><b>记忆技巧：</b>auf = 向前看（未来），über = 对着现有的东西高兴。B2考试中几乎必考。'},

  {q:'Die Firma muss ___ Konkurs anmelden. (Insolvenz → FVG)',o:['den','die','das','dem'],a:0,f:'<b>Nomen-Verb-Verbindung (名词-动词搭配/FVG)</b>：公司必须申请破产。<br><br><b>规则：</b>Insolvenz anmelden = 申请破产。Insolvenz = 破产(女性名词, <b>die</b>)。eine Insolvenz anmelden。<br><br><b>但本题考点是：</b>"Konkurs anmelden" 也是"申请破产"的常用表达。Konkurs = 破产(男性名词, <b>der</b>)，所以：<b>den</b> Konkurs anmelden。<br><br><b>三个同义表达：</b>①Insolvenz anmelden (die) ②Konkurs anmelden (der) ③Pleite gehen (口语)。注意冠词随名词变化！'},
  {q:'Bitte ___ Sie mir die Unterlagen ___. (zusenden → höflich)',o:['würden/zusenden','haben/zugesandt','sind/zusenden','werden/gesendet'],a:0,f:'<b>Konjunktiv II 礼貌请求 (höfliche Bitte)</b>：请您把文件发给我。<br><br><b>规则：</b>KII用于表达礼貌、客气的请求。würden + Infinitiv = 比直陈式更礼貌。<br>全句：<b>Würden</b> Sie mir die Unterlagen <b>zusenden</b>? = Könnten Sie mir...?<br><br><b>对比：</b>直陈式 "Senden Sie mir..." = 命令式，较生硬。KII "Würden Sie..." = 礼貌请求，B2写作中（尤其是正式信函）推荐使用KII表达请求。<br><br><b>B2写作考点：</b>Beschwerdebrief中常用KII表达请求和投诉。'},
  {q:'Die Wohnung, ___ wir besichtigt haben, war zu teuer.',o:['das','die','der','den'],a:1,f:'<b>Relativsatz (关系从句) — 性数格判断</b>：我们看过的那个公寓太贵了。<br><br><b>规则：</b>关系代词 = 指示代词，性数跟<b>先行词</b>一致，格跟<b>从句中的功能</b>一致。<br>die Wohnung = 女性单数。besichtigen + Akk.，所以从句中关系代词是Akk. → <b>die</b> (Nom.=Akk. bei Fem.)。<br><br><b>完整关系代词变格（女性）：</b>Nom. die, Akk. die, Dat. der, Gen. deren。<br><br><b>注意：</b>❌ "das"是中性的Akk.。❌ "der"在这里是Dat.或Gen.，但besichtigen需要Akk.。'},
  {q:'Er ___ den Vertrag ___. (unterschreiben → Perfekt)',o:['ist/unterschrieben','hat/unterschrieben','wurde/unterschreibt','hat/unterschreiben'],a:1,f:'<b>Perfekt mit haben + Partizip II (可分动词)</b>：他签了合同。<br><br><b>规则：</b>unterschreiben (可分动词：unter+schreiben) → PII = unter<b>geschrieben</b> (属于强变化：schreiben→geschrieben)。完成时：Er <b>hat</b> den Vertrag <b>unterschrieben</b>.<br><br><b>辨析：</b>❌ "ist unterschrieben" — unterschreiben不是位移/状态变化动词，不用sein。❌ "hat unterschreiben" — 忘了用Partizip II。<br><br><b>可分动词PII规则：</b>ge-插入在可分前缀和词根之间：unterschreiben → unter<b>ge</b>schrieben。'},
  {q:'Ich ___ gestern nicht kommen. (können → Präteritum)',o:['könnte','konnte','kann','gekonnt'],a:1,f:'<b>Modalverben Präteritum (情态动词过去时)</b>：我昨天不能来。<br><br><b>规则：</b>können的过去时是<b>konnte</b>（不规则变化，必须单独记忆）。<br><br><b>关键区别：</b>❌ <b>könnte</b>是Konjunktiv II（表示非现实/礼貌），不是过去时！"Ich könnte gestern nicht kommen"语法错误，因为KII不能表示过去的客观事实。<br>❌ <b>kann</b>是现在时，与"gestern"矛盾。<br>❌ <b>gekonnt</b>是Partizip II，不能单独作谓语。<br><br><b>Modalverb Präteritum表：</b>können→konnte, müssen→musste, dürfen→durfte, wollen→wollte, sollen→sollte, mögen→mochte。'},
  {q:'Je mehr man übt, ___ besser wird man.',o:['je','umso','desto','damit'],a:2,f:'<b>je...desto... (越...越...)</b>：练习得越多，你就会变得越好。<br><br><b>规则：</b>je + Komparativ (+ Nebensatz), <b>desto</b> + Komparativ (+ Hauptsatz mit Verb an 2. Position)。<br>全句：Je mehr man übt, <b>desto</b> besser wird man.<br><br><b>辨析：</b>❌ "je...je..." — 两个je不能连用。❌ "umso" — 实际上 umso 和 desto 在标准德语中都可使用，但传统规则更推荐desto。本题A=je(B=umso)被当作错误，因为je不能重复出现。<br><br><b>主句语序注意：</b>desto besser <b>wird</b> man. — 动词在第二位（desto besser = 占第一位）。'},
  {q:'Er ___ sich gestern mit seiner Freundin. (treffen→Perfekt)',o:['hat getroffen','ist getroffen','hat getrefft','ist getrefft'],a:0,f:'<b>Perfekt: treffen + haben</b>：他昨天和女朋友见了面。<br><br><b>规则：</b>treffen构成完成时用<b>haben</b>（不是sein）。PII：treffen → ge<b>troff</b>en（强变化：e→o）。<br>Er <b>hat</b> sich gestern mit seiner Freundin <b>getroffen</b>.<br><br><b>为什么不用sein？</b>treffen是及物动词（jdn. treffen），及物动词完成时用haben。sich treffen虽为反身用法，但反身动词也用haben。<br><br><b>对比：</b>sich begegnen (相遇) → ist begegnet (不及物，用sein)。'},
  {q:'___ Hilfe meiner Eltern habe ich die Prüfung bestanden.',o:['Mit','Durch','Wegen','Aufgrund'],a:0,f:'<b>mit Hilfe + Genitiv (在...的帮助下)</b>：在我父母的帮助下我通过了考试。<br><br><b>规则：</b><b>Mit</b> Hilfe meiner Eltern... = Mit der Hilfe von meinen Eltern...<br><br><b>辨析：</b>❌ Durch = 通过(某种手段/方式/施动者)，如 durch Fleiß。Hilfe不能用durch。<br>❌ Wegen = 因为(原因)，但mit Hilfe强调"借助"而非"因为"。<br>❌ Aufgrund = 基于/由于(正式书面)，语气不合。<br><br><b>B2写作提示：</b>mit Hilfe + Gen. 是常用的书面表达，用于描述借助某物/某人完成某事。'},
  {q:'Die Arbeit ist ___ (machen) als ich dachte. (比较级)',o:['leichter','mehr leicht','leichtere','am leichtesten'],a:0,f:'<b>Komparativ (比较级)</b>：这项工作比我想的要容易。<br><br><b>规则：</b>leicht的比较级是<b>leichter</b>（单音节adj. + -er）。注意c丢掉：leicht → leichter（不是leichter，而是ch结合规则）。<br><br><b>辨析：</b>❌ "mehr leicht" — 这不是德语比较级构成方式。❌ "leichtere" — 这是带词尾的比较级（需要名词），此处作表语不加词尾。❌ "am leichtesten" — 这是最高级。<br><br><b>比较级表语用法：</b>X ist + Komparativ + als Y。表语位置不加形容词词尾。'},
  {q:'___ du Lust ___, ins Kino zu gehen?',o:['Hast/hast','Hättest/hättest','Hast/--','Hättest/zu'],a:2,f:'<b>Lust haben, etw. zu tun</b>：你有兴趣去看电影吗？<br><br><b>规则：</b><b>Lust haben, ... zu + Infinitiv</b>。这是一个固定结构：haben + 名词(Lust) + zu-不定式。<br>全句：<b>Hast</b> du Lust, ins Kino zu gehen?<br><br><b>关键点：</b>Lust后面不需要再加介词！这和英语的"feel like doing"不同。德语中Lust直接加逗号和zu-不定式。<br><br><b>类似结构：</b>Zeit haben, ... zu tun / Spaß haben, ... zu tun / Probleme haben, ... zu tun。'},
  {q:'Ich ___ das Buch ___. (lesen→Perfekt)',o:['habe/gelesen','bin/gelesen','habe/gelegen','bin/gelegen'],a:0,f:'<b>lesen Perfekt: haben + gelesen</b>：我读了这本书。<br><br><b>规则：</b>lesen → PII = <b>gelesen</b>（强变化：e→a→e）。完成时：Ich <b>habe</b> das Buch <b>gelesen</b>.<br><br><b>⚠️ 常见混淆：</b>lesen (阅读) ≠ liegen (躺/位于)。liegen → PII = <b>gelegen</b> (hat gelegen)。❌ "habe gelegen" = 我躺过了（不是阅读！）。<br><br><b>记忆：</b>lesen有s→读→gelesen；liegen有g→躺→gelegen。s字母对应s(z)音。'},
  {q:'Er arbeitet, ___ Geld zu verdienen.',o:['um','damit','für','wegen'],a:0,f:'<b>Finalsatz: um...zu + Infinitiv (目的从句)</b>：他工作是为了挣钱。<br><br><b>规则：</b>当<b>主句主语 = 从句主语</b>时，用<b>um...zu + Inf.</b>。Er arbeitet, <b>um</b> Geld <b>zu</b> verdienen. (主从句主语都是er)<br><br><b>何时用damit：</b>当主从句<b>主语不同</b>时用damit从句。如：Er arbeitet, <b>damit</b> seine Familie ein besseres Leben hat. (主语：er ≠ seine Familie)<br><br><b>❌ für/wegen：</b>不能引导不定式从句。<br><br><b>B2/C1考点：</b>um...zu vs damit是必考点，在写作中也频繁使用。'},
  {q:'Das Kind ___ von der Oma ___. (abholen→Passiv Perfekt)',o:['wurde/abgeholt','ist/abgeholt worden','hat/abgeholt','wird/abgeholt'],a:1,f:'<b>Passiv Perfekt (完成时被动)</b>：孩子被奶奶接走了。<br><br><b>规则：</b>Vorgangspassiv Perfekt = <b>sein + Partizip II + worden</b>。<br>abholen (可分) → PII = abgeholt。全句：Das Kind <b>ist</b> von der Oma <b>abgeholt worden</b>.<br><br><b>⚠️ 注意worden vs geworden：</b>被动完成时用<b>worden</b>（不是geworden！werden的PII在被动中ge-脱落）。<br><br><b>时态对比：</b>Präsens Passiv: wird abgeholt | Prät. Passiv: wurde abgeholt | Perfekt Passiv: ist abgeholt worden。'},
  {q:'___ des schlechten Wetters blieben wir zu Hause.',o:['Trotz','Wegen','Aufgrund','Während'],a:1,f:'<b>Kausale Nominalisierung (原因名词化)</b>：因为天气不好，我们待在家里。<br><br><b>规则：</b>weil das Wetter schlecht war → <b>Wegen</b> des schlechten Wetters。<b>Wegen + Genitiv</b> = 因为/由于。<br><br><b>辨析：</b>❌ Trotz = 尽管（让步，逻辑相反：不能说"尽管天气不好我们待在家"——待在家是因为天气不好，符合逻辑）。<br>❌ Während = 在...期间（时间）。Aufgrund也表原因但更正式。<br><br><b>注意：</b>口语中wegen常接Dativ (wegen dem Wetter)，但书面语（尤其是考试）须用Genitiv：wegen des schlechten Wetters。'},
  {q:'Ich weiß nicht, ___ er heute kommt.',o:['ob','wenn','weil','damit'],a:0,f:'<b>Indirekter Fragesatz (间接疑问句)</b>：我不知道他今天是否来。<br><br><b>规则：</b>间接疑问句（Ja/Nein-问句）用<b>ob</b>引导。直接问句"Kommt er heute?" → 间接"Ich weiß nicht, <b>ob</b> er heute kommt."<br><br><b>辨析：</b>❌ wenn = 如果/当...时（条件/时间），不能用于"是否"。❌ weil = 因为（原因）。❌ damit = 为了（目的）。<br><br><b>ob vs wenn：</b>英语都用if，但德语严格区分：ob = whether, wenn = if/when。这是英语母语者最常见错误之一。'},
  {q:'Sie ist ___ (gut) Sängerin der Klasse.',o:['die beste','die bessere','die guteste','am besten'],a:0,f:'<b>Superlativ als Attribut (最高级作定语)</b>：她是班上最好的歌手。<br><br><b>规则：</b>gut → Superlativ = <b>beste</b>（不规则！）。作定语（修饰名词）时加定冠词+形容词词尾：<b>die beste</b> Sängerin。<br><br><b>辨析：</b>❌ "die bessere" = 比较级（更好的），不是最高级。❌ "die guteste" — gut的最高级是不规则的，不是guteste。❌ "am besten" — 这是表语/状语用法：Sie singt am besten. 作定语必须用die beste。<br><br><b>不规则比较级/最高级：</b>gut→besser→beste, viel→mehr→meiste, gern→lieber→liebste。'},
];

const c1TestQs = [
  {q:'Der Minister betonte, die Wirtschaft ___ sich gut ___. (entwickeln → KI)',o:['habe/entwickelt','hat/entwickelt','wäre/entwickelt','sei/entwickeln'],a:0,f:'<b>Konjunktiv I — Indirekte Rede (间接引语)</b>：部长强调，经济发展良好。<br><br><b>规则：</b>间接引语中用KI保持<b>中立客观</b>，不带说话人态度。动词用KI形式：haben的KI第三人称单数 = <b>habe</b>。Perfekt KI = habe + PII。<br>全句：Der Minister betonte, die Wirtschaft <b>habe</b> sich gut <b>entwickelt</b>.<br><br><b>辨析：</b>❌ "hat entwickelt" = 直陈式（陈述事实），失去了间接引语的疏离效果。❌ "wäre entwickelt" = KII（暗示怀疑——"我怀疑经济可能没有发展好"），这不是部长原意。❌ "sei entwickeln" = 语法结构错误。<br><br><b>C1核心考点：</b>KI在新闻报导、学术写作中极其常见。考点在于区分直陈式(etw. behaupten→句中用KI)和KII(对转述内容存疑→用KII)。'},
  {q:'___ des technologischen ___ sind viele Arbeitsplätze gefährdet.',o:['Aufgrund/Fortschritts','Trotz/Fortschritt','Wegen/Fortschritt','Dank/Entwicklung'],a:0,f:'<b>Nominalisierung — Kausalangabe mit Genitiv</b>：由于技术进步，许多工作岗位受到威胁。<br><br><b>规则：</b>Weil die Technologie fortschreitet → <b>Aufgrund</b> des technologischen <b>Fortschritts</b>。<br>Aufgrund + Genitiv = 由于/基于（正式书面语）。Fortschritt → des Fortschritts (Gen. 男性+弱变化名词+s)。<br><br><b>辨析：</b>Aufgrund/Wegen/Aus都可以表原因，但Aufgrund最正式，常见于学术/新闻文本。Dank + Gen./Dat. 表"幸亏/多亏"（积极原因），这里用Aufgrund最准确。<br><br><b>⚠️ 常见错误：</b>❌ "Aufgrund/Fortschritt" — 缺少Genitiv词尾-s。'},
  {q:'Das Problem ___ durch eine Änderung des Verfahrens ___ werden. (lösen → Passiversatz)',o:['ist/lösen','hat/lösen','kann/gelöst','wird/lösen'],a:2,f:'<b>Modalverb + Passiv (情态动词被动态)</b>：问题可以通过改变方法被解决。<br><br><b>规则：</b>Modalverb + Partizip II + werden = 情态被动（表示可能性/必要性+被动）。<br>全句：Das Problem <b>kann</b> durch eine Änderung des Verfahrens <b>gelöst</b> werden.<br><br><b>结构拆解：</b>kann (Modalverb, 变位) + gelöst (PII, 不变) + werden (不定式, 不变)。语序：Modalverb在第二位，PII在最后，werden在PII之前。<br><br><b>对比：</b>sein+zu+Inf. (Passiversatz): Das Problem ist zu lösen. | sich lassen+Inf.: Das Problem lässt sich lösen. | Modalverb+Passiv: Das Problem kann gelöst werden.'},
  {q:'Es lässt ___ nicht leugnen, dass Handlungsbedarf besteht.',o:['es','sich','das','man'],a:1,f:'<b>sich lassen + Infinitiv (Passiversatz)</b>：无法否认存在行动需求。<br><br><b>规则：</b>etw. lässt <b>sich</b> + Infinitiv = etw. kann + PII + werden（被动替代形式）。<br>Es lässt <b>sich</b> nicht leugnen = Es kann nicht geleugnet werden.<br><br><b>关键点：</b>这个结构中的<b>sich</b>是反身代词（Akk.），不可省略，不可替换为es/das/man。<br><br><b>其他Passiversatzformen：</b>① sein + zu + Inf.: Das ist zu lösen. ② -bar: Das ist lösbar. ③ sich lassen + Inf.: Das lässt sich lösen. ④ gehören + PII: Das gehört verboten! C1考试要求能识别并使用这些替代形式。'},
  {q:'Die ___ (durchführen) Studie belegt die Wirksamkeit.',o:['durchführende','durchgeführte','durchführen','durchführt'],a:1,f:'<b>Partizip II als Adjektivattribut (第二分词作定语)</b>：已完成的这项研究证明了有效性。<br><br><b>规则：</b>PII作形容词定语表示<b>被动+完成</b>。durchführen → PII = durchge<b>führt</b> → 加形容词词尾-e (Nom. Fem. 定冠词后) → die <b>durchgeführte</b> Studie = die Studie, die durchgeführt wurde.<br><br><b>PI vs PII 关键区别：</b>❌ die <b>durchführende</b> Studie (PI) = 正在执行研究的那个研究本身（逻辑不通，研究不能执行自己）。PI = 主动/进行，PII = 被动/完成。<br><br><b>C1阅读技巧：</b>遇到长Partizipialattribute，先找到名词，再向前找分词，还原为关系从句理解。如：die von dem Institut durchgeführte Studie = die Studie, die von dem Institut durchgeführt wurde。'},
  {q:'Die Regierung hat ___, neue Maßnahmen zu ___. (beschließen→FVG)',o:['beschlossen/ergreifen','entschieden/nehmen','beschlossen/machen','entschieden/tun'],a:0,f:'<b>FVG + zu-Infinitiv-Konstruktion</b>：政府决定采取新措施。<br><br><b>规则：</b>beschließen → PII = <b>beschlossen</b>。Maßnahmen <b>ergreifen</b> = 采取措施（这是第二个FVG）。<br>全句：Die Regierung hat <b>beschlossen</b>, neue Maßnahmen zu <b>ergreifen</b>.<br><br><b>两个FVG嵌套：</b>① etw. beschließen = eine Entscheidung treffen ② Maßnahmen ergreifen = Maßnahmen treffen。❌ "Maßnahmen nehmen/machen/tun" 都不是标准德语表达。<br><br><b>C1重点：</b>FVG (Funktionsverbgefüge) 在C1考试中高频出现。把动词换成"动词+名词"组合是书面德语的重要特征。'},
  {q:'Das ist ___ faszinierend! (Modalpartikel: 表示"真的/确实")',o:['doch','ja','mal','denn'],a:1,f:'<b>Modalpartikeln (语气小品词) — ja</b>：这确实太迷人了！<br><br><b>规则：</b><b>ja</b>在这里不表示"是/对"，而是表达说话人的<b>情感确认、强调、共鸣</b>：这<b>确实</b>/<b>真的</b>太迷人了。<br><br><b>辨析：</b>❌ doch — 表示"反驳/毕竟/催促"，如: Das ist doch klar! = 这明明很清楚（别人不这么认为）。❌ mal — 表示"一下/暂且"，如: Guck mal! = 你看一下！❌ denn — 表示"到底/究竟"，如: Was ist denn los? = 到底怎么了？<br><br><b>C1考点：</b>Modalpartikeln在Leseverstehen中需要通过语境判断态度。ja用于建立共识和确认已知信息。'},
  {q:'In ___ auf die steigenden Kosten wurde das Projekt gestoppt.',o:['Hinsicht','Bezug','Anbetracht','Rücksicht'],a:2,f:'<b>C1 Präpositionalphrase — in Anbetracht</b>：考虑到不断上涨的成本，项目被叫停。<br><br><b>规则：</b><b>in Anbetracht + Genitiv</b> = 考虑到/鉴于（非常正式）。<br><br><b>辨析相似结构：</b>① mit/in Bezug auf + Akk. = 关于/就...而言 ② in Hinsicht auf + Akk. = 在...方面 ③ mit Rücksicht auf + Akk. = 顾及/考虑到（照顾某人的感受）。<br><br><b>语感判断：</b>区分点是介词搭配：in An<b>betracht</b> + Gen. (不加auf)，in Hinsicht <b>auf</b> + Akk.，mit <b>Rücksicht auf</b> + Akk.。本题空格后有"auf"，但in Anbetracht不加auf——等等，实际上标准是in Anbetracht + Gen. (不加auf)。不过本题应为 in Anbetracht der steigenden Kosten...'},
  {q:'___ man mehr in Bildung investiert ___, ___ die Arbeitslosigkeit sinken.',o:['Wenn/würde/würde','Würde/-/würde','Wenn/-/könnte','Damit/würde/würde'],a:0,f:'<b>KII Konditionalsatz (完整结构)</b>：如果人们更多投资教育，失业率就会下降。<br><br><b>规则：</b>Wenn + Subjekt + ... + <b>würde</b> + Infinitiv (从句末), <b>würde</b> + Subjekt + ... + Infinitiv (主句)。<br>全句：<b>Wenn</b> man mehr in Bildung investieren <b>würde</b>, <b>würde</b> die Arbeitslosigkeit sinken.<br>注意从句中动词(würde)在末位，主句中动词(würde)在第二位。<br><br><b>关键：</b>第一个空填Wenn (引导从句)，第二个空填würde (从句末助动词)，第三个空填würde (主句助动词，占第二位)。主句以würde开头，主语die Arbeitslosigkeit紧跟，然后sinken。'},
  {q:'Die Firma ___ über 500 Mitarbeiter. (verfügen→richtige Präp.)',o:['verfügt','verfügt über','verfügt von','verfügt mit'],a:1,f:'<b>verfügen über + Akkusativ (固定搭配)</b>：公司拥有500多名员工。<br><br><b>规则：</b>verfügen + <b>über</b> + Akk. = 拥有/具有。注意：über在这是介词，后接Akkusativ。<br><br><b>对比：</b>英语"dispose of / have at one\'s disposal" ↔ 德语"verfügen über"。❌ 直接说"Die Firma verfügt 500 Mitarbeiter"语法不完整。<br><br><b>类似结构：</b>besitzen + Akk. (直接宾语，不用介词) = 拥有，但verfügen über更正式，常用于书面/商务文本。'},
  {q:'Der __ (fallen) Aktienkurs beunruhigt die Anleger.',o:['fallende','gefallene','fallene','gefallende'],a:0,f:'<b>Partizip I als Adjektiv (PI作定语)</b>：正在下跌的股价令投资者不安。<br><br><b>规则：</b>fallen → PI = <b>fallend</b> + 形容词词尾-e = <b>fallende</b>。PI表示<b>正在进行</b>的动作：正在下跌的。<br><br><b>PI vs PII：</b>❌ "gefallene" = PII (已跌完的)——已跌完的股价可能不再令人不安了。❌ "fallene" 不存在。❌ "gefallende" 不存在（PI和PII不能混合）。<br><br><b>C1阅读关键：</b>PI = 在...的 / 正在...的 (aktiv/andauernd)，PII = 被...的 / 已...的 (passiv/vollendet)。遇到分词定语先判断"谁对谁做了什么动作"。'},
  {q:'Wir müssen eine ___ treffen.(entscheiden→FVG+Nomen)',o:['Entscheiden','Entscheidung','Verfahren','Bescheid'],a:1,f:'<b>Funktionsverbgefüge: eine Entscheidung treffen</b>：我们必须做出决定。<br><br><b>规则：</b>entscheiden (动词) → eine <b>Entscheidung</b> treffen (FVG)。treffen + Entscheidung = 做决定 (固定搭配)。<br><br><b>常见FVG表 (C1必须掌握)：</b>eine Entscheidung treffen = entscheiden | eine Frage stellen = fragen | eine Antwort geben = antworten | Kritik üben = kritisieren | zum Ausdruck bringen = ausdrücken | in Anspruch nehmen = beanspruchen。<br><br><b>❌ die anderen：</b>"Verfahren treffen" / "Bescheid treffen" 不存在。"Entscheiden"是动词原型，不能直接加冠词。'},
  {q:'Von dieser Maßnahme ___ vor allem kleine Unternehmen. (profitieren→richtig)',o:['profitieren','profitieren über','profitieren von','profitieren mit'],a:2,f:'<b>profitieren von + Dativ (动介搭配)</b>：小企业尤其从这一措施中获益。<br><br><b>规则：</b>profitieren + <b>von</b> + Dat. = 从...中获益/受益。<br><br><b>辨析：</b>❌ profitieren über — 不存在这个搭配。❌ profitieren mit — 不存在。❌ 直接及物用法"Von dieser Maßnahme profitieren..." — 错误，必须加von。<br><br><b>同类动介搭配 (von+Dativ)：</b>abhängen von (取决于), ausgehen von (以为...出发点), sprechen von (谈论), träumen von (梦想), überzeugen von (说服...相信)。'},
  {q:'___ die Wirtschaft auch wächst, ___ bleibt die Arbeitslosigkeit hoch.',o:['Obwohl/dennoch','Wenn/auch','Trotzdem/aber','Weil/deshalb'],a:0,f:'<b>Konzessivsatz mit Korrelat (让步从句+相关词)</b>：尽管经济在增长，失业率仍然很高。<br><br><b>规则：</b><b>Obwohl</b>引导让步从句（动词在后），主句用<b>dennoch</b>作副词呼应（动词在第二）。<br>全句：<b>Obwohl</b> die Wirtschaft auch wächst, <b>dennoch</b> bleibt die Arbeitslosigkeit hoch.<br><br><b>dennoch vs trotzdem：</b>两者都可作主句副词，dennoch略正式。<br><br><b>⚠️ 关键：</b>❌ Trotzdem不可作从句连接词（不能说"Trotzdem die Wirtschaft wächst"）。Trotzdem只能作副词。作从句连接词必须用obwohl/obgleich。'},
  {q:'Er gilt ___ einer der besten Experten auf diesem Gebiet.',o:['für','wie','als','zu'],a:2,f:'<b>gelten als + Nominativ (被认为是)</b>：他被认为是该领域最优秀的专家之一。<br><br><b>规则：</b>gelten <b>als</b> + <b>Nominativ</b> (不是Akk.！) = 被认为是/被视为。<br>Er gilt <b>als</b> einer der besten Experten. (einer = Nom.)<br><br><b>辨析：</b>❌ gelten für — 不存在这个搭配。❌ gelten wie — 不存在。❌ gelten zu — 不存在。<br><br><b>类似结构：</b>angesehen werden als + Nom. (被视为) / betrachtet werden als + Nom. (被看作) / bezeichnet werden als + Nom. (被称为)。都接Nominativ。'},
  {q:'Der Vorstand ___, das Projekt zu ___. (beschließen→KI)',o:['beschloss/verschieben','beschließe/verschieben','beschlossen/verschieben','beschloss/verschoben'],a:1,f:'<b>Konjunktiv I in der indirekten Rede</b>：董事会决定推迟项目。<br><br><b>规则：</b>间接引语中，beschließen的KI第三人称 = <b>beschließe</b>。<br>全句：Der Vorstand <b>beschließe</b>, das Projekt zu <b>verschieben</b>.<br><br><b>⚠️ 难点：</b>beschließen的KI形<b>beschließe</b>与直陈式<b>beschloss</b>不同，但与直陈式现在时ich beschließe形似。如果KI形与直陈式相同，则<b>必须用würde替代</b>。本题中EI单数第三人称KI与直陈式不同，可以正常使用。<br><br><b>C1阅读考点：</b>通过KI vs 直陈式的选择判断作者态度。KI = 中立转述，KII = 怀疑/不认同转述内容。'},
  {q:'Es handelt ___ um ein schwerwiegendes Problem.',o:['sich','es','ihn','das'],a:0,f:'<b>es handelt sich um + Akkusativ (固定句型)</b>：这涉及一个严重的问题。<br><br><b>规则：</b><b>Es handelt sich um</b> + Akk. = 这涉及/关于...。这是德语中最常用的固定句型之一。<br><br><b>关键：</b>始终用<b>es</b>作主语，<b>sich</b>作反身代词，<b>um</b>作介词。三者缺一不可。❌ "Es handelt um..." (缺少sich) ❌ "Es handelt es um..." (错误的sich)。<br><br><b>用法场景：</b>Bei diesem Text <b>handelt es sich um</b> einen Kommentar. (这篇文章是一篇评论)。C1阅读/写作中极其常见。'},
  {q:'___ man regelmäßig übt, ___ verbessert man seine Sprachkenntnisse.',o:['Wenn/so','Indem/dann','Je/desto','Dann/wenn'],a:1,f:'<b>Indem-Satz (方式从句) + dann-Korrelat</b>：通过定期练习，来改善语言能力。<br><br><b>规则：</b><b>Indem</b> (通过...的方式) + 从句, <b>dann</b> (那么/就) + 主句。Indem表达"通过做某事的方式来达成某事"。<br>全句：<b>Indem</b> man regelmäßig übt, <b>dann</b> verbessert man seine Sprachkenntnisse.<br><br><b>辨析：</b>❌ Wenn...so... — 条件关系（如果...那么...），但句意更接近方式而非条件。❌ Je...desto — 比例关系（越...越...）。❌ Dann...wenn — 语序倒置错误。<br><br><b>口语替代：</b>Indem → dadurch dass...。两者功能相同但dadurch dass更口语化。'},
  {q:'Die Umsetzung ___ (verschieben) auf nächstes Jahr.',o:['wird verschoben','ist verschoben','hat verschoben','würde verschieben'],a:0,f:'<b>Vorgangspassiv Präsens (过程被动态现在时)</b>：实施被推迟到明年。<br><br><b>规则：</b>Vorgangspassiv = <b>werden + Partizip II</b>。现在时：<b>wird</b> + PII。verschieben → PII = <b>verschoben</b> (强变化)。<br>全句：Die Umsetzung <b>wird</b> auf nächstes Jahr <b>verschoben</b>.<br><br><b>辨析：</b>❌ "ist verschoben" = Zustandspassiv (状态被动)，强调推迟后的状态，不是推迟这个动作。❌ "hat verschoben" = 主动完成时 (谁推迟的？无主语)。❌ "würde verschieben" = KII (非现实/礼貌)，不合句意。<br><br><b>Vorgangspassiv vs Zustandspassiv：</b>wird verschoben (被推迟的动作) vs ist verschoben (已推迟的状态)。C1必考点。'},
  {q:'Er handelte, ___ die Konsequenzen zu bedenken.',o:['ohne','statt','anstatt','um'],a:0,f:'<b>ohne...zu + Infinitiv (没有...就...)</b>：他没有考虑后果就行动了。<br><br><b>规则：</b><b>ohne</b>...zu + Inf. = 没有做某事（本该做或可能做的情况下）。<br>Er handelte, <b>ohne</b> die Konsequenzen <b>zu</b> bedenken. = 他行动了，却没考虑后果。<br><br><b>辨析：</b>❌ statt/anstatt...zu = 不做...而做...（选择替代关系）。❌ um...zu = 为了...（目的关系）。<br><br><b>对比：</b>ohne...zu (没做) vs statt...zu (取而代之) vs um...zu (为了)。如：Er ging vorbei, ohne mich zu sehen. (没有看见我就走过去了) vs Er las ein Buch, statt zu arbeiten. (不工作而看书)。'},
  {q:'Die Verhandlungen stehen kurz ___ dem Abschluss.',o:['für','vor','an','zu'],a:1,f:'<b>kurz vor + Dativ stehen (固定搭配)</b>：谈判即将完成。<br><br><b>规则：</b><b>kurz vor + Dat. stehen</b> = 即将... / 快要...。<br>Die Verhandlungen stehen kurz <b>vor</b> dem Abschluss. = 谈判即将结束。<br><br><b>类似表达：</b>kurz vor dem Ziel stehen (即将到达目标), kurz vor dem Zusammenbruch stehen (快要崩溃), kurz vor dem Abschluss stehen (即将完成)。<br><br><b>辨析：</b>❌ kurz für — 不存在。❌ kurz an — 不存在。❌ kurz zu — 不存在。这是一个固定搭配，空间隐喻：vor = 在...前面（即将到达）。'},
  {q:'___ mangelnder Nachfrage wurde das Produkt eingestellt.',o:['Trotz','Aufgrund','Wegen','Infolge'],a:2,f:'<b>Wegen + Genitiv — 原因介词 (Genitivpräposition)</b>：由于缺乏需求，该产品停产了。<br><br><b>规则：</b><b>Wegen</b> + Genitiv = 由于/因为。<b>mangelnd</b> → Gen. Fem. = mangelnd<b>er</b> Nachfrage。<br>全句：<b>Wegen</b> mangelnder Nachfrage wurde das Produkt eingestellt.<br><br><b>辨析：</b>❌ Trotz = 尽管（让步，逻辑错误：不能说"尽管缺乏需求产品被停产"——停产是因为缺乏需求）。❌ Aufgrund 也表原因且可填入，但Wegen是更常用的选择。<br><br><b>⚠️ Genitiv vs Dativ：</b>书面语中用Genitiv (wegen des Regens)，口语中常用Dativ (wegen dem Regen)。B2/C1考试中优先用Genitiv。'},
  {q:'Das Thema, ___ wir diskutiert haben, ist komplex.',o:['worüber','darüber','woran','daran'],a:0,f:'<b>wo(r)- + Präposition als Relativpronomen</b>：我们讨论过的那个话题很复杂。<br><br><b>规则：</b>谈论抽象话题不用"das..."而用<b>wo(r)- + Präposition</b>。diskutieren <b>über</b> + Akk. → <b>worüber</b>。<br>Das Thema, <b>worüber</b> wir diskutiert haben, ist komplex. = Das Thema, <b>über das</b> wir diskutiert haben...<br><br><b>规则详解：</b>wo(r)-关系代词用于①非人先行词 ②介词后。wenn die Präposition mit Vokal beginnt, wird ein -r- eingefügt: wo<b>r</b>über, wo<b>r</b>an, wo<b>r</b>auf。<br><br><b>❌ darüber：</b>这是副词，不是关系代词。不能引导关系从句。'},
  {q:'Die Firma ___ expandieren. (vorhaben→richtige Form)',o:['hat vor zu','hat vor','vorhat zu','vorhat'],a:0,f:'<b>vorhaben + zu-Infinitiv (可分动词+zu不定式)</b>：公司打算扩张。<br><br><b>规则：</b>vorhaben = 打算/计划。可分动词+Trennungsverb。现在时：hat vor。配合不定式：<b>hat vor, zu</b> expandieren。<br>全句：Die Firma <b>hat vor, zu</b> expandieren = Die Firma <b>hat vor</b> + zu expandieren。<br><br><b>可分动词+zu规则：</b>zu插入在可分前缀和词根之间。vorhaben: hat <b>vor, zu</b>... (不是 vorzu，因为haben已分开前缀)。<br><br><b>类似结构：</b>vorhaben, etw. zu tun / planen, etw. zu tun / beabsichtigen, etw. zu tun。这三个都表示"打算/计划做某事"。'},
  {q:'Sie ___ eine führende Rolle in der Branche. (einnehmen→Perfekt)',o:['hat eingenommen','ist eingenommen','hat eingenommen zu','wurde eingenommen'],a:0,f:'<b>Perfekt: einnehmen + haben (不可分动词)</b>：她在行业中占据了领先地位。<br><br><b>规则：</b>einnehmen = 不可分动词（前缀ein-不可分）。PII：einnehmen → <b>eingenommen</b>（强变化：nehmen→genommen, 不可分前缀eingenommen, 无ge-）。<br>全句：Sie <b>hat</b> eine führende Rolle in der Branche <b>eingenommen</b>.<br><br><b>不可分动词PII规则：</b>无ge-前缀。如：verstehen → verstanden, bekommen → bekommen, einnehmen → eingenommen。<br><br><b>eine Rolle einnehmen vs spielen：</b>Rolle <b>einnehmen</b> = 占据/担任角色（更正式），Rolle <b>spielen</b> = 扮演角色（更常用）。'},
];

// ===== ERROR BANK =====
function loadErrorBank() {
  try { return JSON.parse(localStorage.getItem('de-errorbank') || '{}'); } catch(e) { return {}; }
}
function saveErrorBank(bank) { localStorage.setItem('de-errorbank', JSON.stringify(bank)); }
function addError(type, question, options, correctIdx, userAnswer, explanation, topic) {
  let bank = loadErrorBank();
  let id = 'err-' + Date.now() + '-' + Math.random().toString(36).substr(2,4);
  bank[id] = {type, question, options, correctIdx, userAnswer, explanation, topic, timestamp: Date.now(), reviewed: 0, mastered: false};
  saveErrorBank(bank);
}
function getActiveErrors() {
  let bank = loadErrorBank();
  return Object.entries(bank).filter(function(e) { return !e[1].mastered; }).sort(function(a,b) { return b[1].timestamp - a[1].timestamp; });
}
function getErrorCount() { return getActiveErrors().length; }
function markErrorReviewed(errId, correct) {
  let bank = loadErrorBank();
  if (!bank[errId]) return;
  bank[errId].reviewed = (bank[errId].reviewed||0) + 1;
  if (correct) bank[errId].reviewed += 1;
  if (bank[errId].reviewed >= 2) bank[errId].mastered = true;
  saveErrorBank(bank);
}

// ===== TEST INFRASTRUCTURE =====
window.testState = window.testState || {};
window.testScores = window.testScores || {};

function renderTest(pageId, questions, prefix, testType) {
  window.testScores[prefix] = 0;
  window.testState[prefix] = {questions: questions, testType: testType, answers: new Array(questions.length).fill(null)};
  let html = '<div style="margin-bottom:12px;color:#7b8db5">Beantwortet: <span id="' + prefix + '-score">0</span>/' + questions.length + '</div>';
  questions.forEach(function(q, i) {
    html += '<div class="quiz"><h4>' + (i+1) + '. ' + q.q + '</h4>';
    q.o.forEach(function(o, j) {
      html += '<div class="q-option" data-prefix="' + prefix + '" data-idx="' + i + '" data-correct="' + (j===q.a) + '" data-useridx="' + j + '" onclick="answerTestQ(this)">' + String.fromCharCode(65+j) + '. ' + o + '</div>';
    });
    html += '<div class="q-feedback" id="' + prefix + '-fb-' + i + '"></div></div>';
  });
  html += '<div id="' + prefix + '-result" style="text-align:center;margin-top:16px;display:none"></div>';
  html += '<button class="btn btn-red" style="margin-top:10px" onclick="showTestResult(\'' + prefix + '\')">📊 Ergebnis anzeigen</button>';
  var containerId = pageId === 'test_b2' ? 'test-b2-container' : (pageId === 'test_c1' ? 'test-c1-container' : 'grammar-quiz-container');
  document.getElementById(containerId).innerHTML = html;
}

window.answerTestQ = function(el) {
  var prefix = el.getAttribute('data-prefix');
  var idx = parseInt(el.getAttribute('data-idx'));
  var correct = el.getAttribute('data-correct') === 'true';
  var userIdx = parseInt(el.getAttribute('data-useridx'));
  var state = window.testState[prefix];
  if (!state) {
    // Auto-init state for reading/listening quizzes
    if (!window.testState[prefix]) {
      window.testState[prefix] = {questions: [], answers: []};
      window.testScores[prefix] = 0;
    }
    state = window.testState[prefix];
  }
  if (state.answers[idx] !== null) return;
  if (el.parentElement.querySelector('.q-option.correct')) return;

  var fbEl = document.getElementById(prefix + '-fb-' + idx);
  var q = state.questions[idx];

  if (correct) {
    el.classList.add('correct');
    fbEl.textContent = '✅ ' + q.f;
    fbEl.style.display = 'block';
    state.answers[idx] = {correct: true};
    window.testScores[prefix] = (window.testScores[prefix]||0) + 1;
    var scoreEl = document.getElementById(prefix + '-score');
    if (scoreEl) scoreEl.textContent = window.testScores[prefix];
  } else {
    el.classList.add('wrong');
    state.answers[idx] = {correct: false, userIdx: userIdx};
    fbEl.innerHTML = '❌ Richtig: <strong>' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</strong> — ' + q.f;
    fbEl.style.display = 'block';
    var opts = el.parentElement.querySelectorAll('.q-option');
    opts[q.a].classList.add('correct');
    for (var k = 0; k < opts.length; k++) opts[k].style.pointerEvents = 'none';
  }
  // Save reading progress to localStorage (persist answers across page navigation)
  var _sp = ['dailyread','match','readc','reads'];
  if (_sp.indexOf(prefix) >= 0 && window.testState[prefix] && window.testState[prefix].readingId) {
    localStorage.setItem('de-readstate-'+window.testState[prefix].readingId, JSON.stringify({
      state: window.testState[prefix],
      score: window.testScores[prefix] || 0,
      day: getStudyDay()
    }));
  }
};

window.showTestResult = function(prefix) {
  var state = window.testState[prefix];
  if (!state || !state.questions || state.questions.length === 0) return;
  var total = state.questions.length;
  var score = window.testScores[prefix] || 0;
  var pct = Math.round(score/total*100);
  var el = document.getElementById(prefix + '-result');

  var allList = '';
  var wrongCount = 0;
  for (var i = 0; i < state.answers.length; i++) {
    var ans = state.answers[i];
    var q = state.questions[i];
    var isWrong = ans && !ans.correct;
    if (isWrong) {
      wrongCount++;
      addError(state.testType, q.q, q.o, q.a, ans.userIdx, q.f, state.testType);
    }
    allList += '<div style="background:#1a1a2e;border:1px solid ' + (isWrong ? '#e94560' : '#1e3a2f') + ';border-left:4px solid ' + (isWrong ? '#e94560' : '#22c55e') + ';border-radius:8px;padding:14px;margin:10px 0;text-align:left">';
    allList += '<strong style="color:' + (isWrong ? '#e94560' : '#22c55e') + '">' + (isWrong ? '❌ ' : '✅ ') + (i+1) + '. ' + q.q + '</strong><br>';
    if (isWrong) {
      allList += '<span style="color:#f87171">Deine Antwort: ' + String.fromCharCode(65 + ans.userIdx) + '. ' + q.o[ans.userIdx] + '</span><br>';
    }
    allList += '<span style="color:#22c55e">Richtig: ' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</span><br>';
    allList += '<div style="background:#0d1b2a;border-radius:6px;padding:10px;margin-top:6px;color:#c8d0dc;font-size:.88em;line-height:1.7"><strong>📖 详细讲解：</strong>' + q.f + '</div>';
    allList += '</div>';
  }

  var gradeEmoji = pct >= 90 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
  var gradeText = pct >= 90 ? 'Hervorragend! C1-Niveau!' : pct >= 80 ? 'Sehr gut! Prüfungsreif!' : pct >= 60 ? 'Gut! Weiter üben.' : 'Mehr Übung nötig.';

  el.style.display = 'block';
  
  // Record skill scores (FIX 9)
  if (prefix === 'b2t' || prefix === 'c1t') {
    recordSkillScore('grammatik', score, total);
  }
  if (prefix === 'readc' || prefix === 'reads' || prefix === 'match') {
    recordSkillScore('lesen', score, total);
  }
  if (prefix === 'listen') {
    recordSkillScore('hoeren', score, total);
  }
  el.innerHTML = '<h2 style="color:' + (pct>=80?'#22c55e':pct>=60?'#f39c12':'#e94560') + ';font-size:1.6em">' + gradeEmoji + ' ' + score + '/' + total + ' (' + pct + '%) — ' + gradeText + '</h2>'
    + '<div style="margin-top:16px"><h3 style="color:#f39c12">📋 Vollständige Auswertung (' + total + ' Fragen)</h3>' + allList + '</div>'
    + (wrongCount > 0 ? '<p style="color:#7b8db5;font-size:.8em;margin-top:8px">' + wrongCount + ' Fehler in die Fehlerbank aufgenommen. <a href="javascript:goPage(\'error_review\')" style="color:#f39c12">→ Zur Fehlerwiederholung</a></p>' : '');
};

function vocabPage(title, words, deckId) {
  let html = `<h1>${title}</h1><p>${words.length} 个词汇。点击卡片看释义，标"Gelernt"会被记录。</p>`;
  html += renderFlashcard(deckId, words);
  html += `<h3 style="margin-top:20px">📋 完整词汇表</h3><div class="table-wrap"><table>
    <tr><th>Deutsch</th><th>中文</th><th>词性</th><th>例句</th></tr>`;
  words.forEach((w, i) => {
    let m = vocabMastered[deckId + '-' + i] ? ' ✅' : '';
    html += `<tr><td><strong>${w.de}</strong>${m}</td><td>${w.zh}</td><td>${w.hint}</td><td style="font-size:.78em">${w.ex}</td></tr>`;
  });
  html += `</table></div>`;
  return html;
}

function vbpPage() {
  let html = `<h1>🔗 动介搭配训练器</h1><p>80+组核心搭配。掌握这些，写作至少提5分。</p>`;
  let allVbp = [];
  for (let cat in vbpData) {
    html += `<h2>${cat}</h2><div class="table-wrap"><table><tr><th>动词+介词+格</th><th>中文</th><th>例句</th></tr>`;
    vbpData[cat].forEach(v => {
      let tag = v.v.includes('+A') && !v.v.includes('+D') ? '<span class="inline-tag tag-akk">Akk</span>' :
                v.v.includes('+D') ? '<span class="inline-tag tag-dat">Dat</span>' : '';
      html += `<tr><td>${v.v} ${tag}</td><td>${v.zh}</td><td style="font-size:.78em">${v.ex}</td></tr>`;
      allVbp.push(v);
    });
    html += `</table></div>`;
  }
  html += `<h2>🎯 随机测试（10题）</h2>`;
  let shuffled = [...allVbp].sort(() => Math.random() - 0.5).slice(0, 10);
  function getPrep(vStr) {
    let parts = vStr.split(' ');
    // Find the element containing +A or +D, the preposition is right before it
    for (let k = 0; k < parts.length; k++) {
      if (/\+[AD]/.test(parts[k])) return parts[k-1] || '';
    }
    return parts[parts.length-1];
  }
  shuffled.forEach((v, i) => {
    let blank = v.v.replace(/ .*$/, ' _____');
    let correctPrep = getPrep(v.v);
    var vbpMeta = JSON.stringify({type:'vbp',de:v.v,zh:v.zh,ex:v.ex,prep:correctPrep}).replace(/'/g,"&#39;").replace(/"/g,"&quot;");
    html += `<div class="quiz"><h4>${i+1}. ${blank}</h4><p style="color:#7b8db5;font-size:.8em">${v.zh}</p>`;
    html += `<div class="q-option" data-correct="true" data-vbpmeta="${vbpMeta}" onclick="answerVbpQ(this,'vbpq-${i}')">A. ${correctPrep}</div>`;
    let others = allVbp.filter(x => x.v !== v.v).sort(() => Math.random() - 0.5).slice(0, 3);
    others.forEach((o, j) => {
      html += `<div class="q-option" data-correct="false" onclick="answerVbpQ(this,'vbpq-${i}')">${String.fromCharCode(66+j)}. ${getPrep(o.v)}</div>`;
    });
    html += `<div class="q-feedback">✅ ${v.v} — ${v.ex}</div></div>`;
  });
  return html;
}

window.answerVbpQ = function(el, pid) {
  if (quizState[pid]) return;
  var correct = el.getAttribute('data-correct') === 'true';
  if (correct) {
    el.classList.add('correct');
    el.parentElement.querySelector('.q-feedback').style.display = 'block';
    quizState[pid] = true;
    checkAllDone(currentPage);
    // SRS tracking: record correct answer
    var metaStr = el.getAttribute('data-vbpmeta');
    if (metaStr) {
      var meta = JSON.parse(metaStr.replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
      var srsId = 'vbp-' + meta.de.replace(/[^a-zA-ZäöüßÄÖÜ]/g,'_');
      recordSRS(srsId, meta);
    }
  } else {
    el.classList.add('wrong');
    setTimeout(function() { el.classList.remove('wrong'); }, 500);
    // SRS tracking: fail the corresponding item
    var correctOpt = el.parentElement.querySelector('.q-option[data-correct="true"]');
    if (correctOpt) {
      var mStr = correctOpt.getAttribute('data-vbpmeta');
      if (mStr) {
        var m = JSON.parse(mStr.replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
        var sId = 'vbp-' + m.de.replace(/[^a-zA-ZäöüßÄÖÜ]/g,'_');
        failSRS(sId);
      }
    }
  }
};
