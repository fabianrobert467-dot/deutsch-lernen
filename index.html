<script>
// ===== FIREBASE INIT & CLOUD SYNC =====
firebase.initializeApp({
  apiKey: "AIzaSyD-DXaaYDS5CIPS4-Yqps7G9fsuQ9wbELg",
  authDomain: "deutsch-lernen-3bad7.firebaseapp.com",
  projectId: "deutsch-lernen-3bad7",
  storageBucket: "deutsch-lernen-3bad7.firebasestorage.app",
  messagingSenderId: "654638229070",
  appId: "1:654638229070:web:e5c66a8dd016956417c51f"
});
var db = firebase.firestore();
var auth = firebase.auth();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function(){});
var currentUser = null;
var _syncIgnore = false;  // prevent onSnapshot loop when we're the pusher

// Auth UI
window.showAuthModal = function() { document.getElementById('auth-modal').classList.add('open'); };
window.hideAuthModal = function() { document.getElementById('auth-modal').classList.remove('open'); var e=document.getElementById('auth-error'); if(e)e.style.display='none'; };

window.register = function() {
  var em = document.getElementById('auth-email-input').value.trim();
  var pw = document.getElementById('auth-password-input').value;
  var er = document.getElementById('auth-error');
  if (!em || !pw || pw.length < 6) { er.textContent = 'Bitte gültige Email und Passwort (min. 6 Zeichen) eingeben.'; er.style.display='block'; return; }
  auth.createUserWithEmailAndPassword(em, pw).then(function(){ hideAuthModal(); }).catch(function(e){ er.textContent = '❌ ' + e.message; er.style.display='block'; });
};

window.login = function() {
  var em = document.getElementById('auth-email-input').value.trim();
  var pw = document.getElementById('auth-password-input').value;
  var er = document.getElementById('auth-error');
  if (!em || !pw) { er.textContent = 'Bitte Email und Passwort eingeben.'; er.style.display='block'; return; }
  auth.signInWithEmailAndPassword(em, pw).then(function(){ hideAuthModal(); }).catch(function(e){ er.textContent = '❌ ' + e.message; er.style.display='block'; });
};

window.loginWithGoogle = function() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(function(){ hideAuthModal(); }).catch(function(e){
    document.getElementById('auth-error').textContent = '❌ ' + e.message;
    document.getElementById('auth-error').style.display = 'block';
  });
};

window.logout = function() { auth.signOut(); };

function setSyncUI(user) {
  currentUser = user;
  document.getElementById('auth-logged-out').style.display = user ? 'none' : 'block';
  document.getElementById('auth-logged-in').style.display = user ? 'block' : 'none';
  if (user) document.getElementById('auth-email-display').textContent = user.email;
}

function setSyncDot(s) {
  var d = document.getElementById('sync-dot'); var t = document.getElementById('sync-status');
  if (!d) return;
  d.className = 'sync-dot sync-' + s;
  if (t) t.textContent = s === 'online' ? '已同步' : s === 'syncing' ? '同步中...' : '离线';
}

// Collect all de-* data from localStorage
function collectAllData() {
  var data = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.indexOf('de-') === 0) {
      try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) { data[k] = localStorage.getItem(k); }
    }
  }
  return data;
}

// Write all data to localStorage from a data object
function applyCloudData(data) {
  for (var k in data) {
    if (k.indexOf('de-') !== 0) continue;
    var v = data[k];
    var s = typeof v === 'string' ? v : JSON.stringify(v);
    try {
      // Only update if different
      var cur = localStorage.getItem(k);
      if (cur !== s) localStorage.setItem(k, s);
    } catch(e) {}
  }
}

// Push local data to cloud
function pushToCloud() {
  if (!currentUser) return;
  var data = collectAllData();
  data._updated = firebase.firestore.FieldValue.serverTimestamp();
  _syncIgnore = true;
  setSyncDot('syncing');
  db.collection('users').doc(currentUser.uid).set(data, {merge: true}).then(function(){
    setSyncDot('online');
    _syncIgnore = false;
  }).catch(function(e){
    console.error('Sync push failed:', e);
    setSyncDot('offline');
    _syncIgnore = false;
  });
}

// Debounced push
var _syncTimer = null;
function schedulePush() {
  if (!currentUser) return;
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(pushToCloud, 1500);
}

// Pull cloud data and merge into localStorage
function pullAndMerge(user) {
  setSyncDot('syncing');
  db.collection('users').doc(user.uid).get().then(function(doc){
    if (!doc.exists) { pushToCloud(); return; }
    var remote = doc.data();
    var local = collectAllData();
    // Merge: remote wins, but keep keys that only exist locally
    for (var rk in remote) {
      if (rk.indexOf('de-') !== 0) continue;
      var rv = typeof remote[rk] === 'string' ? remote[rk] : JSON.stringify(remote[rk]);
      var lv = localStorage.getItem(rk);
      if (rv !== lv) localStorage.setItem(rk, rv);
    }
    // Push local-only keys to cloud
    var hasLocalOnly = false;
    for (var lk in local) {
      if (!(lk in remote)) { hasLocalOnly = true; break; }
    }
    if (hasLocalOnly) pushToCloud();
    setSyncDot('online');
    loadProgress();
    renderNav();
    renderContent();
  }).catch(function(e){
    console.error('Pull failed:', e);
    setSyncDot('offline');
  });
}

// Auth state changes
auth.onAuthStateChanged(function(user) {
  setSyncUI(user);
  if (user) {
    // Listen for remote changes
    db.collection('users').doc(user.uid).onSnapshot(function(doc){
      if (_syncIgnore) { _syncIgnore = false; return; }
      if (!doc.exists) return;
      applyCloudData(doc.data());
      loadProgress();
      renderNav();
      renderContent();
      setSyncDot('online');
    }, function(e){ setSyncDot('offline'); });
    // Initial pull
    pullAndMerge(user);
  } else {
    setSyncDot('offline');
    loadProgress();
    renderNav();
    renderContent();
  }
});

// ===== EXAM DATES =====
const B2_DATE = new Date();
B2_DATE.setDate(B2_DATE.getDate() + 15);
const C1_DATE = new Date();
C1_DATE.setDate(C1_DATE.getDate() + 45);
// ====== DAY MANAGEMENT ======
// Simple counter-based system: day number stored in localStorage
// Day only advances when user explicitly clicks "完成今日学习"
function getStudyDay() {
  try {
    var d = parseInt(localStorage.getItem('de-daynum'));
    if (d >= 1 && d <= 45) return d;
  } catch(e) {}
  localStorage.setItem('de-daynum', '1');
  return 1;
}
function setStudyDay(n) {
  n = Math.max(1, Math.min(45, parseInt(n)||1));
  localStorage.setItem('de-daynum', String(n));
  schedulePush();
  renderContent();
}
function advanceDay() {
  var d = getStudyDay();
  if (d < 45) setStudyDay(d+1);
}
function prevDay() { setStudyDay(getStudyDay() - 1); }
function nextDay() { setStudyDay(getStudyDay() + 1); }
function resetToToday() { setStudyDay(1); }

function getCountdown(date) {
  let diff = Math.ceil((date - new Date()) / 86400000);
  return diff > 0 ? diff + ' Tage' : (diff === 0 ? 'Heute!' : 'Vorbei');
}

function updateCountdowns() {
  let elB2 = document.getElementById('cd-b2');
  let elC1 = document.getElementById('cd-c1');
  if (elB2) {
    let dB2 = Math.ceil((B2_DATE - new Date()) / 86400000);
    elB2.textContent = '📅 B2: ' + (dB2 > 0 ? dB2 + ' Tage' : (dB2===0?'HEUTE!':'✓'));
  }
  if (elC1) {
    let dC1 = Math.ceil((C1_DATE - new Date()) / 86400000);
    elC1.textContent = '🎯 C1: ' + (dC1 > 0 ? dC1 + ' Tage' : (dC1===0?'HEUTE!':'✓'));
  }
}

function renderNav() {

function updateProgress() {
  let studyPages = nav.filter(n => n.id !== 'home' && n.id !== 'roadmap' && n.id !== 'daily' && n.id !== 'exam_tips');
  let pct = Math.round((completed.size / studyPages.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  let lvl = pct < 35 ? '📚 Phase 1: B2' : pct < 70 ? '📖 Phase 2: C1' : '🏆 Prüfungsbereit!';
  document.getElementById('badge-display').textContent = lvl;
}
function updateStreak() {
  let today = new Date().toISOString().split('T')[0];
  if (lastStudyDate !== today) {
    let yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    if (lastStudyDate === yesterday) streakDays++; else if (lastStudyDate !== today) streakDays = 1;
    lastStudyDate = today;
    localStorage.setItem('de-streak', JSON.stringify({days:streakDays, date:lastStudyDate})); schedulePush();
  }
  let el = document.getElementById('streak-text'); if (el) el.textContent = streakDays;
}

  try { JSON.parse(localStorage.getItem('de-done') || '[]').forEach(id => completed.add(id)); } catch(e) {}

}

}
function saveSkills() { localStorage.setItem('de-skills', JSON.stringify(skillScores)); schedulePush(); }

function recordSkillScore(skill, correct, total) {
  if (!skillScores[skill]) skillScores[skill] = {correct:0, total:0};
  skillScores[skill].correct += correct;
  skillScores[skill].total += total;
  saveSkills();
}

function getSkillPct(skill) {
  var s = skillScores[skill];
  if (!s || s.total === 0) return -1; // no data yet
  return Math.round(s.correct / s.total * 100);
}

function getWeakestSkills() {
  var weak = [];
  ['grammatik','lesen','wortschatz','hoeren'].forEach(function(s) {
    var pct = getSkillPct(s);
    if (pct >= 0 && pct < 60) weak.push({skill:s, pct:pct});
    else if (pct >= 0 && pct < 80) weak.push({skill:s, pct:pct, level:'yellow'});
  });
  weak.sort(function(a,b){return a.pct - b.pct;});
  return weak;
}

function getSkillName(skill) {
  var m = {grammatik:'语法', lesen:'阅读', wortschatz:'词汇', hoeren:'听力', schreiben:'写作'};
  return m[skill] || skill;
}

function getSkillEmoji(pct) {
  if (pct < 0) return '⬜';
  if (pct < 40) return '🔴';
  if (pct < 60) return '🟠';
  if (pct < 80) return '🟡';
  return '🟢';
}

function generateWeeklyReport() {
  var day = getStudyDay();
  if (day % 7 !== 0 && day !== 45) return null;
  var week = Math.ceil(day / 7);
  var wordsLearned = Object.keys(vocabMastered).length;
  var errorsTotal = Object.keys(loadErrorBank()).length;
  var errorsActive = getErrorCount();
  var skillSummary = {};
  ['grammatik','lesen','wortschatz','hoeren'].forEach(function(s) {
    var pct = getSkillPct(s);
    skillSummary[s] = pct >= 0 ? pct + '%' : 'keine Daten';
  });
  var report = {week:week, date: new Date().toISOString().split('T')[0], day:day, words:wordsLearned, errorsTotal:errorsTotal, errorsActive:errorsActive, skills:skillSummary};
  weeklyHistory.push(report);

  localStorage.setItem('de-weekly', JSON.stringify(weeklyHistory)); schedulePush();
  return report;
}

// ===== SRS (Spaced Repetition System) =====
// Interval progression (days): 1→2→4→7→14→30→60
var SRS_INTERVALS = [1, 2, 4, 7, 14, 30, 60];
var srsData = {};

function loadWeeklyReport() {}

function loadSRS() {
  try { srsData = JSON.parse(localStorage.getItem('de-srs') || '{}'); } catch(e) { srsData = {}; }
}
function saveSRS() { localStorage.setItem('de-srs', JSON.stringify(srsData)); schedulePush(); }
function srsNextInterval(stage) { return SRS_INTERVALS[Math.min(stage, SRS_INTERVALS.length - 1)]; }

// Called when user marks a word/VBP as learned or answers correctly
// meta: {type:'vocab'|'vbp', de, zh, ex, hint, prep} for review display
function recordSRS(itemId, meta) {
  var now = Date.now();
  var entry = srsData[itemId];
  if (!entry) {
    srsData[itemId] = { stage: 0, nextReview: now + SRS_INTERVALS[0] * 86400000, lastReview: now, correct: 1, meta: meta || null };
  } else {
    entry.correct = (entry.correct || 0) + 1;
    entry.stage = Math.min(entry.stage + 1, SRS_INTERVALS.length - 1);
    entry.lastReview = now;
    entry.nextReview = now + srsNextInterval(entry.stage) * 86400000;
    if (meta) entry.meta = meta;
  }
  saveSRS();
}

// Called when user gets a word/VBP wrong in review
function failSRS(itemId) {
  var now = Date.now();
  var entry = srsData[itemId];
  if (!entry) {
    srsData[itemId] = { stage: 0, nextReview: now + SRS_INTERVALS[0] * 86400000, lastReview: now, correct: 0 };
  } else {
    entry.stage = Math.max(0, entry.stage - 1); // drop one stage
    entry.lastReview = now;
    entry.nextReview = now + srsNextInterval(entry.stage) * 86400000;
  }
  saveSRS();
}

function getDueItems() {
  var now = Date.now();
  var due = [];
  for (var id in srsData) {
    if (srsData[id].nextReview <= now) {
      due.push({ id: id, entry: srsData[id] });
    }
  }
  return due;
}

function getDueCount() {
  var now = Date.now();
  var count = 0;
  for (var id in srsData) {
    if (srsData[id].nextReview <= now) count++;
  }
  return count;
}

function getSRSCount() {
  return getDueCount();
}

// Get total SRS-tracked items
function getSRSTotal() { return Object.keys(srsData).length; }

function renderFlashcard(deckId, words) {
  if (!flashcardIdx[deckId]) flashcardIdx[deckId] = 0;
  let idx = flashcardIdx[deckId];
  if (idx >= words.length) flashcardIdx[deckId] = 0;
  let w = words[flashcardIdx[deckId]];
  let html = `<div style="text-align:center;margin-bottom:8px;color:#7b8db5;font-size:.8em">${words.length} Wörter | Nr. ${idx+1} | ✅ ${Object.keys(vocabMastered).filter(k=>k.startsWith(deckId)).length} gemeistert</div>`;
  html += `<div class="flashcard" onclick="this.querySelector('.inner').classList.toggle('flipped')">
    <div class="inner"><div class="front"><div class="word">${w.de}</div><div class="hint">${w.hint||''}</div><div style="margin-top:10px;font-size:.7em;color:#7b8db5">👆 Klicken zum Umdrehen</div></div>
    <div class="back"><div class="meaning">${w.zh}</div><div class="example">${w.ex||''}</div></div></div></div>`;
  html += `<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-red" onclick="flashcardIdx['${deckId}']=(flashcardIdx['${deckId}']-1+${words.length})%${words.length};renderContent()">⬅ Zurück</button>
    <button class="btn btn-green" onclick="vocabMastered['${deckId}-'+flashcardIdx['${deckId}']]=true;saveVocabMastered();recordSRS('${deckId}-'+flashcardIdx['${deckId}'],{type:'vocab',de:'${w.de.replace(/'/g,"\\'")}',zh:'${w.zh.replace(/'/g,"\\'")}',ex:'${(w.ex||'').replace(/'/g,"\\'")}',hint:'${(w.hint||'').replace(/'/g,"\\'")}'});flashcardIdx['${deckId}']=(flashcardIdx['${deckId}']+1)%${words.length};renderContent()">✅ Gelernt</button>
    <button class="btn btn-gold" onclick="flashcardIdx['${deckId}']=(flashcardIdx['${deckId}']+1)%${words.length};renderContent()">Weiter ➡</button></div>`;
  return html;
}

function correctOpt(el, pid) { el.classList.add('correct'); el.parentElement.querySelector('.q-feedback').style.display = 'block'; quizState[pid] = true; checkAllDone(currentPage); }
function wrongOpt(el) { el.classList.add('wrong'); setTimeout(() => el.classList.remove('wrong'), 500); }
function checkAllDone(pageId) {
  let qs = document.querySelectorAll('.quiz'); if (qs.length === 0) return;
  let allOk = true; qs.forEach((q, i) => { if (!quizState[pageId + '-' + i]) allOk = false; });
  if (allOk) markDone(pageId);
}
function renderQuiz(opts) {
  let html = `<div class="quiz"><h4>${opts.q}</h4>`;
  opts.a.forEach((a, i) => { html += `<div class="q-option" data-correct="${a.correct||false}" onclick="if(this.getAttribute('data-correct')==='true'){this.classList.add('correct');this.parentElement.querySelector('.q-feedback').style.display='block';quizState['${opts.pid}-${opts.qid}']=true;checkAllDone('${opts.pid}')}else{this.classList.add('wrong');setTimeout(()=>this.classList.remove('wrong'),500)}">${String.fromCharCode(65+i)}. ${a.text}</div>`; });
  html += `<div class="q-feedback">✅ ${opts.fb||'Richtig!'}</div></div>`; return html;
}

// ===== DAILY PLAN ENGINE =====
function getDailyPlan() {
  let day = getStudyDay();
  let isB2 = day <= 15;
  let phase = isB2 ? 'B2' : 'C1';
  let tasks = [];
  let vocabTheme, grammarPage, readingPage, writingPage;

  if (isB2) {
    // B2 Phase: Day 1-15
    let vocabCycle = ((day-1) % 5);
    var b2Themes = ['vocab_b2_alltag','vocab_b2_gesund','vocab_b2_reise','vocab_b2_beruf','vocab_b2_medien'];
    vocabTheme = b2Themes[vocabCycle];

    if (day <= 3) grammarPage = 'grammar_b2';
    else if (day <= 6) grammarPage = 'grammar_konjunktiv2';
    else if (day <= 9) grammarPage = 'grammar_passiv';
    else if (day <= 12) grammarPage = 'grammar_nominal';
    else grammarPage = 'grammar_partizip';

    var b2Readings = ['reading1','reading2','reading3','reading_t1_1','reading_t2_1','reading_t1_2','reading_t2_2','reading_t1_3','reading_t2_3'];
    readingPage = 'daily_reading'; // Tägliche Leseübung
    if (day % 4 === 0) writingPage = (day % 8 === 4) ? 'writing_b2_prompt' : 'writing_b2';

    tasks = [
      {text:`背B2词汇：${getVocabName(vocabTheme)}（20词）`, type:'vocab', page:vocabTheme},
      {text:`B2语法复习：${getGrammarName(grammarPage)}`, type:'grammar', page:grammarPage},
      {text:'动介搭配练习（10组）', type:'vbp', page:'vbp'},
      {text:'用闪卡复习前一天的词汇（10分钟）', type:'review', page:'vocab_flashcards'},
    ];
    if (readingPage) tasks.push({text:'完成1篇阅读理解', type:'reading', page:readingPage});
    if (writingPage) tasks.push({text:'B2写作练习：正式信函（1篇，限时60分钟）', type:'writing', page:writingPage});
    if (day === 5 || day === 10) tasks.push({text:'🧪 B2半模测试（完成B2模拟测试的一半题目）', type:'test', page:'test_b2'});
    if (day === 14) tasks.push({text:'🧪 B2全真模拟（限时完成B2模拟测试全部）', type:'test', page:'test_b2'});
    if (day === 15) tasks.push({text:'🏆 今天考B2！只复习错题+Redemittel，不做新题', type:'exam', page:'exam_tips'});

    tasks.push({text:'🎧 听力训练：Hörverstehen mit Transkript（15分钟）', type:'listen', page:'listening'});
    tasks.push({text:'💬 口语：Vortrag vorbereiten & üben（10分钟）', type:'speak', page:'speaking'});
    tasks.push({text:'🔴 复习错题（' + getErrorCount() + '题待复习）', type:'error', page:'error_review'});
    tasks.push({text:'🧠 间隔复习到期内容（' + getDueCount() + '项）', type:'srs', page:'srs_review'});
    // Adaptive: add extra tasks based on weak skills
    var weakSkills = getWeakestSkills();
    if (weakSkills.length > 0) {
      var weakestSkill = weakSkills[0].skill;
      if (weakestSkill === 'grammatik' && weakSkills[0].pct < 60) tasks.push({text:'📖 弱项攻克：额外语法练习（系统推荐）', type:'grammar', page:'grammar_quiz'});
      if (weakestSkill === 'lesen' && weakSkills[0].pct < 60) tasks.push({text:'📰 弱项攻克：额外阅读训练1篇', type:'reading', page:'reading_t2_1'});
      if (weakestSkill === 'wortschatz' && weakSkills[0].pct < 60) tasks.push({text:'📝 弱项攻克：额外词汇复习（闪卡20词）', type:'vocab', page:'vocab_flashcards'});
    }
    tasks.push({text:'📝 今日生词本整理（5分钟）', type:'review', page:''});
  } else {
    // C1 Phase: Day 16-45
    let c1Day = day - 15;
    let vocabCycle = ((c1Day-1) % 5);
    let themes = ['vocab_wissenschaft','vocab_politik','vocab_umwelt','vocab_medien','vocab_arbeit'];
    vocabTheme = themes[vocabCycle];

    let grammarCycle = ((c1Day-1) % 7);
    let grammars = ['grammar_konjunktiv1','grammar_konjunktiv2','grammar_passiv','grammar_nominal','grammar_partizip','grammar_fvg','grammar_partikeln'];
    grammarPage = grammars[grammarCycle];

    var c1Readings = ['reading_t2_1','reading_t2_2','reading_t2_3','reading_t1_1','reading_t1_2','reading_t1_3','reading_t2_1','reading_t2_2'];
    readingPage = 'daily_reading'; // Tägliche Leseübung
    if (c1Day % 3 === 0) writingPage = 'writing';

    tasks = [
      {text:`背C1词汇：${getVocabName(vocabTheme)}（15词）`, type:'vocab', page:vocabTheme},
      {text:`C1语法专题：${getGrammarName(grammarPage)}`, type:'grammar', page:grammarPage},
      {text:'动介搭配训练（15组，含随机测试）', type:'vbp', page:'vbp'},
      {text:'用闪卡复习之前所有词汇（15分钟）', type:'review', page:'vocab_flashcards'},
    ];
    if (readingPage) tasks.push({text:'📰 今日阅读训练（Goethe Format）+精读分析', type:'reading', page:'daily_reading'});
    if (writingPage) tasks.push({text:'C1写作：Erörterung（1篇，限时80分钟）', type:'writing', page:writingPage});
    if (c1Day === 10 || c1Day === 20) tasks.push({text:'🧪 C1半模测试', type:'test', page:'test_c1'});
    if (c1Day === 25) tasks.push({text:'📊 中期评估：检查弱项，调整策略', type:'review', page:'roadmap'});
    if (c1Day >= 28) tasks.push({text:'🧪 C1全真模拟（限时完成全部）', type:'test', page:'test_c1'});
    if (c1Day === 30) tasks.push({text:'🏆 今天考C1！考前只看总结，不学新东西', type:'exam', page:'exam_tips'});

    tasks.push({text:'🎧 听力：Hörverstehen mit Transkript（20分钟）', type:'listen', page:'listening'});
    tasks.push({text:'💬 口语：C1 Vortrag vorbereiten & üben（15分钟）', type:'speak', page:'speaking'});
    tasks.push({text:'🔴 复习错题（' + getErrorCount() + '题待复习）', type:'error', page:'error_review'});
    tasks.push({text:'🧠 间隔复习到期内容（' + getDueCount() + '项）', type:'srs', page:'srs_review'});
    var weakSkillsC1 = getWeakestSkills();
    if (weakSkillsC1.length > 0) {
      var wsC1 = weakSkillsC1[0];
      if (wsC1.skill === 'grammatik' && wsC1.pct < 70) tasks.push({text:'📖 弱项攻克：额外C1语法练习', type:'grammar', page:'grammar_quiz'});
      if (wsC1.skill === 'lesen' && wsC1.pct < 70) tasks.push({text:'📰 弱项攻克：额外C1阅读训练', type:'reading', page:'reading_t2_3'});
      if (wsC1.skill === 'wortschatz' && wsC1.pct < 70) tasks.push({text:'📝 弱项攻克：额外词汇闪卡复习', type:'vocab', page:'vocab_flashcards'});
    }
    tasks.push({text:'📝 今日Redemittel收集（从阅读/听力中摘抄）', type:'review', page:''});
  }
  return {day, isB2, phase, tasks};
}

function getVocabName(id) {
  let m = {vocab_b2_alltag:'日常生活',vocab_b2_gesund:'健康与饮食',vocab_b2_reise:'旅行与交通', vocab_b2_beruf:'职业与工作', vocab_b2_medien:'媒体与通信',
    vocab_wissenschaft:'科学与研究',vocab_politik:'政治与社会',vocab_umwelt:'环境与可持续',
    vocab_medien:'媒体与数字化',vocab_arbeit:'工作与经济'};
  return m[id]||id;
}
function getGrammarName(id) {
  let m = {grammar_b2:'B2语法速查',grammar_konjunktiv1:'Konjunktiv I',grammar_konjunktiv2:'Konjunktiv II',
    grammar_passiv:'Passiv & Ersatzformen',grammar_nominal:'Nominalisierung',grammar_partikeln:'Modalpartikeln',
    grammar_partizip:'Partizipialattribute',grammar_fvg:'Nomen-Verb-Verbindungen'};
  return m[id]||id;
}

function renderDailyReading() {
  var day = getStudyDay();
  var readingIds = ['reading_t1_1','reading_t1_2','reading_t1_3','reading_t2_1','reading_t2_2','reading_t2_3'];
  var rid = readingIds[(day - 1) % readingIds.length];
  var rt = readingTexts[rid];
  if (!rt) { document.getElementById('daily-reading-container').innerHTML = '<p>Kein Lesetext gefunden.</p>'; return; }

  var prefix = 'dailyread';
  // Restore saved progress if same reading (fix: persist answers across page navigation)
  var savedDR = localStorage.getItem('de-readstate-'+rid);
  if (savedDR) {
    try {
      var parsed = JSON.parse(savedDR);
      if (parsed.day === day) {
        window.testState[prefix] = parsed.state;
        window.testScores[prefix] = parsed.score || 0;
      } else { localStorage.removeItem('de-readstate-'+rid); window.testScores[prefix] = 0; }
    } catch(e) { window.testScores[prefix] = 0; }
  } else { window.testScores[prefix] = 0; }

  if (rt.type === 'match') {
    var questions = [];
    rt.statements.forEach(function(s, i) {
      questions.push({
        q: (i+1) + '. ' + s.text,
        o: rt.texts.map(function(_, j) { return 'Person ' + j; }),
        a: s.match,
        f: 'Richtige Zuordnung: Person ' + s.match,
        type: 'matching'
      });
    });
    if (!window.testState[prefix]) {
      window.testState[prefix] = {questions: questions, answers: new Array(questions.length).fill(null), testType: 'Tägliches Lesen', readingId: rid, readingType: 'match', readingTitle: rt.title, readingFb: rt.fb || ''};
    }
    var savedScore = window.testScores[prefix] || 0;

    var html = '<h2>' + rt.title + '</h2>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0">';
    rt.texts.forEach(function(t, i) {
      html += '<div style="background:#0d1b2a;border:1px solid #0f3460;border-radius:8px;padding:14px;font-size:.84em;line-height:1.7"><strong style="color:#f39c12">Person ' + i + ':</strong> ' + t + '</div>';
    });
    html += '</div>';
    html += '<h2>📝 Aussagen zuordnen</h2>';
    html += '<p style="color:#7b8db5;font-size:.8em">Ordnen Sie jede Aussage der passenden Person zu. Klicken Sie auf eine Option.</p>';
    if (rt.fb) html += '<div class="tip" style="margin-bottom:12px"><strong>💡 Strategie-Tipp:</strong> ' + rt.fb + '</div>';

    html += '<div style="margin-bottom:12px;color:#7b8db5">Beantwortet: <span id="' + prefix + '-score">' + savedScore + '</span>/' + questions.length + '</div>';
    questions.forEach(function(q, i) {
      html += '<div class="quiz"><h4>' + q.q + '</h4>';
      q.o.forEach(function(o, j) {
        html += '<div class="q-option" data-prefix="' + prefix + '" data-idx="' + i + '" data-correct="' + (j===q.a?'true':'false') + '" data-useridx="' + j + '" onclick="answerTestQ(this)">' + o + '</div>';
      });
      html += '<div class="q-feedback" id="' + prefix + '-fb-' + i + '"></div></div>';
    });
    html += '<div id="' + prefix + '-result" style="text-align:center;margin-top:16px;display:none"></div>';
    html += '<button class="btn btn-red" style="margin-top:10px" onclick="showDailyReadingResult()">📊 Ergebnis & Analyse anzeigen</button>';

  } else {
    // comprehension type
    var questions = [];
    rt.qs.forEach(function(rq) {
      questions.push({
        q: rq.q,
        o: rq.a.map(function(a) { return a.text; }),
        a: rq.a.findIndex(function(a) { return a.correct; }),
        f: rq.fb || '',
        type: classifyQuestionType(rq.q)
      });
    });
    if (!window.testState[prefix]) {
      window.testState[prefix] = {questions: questions, answers: new Array(questions.length).fill(null), testType: 'Tägliches Lesen', readingId: rid, readingType: 'comprehension', readingTitle: rt.title, readingFb: rt.fb || ''};
    }
    var savedScore2 = window.testScores[prefix] || 0;

    var html = '<h2>' + rt.title + '</h2>';
    if (rt.fb) html += '<div class="tip" style="margin-bottom:12px"><strong>💡 Vor dem Lesen:</strong> ' + rt.fb + '</div>';
    html += '<div style="background:#0d1b2a;border:1px solid #0f3460;border-radius:8px;padding:18px 22px;margin:14px 0;line-height:1.9;font-size:.92em">';
    html += rt.text.split('\n').filter(function(p) { return p.trim(); }).map(function(p) { return '<p>' + p + '</p>'; }).join('');
    html += '</div>';
    html += '<h2>📝 Textverständnis (' + questions.length + ' Fragen)</h2>';
    html += '<div style="margin-bottom:12px;color:#7b8db5">Beantwortet: <span id="' + prefix + '-score">' + savedScore2 + '</span>/' + questions.length + '</div>';
    questions.forEach(function(q, i) {
      html += '<div class="quiz"><h4>' + (i+1) + '. ' + q.q + '</h4>';
      q.o.forEach(function(o, j) {
        html += '<div class="q-option" data-prefix="' + prefix + '" data-idx="' + i + '" data-correct="' + (j===q.a?'true':'false') + '" data-useridx="' + j + '" onclick="answerTestQ(this)">' + String.fromCharCode(65+j) + '. ' + o + '</div>';
      });
      html += '<div class="q-feedback" id="' + prefix + '-fb-' + i + '"></div></div>';
    });
    html += '<div id="' + prefix + '-result" style="text-align:center;margin-top:16px;display:none"></div>';
    html += '<button class="btn btn-red" style="margin-top:10px" onclick="showDailyReadingResult()">📊 Ergebnis & Analyse anzeigen</button>';
  }

  var container = document.getElementById('daily-reading-container');
  if (container) container.innerHTML = html;
  // Restore visual state for already-answered questions
  setTimeout(function() {
    var state = window.testState[prefix];
    if (!state || !state.answers) return;
    for (var ri = 0; ri < state.answers.length; ri++) {
      var ans = state.answers[ri];
      if (ans === null || ans === undefined) continue;
      var fbEl = document.getElementById(prefix + '-fb-' + ri);
      var opts = document.querySelectorAll('.q-option[data-prefix="' + prefix + '"][data-idx="' + ri + '"]');
      if (ans.correct) {
        if (opts[state.questions[ri].a]) opts[state.questions[ri].a].classList.add('correct');
        if (fbEl) { fbEl.textContent = '✅ ' + state.questions[ri].f; fbEl.style.display = 'block'; }
      } else {
        if (opts[ans.userIdx]) opts[ans.userIdx].classList.add('wrong');
        if (opts[state.questions[ri].a]) opts[state.questions[ri].a].classList.add('correct');
        if (fbEl) { fbEl.innerHTML = '❌ Richtig: <strong>' + state.questions[ri].o[state.questions[ri].a] + '</strong> — ' + state.questions[ri].f; fbEl.style.display = 'block'; }
        for (var ok = 0; ok < opts.length; ok++) opts[ok].style.pointerEvents = 'none';
      }
    }
  }, 80);
}

// ====== DAILY READING RESULT ======
window.showDailyReadingResult = function() {
  var prefix = 'dailyread';
  var state = window.testState[prefix];
  if (!state) return;
  var total = state.questions.length;
  var score = window.testScores[prefix] || 0;
  var pct = Math.round(score/total*100);

  recordSkillScore('lesen', score, total);
  var day = getStudyDay();
  localStorage.setItem('de-reading-done-' + day, JSON.stringify({
    date: new Date().toISOString().split('T')[0],
    score: score, total: total, pct: pct,
    readingId: state.readingId
  })); schedulePush();

  var el = document.getElementById(prefix + '-result');
  el.style.display = 'block';

  var gradeEmoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '📚';
  var gradeColor = pct >= 80 ? '#22c55e' : pct >= 60 ? '#f39c12' : '#ef4444';

  var html = '<h2 style="color:' + gradeColor + ';font-size:1.4em;margin-bottom:4px">' + gradeEmoji + ' ' + score + '/' + total + ' (' + pct + '%)</h2>';
  html += '<p style="color:#c8d0dc;font-size:.85em">Leseverstehen | ' + state.readingTitle + '</p>';

  // Section B: Question analysis
  html += '<h2 style="margin-top:20px;color:#f39c12">📋 Fragenanalyse</h2>';
  var wrongTypes = [];
  state.questions.forEach(function(q, i) {
    var ans = state.answers[i];
    var correct = ans && ans.correct;
    if (!correct) {
      wrongTypes.push(q.type || 'detail');
      addError('Tägliches Lesen', q.q, q.o, q.a, ans ? ans.userIdx : -1, q.f, 'Leseverstehen');
    }
    var userAnswer = (ans && ans.userIdx !== undefined && ans.userIdx >= 0) ? q.o[ans.userIdx] : '(nicht beantwortet)';
    html += '<div class="quiz" style="border-left:3px solid ' + (correct?'#22c55e':'#ef4444') + '">';
    html += '<h4>' + (correct?'✅':'❌') + ' ' + (i+1) + '. ' + q.q + '</h4>';
    if (!correct) html += '<p style="color:#ef4444;font-size:.8em">Deine Antwort: ' + userAnswer + '</p>';
    html += '<p style="color:#22c55e;font-size:.8em">✅ Richtig: ' + q.o[q.a] + '</p>';
    html += '<div style="background:#0d1b2a;border-radius:6px;padding:10px 14px;margin-top:6px;font-size:.82em;line-height:1.6">' + q.f + '</div>';
    html += '</div>';
  });

  // Section C + D: Error analysis + strategies
  if (wrongTypes.length > 0) {
    html += '<h2 style="margin-top:20px;color:#f39c12">🔍 Fehleranalyse</h2>';
    html += '<div style="background:#0d1b2a;border-radius:8px;padding:16px;margin:12px 0;line-height:1.8">';
    html += generateErrorDiagnosis(wrongTypes);
    html += '</div>';
    html += '<h2 style="margin-top:16px;color:#f39c12">💡 Lesestrategien für dich</h2>';
    html += '<div style="background:#0d1b2a;border-radius:8px;padding:16px;margin:12px 0;line-height:1.8">';
    html += generateReadingStrategies(state.readingType, wrongTypes);
    html += '</div>';
  }

  // Section E: General tips
  html += '<h2 style="margin-top:16px;color:#f39c12">📖 Lesetipps für die Goethe-Prüfung</h2>';
  html += generateGeneralReadingTips();

  el.innerHTML = html;
  el.scrollIntoView({behavior:'smooth'});
};

// Called by the test result handler to save skill scores and generate tomorrow's plan
function saveDailyTestResult(scores) {
  // scores: {vocab: {c,t}, grammar: {c,t}, reading: {c,t}}
  for (var skill in scores) {
    var s = scores[skill];
    if (s && s.t > 0) recordSkillScore(skill, s.c, s.t);
  }
  // Save today's test completion
  var day = getStudyDay();
  localStorage.setItem('de-test-done-' + day, JSON.stringify({
    date: new Date().toISOString().split('T')[0],
    scores: scores
  })); schedulePush();
}

// Generate tomorrow's focus based on today's test
function getTomorrowFocus() {
  var weak = getWeakestSkills();
  var focus = [];
  if (weak.length > 0 && weak[0].pct < 60) {
    focus.push({skill: weak[0].skill, pct: weak[0].pct, msg: '重点攻克：' + getSkillName(weak[0].skill) + '（正确率仅' + weak[0].pct + '%）'});
  }
  if (weak.length > 1 && weak[1].pct < 70) {
    focus.push({skill: weak[1].skill, pct: weak[1].pct, msg: '需要加强：' + getSkillName(weak[1].skill) + '（正确率' + weak[1].pct + '%）'});
  }
  var errCount = getErrorCount();
  if (errCount > 0) {
    focus.push({skill: 'error', pct: 0, msg: '错题复习：' + errCount + '道错题待巩固'});
  }
  var srsDue = getDueCount();
  if (srsDue > 0) {
    focus.push({skill: 'srs', pct: 0, msg: '间隔复习：' + srsDue + '项内容到期'});
  }
  return focus;
}

    html += '<p>'+emoji+' <strong>'+getSkillName(sk)+'：</strong><span style="color:'+color+'">'+s.c+'/'+s.t+'（'+pct+'%）</span></p>';
  }
  html += '</div>';

  if (focus.length > 0) {
    html += '<h2>🎯 明日重点关注</h2>';
    focus.forEach(function(f) {
      html += '<div class="'+(f.pct>0 && f.pct<60?'warn':'tip')+'" style="margin-bottom:6px"><strong>' + f.msg + '</strong></div>';
    });
  }

  html += '<h2>📅 明天学习内容预览</h2>';
  // Show what next day's tasks will include
  var nextPlan = getDailyPlanForDay(nextDay);
  html += '<ul style="line-height:1.8">';
  nextPlan.tasks.forEach(function(t) {
    html += '<li>' + t.text + '</li>';
  });
  html += '</ul>';

  html += '<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">';
  html += '<button class="btn btn-green" onclick="advanceDay()">✅ 完成今日，进入明天（Tag '+nextDay+'）</button>';
  html += '<button class="btn btn-red" onclick="goPage(\'home\')">🏠 返回首页</button>';
  html += '</div>';
  return html;
};

// Render the end-of-day test
function renderDailyTest() {
  var day = getStudyDay();
  var plan = getDailyPlan();

  // Build questions from today's content
  var questions = [];

  // 1. Vocab questions (5) — from today's vocab deck
  var vocabDeckId = '';
  plan.tasks.forEach(function(t) { if (t.type === 'vocab' && t.page) vocabDeckId = t.page; });
  if (vocabDeckId && vocabDecks[vocabDeckId]) {
    var words = vocabDecks[vocabDeckId];
    var used = {};
    for (var i = 0; i < 5 && i < words.length; i++) {
      var idx = Math.floor(Math.random() * words.length);
      while (used[idx] && Object.keys(used).length < words.length) idx = Math.floor(Math.random() * words.length);
      used[idx] = true;
      var w = words[idx];
      // Generate a wrong option
      var wrongPool = words.filter(function(_,j){return j !== idx;});
      var wrong = wrongPool[Math.floor(Math.random() * wrongPool.length)];
      var opts = [w.zh, (wrong||{}).zh || 'keine'].sort(function(){return Math.random() - 0.5;});
      var correctIdx = opts.indexOf(w.zh);
      questions.push({
        q: '🔤 ' + w.de + ' 的中文意思是？',
        o: opts.map(function(o){return o||'---';}),
        a: correctIdx,
        skill: 'wortschatz',
        f: w.de + ' = ' + w.zh + (w.hint ? ' ('+w.hint+')' : '') + (w.ex ? '<br>📖 ' + w.ex : '')
      });
    }
  }

  // 2. Grammar questions (5) — from grammar test bank
  if (typeof b2TestQs !== 'undefined') {
    var grammarQs = b2TestQs;
    var usedG = {};
    for (var j = 0; j < 5; j++) {
      var gi = Math.floor(Math.random() * grammarQs.length);
      while (usedG[gi]) gi = Math.floor(Math.random() * grammarQs.length);
      usedG[gi] = true;
      questions.push({
        q: '📖 ' + grammarQs[gi].q,
        o: grammarQs[gi].o,
        a: grammarQs[gi].a,
        skill: 'grammatik',
        f: grammarQs[gi].f
      });
    }
  }

  // Render test
  var prefix = 'dailytest';
  window.testScores[prefix] = 0;
  window.testState[prefix] = {questions: questions, answers: new Array(questions.length).fill(null), testType: 'daily', skills: {}};

  var html = '<div style="margin-bottom:12px;color:#7b8db5">Beantwortet: <span id="' + prefix + '-score">0</span>/' + questions.length + '</div>';
  questions.forEach(function(q, i) {
    html += '<div class="quiz"><h4>' + (i+1) + '. ' + q.q + '</h4>';
    q.o.forEach(function(o, j) {
      html += '<div class="q-option" data-prefix="' + prefix + '" data-idx="' + i + '" data-correct="' + (j===q.a) + '" data-useridx="' + j + '" data-skill="' + (q.skill||'') + '" onclick="answerDailyTestQ(this)">' + String.fromCharCode(65+j) + '. ' + o + '</div>';
    });
    html += '<div class="q-feedback" id="' + prefix + '-fb-' + i + '"></div></div>';
  });
  html += '<div id="' + prefix + '-result" style="text-align:center;margin-top:16px;display:none"></div>';
  html += '<button class="btn btn-red" style="margin-top:10px" onclick="showDailyTestResult()">📊 查看测试结果 & 明日规划</button>';

  var container = document.getElementById('daily-test-container');
  if (container) container.innerHTML = html;
}

// Answer handler for daily test (tracks skill scores)
window.answerDailyTestQ = function(el) {
  var prefix = 'dailytest';
  var idx = parseInt(el.getAttribute('data-idx'));
  var correct = el.getAttribute('data-correct') === 'true';
  var userIdx = parseInt(el.getAttribute('data-useridx'));
  var skill = el.getAttribute('data-skill') || 'grammatik';
  var state = window.testState[prefix];
  if (!state || state.answers[idx] !== null) return;
  if (el.parentElement.querySelector('.q-option.correct')) return;

  var fbEl = document.getElementById(prefix + '-fb-' + idx);
  var q = state.questions[idx];

  // Track skill
  if (!state.skills[skill]) state.skills[skill] = {c:0, t:0};
  state.skills[skill].t++;

  if (correct) {
    el.classList.add('correct');
    fbEl.textContent = '✅ ' + q.f;
    fbEl.style.display = 'block';
    state.answers[idx] = {correct: true};
    state.skills[skill].c++;
    window.testScores[prefix] = (window.testScores[prefix]||0) + 1;
    document.getElementById(prefix + '-score').textContent = window.testScores[prefix];
  } else {
    el.classList.add('wrong');
    state.answers[idx] = {correct: false, userIdx: userIdx};
    fbEl.innerHTML = '❌ Richtig: <strong>' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</strong> — ' + q.f;
    fbEl.style.display = 'block';
    var opts = el.parentElement.querySelectorAll('.q-option');
    opts[q.a].classList.add('correct');
    for (var k = 0; k < opts.length; k++) opts[k].style.pointerEvents = 'none';
  }
};

// Show daily test result + tomorrow plan
window.showDailyTestResult = function() {
  var prefix = 'dailytest';
  var state = window.testState[prefix];
  if (!state) return;
  var total = state.questions.length;
  var score = window.testScores[prefix] || 0;
  var pct = Math.round(score/total*100);

  // Save skill scores
  saveDailyTestResult(state.skills);

  var el = document.getElementById(prefix + '-result');
  el.style.display = 'block';

  var gradeEmoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '📚';

  // Show skill breakdown
  var skillBreakdown = '';
  for (var sk in state.skills) {
    var s = state.skills[sk];

    '<p style="color:#c8d0dc;margin-top:4px">' + skillBreakdown + '</p>' +
    '<button class="btn btn-green" style="margin-top:12px;font-size:1em" onclick="goPage(\'tomorrow_plan\')">🔮 查看明日学习计划 →</button>';
};

// ====== READING STRATEGY HELPERS ======
function classifyQuestionType(qText) {
  var qt = qText.toLowerCase();
  if (/hauptthema|hauptaussage|worum geht|der text insgesamt|das zentrale thema|kernaussage/i.test(qt)) return "main-idea";
  if (/schließen|folgern|ableiten|impliziert|kann man|worauf deutet|lässt sich/i.test(qt)) return "inference";
  if (/bedeutet|synonym|ersetzt|steht für|heißt|meint der autor|im kontext/i.test(qt)) return "vocabulary";
  return "detail";
}

function getErrorTypeName(type) {
  var m = {detail:"Detailfragen","main-idea":"Hauptaussage",inference:"Schlussfolgerungen",vocabulary:"Wortschatz",matching:"Zuordnung"};
  return m[type] || type;
}

function generateErrorDiagnosis(wrongTypes) {
  var counts = {};
  wrongTypes.forEach(function(t) { counts[t] = (counts[t]||0) + 1; });
  var sorted = Object.keys(counts).sort(function(a,b){return counts[b] - counts[a];});
  var total = wrongTypes.length;
  var html = "<p><strong>\uD83D\uDD0D " + total + " Fehler analysiert:</strong></p><ul style=\"margin-top:4px\">";
  sorted.forEach(function(t) { html += "<li><strong>" + getErrorTypeName(t) + ":</strong> " + counts[t] + " Fehler</li>"; });
  html += "</ul>";
  var mainType = sorted[0];
  if (mainType === "detail" && counts[mainType] >= 2) {
    html += "<p style=\"margin-top:8px\">\uD83D\uDCCC <strong>Muster:</strong> Du hast vor allem bei <strong>Detailfragen</strong> Fehler. Du suchst den Text nicht gründlich genug nach spezifischen Informationen — oder fällst auf Distraktoren herein.</p>";
    html += "<p>\uD83D\uDC8A <strong>Lösung:</strong> Lies die Fragen VOR dem Text. Unterstreiche Schlüsselwörter. Prüfe jede Option: Steht das WIRKLICH so im Text?</p>";
  } else if (mainType === "inference") {
    html += "<p style=\"margin-top:8px\">\uD83D\uDCCC <strong>Muster:</strong> Du hast Schwierigkeiten bei <strong>Schlussfolgerungen</strong>. Du nimmst Informationen zu wörtlich.</p>";
    html += "<p>\uD83D\uDC8A <strong>Lösung:</strong> Frage dich: Lässt sich das LOGISCH aus dem Text ableiten? Achte auf Konnektoren (daher, deshalb).</p>";
  } else if (mainType === "main-idea") {
    html += "<p style=\"margin-top:8px\">\uD83D\uDCCC <strong>Muster:</strong> Du hast das <strong>Hauptthema</strong> nicht erfasst. Konzentrierst du dich zu sehr auf Einzelheiten?</p>";
    html += "<p>\uD83D\uDC8A <strong>Lösung:</strong> Lies den Text zuerst komplett durch. Frage dich: Worüber spricht der Text von Anfang bis Ende?</p>";
  } else if (mainType === "vocabulary") {
    html += "<p style=\"margin-top:8px\">\uD83D\uDCCC <strong>Muster:</strong> Du hast <strong>Wortschatz im Kontext</strong> falsch interpretiert.</p>";
    html += "<p>\uD83D\uDC8A <strong>Lösung:</strong> Unbekannte Wörter aus dem Satzzusammenhang erschließen, nicht aus dem Wörterbuch.</p>";
  }
  return html;
}

function generateReadingStrategies(readingType, wrongTypes) {
  var html = "";
  var typeSet = {};
  wrongTypes.forEach(function(t) { typeSet[t] = true; });
  if (readingType === "match") {
    html += "<h4>\uD83D\uDCCB Teil 1: Zuordnungsaufgaben</h4><ul>";
    html += "<li><strong>Querlesen (30s/Text):</strong> Überfliege alle Texte. Notiere 2-3 Schlüsselwörter pro Person.</li>";
    html += "<li><strong>Synonyme erkennen:</strong> Die Aussagen verwenden fast nie die gleichen Wörter wie die Texte.</li>";
    html += "<li><strong>Ausschlussverfahren:</strong> Streiche die Personen, die definitiv NICHT passen.</li>";
    html += "<li><strong>Negationen beachten:</strong> \"nicht\", \"kein\", \"kaum\" ändern die Bedeutung komplett.</li>";
    html += "</ul>";
  } else {
    html += "<h4>\uD83D\uDCC4 Teil 2: Textverständnis</h4><ul>";
    html += "<li><strong>Fragen zuerst (ohne Optionen):</strong> Die 5 Fragen geben eine Landkarte des Textes.</li>";
    html += "<li><strong>1. Durchgang (5-7 Min):</strong> Text überfliegen, Hauptidee erfassen, relevante Stellen markieren.</li>";
    html += "<li><strong>2. Durchgang:</strong> Gezielt Antworten suchen. Fragen sind meist in Textreihenfolge.</li>";
    html += "<li><strong>Distraktoren erkennen:</strong> Falsche Optionen sind nie völlig unsinnig — oft verdrehen sie ein Detail.</li>";
    html += "</ul>";
  }
  if (typeSet["detail"]) {
    html += "<h4 style=\"margin-top:12px\">\uD83D\uDD0D Für Detailfragen:</h4><ul>";
    html += "<li>Unterstreiche <strong>Zahlen, Daten, Namen</strong> beim Lesen.</li>";
    html += "<li><strong>Distraktoren-Falle:</strong> Richtige Zahl aus dem Text, aber auf falsche Sache bezogen.</li>";
    html += "</ul>";
  }
  if (typeSet["inference"]) {
    html += "<h4 style=\"margin-top:12px\">\uD83E\uDDE0 Für Schlussfolgerungen:</h4><ul>";
    html += "<li>Achte auf <strong>Konnektoren:</strong> daher, deshalb (Folge), obwohl (Einschränkung), allerdings (Gegensatz).</li>";
    html += "<li><strong>Übertreibungen sind falsch:</strong> alle/immer/nie → im Text meist viele/oft/teilweise.</li>";
    html += "</ul>";
  }
  return html;
}

  {q:'___ er krank war, ging er zur Arbeit.',o:['Weil','Obwohl','Wenn','Damit'],a:1,f:'<b>Konzessivsatz (让步从句)</b>：尽管他生病了，他还是去上班。<br><br><b>规则：</b><b>Obwohl</b>引导让步从句，表示"尽管/虽然"，从句动词在末尾。全句：<b>Obwohl</b> er krank war, ging er zur Arbeit.<br><br><b>辨析：</b>❌ Weil = 因为（因果倒置，逻辑错误：不能说"因为他病了所以去上班"）。❌ Wenn = 如果/当...时（条件或时间，不是让步）。❌ Damit = 为了（目的从句）。<br><br><b>B2考点：</b>Leseverstehen中经常通过连接词判断句子间的逻辑关系。'},
  {q:'Sie ___ seit 3 Jahren in Berlin. (leben → Perfekt)',o:['hat gelebt','ist gelebt','hat leben','ist leben'],a:0,f:'<b>Perfekt mit haben (完成时助动词)</b>：她已在柏林生活了3年。<br><br><b>规则：</b>leben构成完成时用助动词<b>haben</b>：Sie <b>hat</b> seit 3 Jahren in Berlin <b>gelebt</b>.<br><br><b>核心规则—haben vs sein：</b>大多数动词用<b>haben</b>。用<b>sein</b>的动词必须同时满足两个条件：①表示位置/状态变化（如gehen, fahren, aufstehen）②不及物。leben不表示变化，用haben。<br><br><b>常见错误：</b>❌ "ist gelebt" — leben不是位移动词，不用sein。'},
  {q:'Der ___ (steigen) Preis macht mir Sorgen.',o:['gestiegen','steigende','steigene','steigte'],a:1,f:'<b>Partizip I als Adjektiv (第一分词作形容词)</b>：正在上涨的价格让我担忧。<br><br><b>规则：</b>Partizip I = 动词原形 + <b>-d</b> + 形容词词尾。steigen → steigen<b>d</b> → der <b>steigende</b> Preis。Partizip I表示<b>主动的、正在进行</b>的动作。<br><br><b>对比Partizip II：</b>der <b>gestiegene</b> Preis = 已经上涨完的价格（PII = 被动/完成）。这里"正在上涨"用PI。<br><br><b>C1重点：</b>Partizipialattribute（分词定语）是C1阅读中最常见的复杂结构之一，必须能区分PI和PII的含义差异。'},
  {q:'Ich freue mich ___ das Konzert morgen.',o:['über','auf','an','für'],a:1,f:'<b>sich freuen auf vs über — 经典辨析</b>：我期待明天的音乐会。<br><br><b>规则：</b>sich freuen <b>auf</b> + Akk. = 期待<b>未来</b>的事（音乐会在明天，还没发生）→ Ich freue mich <b>auf</b> das Konzert.<br>sich freuen <b>über</b> + Akk. = 为<b>已发生/现在</b>的事高兴 → Ich freue mich <b>über</b> das Geschenk.（礼物已经收到了）<br><br><b>记忆技巧：</b>auf = 向前看（未来），über = 对着现有的东西高兴。B2考试中几乎必考。'},
  {q:'___ du mehr Sport treiben ___, ___ du gesünder.',o:['Wenn/würdest/wärst','Würdest/wenn/wärst','Wenn/hättest/wärst','Damit/würdest/bist'],a:0,f:'<b>Konjunktiv II Konditionalsatz (KII条件句)</b>：如果你多做运动，你会更健康。<br><br><b>规则：</b>KII条件句结构：<b>Wenn</b> + Subjekt + ... + KII-Verb (从句末), <b>würde</b> + Subjekt + ... (主句)。<br>treiben的KII → <b>würdest</b> treiben（弱变化动词常用würde+Inf.替代）<br>sein的KII → <b>wärst</b>（强变化，必须牢记）<br><br><b>全句：</b>Wenn du mehr Sport treiben <b>würdest</b>, <b>wärst</b> du gesünder.<br><br><b>关键点：</b>würde-Ersatzform在口语中极为常见。但haben/sein/Modalverben仍用原KII形式。'},
  {q:'Die Firma muss ___ Konkurs anmelden. (Insolvenz → FVG)',o:['den','die','das','dem'],a:0,f:'<b>Nomen-Verb-Verbindung (名词-动词搭配/FVG)</b>：公司必须申请破产。<br><br><b>规则：</b>Insolvenz anmelden = 申请破产。Insolvenz = 破产(女性名词, <b>die</b>)。eine Insolvenz anmelden。<br><br><b>但本题考点是：</b>"Konkurs anmelden" 也是"申请破产"的常用表达。Konkurs = 破产(男性名词, <b>der</b>)，所以：<b>den</b> Konkurs anmelden。<br><br><b>三个同义表达：</b>①Insolvenz anmelden (die) ②Konkurs anmelden (der) ③Pleite gehen (口语)。注意冠词随名词变化！'},
  {q:'Bitte ___ Sie mir die Unterlagen ___. (zusenden → höflich)',o:['würden/zusenden','haben/zugesandt','sind/zusenden','werden/gesendet'],a:0,f:'<b>Konjunktiv II 礼貌请求 (höfliche Bitte)</b>：请您把文件发给我。<br><br><b>规则：</b>KII用于表达礼貌、客气的请求。würden + Infinitiv = 比直陈式更礼貌。<br>全句：<b>Würden</b> Sie mir die Unterlagen <b>zusenden</b>? = Könnten Sie mir...?<br><br><b>对比：</b>直陈式 "Senden Sie mir..." = 命令式，较生硬。KII "Würden Sie..." = 礼貌请求，B2写作中（尤其是正式信函）推荐使用KII表达请求。<br><br><b>B2写作考点：</b>Beschwerdebrief中常用KII表达请求和投诉。'},
  {q:'Die Wohnung, ___ wir besichtigt haben, war zu teuer.',o:['das','die','der','den'],a:1,f:'<b>Relativsatz (关系从句) — 性数格判断</b>：我们看过的那个公寓太贵了。<br><br><b>规则：</b>关系代词 = 指示代词，性数跟<b>先行词</b>一致，格跟<b>从句中的功能</b>一致。<br>die Wohnung = 女性单数。besichtigen + Akk.，所以从句中关系代词是Akk. → <b>die</b> (Nom.=Akk. bei Fem.)。<br><br><b>完整关系代词变格（女性）：</b>Nom. die, Akk. die, Dat. der, Gen. deren。<br><br><b>注意：</b>❌ "das"是中性的Akk.。❌ "der"在这里是Dat.或Gen.，但besichtigen需要Akk.。'},
  {q:'Er ___ den Vertrag ___. (unterschreiben → Perfekt)',o:['ist/unterschrieben','hat/unterschrieben','wurde/unterschreibt','hat/unterschreiben'],a:1,f:'<b>Perfekt mit haben + Partizip II (可分动词)</b>：他签了合同。<br><br><b>规则：</b>unterschreiben (可分动词：unter+schreiben) → PII = unter<b>geschrieben</b> (属于强变化：schreiben→geschrieben)。完成时：Er <b>hat</b> den Vertrag <b>unterschrieben</b>.<br><br><b>辨析：</b>❌ "ist unterschrieben" — unterschreiben不是位移/状态变化动词，不用sein。❌ "hat unterschreiben" — 忘了用Partizip II。<br><br><b>可分动词PII规则：</b>ge-插入在可分前缀和词根之间：unterschreiben → unter<b>ge</b>schrieben。'},
  {q:'Ich ___ gestern nicht kommen. (können → Präteritum)',o:['könnte','konnte','kann','gekonnt'],a:1,f:'<b>Modalverben Präteritum (情态动词过去时)</b>：我昨天不能来。<br><br><b>规则：</b>können的过去时是<b>konnte</b>（不规则变化，必须单独记忆）。<br><br><b>关键区别：</b>❌ <b>könnte</b>是Konjunktiv II（表示非现实/礼貌），不是过去时！"Ich könnte gestern nicht kommen"语法错误，因为KII不能表示过去的客观事实。<br>❌ <b>kann</b>是现在时，与"gestern"矛盾。<br>❌ <b>gekonnt</b>是Partizip II，不能单独作谓语。<br><br><b>Modalverb Präteritum表：</b>können→konnte, müssen→musste, dürfen→durfte, wollen→wollte, sollen→sollte, mögen→mochte。'},
  {q:'Je mehr man übt, ___ besser wird man.',o:['je','umso','desto','damit'],a:2,f:'<b>je...desto... (越...越...)</b>：练习得越多，你就会变得越好。<br><br><b>规则：</b>je + Komparativ (+ Nebensatz), <b>desto</b> + Komparativ (+ Hauptsatz mit Verb an 2. Position)。<br>全句：Je mehr man übt, <b>desto</b> besser wird man.<br><br><b>辨析：</b>❌ "je...je..." — 两个je不能连用。❌ "umso" — 实际上 umso 和 desto 在标准德语中都可使用，但传统规则更推荐desto。本题A=je(B=umso)被当作错误，因为je不能重复出现。<br><br><b>主句语序注意：</b>desto besser <b>wird</b> man. — 动词在第二位（desto besser = 占第一位）。'},
  {q:'Er ___ sich gestern mit seiner Freundin. (treffen→Perfekt)',o:['hat getroffen','ist getroffen','hat getrefft','ist getrefft'],a:0,f:'<b>Perfekt: treffen + haben</b>：他昨天和女朋友见了面。<br><br><b>规则：</b>treffen构成完成时用<b>haben</b>（不是sein）。PII：treffen → ge<b>troff</b>en（强变化：e→o）。<br>Er <b>hat</b> sich gestern mit seiner Freundin <b>getroffen</b>.<br><br><b>为什么不用sein？</b>treffen是及物动词（jdn. treffen），及物动词完成时用haben。sich treffen虽为反身用法，但反身动词也用haben。<br><br><b>对比：</b>sich begegnen (相遇) → ist begegnet (不及物，用sein)。'},
  {q:'___ Hilfe meiner Eltern habe ich die Prüfung bestanden.',o:['Mit','Durch','Wegen','Aufgrund'],a:0,f:'<b>mit Hilfe + Genitiv (在...的帮助下)</b>：在我父母的帮助下我通过了考试。<br><br><b>规则：</b><b>Mit</b> Hilfe meiner Eltern... = Mit der Hilfe von meinen Eltern...<br><br><b>辨析：</b>❌ Durch = 通过(某种手段/方式/施动者)，如 durch Fleiß。Hilfe不能用durch。<br>❌ Wegen = 因为(原因)，但mit Hilfe强调"借助"而非"因为"。<br>❌ Aufgrund = 基于/由于(正式书面)，语气不合。<br><br><b>B2写作提示：</b>mit Hilfe + Gen. 是常用的书面表达，用于描述借助某物/某人完成某事。'},
  {q:'Die Arbeit ist ___ (machen) als ich dachte. (比较级)',o:['leichter','mehr leicht','leichtere','am leichtesten'],a:0,f:'<b>Komparativ (比较级)</b>：这项工作比我想的要容易。<br><br><b>规则：</b>leicht的比较级是<b>leichter</b>（单音节adj. + -er）。注意c丢掉：leicht → leichter（不是leichter，而是ch结合规则）。<br><br><b>辨析：</b>❌ "mehr leicht" — 这不是德语比较级构成方式。❌ "leichtere" — 这是带词尾的比较级（需要名词），此处作表语不加词尾。❌ "am leichtesten" — 这是最高级。<br><br><b>比较级表语用法：</b>X ist + Komparativ + als Y。表语位置不加形容词词尾。'},
  {q:'___ du Lust ___, ins Kino zu gehen?',o:['Hast/hast','Hättest/hättest','Hast/--','Hättest/zu'],a:2,f:'<b>Lust haben, etw. zu tun</b>：你有兴趣去看电影吗？<br><br><b>规则：</b><b>Lust haben, ... zu + Infinitiv</b>。这是一个固定结构：haben + 名词(Lust) + zu-不定式。<br>全句：<b>Hast</b> du Lust, ins Kino zu gehen?<br><br><b>关键点：</b>Lust后面不需要再加介词！这和英语的"feel like doing"不同。德语中Lust直接加逗号和zu-不定式。<br><br><b>类似结构：</b>Zeit haben, ... zu tun / Spaß haben, ... zu tun / Probleme haben, ... zu tun。'},
  {q:'Ich ___ das Buch ___. (lesen→Perfekt)',o:['habe/gelesen','bin/gelesen','habe/gelegen','bin/gelegen'],a:0,f:'<b>lesen Perfekt: haben + gelesen</b>：我读了这本书。<br><br><b>规则：</b>lesen → PII = <b>gelesen</b>（强变化：e→a→e）。完成时：Ich <b>habe</b> das Buch <b>gelesen</b>.<br><br><b>⚠️ 常见混淆：</b>lesen (阅读) ≠ liegen (躺/位于)。liegen → PII = <b>gelegen</b> (hat gelegen)。❌ "habe gelegen" = 我躺过了（不是阅读！）。<br><br><b>记忆：</b>lesen有s→读→gelesen；liegen有g→躺→gelegen。s字母对应s(z)音。'},
  {q:'Er arbeitet, ___ Geld zu verdienen.',o:['um','damit','für','wegen'],a:0,f:'<b>Finalsatz: um...zu + Infinitiv (目的从句)</b>：他工作是为了挣钱。<br><br><b>规则：</b>当<b>主句主语 = 从句主语</b>时，用<b>um...zu + Inf.</b>。Er arbeitet, <b>um</b> Geld <b>zu</b> verdienen. (主从句主语都是er)<br><br><b>何时用damit：</b>当主从句<b>主语不同</b>时用damit从句。如：Er arbeitet, <b>damit</b> seine Familie ein besseres Leben hat. (主语：er ≠ seine Familie)<br><br><b>❌ für/wegen：</b>不能引导不定式从句。<br><br><b>B2/C1考点：</b>um...zu vs damit是必考点，在写作中也频繁使用。'},
  {q:'Das Kind ___ von der Oma ___. (abholen→Passiv Perfekt)',o:['wurde/abgeholt','ist/abgeholt worden','hat/abgeholt','wird/abgeholt'],a:1,f:'<b>Passiv Perfekt (完成时被动)</b>：孩子被奶奶接走了。<br><br><b>规则：</b>Vorgangspassiv Perfekt = <b>sein + Partizip II + worden</b>。<br>abholen (可分) → PII = abgeholt。全句：Das Kind <b>ist</b> von der Oma <b>abgeholt worden</b>.<br><br><b>⚠️ 注意worden vs geworden：</b>被动完成时用<b>worden</b>（不是geworden！werden的PII在被动中ge-脱落）。<br><br><b>时态对比：</b>Präsens Passiv: wird abgeholt | Prät. Passiv: wurde abgeholt | Perfekt Passiv: ist abgeholt worden。'},
  {q:'___ des schlechten Wetters blieben wir zu Hause.',o:['Trotz','Wegen','Aufgrund','Während'],a:1,f:'<b>Kausale Nominalisierung (原因名词化)</b>：因为天气不好，我们待在家里。<br><br><b>规则：</b>weil das Wetter schlecht war → <b>Wegen</b> des schlechten Wetters。<b>Wegen + Genitiv</b> = 因为/由于。<br><br><b>辨析：</b>❌ Trotz = 尽管（让步，逻辑相反：不能说"尽管天气不好我们待在家"——待在家是因为天气不好，符合逻辑）。<br>❌ Während = 在...期间（时间）。Aufgrund也表原因但更正式。<br><br><b>注意：</b>口语中wegen常接Dativ (wegen dem Wetter)，但书面语（尤其是考试）须用Genitiv：wegen des schlechten Wetters。'},
  {q:'Ich weiß nicht, ___ er heute kommt.',o:['ob','wenn','weil','damit'],a:0,f:'<b>Indirekter Fragesatz (间接疑问句)</b>：我不知道他今天是否来。<br><br><b>规则：</b>间接疑问句（Ja/Nein-问句）用<b>ob</b>引导。直接问句"Kommt er heute?" → 间接"Ich weiß nicht, <b>ob</b> er heute kommt."<br><br><b>辨析：</b>❌ wenn = 如果/当...时（条件/时间），不能用于"是否"。❌ weil = 因为（原因）。❌ damit = 为了（目的）。<br><br><b>ob vs wenn：</b>英语都用if，但德语严格区分：ob = whether, wenn = if/when。这是英语母语者最常见错误之一。'},
  {q:'Sie ist ___ (gut) Sängerin der Klasse.',o:['die beste','die bessere','die guteste','am besten'],a:0,f:'<b>Superlativ als Attribut (最高级作定语)</b>：她是班上最好的歌手。<br><br><b>规则：</b>gut → Superlativ = <b>beste</b>（不规则！）。作定语（修饰名词）时加定冠词+形容词词尾：<b>die beste</b> Sängerin。<br><br><b>辨析：</b>❌ "die bessere" = 比较级（更好的），不是最高级。❌ "die guteste" — gut的最高级是不规则的，不是guteste。❌ "am besten" — 这是表语/状语用法：Sie singt am besten. 作定语必须用die beste。<br><br><b>不规则比较级/最高级：</b>gut→besser→beste, viel→mehr→meiste, gern→lieber→liebste。'},
// Topics: Plusquamperfekt, Futur, Zustandspassiv, Adjektivdeklination,

// Finalsätze (damit), Kausalsätze, Konzessivsätze (obwohl/trotzdem),
// Modalsätze (indem/dadurch dass), Negation, reflexive Verben,

{ q:'Nachdem er ___, ging er schlafen.', o:['gegessen hatte','gegessen hat','aß','essen würde'], a:0, f:'<b>Plusquamperfekt — Vorzeitigkeit (过去完成时)</b>：他吃完后就去睡觉了。<br><br><b>规则：</b>Plusquamperfekt = hatte/war + Partizip II。表示<b>过去之过去</b>（在一个过去动作之前已完成的动作）。nachdem从句要求<b>时态前置一级</b>：主句Präteritum → 从句Plusquamperfekt。<br>Nachdem er <b>gegessen hatte</b>, ging er schlafen.<br><br><b>关键：</b>nachdem/bevor/sobald等时间连词对时态序列有严格要求。主句过去时→从句必须Plusquamperfekt（如果从句动作先发生）。❌ "gegessen hat"是现在完成时，与过去时主句不匹配。' },
{ q:'In einem Jahr ___ ich mein Studium ___. (abschließen → Futur I)', o:['werde/abschließen','habe/abgeschlossen','wurde/abschließen','bin/abgeschlossen'], a:0, f:'<b>Futur I — Zukunft (将来时)</b>：一年后我将完成学业。<br><br><b>规则：</b>Futur I = <b>werden + Infinitiv</b>。werden变位，Infinitiv在句末。<br>In einem Jahr <b>werde</b> ich mein Studium <b>abschließen</b>.<br><br><b>用法提示：</b>德语口语中常以现在时+时间状语替代将来时（In einem Jahr schließe ich...），但书面语中Futur I更正式。❌ "habe abgeschlossen" = Perfekt（已完成）。❌ "wurde abschließen" = 语法错误。' },
{ q:'Die Tür ___ (schließen → Zustandspassiv) den ganzen Tag.', o:['ist geschlossen','war geschlossen','wurde geschlossen','hat geschlossen'], a:1, f:'<b>Zustandspassiv — Präteritum (状态被动过去时)</b>：门整天都关着。<br><br><b>规则：</b>Zustandspassiv = <b>sein + Partizip II</b>，表示动作完成后的<b>结果状态</b>。过去时：<b>war</b> + PII。<br>Die Tür <b>war</b> den ganzen Tag <b>geschlossen</b>.<br><br><b>Vorgang vs Zustand：</b>Die Tür <b>wurde</b> geschlossen = 门被关上了（动作过程）。Die Tür <b>war</b> geschlossen = 门关着（结果状态）。❌ "ist geschlossen" = 现在时状态。❌ "wurde geschlossen" = Vorgangspassiv过去时。❌ "hat geschlossen" = 主动。' },
{ q:'Das ist die Tasche meiner ___ (alt) Schwester.', o:['alter','alten','alte','altem'], a:1, f:'<b>Adjektivdeklination — Genitiv Feminin mit Possessiv</b>：这是我姐姐的包。<br><br><b>规则：</b>meiner → 物主冠词（已带词尾-er）。后面的形容词用<b>-en</b>（弱变化，因为物主冠词已明确指示了性和格）。meiner <b>alten</b> Schwester (Gen. Fem.)。<br><br><b>形容词变格核心规则：</b>①定冠词后→弱变化(-e/-en) ②不定冠词/物主冠词后→混合变化（Nom. -er/-e, Akk./Dat./Gen. -en） ③无冠词→强变化（带完整词尾）。本题mein→物主冠词→混合变化→Gen. Fem. → -en。' },
{ q:'___ einem Jahr habe ich Deutsch gelernt.', o:['Vor','Seit','In','Nach'], a:1, f:'<b>seit + Dativ — Zeitdauer (自...以来)</b>：我学德语一年了。<br><br><b>规则：</b><b>Seit</b> + Dativ + 现在时动词 = 从过去某时开始持续到现在（可能还会继续）。<br><b>Seit</b> einem Jahr habe ich Deutsch gelernt... 不，应该用：<b>Seit</b> einem Jahr <b>lerne</b> ich Deutsch.<br><br><b>辨析：</b>❌ Vor = ...之前（过去时间点，动词用过去时）：Vor einem Jahr lernte ich... = 一年前我学了（已结束）。❌ In = 在...之后（未来）：in einem Jahr = 一年后。❌ Nach = 在...之后（过去/未来均可）。<br><br><b>seit vs vor：</b>Seit + 现在时 = 还在持续。Vor + 过去时 = 已结束。B2必考。' },
{ q:'Wir treffen uns ___ Bahnhof.', o:['in dem','am','im','auf dem'], a:1, f:'<b>am + Ort (固定搭配)</b>：我们在火车站见面。<br><br><b>规则：</b>Bahnhof是公共场所/建筑，见面地点用<b>am</b> Bahnhof（an dem）。<br><br><b>介词+地点规则：</b>① am Bahnhof/am Markt/am See = 在...旁边（开放公共场所）② im Bahnhof = 在火车站建筑内部 ③ auf dem Bahnhof = 在火车站（南德/奥地利用法）。标准书面语中am最常见。<br><br><b>类似：</b>am Flughafen, am Hafen, am Eingang。in/im用于封闭空间：im Haus, im Zimmer, im Kino。' },
{ q:'Das Buch, mit ___ ich lerne, ist sehr gut.', o:['das','dem','der','den'], a:1, f:'<b>Relativpronomen — Dativ Neutrum mit Präposition</b>：我用它来学习的那本书很好。<br><br><b>规则：</b>关系代词的<b>性</b>跟先行词（das Buch = Neutrum），<b>格</b>跟从句中的功能。mit + Dativ → 需要Dativ关系代词。<br>das Buch, mit <b>dem</b> ich lerne... = das Buch, mit welchem ich lerne...<br><br><b>关系代词Dativ变格：</b>Mask./Neut. = <b>dem</b>, Fem. = <b>der</b>, Plural = <b>denen</b>。❌ "mit das" — 关系代词不能直接用Artikle。❌ "mit der" — der是Fem. Dat.，但das Buch是Neutrum。' },
{ q:'Ich freue mich ___ die Reise.', o:['über','an','zu','mit'], a:0, f:'<b>sich freuen über + Akk. — 已发生的事情</b>：我为（已确定的）旅行感到高兴。<br><br><b>规则：</b>sich freuen <b>über</b> + Akk. = 为<b>已发生/现在</b>的事高兴。<br>sich freuen <b>auf</b> + Akk. = 期待<b>未来</b>的事。<br>此处旅行是已确定的事（Vorfreude也可以），但更准确：如果旅行是未来的计划→用auf；如果已经给了旅行→用über。此句我们假设旅行"这件事"现在令她高兴→über。<br><br><b>关键区分：</b>über = 对已有的/现在的高兴，auf = 对未来的期待。这个考点B2必考。' },
{ q:'Das Problem ___ sich leicht lösen.', o:['lässt','hat','wird','kann'], a:0, f:'<b>sich lassen + Infinitiv (Passiversatz)</b>：这个问题很容易解决。<br><br><b>规则：</b>etw. <b>lässt sich</b> + Infinitiv = etw. kann + PII + werden（被动替代形式）。<br>Das Problem <b>lässt sich</b> leicht lösen. = Das Problem kann leicht gelöst werden.<br><br><b>类似结构：</b>① sein + zu + Inf.: Das Problem ist leicht zu lösen. ② -bar: Das Problem ist leicht lösbar. ③ sich lassen: Das Problem lässt sich leicht lösen。三者都表被动可能性。<br><br><b>口语提示：</b>sich lassen在口语中极常见。❌ "lässt"必须加sich——lässt sich是固定结构。' },
{ q:'Du ___ nicht so viel arbeiten.', o:['brauchst','musst','darfst','kannst'], a:0, f:'<b>brauchen + zu + Infinitiv — 不必/不需要</b>：你不必工作那么多。<br><br><b>规则：</b><b>nicht brauchen + zu</b> + Infinitiv = 不必/不需要做某事（= nicht müssen）。<br>Du <b>brauchst</b> nicht so viel <b>zu</b> arbeiten.<br><br><b>⚠️ 口语中：</b>口语中常省略zu，尤其是南部德语：Du brauchst nicht kommen. 但<b>书面语中必须加zu</b>。<br><br><b>辨析：</b>❌ müssen可以替代但语义更强（禁止/无必需）。nicht müssen = 不是必须；nicht brauchen = 不需要。两者常可互换，但brauchen zu更口语化。' },
{ q:'Er fährt mit dem Fahrrad, ___ er kein Auto hat.', o:['weil','obwohl','trotzdem','damit'], a:0, f:'<b>Kausalsatz — weil (原因从句)</b>：他骑自行车，因为他没有汽车。<br><br><b>规则：</b><b>weil</b>引导原因从句，动词在末位。<br>Er fährt mit dem Fahrrad, <b>weil</b> er kein Auto hat.<br><br><b>辨析：</b>❌ obwohl = 尽管（让步，语义相反）。❌ trotzdem = 尽管如此（副词，不能引导从句）。❌ damit = 为了（目的）。<br><br><b>weil vs denn：</b>weil + 从句（动词末位），denn + 主句语序（动词二位）。weil更口语化，denn更书面。' },
{ q:'___ des Lärms konnte ich nicht schlafen.', o:['Wegen','Trotz','Aufgrund','Während'], a:0, f:'<b>Wegen + Genitiv — Kausale Nominalisierung</b>：因为噪音，我睡不着。<br><br><b>规则：</b>Weil es laut war → <b>Wegen</b> + Genitiv。Wegen <b>des</b> Lärms (Gen. Mask., 加-s)。<br><br><b>辨析：</b>❌ Trotz = 尽管（让步，逻辑相反）。❌ Aufgrund = 也可表因，但更正式。二者这里语义都对，但Wegen是日常最常用。❌ Während = 当...时候（时间）。<br><br><b>⚠️ Genitiv vs Dativ：</b>书面语Wegen des Lärms (Gen.)，口语Wegen dem Lärm (Dat.)。B2考试用Genitiv。' },
{ q:'Das ist der Mann, ___ ich gestern gesehen habe.', o:['der','den','dem','dessen'], a:1, f:'<b>Relativpronomen — Akkusativ Maskulinum</b>：这就是我昨天看到的那个男人。<br><br><b>规则：</b>先行词der Mann = Maskulinum。从句中sehen + Akk. → 关系代词用Akkusativ → <b>den</b>。<br>der Mann, <b>den</b> ich gesehen habe.<br><br><b>关系代词完整变格（Mask.）：</b>Nom. der, Akk. <b>den</b>, Dat. dem, Gen. dessen。<br><br><b>关键：</b>判断关系代词的格不看主句，看<b>从句中的功能</b>。sehen需要Akk.宾语→用den。❌ der是Nom.（作从句主语时用）。❌ dem是Dat.（作间接宾语或介词宾语时用）。' },
{ q:'___ sie krank ist, geht sie arbeiten.', o:['Obwohl','Weil','Wenn','Damit'], a:0, f:'<b>Konzessivsatz — obwohl (让步从句)</b>：尽管她生病了，她还是去上班。<br><br><b>规则：</b><b>Obwohl</b> + 从句 = 尽管/虽然。表示<b>主句行为与从句预期相反</b>。<br><b>Obwohl</b> sie krank ist, geht sie arbeiten.<br><br><b>其他让步表达：</b>① obgleich/obschon (obwohl同义，更正式) ② trotz + Gen. (名词化) ③ zwar...aber (虽然...但是，并列结构)。<br><br><b>辨析：</b>❌ Weil = 因为（因果倒置）。❌ Wenn = 如果/当（条件/时间）。❌ Damit = 为了（目的）。B2阅读中让步关系高频出现。' },
{ q:'Ich helfe ___ (er) bei den Hausaufgaben.', o:['er','ihn','ihm','seiner'], a:2, f:'<b>Dativ nach "helfen" (帮助某人)</b>：我帮他做作业。<br><br><b>规则：</b>helfen + <b>Dativ</b>。这是最常见的要求Dativ的动词之一。<br>Ich helfe <b>ihm</b> bei den Hausaufgaben.<br><br><b>常见Dativ动词（必记）：</b>helfen, danken, gratulieren, folgen, gefallen, gehören, schaden, passieren, fehlen, antworten, vertrauen, begegnen, widersprechen。<br><br><b>⚠️ 英语干扰：</b>英语"I help him" → 德语<b>"Ich helfe ihm"</b>（不是ihn！）。这是英语母语者最常见错误之一。' },
{ q:'___ es regnet, spielen wir draußen.', o:['Obwohl','Weil','Wenn','Damit'], a:0, f:'<b>Konzessivsatz (obwohl vs weil vs wenn)</b>：尽管下雨，我们还在外面玩。<br><br><b>规则：</b>下雨通常会导致不出去玩，但这里相反，所以是让步。用<b>Obwohl</b>。<br><br><b>语义判断技巧：</b>① 因→果→用weil（Weil es regnet, bleiben wir drinnen）② 条件→结果→用wenn（Wenn es regnet, gehen wir rein）③ 反因果→用obwohl（Obwohl es regnet, gehen wir raus）。<br><br><b>B2阅读核心技能：</b>通过连接词判断句子间逻辑关系。obwohl = 反预期/让步，weil = 原因，damit = 目的，wenn = 条件/时间。' },
{ q:'Er ___ noch nie in den USA. (sein → Perfekt)', o:['hat gewesen','ist gewesen','war gewesen','ist sein'], a:1, f:'<b>sein Perfekt: ist gewesen</b>：他从没去过美国。<br><br><b>规则：</b>sein的完成时 = <b>ist gewesen</b>（用sein作助动词，不是haben！）。<br>Er <b>ist</b> noch nie in den USA <b>gewesen</b>.<br><br><b>⚠️ 易混点：</b>sein作为动词时助动词也是sein。类似于bleiben (ist geblieben), werden (ist geworden), geschehen (ist geschehen)。运动动词也用sein。<br><br><b>haben vs sein 助动词：</b>大多数动词用haben。用sein的：①位移/变化动词 ②sein/bleiben/werden ③发生类动词。' },
{ q:'___ länger man lernt, ___ besser wird man.', o:['Je/desto','Je/je','Wenn/so','Indem/dann'], a:0, f:'<b>je...desto — Proportionalvergleich (越...越)</b>：学得越久，就越好。<br><br><b>规则：</b><b>Je</b> + Komparativ + Nebensatz, <b>desto</b> + Komparativ + Hauptsatz。<br><b>Je</b> länger man lernt, <b>desto</b> besser wird man.<br><br><b>⚠️ 语序重点：</b>desto后动词在第二位（desto besser = 第一位，动词wird = 第二位）。je从句中动词在末位。<br><br><b>umso vs desto：</b>umso和desto在现代德语中都可使用，无实质差异。传统规范中je配desto更常见。❌ "Je...je"是错误的。' },
{ q:'Ich kann mich nicht ___ seinen Namen erinnern.', o:['an','über','auf','für'], a:0, f:'<b>sich erinnern an + Akk. (记住/想起)</b>：我想不起他的名字。<br><br><b>规则：</b>sich erinnern + <b>an</b> + Akkusativ = 想起/记得。<br>Ich kann mich nicht <b>an</b> seinen Namen erinnern.<br><br><b>反身动词+介词搭配（高频）：</b>sich erinnern an + Akk. (想起), sich interessieren für + Akk. (感兴趣), sich kümmern um + Akk. (照顾/处理), sich gewöhnen an + Akk. (习惯), sich freuen auf/über + Akk. (期待/高兴), sich ärgern über + Akk. (生气)。<br><br><b>⚠️ 注意：</b>erinnern也可以直接加Akk.宾语：jdn. an etw. erinnern = 提醒某人某事。' },
{ q:'Die Email ist noch nicht ___ (schreiben → Zustandspassiv).', o:['geschrieben','geschrieben worden','schreiben','geschreibt'], a:0, f:'<b>Zustandspassiv — Präsens (状态被动现在时)</b>：邮件还没写好。<br><br><b>规则：</b>Zustandspassiv = <b>sein + Partizip II</b>。表示<b>某物处于被完成的状态</b>。<br>Die Email <b>ist</b> noch nicht <b>geschrieben</b>. = 邮件还处于"没被写"的状态。<br><br><b>Vorgang vs Zustand：</b>Die Email <b>wurde</b> geschrieben = 邮件被写了（动作，已完成）。Die Email <b>ist</b> geschrieben = 邮件写好了（状态）。<br><br><b>否定形式：</b>noch nicht + PII = 还没被...（状态被动最常用否定表达式之一）。' },
{ q:'___ (bevor/nachdem/seitdem/sobald) ich nach Hause komme, esse ich zu Abend.', o:['Bevor','Nachdem','Seitdem','Während'], a:1, f:'<b>nachdem — Vorzeitigkeit (在...之后)</b>：回家后我吃晚饭。<br><br><b>规则：</b><b>Nachdem</b>引导从句，表示主句动作在从句动作<b>之后</b>发生。时态：主句现在时 → 从句现在完成时；主句过去时 → 从句过去完成时。<br><b>Nachdem</b> ich nach Hause <b>gekommen bin</b>, esse ich zu Abend.<br><br><b>辨析：</b>❌ Bevor = 在...之前（时序相反：Bevor ich esse, komme ich nach Hause = 吃饭前回家）。❌ Seitdem = 自...以来。❌ Während = 在...期间（同时发生）。<br><br><b>⚠️ 注意：</b>nachdem要求时态前置。此处用gekommen bin而非komme，因为nachdem从句动作必须发生在主句之前。' },
{ q:'Ich ___ mir die Haare schneiden. (lassen → Kausativ)', o:['lasse','habe','wurde','mache'], a:0, f:'<b>lassen + Infinitiv (使役/让某人做某事)</b>：我让人给我剪头发。<br><br><b>规则：</b><b>lassen</b> + Infinitiv = 让/叫/使（别人）做某事。Ich <b>lasse</b> mir die Haare <b>schneiden</b>. = 我叫人给我剪头发（不是我剪，是让别人剪）。<br><br><b>lassen两种用法：</b>①使役：jdn. etw. tun lassen = 让某人做某事 ②可能性：sich lassen + Inf. = 可以被...（Das lässt sich machen. = 这可以做到）。<br><br><b>常见搭配：</b>sich die Haare schneiden lassen, das Auto reparieren lassen, etw. machen lassen。' },
{ q:'Sie ist ___ ihre Freundin. (als/wie 比较)', o:['älter als','älter wie','mehr alt als','alt als'], a:0, f:'<b>Komparativ: als (比较级用als)</b>：她比她朋友大。<br><br><b>规则：</b>比较级 + <b>als</b> + Vergleichsobjekt。alt → <b>älter</b> als。<br>Sie ist <b>älter als</b> ihre Freundin.<br><br><b>⚠️ 经典错误：</b>❌ "älter wie" — 这是方言/英语干扰（older than = älter als，不是wie！）。❌ "mehr alt" — 德语比较级不加mehr，而是加-er且变音。<br><br><b>als vs wie规则：</b>① 比较级+als（größer als）② 同等比较 so...wie（so groß wie）。两者不可互换！南部德语方言偶有混用，但标准书面语严格区分。' },
{ q:'___ seiner Verspätung verpasste er den Zug.', o:['Trotz','Wegen','Aufgrund','Während'], a:2, f:'<b>Aufgrund + Genitiv — formelle Kausalangabe</b>：由于他的迟到，他错过了火车。<br><br><b>规则：</b><b>Aufgrund</b> + Genitiv = 基于/由于（正式书面语）。比Wegen更正式。<br><b>Aufgrund</b> seiner Verspätung verpasste er den Zug.<br><br><b>Aufgrund vs Wegen：</b>Aufgrund = 基于客观事实（formal），Wegen = 因为（日常/通用）。在正式书信、学术写作中用Aufgrund更好。<br><br><b>⚠️ 注意：</b>Aufgrund是复合介词（auf+Grund），已合写为一个词。不可分开写为auf Grund（旧正字法），现代标准为zusammen。' },
{ q:'Ich habe ___ Bruder ein Geschenk gekauft.', o:['meinem','meinen','mein','meiner'], a:0, f:'<b>Adjektivdeklination — Dativ Maskulinum mit Possessiv</b>：我给我哥哥买了个礼物。<br><br><b>规则：</b>Dativ Maskulinum，物主冠词mein后→混合变化→ <b>-em</b>。mein<b>em</b> Bruder。<br><br><b>物主冠词变化表（Mask.）：</b>Nom. mein <b>-</b> Bruder, Akk. mein<b>en</b> Bruder, Dat. mein<b>em</b> Bruder, Gen. mein<b>es</b> Bruders。<br><br><b>关键：</b>间接宾语（给谁）→ Dativ。kaufen需要：jdm. (Dat.) etw. (Akk.) kaufen。所以Bruder是间接宾语→Dativ→meinem。' },
{ q:'___ des Abends sahen wir einen Film.', o:['Während','Trotz','Wegen','Am Ende'], a:0, f:'<b>während + Genitiv — Gleichzeitigkeit</b>：晚上期间我们看了一部电影。<br><br><b>规则：</b><b>Während</b> + Genitiv = 在...期间/过程中。相当于während引导的时间从句。<br><b>Während</b> des Abends sahen wir einen Film.<br><br><b>während双重身份：</b>① 介词 + Genitiv = 在...期间 ② 连词 + 从句（动词末位）= ①与此同时/而... ②在...期间。<br><br><b>⚠️ 注意：</b>Während作介词时接Genitiv。Während des Tages = 白天期间。口语中偶尔接Dativ，但考试中必须用Genitiv。' },
{ q:'Er ___ von allen gern ___. (sehen → Passiv)', o:['wird/gesehen','ist/gesehen','hat/gesehen','würde/gesehen'], a:0, f:'<b>Vorgangspassiv — Präsens (现在时被动)</b>：他被所有人喜欢看见。<br><br><b>规则：</b>Vorgangspassiv = <b>werden + Partizip II</b>。现在时：<b>wird</b> + PII。<br>Er <b>wird</b> von allen gern <b>gesehen</b>. (gesehen = sehen的PII，强变化)<br><br><b>von vs durch：</b>von + Dativ = 被...（施动者为人）；durch + Akk. = 通过...方式/手段。von allen gesehen = 被所有人看到。<br><br><b>sehen→PII：</b>sehen → gesehen（强变化，e→a→e）。区分：Ich habe gesehen (主动) vs ich werde gesehen (被动)。' },
{ q:'___ er viel lernte, bestand er die Prüfung nicht.', o:['Obwohl','Weil','Nachdem','Damit'], a:0, f:'<b>Konzessivsatz im Präteritum</b>：尽管他学了很多，他还是没通过考试。<br><br><b>规则：</b>学了很多→预期能通过→但实际没通过→反预期→让步→<b>Obwohl</b>（过去时保持一致）。<br><b>Obwohl</b> er viel lernte, bestand er die Prüfung nicht.<br><br><b>obwohl + 过去时：</b>从句和主句都用Präteritum保持时态一致。obwohl er lernte (Prät.) → bestand (Prät.)。<br><br><b>常用让步结构：</b>obwohl + Nebensatz | trotz + Genitiv | zwar...aber... | wenngleich (更正式) | selbst wenn (即使)。' },
{ q:'Die Kinder ___ im Park ___. (spielen → Perfekt)', o:['haben/gespielt','sind/gespielt','haben/spielen','sind/gespielen'], a:0, f:'<b>Perfekt mit haben: spielen</b>：孩子们在公园里玩了。<br><br><b>规则：</b>spielen → PII = <b>gespielt</b>（规则变化）。助动词：<b>haben</b>。<br>Die Kinder <b>haben</b> im Park <b>gespielt</b>.<br><br><b>规则动词PII构成：</b>ge- + 词干 + -t。spielen → ge-spiel-t → gespielt。<br><br><b>⚠️ 易错点：</b>spielen虽然表示活动（运动/玩耍），但不是位移动词，不能用sein。只有位置变化或状态变化的动词才用sein。' },
{ q:'Das ist die Lösung, ___ alle gewartet haben.', o:['auf der','auf die','worauf','die'], a:1, f:'<b>Relativpronomen mit Präposition</b>：这就是所有人都在等待的解决方案。<br><br><b>规则：</b>warten auf + Akk.。die Lösung = Fem.。从句：auf + Akk. → 关系代词Akk. Fem. = <b>die</b>。<br>die Lösung, auf <b>die</b> alle gewartet haben.<br><br><b>关系代词 + 介词 = wo(r)-替代：</b>如果先行词是物/抽象概念（非人），可用worauf替代：die Lösung, <b>worauf</b> alle gewartet haben。两者都正确，wo(r)-更正式。<br><br><b>关键：</b>介词始终在关系代词之前：auf die, mit dem, für das等。不是"die auf"这种倒置！' },
{ q:'___ das Wetter schlecht ___, ___ wir zu Hause.', o:['Wenn/ist/bleiben','Wenn/wäre/blieben','Wenn/war/bleiben','Obwohl/ist/bleiben'], a:1, f:'<b>KII Konditionalsatz (第二虚拟条件句)</b>：如果天气不好的话，我们就待在家。<br><br><b>规则：</b>KII用于表达非现实假设。wäre (sein KII), blieben (bleiben KII)。<br><b>Wenn</b> das Wetter schlecht <b>wäre</b>, <b>blieben</b> wir zu Hause.<br><br><b>KII vs 直陈式：</b>直陈式"Wenn das Wetter schlecht ist, bleiben wir"=明天确实可能天气不好（现实条件）。KII"Wenn das Wetter schlecht wäre"=假设语气（不太可能/纯假设）。<br><br><b>口语提示：</b>口语中常用würde替代：Wenn das Wetter schlecht sein würde, würden wir zu Hause bleiben. 但书面语中强变化动词KII更好。' },
{ q:'Er fragte, ___ ich ihm helfen ___.', o:['ob/könnte','wenn/kann','ob/kann','dass/könnte'], a:0, f:'<b>Indirekter Fragesatz + KII</b>：他问我是否能帮他。<br><br><b>规则：</b>间接Ja/Nein问句用<b>ob</b>。KII (könnte) 表礼貌。<br>Er fragte, <b>ob</b> ich ihm helfen <b>könnte</b>.<br><br><b>ob vs wenn再复习：</b>ob = whether (是否)，wenn = if/when (如果/当)。英语if可以同时表示"是否"和"如果"，但德语严格区分。<br><br><b>KII礼貌：</b>könnte比kann更礼貌。在请求、询问中常用KII表示客气。' },
{ q:'Der Brief ___ gestern ___. (schreiben → Passiv Prät.)', o:['wurde/geschrieben','ist/geschrieben','hat/geschrieben','wird/geschrieben'], a:0, f:'<b>Vorgangspassiv — Präteritum</b>：信昨天被写了。<br><br><b>规则：</b>Vorgangspassiv Prät. = <b>wurde + Partizip II</b>。<br>Der Brief <b>wurde</b> gestern <b>geschrieben</b>.<br><br><b>时态链：</b>Präsens Passiv: wird geschrieben | Prät. Passiv: <b>wurde</b> geschrieben | Perfekt Passiv: ist geschrieben worden | Futur Passiv: wird geschrieben werden。<br><br><b>⚠️ worden vs geworden：</b>Perfekt Passiv才用worden。Präteritum直接用wurde，不需要worden。' },
{ q:'Ich ___ gestern nicht kommen, weil ich krank ___ .', o:['könnte/wäre','konnte/war','kann/bin','könnte/bin'], a:1, f:'<b>Modalverb Prät. + weil Kausalsatz</b>：我昨天不能来，因为我病了。<br><br><b>规则：</b>können Prät. = <b>konnte</b> (事实/陈述)。sein Prät. = <b>war</b>。<br>Ich <b>konnte</b> gestern nicht kommen, weil ich krank <b>war</b>.<br><br><b>⚠️ könnte vs konnte：</b>könnte = KII (非现实/假设)，konnte = Präteritum直陈式(事实)。"我昨天不能来"是陈述过去事实→用konnte，不是könnte。<br><br><b>Modalverb过去时：</b>können→konnte, müssen→musste, dürfen→durfte, wollen→wollte, sollen→sollte。sollte同时也用作KII（建议）。' },
{ q:'Es ist zu ___, dass er lügt.', o:['befürchten','befürchtet','befürchtend','Befürchtung'], a:0, f:'<b>sein + zu + Infinitiv — Passiversatz</b>：令人担心的是他在撒谎。<br><br><b>规则：</b>Es ist zu + Infinitiv = es kann/muss + PII + werden。Es ist zu <b>befürchten</b>, dass... = Es muss befürchtet werden, dass...<br><br><b>关键：</b>sein + zu + <b>Infinitiv</b>（不是PII不是分词）。这是固定的被动替代结构。<br><br><b>用法：</b>①可能性：Das ist zu schaffen = Das kann geschafft werden. ②必要性：Die Regeln sind zu beachten = Die Regeln müssen beachtet werden。' },
{ q:'Nicht nur er, ___ auch seine Frau spricht Deutsch.', o:['aber','sondern','doch','denn'], a:1, f:'<b>nicht nur...sondern auch — 不仅...而且</b>：不仅他，他妻子也说德语。<br><br><b>规则：</b><b>Nicht nur</b>..., <b>sondern</b> auch... = 不仅...而且...。这是并列结构，两个部分对称。<br><br><b>辨析：</b>❌ aber auch可能在一些语境下能用，但标准是sondern auch。❌ doch/denn不参与此结构。<br><br><b>sondern vs aber：</b>sondern用于否定后的纠正替代（nicht A, sondern B）。aber用于一般转折。nicht nur...sondern auch是sondern用法的延伸。' },
{ q:'Ich wünschte, ich ___ mehr Zeit.', o:['hätte','habe','hatte','würde haben'], a:0, f:'<b>KII — Wunschsatz (愿望句)</b>：我希望我有更多时间。<br><br><b>规则：</b>表达非现实愿望用KII。haben KII = <b>hätte</b>。wünschte = wünschen的KII。<br>Ich wünschte, ich <b>hätte</b> mehr Zeit.<br><br><b>结构：</b>wünschte, dass... (✓) 或 wünschte, + 无连词从句（动词在末位）。这里用了后者：ich hätte = 无dass。<br><br><b>口语替代：</b>Ich wünschte, ich könnte... / Wenn ich nur... hätte! / Hätte ich doch nur...! 这些都是常见愿望表达。' },
{ q:'Bitte ___ Sie Platz. (nehmen → Imperativ höflich)', o:['nehmen','nehmt','nimm','nahm'], a:0, f:'<b>Imperativ — Höflichkeitsform (尊称命令式)</b>：请坐下。<br><br><b>规则：</b>尊称Sie的Imperativ = <b>Infinitiv + Sie</b>。<br><b>Nehmen</b> Sie Platz! = 请坐！（字面：请您取位置）。<br><br><b>Imperativ三种形式：</b>① du: Nimm Platz! (词干+可能变音) ② ihr: Nehmt Platz! (词干+t) ③ Sie: Nehmen Sie Platz! (Infinitiv + Sie)。<br><br><b>⚠️ 关键：</b>尊称Sie始终大写！Nehmen <b>S</b>ie Platz. 小写sie = 她/他们。' },
{ q:'___ solche Fehler ___ man vermeiden.', o:['Wie/kann','Durch/muss','Indem/sollte','So/könnte'], a:2, f:'<b>Indem-Satz (方式从句)</b>：通过这样做，人们应该避免此类错误。<br><br><b>规则：</b><b>Indem</b>引导方式从句，表示"通过做某事的方式来..."。从句动词在末位。<br><b>Indem</b> man so handelt, <b>sollte</b> man solche Fehler vermeiden.<br><br><b>indem替代：</b>dadurch dass...（口语中更常见）。indem = 方式/手段，英语by doing。<br><br><b>辨析：</b>❌ Wie = 如何（问方式但不用于连词引导方式从句）。❌ Durch = 介词（durch + 名词），不可直接引导从句。❌ So = 如此。' },
{ q:'Ich habe mir das Bein ___ (brechen).', o:['gebrochen','gebrecht','brechen','gebrochen zu'], a:0, f:'<b>brechen Perfekt + Rektion</b>：我摔断了腿。<br><br><b>规则：</b>brechen → PII = <b>gebrochen</b>（强变化：e→a→o）。sich (Dat.) etw. brechen = 弄断了...（反身Dativ + Akk.宾语）。<br>Ich habe <b>mir</b> das Bein <b>gebrochen</b>.<br><br><b>⚠️ 反身代词格：</b>mir (Dativ), weil das Bein是直接宾语(Akk.)。sich+Dativ表示"给自己..."(身体部位)。<br><br><b>类似结构：</b>sich die Hände waschen, sich die Zähne putzen, sich die Haare kämmen。都是Dativ表示"对自己"。' },
{ q:'___ der Zug Verspätung ___, ___ er den Termin verpassen.', o:['Sollte/haben/würde','Falls/-/muss','Wenn/hat/wird','Sollte/haben/müsse'], a:0, f:'<b>KII Konditionalsatz ohne wenn (省wenn条件句)</b>：万一火车晚点，他会错过约会。<br><br><b>规则：</b>条件句可以省略wenn，将变位动词置于<b>句首第一位</b>。<b>Sollte</b> der Zug Verspätung <b>haben</b>, <b>würde</b> er den Termin verpassen.<br><br><b>省略wenn规则：</b>wenn + 主语 + 动词... → 动词 + 主语 + ...。Sollte es regnen, bleiben wir zu Hause. = Wenn es regnen sollte, ...<br><br><b>C1重点：</b>这种省略wenn的结构在正式书面文本中极其常见。sollte位于句首表示"万一/如果"。' },
{ q:'Die Veranstaltung findet ___ 18 Uhr ___.', o:['um/statt','in/statt','am/statt','zu/statt'], a:0, f:'<b>um + Uhrzeit (时间介词)</b>：活动在18点举行。<br><br><b>规则：</b>时刻用<b>um</b>：um 18 Uhr, um Mitternacht, um halb drei。<br><br><b>时间介词规则：</b>① um + 时刻：um 8 Uhr ② am + 天/日期：am Montag, am 1. Mai ③ im + 月/季/年：im Januar, im Sommer, im Jahr 2024 ④ in + 未来时间段：in zwei Stunden (两小时后)。<br><br><b>⚠️ 区别：</b>um 8 Uhr = 在8点；gegen 8 Uhr = 大约8点；ab 8 Uhr = 从8点起；bis 8 Uhr = 直到8点。' },
{ q:'Sie ___ den ganzen Tag nichts. (essen → Präteritum)', o:['aß','aßte','isste','ess'], a:0, f:'<b>essen Präteritum (强变化)</b>：她一整天没吃东西。<br><br><b>规则：</b>essen → Präteritum = <b>aß</b> (强变化，必须单独记忆！)。这是ich/sie/es的过去时形式。<br>Sie <b>aß</b> den ganzen Tag nichts.<br><br><b>强变化动词Präteritum（高频）：</b>essen→aß, gehen→ging, kommen→kam, sehen→sah, schlafen→schlief, fahren→fuhr, geben→gab, nehmen→nahm, schreiben→schrieb, trinken→trank。<br><br><b>⚠️ 错误：</b>❌ "aßte" — aß已经包含了过去时标记，不是规则动词不能加-te。' },
{ q:'Er ist ___ (fleißig) Schüler der Klasse.', o:['der fleißigste','am fleißigsten','der fleißigere','mehr fleißig'], a:0, f:'<b>Superlativ als Attribut (最高级作定语)</b>：他是班上最勤奋的学生。<br><br><b>规则：</b>fleißig → Superlativ = <b>fleissigst</b>。作定语时：定冠词 + -ste + 形容词词尾。<br><b>der fleißigste</b> Schüler (Nom. Mask. 定冠词后弱变化-e)。<br><br><b>最高级构成：</b>① -est用于-d/-t/-s/-ß/-z/-sch结尾的词：der kürzeste, der süßeste ② 其余用-st：der kleinste。fleißig → fleißigst (ß后直接-st)。<br><br><b>am最高级(作表语/状语)：</b>Er ist am fleißigsten. (表语)。Er arbeitet am fleißigsten. (状语)。' },
{ q:'___ man genug schläft, ___ man sich besser.', o:['Wenn/konzentriert','Obwohl/konzentriert','Damit/konzentriert','Weil/konzentriert'], a:0, f:'<b>Konditionalsatz (wenn 条件句)</b>：如果睡眠充足，就能更好地集中注意力。<br><br><b>规则：</b><b>Wenn</b> + 主语 + ... 动词 (从句末), 动词 (主句第二)。<br><b>Wenn</b> man genug <b>schläft</b>, <b>konzentriert</b> man sich besser.<br><br><b>wenn的多重含义：</b>① 条件（如果）：Wenn es regnet, bleiben wir drinnen. ② 时间（当...时）：Immer wenn er kommt, freue ich mich. ③ 每当：Jedes Mal wenn... 上下文区分。' },
{ q:'Sie fragte, ___ er schon angekommen ___.', o:['ob/sei','wenn/ist','ob/ist','dass/wäre'], a:0, f:'<b>Indirekte Frage + KI (转述疑问+间接引语)</b>：她问他是否已经到了。<br><br><b>规则：</b>间接疑问用<b>ob</b>。若转述他人话语可用KI：sein KI = <b>sei</b>。<br>Sie fragte, <b>ob</b> er schon angekommen <b>sei</b>.<br><br><b>⚠️ KI vs 直陈式：</b>在日常口语中用直陈式ist也很常见。但在正式/书面环境，转述他人问题用KI显得更精确客观。B2考试中对ob的使用是重点，KI是加分项。<br><br><b>ob vs dass：</b>ob = 是否（Ja/Nein疑问），dass = 事实（已知信息转述）。Fragen后接ob，sagen后接dass。' },
{ q:'Das ist ___ schönste Tag meines Lebens.', o:['der','am','den','dem'], a:0, f:'<b>Superlativ: der schönste (最高级+定冠词)</b>：这是我一生中最美好的一天。<br><br><b>规则：</b>最高级作定语需定冠词。schön → schönst。Mask. Nom. = <b>der</b> schönste Tag。<br><br><b>最高级三种形式：</b>① 作定语：der schönste Tag (加冠词+词尾) ② 作表语：Der Tag ist am schönsten. (am + -sten) ③ 作状语：Sie singt am schönsten.。<br><br><b>⚠️ 常用不归则最高级：</b>gut→beste, viel→meiste, gern→liebste, groß→größte, nah→nächste, hoch→höchste。' },
{ q:'Er tut so, ___ er alles ___. (wissen)', o:['als ob/wüsste','als/wüsste','dass/wisse','als ob/wisse'], a:0, f:'<b>als ob + KII (仿佛/好像)</b>：他装得好像什么都知道似的。<br><br><b>规则：</b><b>als ob</b> + KII = 假装/好像（非现实比较）。wissen KII = <b>wüsste</b>（强变化）。<br>Er tut so, <b>als ob</b> er alles <b>wüsste</b>.<br><br><b>als ob vs als：</b>als ob + 从句（动词末位），als + 动词第一位置。Er tut so, als ob er alles wüsste. = Er tut so, als wüsste er alles.<br><br><b>⚠️ 必须用KII：</b>als ob/als后的比较是非现实的（其实他不知道），所以必须用KII，不能用直陈式。' },
{ q:'Ich bin ___ (alt) als du.', o:['älter','alt','am ältesten','mehr alt'], a:0, f:'<b>Komparativ — unregelmäßig (不规则比较级)</b>：我比你大。<br><br><b>规则：</b>alt → Komparativ = <b>älter</b>（单音节+a变音+er）。<br>Ich bin <b>älter</b> als du.<br><br><b>常用变音比较级（单音节动词+a/o/u→ä/ö/ü）：</b>alt→älter, arm→ärmer, groß→größer, jung→jünger, klug→klüger, kurz→kürzer, lang→länger, warm→wärmer。但不是所有都变：flach→flacher (不变!), bunt→bunter (不变!)。<br><br><b>⚠️ 注意：</b>比较级不加mehr！这是英语干扰。德语通过-er形成比较级。' },
{ q:'Ich kümmere ___ um das Problem.', o:['mich','mir','sich','es'], a:0, f:'<b>sich kümmern um + Akk. (反身+介词固定搭配)</b>：我负责处理这个问题。<br><br><b>规则：</b>sich + <b>Akkusativ</b> kümmern + <b>um</b> + Akk. = 照顾/处理/关心。<br>Ich kümmere <b>mich</b> um das Problem.<br><br><b>⚠️ 常见错误：</b>❌ sich kümmern + über/von/auf — 固定搭配是um！❌ "Ich kümmere mir" — 反身代词用Akk. (mich) 不是Dat. (mir)。<br><br><b>高频反身+介词：</b>sich kümmern um (处理), sich interessieren für (感兴趣), sich gewöhnen an (习惯), sich freuen auf/über (期待/高兴)。' },
{ q:'Das Problem ___ bereits ___. (lösen → Passiv Perfekt)', o:['ist/gelöst worden','hat/gelöst','wurde/gelöst','ist/lösen worden'], a:0, f:'<b>Passiv Perfekt — 完整结构</b>：问题已经被解决了。<br><br><b>规则：</b>Passiv Perfekt = <b>sein + Partizip II + worden</b>。<br>Das Problem <b>ist</b> bereits <b>gelöst worden</b>.<br><br><b>⚠️ worden vs geworden：</b>被动完成时werden的PII写作<b>worden</b>（不是geworden！）。geworden用于werden作实义动词时：Er ist Lehrer geworden（他成了老师）。<br><br><b>三词结构不可缺：</b>ist (助动词) + gelöst (PII) + worden (werden的PII)。三者缺一不可！' },
