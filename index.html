function renderSRSReviewQuiz() {
  var due = getDueItems();
  if (due.length === 0) return;
  var count = Math.min(10, due.length);
  var shuffled = due.sort(function(){ return Math.random() - 0.5; }).slice(0, count);

  var questions = [];
  var itemIds = [];
  var allDueForDistractors = due;

  shuffled.forEach(function(d) {
    var meta = d.entry.meta || {};
    if (meta.type === 'vbp') {
      // VBP item: show verb with blank, pick preposition
      var allVbpMeta = [];
      allDueForDistractors.forEach(function(d2) {
        var m2 = d2.entry.meta;
        if (m2 && m2.type === 'vbp' && m2.prep) allVbpMeta.push(m2.prep);
      });
      // Also use generic VBP prepositions as distractors
      var genericPreps = ['auf','an','für','mit','bei','nach','aus','von','zu','um','über','unter','vor','gegen','durch'];
      var allPreps = allVbpMeta.concat(genericPreps);
      // Remove duplicates and the correct answer
      var distractors = [];
      var seen = {};
      for (var p = 0; p < allPreps.length && distractors.length < 3; p++) {
        var prep = allPreps[p];
        if (prep !== meta.prep && !seen[prep]) { seen[prep] = true; distractors.push(prep); }
      }
      while (distractors.length < 3) distractors.push('???');
      var options = [meta.prep].concat(distractors.slice(0,3));
      // Shuffle options
      var correctIdx = 0;
      for (var s = options.length - 1; s > 0; s--) {
        var j = Math.floor(Math.random() * (s + 1));
        var tmp = options[s]; options[s] = options[j]; options[j] = tmp;
      }
      correctIdx = options.indexOf(meta.prep);
      questions.push({
        q: meta.de.replace(' ' + meta.prep + '+', ' _____'),
        o: options,
        a: correctIdx,
        f: '<b>' + meta.de + '</b> — ' + (meta.zh||'') + '<br>例句：' + (meta.ex||'')
      });
    } else {
      // Vocab item: show German, pick Chinese meaning
      var distractorsZh = [];
      var seenZh = {};
      for (var d3 = 0; d3 < allDueForDistractors.length && distractorsZh.length < 3; d3++) {
        var m3 = allDueForDistractors[d3].entry.meta;
        if (m3 && m3.zh && m3.zh !== meta.zh && !seenZh[m3.zh]) {
          seenZh[m3.zh] = true; distractorsZh.push(m3.zh);
        }
      }
      while (distractorsZh.length < 3) distractorsZh.push('???');
      var opts = [meta.zh].concat(distractorsZh.slice(0,3));
      var ci = 0;
      for (var s2 = opts.length - 1; s2 > 0; s2--) {
        var j2 = Math.floor(Math.random() * (s2 + 1));
        var tmp2 = opts[s2]; opts[s2] = opts[j2]; opts[j2] = tmp2;
      }
      ci = opts.indexOf(meta.zh);
      questions.push({
        q: '<span style="color:#f39c12;font-style:italic">' + (meta.de||'?') + '</span> ' + (meta.hint?'('+meta.hint+')':''),
        o: opts,
        a: ci,
        f: '<b>' + (meta.de||'?') + '</b> = ' + (meta.zh||'?') + (meta.ex?'<br>例句：' + meta.ex:'')
      });
    }
    itemIds.push(d.id);
  });

  window.testScores['sr'] = 0;
  window.testState['sr'] = {questions: questions, testType: 'SRS-Wiederholung', answers: new Array(questions.length).fill(null), itemIds: itemIds};

  var html = '<div style="margin-bottom:12px;color:#7b8db5">Beantwortet: <span id="sr-score">0</span>/' + count + '</div>';
  questions.forEach(function(q, i) {
    html += '<div class="quiz"><h4>' + (i+1) + '. ' + q.q + '</h4>';
    q.o.forEach(function(o, j) {
      html += '<div class="q-option" data-prefix="sr" data-idx="' + i + '" data-correct="' + (j===q.a) + '" data-useridx="' + j + '" data-itemid="' + itemIds[i] + '" onclick="answerSRSReviewQ(this)">' + String.fromCharCode(65+j) + '. ' + o + '</div>';
    });
    html += '<div class="q-feedback" id="sr-fb-' + i + '"></div></div>';
  });
  html += '<div id="sr-result" style="text-align:center;margin-top:16px;display:none"></div>';
  html += '<button class="btn btn-red" style="margin-top:10px" onclick="showSRSReviewResult()">📊 Ergebnis anzeigen</button>';

  document.getElementById('srs-review-container').innerHTML = html;
}

window.answerSRSReviewQ = function(el) {
  var prefix = 'sr';
  var idx = parseInt(el.getAttribute('data-idx'));
  var correct = el.getAttribute('data-correct') === 'true';
  var userIdx = parseInt(el.getAttribute('data-useridx'));
  var itemId = el.getAttribute('data-itemid');
  var state = window.testState[prefix];
  if (!state || state.answers[idx] !== null) return;

  var fbEl = document.getElementById(prefix + '-fb-' + idx);
  var q = state.questions[idx];

  if (correct) {
    el.classList.add('correct');
    fbEl.textContent = '✅ ' + q.f;
    fbEl.style.display = 'block';
    state.answers[idx] = {correct: true, itemId: itemId};
    window.testScores[prefix] = (window.testScores[prefix]||0) + 1;
    document.getElementById(prefix + '-score').textContent = window.testScores[prefix];
    recordSRS(itemId);
  } else {
    el.classList.add('wrong');
    state.answers[idx] = {correct: false, userIdx: userIdx, itemId: itemId};
    fbEl.innerHTML = '❌ Richtig: <strong>' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</strong> — ' + q.f;
    fbEl.style.display = 'block';
    var opts = el.parentElement.querySelectorAll('.q-option');
    opts[q.a].classList.add('correct');
    for (var k = 0; k < opts.length; k++) opts[k].style.pointerEvents = 'none';
    failSRS(itemId);
  }
};

window.showSRSReviewResult = function() {
  var state = window.testState['sr'];
  if (!state) return;
  var total = state.questions.length;
  var score = window.testScores['sr'] || 0;
  var pct = Math.round(score/total*100);
  var el = document.getElementById('sr-result');
  var dueCount = getDueCount();

  var allList = '';
  var wrongCount = 0;
  for (var i = 0; i < state.answers.length; i++) {
    var ans = state.answers[i];
    var q = state.questions[i];
    var isWrong = ans && !ans.correct;
    if (isWrong) wrongCount++;
    allList += '<div style="background:#1a1a2e;border:1px solid ' + (isWrong ? '#e94560' : '#1e3a2f') + ';border-left:4px solid ' + (isWrong ? '#e94560' : '#22c55e') + ';border-radius:8px;padding:14px;margin:10px 0;text-align:left">';
    allList += '<strong style="color:' + (isWrong ? '#e94560' : '#22c55e') + '">' + (isWrong ? '❌ ' : '✅ ') + (i+1) + '. ' + q.q + '</strong><br>';
    allList += '<span style="color:#22c55e">Richtig: ' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</span><br>';
    allList += '<div style="background:#0d1b2a;border-radius:6px;padding:10px;margin-top:6px;color:#c8d0dc;font-size:.88em;line-height:1.7"><strong>📖 详细讲解：</strong>' + q.f + '</div>';
    allList += '</div>';
  }

  var stageInfo = '';
  state.answers.forEach(function(a, i) {
    if (a && a.itemId && srsData[a.itemId]) {
      var entry = srsData[a.itemId];
      stageInfo += '<span style="display:inline-block;margin:3px;padding:3px 8px;border-radius:10px;font-size:.72em;'
        + (a.correct ? 'background:#1a3a1a;color:#22c55e' : 'background:#3a1a1a;color:#e94560')
        + '">' + (i+1) + '. Stufe ' + entry.stage + ' → ' + srsNextInterval(entry.stage) + 'd</span>';
    }
  });

  var msg = pct >= 80 ? '🎉 Super! Langzeitgedächtnis wird aufgebaut!' :
            pct >= 50 ? '👍 Gut. Weiter dranbleiben.' : '📚 Dranbleiben! Wiederholung ist der Schlüssel.';

  el.style.display = 'block';
  el.innerHTML = '<h2 style="color:' + (pct>=80?'#22c55e':'#f39c12') + ';font-size:1.4em">' + score + '/' + total + ' (' + pct + '%) — ' + msg + '</h2>'
    + (stageInfo ? '<div style="margin:8px 0">' + stageInfo + '</div>' : '')
    + '<p style="color:#7b8db5;font-size:.8em">Noch ' + dueCount + ' fällige Wiederholungen in der SRS-Bank.</p>'
    + '<div style="margin-top:16px"><h3 style="color:#f39c12">📋 Vollständige Auswertung (' + total + ' Fragen)</h3>' + allList + '</div>'
    + '<p style="margin-top:8px"><button class="btn btn-red" onclick="goPage(\'srs_review\')">🔄 Nochmal wiederholen</button> '
    + '<button class="btn btn-gold" onclick="goPage(\'vocab_flashcards\')">🃏 学新词汇</button></p>';
};

  {q:'Wenn ich das ___, ___ ich anders.',o:['weiß/würde','wüsste/hätte','wusste/hatte','wisse/werde'],a:1,f:'<b>Konjunktiv II — 非现实条件</b>：如果我知道，我就会采取不同做法。<br><br><b>规则：</b>wissen的KII = <b>wüsste</b>（强变化，必须牢记！不是weißte）。haben的KII = <b>hätte</b>（强变化）。<br>全句：Wenn ich das <b>wüsste</b>, <b>hätte</b> ich anders gehandelt.<br><br><b>⚠️ 常见错误：</b>❌ "weiß" 是直陈式现在时（规则变化），KII是不规则的。❌ "wisse" 是KI，不能用于非现实条件句。❌ "wusste" 是过去时。KII与过去时形式相近但不相同：wusste (过去) vs wüsste (KII)。'},
  {q:'Das Gesetz ___ letzte Woche ___.',o:['hat/verabschiedet','wurde/verabschiedet','ist/verabschieden','wird/verabschiedet'],a:1,f:'<b>Vorgangspassiv Präteritum (过程被动过去时)</b>：该法律上周被通过了。<br><br><b>规则：</b>Vorgangspassiv = <b>werden + Partizip II</b>。过去时：werden → <b>wurde</b>。<br>全句：Das Gesetz <b>wurde</b> letzte Woche <b>verabschiedet</b>.<br><br><b>Passiv时态变化表（仅werden变化）：</b>Präsens: wird verabschiedet | Prät.: <b>wurde</b> verabschiedet | Perfekt: ist verabschiedet worden | Futur: wird verabschiedet werden。<br><br><b>⚠️ 注意：</b>被动完成时用worden（不是geworden！）。"ist verabschiedet worden" (被动完成) ≠ "ist verabschiedet geworden" (werden的主动完成，无意义)。'},
  {q:'___ der steigenden Preise ___ die Kaufkraft.',o:['Wegen/sinkt','Aufgrund/sinkt','Trotz/steigt','Ohne/bleibt'],a:1,f:'<b>Nominalisierung — Kausalangabe (原因名词化)</b>：由于价格上涨，购买力下降。<br><br><b>规则：</b>Weil die Preise steigen → <b>Aufgrund</b> + Gen. + 主句。Aufgrund der steigenden Preise... <b>sinkt</b> die Kaufkraft.<br><br><b>辨析：</b>❌ Wegen/sinkt — Wegen在口语中常用Dativ，Aufgrund更正式且总是Genitiv。两个都表示原因，语法上都对。<br>❌ Trotz/steigt — Trotz = 尽管（让步），逻辑矛盾。❌ Ohne/bleibt — ohne通常不用作表原因的介词。<br><br><b>⚠️ 实际上：</b>Wegen和Aufgrund在此语境下都可用于表原因。但Aufgrund与名词化搭配更书面/正式，是C1写作首选。'},
  {q:'Das ist leicht zu ___.',o:['geklärt','erklären','erklärbar','erklärt'],a:1,f:'<b>sein + zu + Infinitiv (Passiversatz)</b>：这很容易解释。<br><br><b>规则：</b>sein + zu + Infinitiv = 被动替代形式，表示<b>可能性或必要性</b>。<br>Das ist leicht zu <b>erklären</b>. = Das kann leicht erklärt werden.<br><br><b>关键：</b>sein+zu+Inf.中动词用<b>不定式原形</b>，不用PII不用- bar。❌ "zu geklärt" — PII不能用于此结构。❌ "erklärbar" — 虽然-bar也是Passiversatz，但不能用于sein+zu+Inf.结构。<br><br><b>三个Passiversatz对比：</b>① Das ist zu erklären. (sein+zu) ② Das lässt sich erklären. (sich lassen) ③ Das ist erklärbar. (-bar)。'},
  {q:'___ mehr ___, ___ das Problem gelöst.',o:['Wenn/würde/könnte','Wenn/wird/kann','Würde/-/könnte','Damit/-/wird'],a:0,f:'<b>Konjunktiv II Vollstruktur</b>：如果更多（人参与），问题就能被解决。<br><br><b>规则：</b>Wenn + ... + <b>würde</b> + Infinitiv (从句末), <b>könnte</b> + PII + werden (主句, Modalverb KII + Passiv)。<br>全句：<b>Wenn</b> mehr getan <b>würde</b>, <b>könnte</b> das Problem gelöst werden.<br><br><b>复杂点：</b>主句是Modalverb KII (könnte) + Passiv (gelöst werden)。从句是würde-Passiv (würde getan)。双层嵌套结构。<br><br><b>关键：</b>❌ Wenn/wird/kann 是直陈式，不表示非现实假设。KII用于表达不确定的、假设性的解决方案。'},
  {q:'Die ___ (zunehmen) Arbeitslosigkeit.',o:['zugenommene','zunehmende','zunehmene','zugenommende'],a:1,f:'<b>Partizip I als Attribut (第一分词作定语)</b>：正在增长的失业率。<br><br><b>规则：</b>zunehmen → PI = <b>zunehmend</b> + 形容词词尾-e = <b>zunehmende</b>。<br>PI = 动词原形 + -d (+ 形容词词尾)。表示<b>主动、正在进行</b>。<br><br><b>PI vs PII：</b>die <b>zunehmende</b> Arbeitslosigkeit (PI) = 正在增长的失业（主动进行）<br>die <b>zugenommene</b> Arbeitslosigkeit (PII) = 已增长的失业（已完成）<br><br><b>C1阅读：</b>Partizipialattribute是最常见的复杂定语结构。看到长定语先找分词，还原为关系从句。'},
  {q:'eine ___ treffen (entscheiden)',o:['Entscheidung','Entscheiden','Entscheid','Entscheidnis'],a:0,f:'<b>FVG: eine Entscheidung treffen</b>：做出决定。<br><br><b>规则：</b>entscheiden (动词) → eine <b>Entscheidung</b> treffen (名词-动词固定搭配/FVG)。<br><br><b>常见FVG（必须掌握）：</b>eine Entscheidung treffen = entscheiden | eine Wahl treffen = wählen | Maßnahmen treffen/ergreifen | eine Vereinbarung treffen。<br><br><b>⚠️ 注意：</b>treffen + 名词 = 做出/达成（决定、选择、措施等）。不是"machen"也不是"nehmen"。❌ "Entscheiden"是动词原形，不能直接加冠词。❌ "Entscheid"是较少使用的名词变体，标准是Entscheidung。'},
  {q:'Das ___ du ___ wissen!',o:['kannst/ja','weißt/doch','hast/mal','tust/denn'],a:1,f:'<b>Modalpartikel — doch (语气小品词)</b>：这你可是知道的！/ 这你明明知道！<br><br><b>规则：</b><b>doch</b>在这里是Modalpartikel，表达"明明/可是/你应该知道的呀"。带有轻轻的责备或提醒语气。<br>Das <b>weißt</b> du <b>doch</b>! = You do know that! / 你明明知道！<br><br><b>辨析：</b>❌ ja — 表示"确实/真的"（建立共识），语气比doch轻。Das weißt du ja! = 你确实知道的呀（没有责备感）。❌ mal — 表示"一下/暂且"。❌ denn — 表示"究竟/到底"。<br><br><b>C1口语/阅读：</b>Modalpartikeln不改变事实内容，但改变<b>语用含义</b>。通过doch/ja/mal/denn判断说话人态度是C1听力/阅读的核心能力。'},
  {q:'Das Projekt ___ abgeschlossen. (Zustandspassiv)',o:['wurde','ist','war','hat'],a:2,f:'<b>Zustandspassiv (状态被动) — Präteritum</b>：项目（当时）已经完结了。<br><br><b>规则：</b>Zustandspassiv = <b>sein + Partizip II</b>（不是werden+PII！）。<br>Zustandspassiv表示动作完成后的<b>状态/结果</b>。过去时：<b>war</b> + PII。Das Projekt <b>war</b> abgeschlossen. = 项目当时已完成（强调那个时间点的状态）。<br><br><b>Vorgangs- vs Zustandspassiv：</b>wurde abgeschlossen (过程被动: 被完结——动作) ≠ war abgeschlossen (状态被动: 已完结——状态)。<br><br><b>❌ "ist abgeschlossen"</b> — 这是Zustandspassiv现在时：项目现在已完成。本题应判断为过去语境用war。'},
  {q:'Die CO2-Emissionen sind ___. (reduzieren→-bar)',o:['reduzierbar','reduziert','reduzieren','reduzierend'],a:0,f:'<b>-bar als Passiversatz (形容词化被动替代)</b>：CO2排放是可减少的。<br><br><b>规则：</b>-bar后缀加在动词词根后构成形容词 = 可被...的 / 能被...的 = kann + PII + werden。<br>reduzier- + -bar = <b>reduzierbar</b> = kann reduziert werden.<br><br><b>常见-bar形容词：</b>lösbar (可解决的), machbar (可行的), hörbar (可听见的), lesbar (可读的), erklärbar (可解释的), trinkbar (可饮用的)。<br><br><b>注意：</b>-bar不能随意造词。有些动词用-bar，有些用-lich：verständlich (可理解的), möglich (可能的)。'},
  {q:'Er ___ einen Beitrag ___.',o:['macht/bei','leistet/zu','hat/von','gibt/für'],a:1,f:'<b>FVG: einen Beitrag leisten zu + Dativ</b>：他为...做出了贡献。<br><br><b>规则：</b>einen Beitrag <b>leisten zu</b> + Dat. = 为...做出贡献。<br>Er <b>leistet</b> einen Beitrag <b>zu</b>r Diskussion. = 他为讨论做出贡献。<br><br><b>类似FVG：</b>Beitrag leisten (贡献), Hilfe leisten (提供帮助), Widerstand leisten (进行抵抗), Arbeit leisten (完成工作), Verzicht leisten (放弃)。<br><br><b>⚠️ 常见错误：</b>❌ Beitrag machen (英语干扰: make a contribution) — 德语不这样说。❌ Beitrag haben — 不存在。'},
  {q:'etw. zum ___ bringen (ausdrücken)',o:['Sprache','Ausdruck','Wort','Satz'],a:1,f:'<b>FVG: etw. zum Ausdruck bringen</b>：表达某事。<br><br><b>规则：</b>ausdrücken (动词) → etw. zum <b>Ausdruck</b> bringen (FVG)。<br>zum Ausdruck bringen = 使...得以表达/把...表达出来 = ausdrücken。<br><br><b>结构分析：</b>zum = zu dem (介词+Dat.)。bringen + 名词(第四格) + zu + 名词(第三格) = 将...带至...的状态。<br><br><b>类似结构：</b>zur Sprache bringen (提起/讨论), zur Anwendung bringen (应用), zu Ende bringen (完成), zur Vernunft bringen (使...理智)。'},
  {q:'Das Konzert ___ ja super! (Modalpartikel)',o:['hat','war','ist','wurde'],a:1,f:'<b>Modalpartikel "ja" + sein (评价/状态)</b>：音乐会确实很赞！<br><br><b>规则：</b>sein + Adjektiv/jA... = 描述状态的系动词结构。Modalpartikel "ja" 表达<b>确认/共鸣/确实</b>。<br>Das Konzert <b>war</b> ja super!<br><br><b>为什么用war：</b>音乐会已发生（过去的），用过去时war。❌ hat/ist/wurde 都不能接形容词谓语。sein接形容词表状态/性质。<br><br><b>Modalpartikel ja vs doch：</b>ja = 确实/真的（共鸣确认）。doch = 明明（轻反驳）。Das war ja super! (共鸣) vs Das war doch super! (你怎么不觉得好？)。'},
  {q:'Er gilt ___ Experte.',o:['für','wie','als','zu'],a:2,f:'<b>gelten als + Nominativ (被视为/被认为是)</b>：他被认为是专家。<br><br><b>规则：</b>gelten <b>als</b> + <b>Nominativ</b>。注意：als后面接的是<b>第一格</b>（不是第四格！）。<br>Er gilt <b>als</b> Experte. (Experte = Nom.)<br><br><b>同类结构（都接Nominativ）：</b>gelten als + Nom. (被视为) | angesehen werden als + Nom. (被视为) | bezeichnet werden als + Nom. (被称为) | bekannt sein als + Nom. (以...身份闻名)。<br><br><b>⚠️ 关键：</b>不是"gelten für"，不是"gelten wie"，不是"gelten zu"。这是不可替换的固定搭配。'},
  {q:'___ man genug schläft, ___ kann man sich schlecht konzentrieren.',o:['Wenn/dann','Obwohl/dennoch','Weil/deshalb','Damit/so'],a:0,f:'<b>Konditionalsatz mit Korrelat (条件从句+相关词)</b>：如果睡眠不足，那么就很难集中注意力。<br><br><b>规则：</b><b>Wenn</b> + Nebensatz (动词在末), <b>dann</b> + Hauptsatz (动词在第二)。<br>全句：<b>Wenn</b> man nicht genug schläft, <b>dann</b> kann man sich schlecht konzentrieren.<br><br><b>辨析：</b>❌ Obwohl/dennoch = 让步（逻辑相反：不能说"尽管睡够了但很难集中"）。❌ Weil/deshalb = 原因（逻辑也可对，但Wenn/dann更自然表达条件关系）。<br><br><b>语序：</b>wenn从句占第一位时，主句动词紧跟：Wenn man genug schläft, <b>kann</b> (动词) man sich...。dann在动词前：<b>dann kann</b> man...。'},
  {q:'Das Auto ___ letzte Woche ___. (reparieren→Passiv)',o:['hat/repariert','ist/repariert','wurde/repariert','wird/repariert'],a:2,f:'<b>Vorgangspassiv Präteritum (过程被动过去时)</b>：车子上周被修了。<br><br><b>规则：</b>Passiv Präteritum = <b>wurde + PII</b>。reparieren → PII = repariert。<br>Das Auto <b>wurde</b> letzte Woche <b>repariert</b>.<br><br><b>辨析：</b>❌ "hat repariert" = 主动完成时（谁修的？缺少主语）。❌ "ist repariert" = Zustandspassiv现在时（车子现在已修好状态），与letzte Woche不搭配。❌ "wird repariert" = 现在时被动（与letzte Woche矛盾）。<br><br><b>时态信号词：</b>letzte Woche = 过去时间 → 必须用过去时。不管主动被动，时间信号决定时态。'},
  {q:'Ich ___ gerne ___ 19. Jahrhundert gelebt. (haben→KII)',o:['habe/im','hätte/im','würde/im','sei/im'],a:1,f:'<b>KII Vergangenheit — Irrealer Wunsch (非现实愿望)</b>：我真想在19世纪生活过。<br><br><b>规则：</b>非现实愿望 (irrealer Wunsch) 用KII Vergangenheit = <b>hätte/wäre + PII</b>。<br>Ich <b>hätte</b> gerne im 19. Jahrhundert gelebt. = 我要是曾在19世纪生活过就好了（实际上不可能）。<br><br><b>结构：</b>haben → hätte (KII) + PII。全句KII完成时。❌ "habe/gelebt" = 直陈式完成时（陈述事实，不是愿望）。❌ "würde/gelebt" = würde + PII 现代口语中可用，但标准语法用hätte。<br><br><b>Irrealer Wunsch = hätte/wäre + PII + gerne。如：</b>Wäre ich doch nur reich! (真希望我有钱！)。'},
  {q:'Der Film ___ (sehen) sich gut an. (Passiversatz)',o:['hat','wird','lässt','ist'],a:2,f:'<b>sich lassen + Infinitiv (Passiversatz)</b>：这电影很好看。<br><br><b>规则：</b>etw. <b>lässt sich</b> + Infinitiv = etw. kann + PII + werden。Der Film <b>lässt</b> sich gut an<b>sehen</b>. = Der Film kann gut angesehen werden.<br><br><b>用法：</b>lässt (lassen的第三人称现在时) + sich + 可分动词(合写)。anschauen → sich gut anschauen lassen。<br><br><b>❌ "hat sich"</b> — 不是passiversatz。❌ "wird sich" — 语法不成立。❌ "ist sich" — 不存在。<br><br><b>C1重点：</b>sich lassen是考试中最常见的Passiversatz之一，必须能主动使用。'},
  {q:'Es ___ mir leid, aber ich kann nicht kommen.',o:['ist','tut','macht','hat'],a:1,f:'<b>Es tut mir leid — 固定表达</b>：我很抱歉，但我不能来。<br><br><b>规则：</b><b>Es tut mir leid</b> = 我很抱歉/对不起。这是固定搭配，不能替换动词。<br><br><b>beachten：</b>leid 在这里是形容词，leidtun 是可分动词：leidtun → tut leid → hat leidgetan。<br><br><b>❌常见错误：</b>❌ "Es ist mir leid" — 英语干扰："It\'s sorry to me" ×。❌ "Es macht mir leid" — 不存在。❌ "Es hat mir leid" — 不存在。<br><br><b>类似表达：</b>Es tut mir weh (让我痛/伤心), Es tut mir gut (对我有好处), Es tut mir nicht leid (我不道歉)。'},
  {q:'Er wurde ___ (fördern), weil er hart arbeitete.',o:['fördert','gefördert','fördernd','förderte'],a:1,f:'<b>Vorgangspassiv mit PII (wurde + PII)</b>：他因为工作努力而得到了晋升/资助。<br><br><b>规则：</b>wurde + <b>Partizip II</b> = Vorgangspassiv Präteritum。<br>fördern → PII = <b>gefördert</b>（弱变化）。Er <b>wurde gefördert</b> = 他被晋升/资助了。<br><br><b>辨析：</b>❌ "fördert" = 现在时第三人称（与wurde不搭配）。❌ "fördernd" = PI (正在晋升的——不合逻辑，被动含义用PII)。❌ "förderte" = 主动过去时（与wurde不搭配）。<br><br><b>Passiv结构：</b>wurde (助动词) + gefördert (PII, 实义动词)。两者缺一不可。变为主动：Man förderte ihn → Er wurde gefördert。'},
  {q:'___ eines Jahres hat sie Deutsch gelernt.',o:['Während','Innerhalb','Aufgrund','Trotz'],a:1,f:'<b>Innerhalb + Genitiv (在...之内)</b>：在一年之内她学会了德语。<br><br><b>规则：</b><b>Innerhalb</b> + Gen. = 在...时间内/在...范围内。表达时间或空间的界限。<br>Innerhalb <b>eines</b> Jahres hat sie Deutsch gelernt.<br><br><b>辨析：</b>❌ Während + Gen. = 在...期间（不强调时间界限，而强调期间发生的事）。❌ Aufgrund = 由于（原因）。❌ Trotz = 尽管（让步）。<br><br><b>注意：</b>innerhalb = within（时间/空间界限内）。außerhalb = outside of。innerhalb der EU (在欧盟范围内)。'},
  {q:'Der Chef ___ den Mitarbeitern ___. (danken→richtig)',o:['dankt/für','bedankt/bei','dankt/--','dankte/sich'],a:2,f:'<b>jdm. danken — Dativ-Verb (带第三格动词)</b>：老板感谢员工们。<br><br><b>规则：</b><b>jdm. (Dat.) danken</b> = 感谢某人。danken后接<b>第三格</b>，不接介词！<br>Der Chef <b>dankt</b> <b>den</b> Mitarbeitern. (Mitarbeitern = Dat. Pl.)<br><br><b>对比：</b>❌ für etw. danken — 可以说 für etw. danken (为某事感谢)，但"感谢某人"是jdm. danken (Dat.)，不加介词。<br>❌ sich bedanken bei jdm. für etw. — 另一种"感谢"的反身用法：Ich bedanke mich bei Ihnen für Ihre Hilfe.<br>❌ dankte sich — 不存在。<br><br><b>Dativ-Verben (常见)</b>：danken, helfen, antworten, gratulieren, folgen, gefallen, gehören, passen。'},
  {q:'Ich ___ ___, das Fenster zu ___. (vergessen)',o:['habe/vergessen/schließen','habe/vergessen/geschlossen','bin/vergessen/schließen','hatte/vergessen/geschlossen'],a:0,f:'<b>Perfekt + zu-Infinitiv (vergessen + zu + Inf.)</b>：我忘了关窗。<br><br><b>规则：</b>vergessen构成完成时用<b>haben</b>（不是sein）。PII = <b>vergessen</b>（强变化，无ge前缀，因为ver-不可分）。<br>Ich <b>habe</b> <b>vergessen</b>, das Fenster zu <b>schließen</b>.<br><br><b>结构：</b>habe + vergessen + , + zu + Infinitiv。zu-不定式作vergessen的宾语。<br><br><b>类似结构：</b>vergessen, etw. zu tun / versuchen, etw. zu tun / versprechen, etw. zu tun / vergessen (忘了做) vs sich erinnern (想起来做) 都接zu-不定式。'},
  {q:'Sie ___ ihn, den Vertrag zu ___. (bitten→Präteritum)',o:['bat/unterschreiben','bat/untergeschrieben','bittete/unterschreiben','bittete/untergeschrieben'],a:0,f:'<b>Präteritum + zu-Infinitiv: jdn. bitten, etw. zu tun</b>：她请他签合同。<br><br><b>规则：</b>bitten的过去时 = <b>bat</b>（强变化，e→a, 必须牢记！不是bittete）。<br>Sie <b>bat</b> ihn, den Vertrag zu <b>unterschreiben</b>.<br><br><b>⚠️ 关键：</b>❌ bittete 不存在！bitten是不规则变化：bitten → bat → hat gebeten。这不按规则变化。<br><br><b>jdn. bitten, etw. zu tun结构：</b>bitten + Akk. + , + zu-Inf. = 请求某人做某事。注意zu-不定式和bitte之间用逗号分隔。<br><br><b>混淆词：</b>bitten (请求) vs bieten (提供) vs beten (祈祷)。bitten→bat, bieten→bot, beten→betete。'},
// 95 new grammar quiz questions (mixed B2/C1) — expanding grammarTestQs from 25→120

{q:'___ sie müde ___, ___ sie trotzdem weiter.',o:['Obwohl/war/arbeitete','Weil/war/arbeitete','Wenn/wäre/arbeitet','Trotzdem/war/arbeitete'],a:0,f:'<b>Konzessivsatz: obwohl + Präteritum</b>：尽管她累了，她仍继续工作。<br><br><b>规则：</b><b>Obwohl</b>引导让步从句，主从句都用Präteritum。Obwohl sie müde <b>war</b>, <b>arbeitete</b> sie trotzdem weiter.<br>❌ Weil = 因果倒置。❌ Trotzdem = 副词，不能引导从句。'},
{q:'Das Meeting ___ auf nächste Woche ___ werden.',o:['soll/verschoben','muss/verschieben','hat/verschoben','wurde/verschieben'],a:0,f:'<b>Modalverb + Passiv: sollen + PII + werden</b>：会议应被推迟到下周。<br><br><b>规则：</b>sollen (计划/预定) + PII (verschoben) + werden = 预定被推迟。Modalverb在第二位，PII+werden在末位。'},
{q:'___ seiner Krankheit nahm er an der Konferenz teil.',o:['Trotz','Wegen','Aufgrund','Infolge'],a:0,f:'<b>Trotz + Genitiv — Konzessivangabe (让步)</b>：尽管生病，他仍参加了会议。<br><br><b>规则：</b>生病→预期不参加→但参加了→反预期→Trotz。❌ Wegen=因为（语义相反）。'},
{q:'Die von der Regierung ___ Maßnahmen zeigen Wirkung.',o:['ergriffenen','ergreifenden','greifenden','gegriffenen'],a:0,f:'<b>PII als Adjektiv: ergreifen → ergriffen</b>：政府采取的那些措施见效了。<br><br><b>规则：</b>ergreifen → PII = <b>ergriffen</b> (强变化: ei→i)。PI ergreifend=正在采取的；PII ergriffen=已被采取的。被动含义→PII。'},
{q:'Es ___ ein großer Fehler ___, ihn zu entlassen.',o:['wäre/gewesen','war/gewesen','ist/sein','würde/sein'],a:0,f:'<b>KII Vergangenheit — irreale Behauptung</b>：解雇他将是一个大错误（假设语气）。<br><br><b>规则：</b>KII Vergangenheit = <b>wäre + PII</b>。Es <b>wäre</b> ein großer Fehler <b>gewesen</b>, ihn zu entlassen. (事实是已解雇了，反事实陈述)。'},
{q:'Der Kunde ___ sich über den Service ___. (beschweren→Perfekt)',o:['hat/beschwert','ist/beschwert','hat/beschweren','wurde/beschwert'],a:0,f:'<b>sich beschweren Perfekt: haben + beschwert</b>：客户投诉了服务。<br><br><b>规则：</b>反身动词用haben作助动词。PII: beschwert (不可分be-，无ge-)。'},
{q:'Man ___ die Tür von außen nicht ___. (öffnen→Passiversatz)',o:['kann/öffnen','lässt/öffnen','hat/geöffnet','ist/zu öffnen'],a:0,f:'<b>Passiversatz: sich lassen + Infinitiv</b>：这门从外面打不开。<br><br><b>规则：</b>Die Tür <b>lässt sich</b> nicht öffnen. = Die Tür kann nicht geöffnet werden. lassen+sich+Inf.=被动替代。'},
{q:'___ die Aufgabe auch schwer ___, wir müssen sie lösen.',o:['Wie/ist','Wenn/ist','Obwohl/ist','So/war'],a:0,f:'<b>Konzessivsatz: wie...auch (无论多么)</b>：无论任务多难，我们必须解决。<br><br><b>规则：</b><b>Wie</b> + Adj. + <b>auch</b> + Subjekt + Verb = 无论多么。Wie schwer die Aufgabe auch <b>ist</b>, wir müssen sie lösen.'},
{q:'Sie ___ uns ___, den Raum zu verlassen. (auffordern→Präteritum)',o:['forderte/auf','aufgeforderte/--','aufforderte/--','forderte/--'],a:0,f:'<b>auffordern: trennbares Verb Präteritum</b>：她要求我们离开房间。<br><br><b>规则：</b>auffordern (可分动词) → Prät.: forderte...<b>auf</b>。Sie <b>forderte</b> uns <b>auf</b>, den Raum zu verlassen.'},
{q:'Das ___ nicht ___. (stimmen → können + Negation)',o:['kann/stimmen','kann/stimmend','darf/stimmen','muss/stimmen'],a:0,f:'<b>können + Negation = 不可能</b>：这不可能是对的。<br><br><b>规则：</b>können + nicht/nicht sein = 不可能。nicht stimmen kann = 不可能对。'},
{q:'Die Kinder ___ im Garten ___ (spielen→Perfekt)',o:['haben/gespielt','sind/gespielt','haben/spielen','wurden/gespielt'],a:0,f:'<b>Perfekt: spielen → haben + gespielt</b>。spielen用haben（不是sein）。spielen不是位移动词。'},
{q:'Ich ___ das schon früher ___ sollen.',o:['hätte/machen','habe/gemacht','würde/machen','hatte/gemacht'],a:0,f:'<b>KII Vergangenheit + Modalverb im Infinitiv</b>：我本应早点做的。<br><br><b>规则：</b>hätte + Infinitiv + sollen = should have done。Ich <b>hätte</b> das schon früher <b>machen</b> sollen.'},
{q:'___ des Unwetters ___ alle Flüge gestrichen.',o:['Wegen/wurden','Trotz/wurden','Aufgrund/waren','Während/sind'],a:0,f:'<b>Wegen + Gen. + Passiv Präteritum</b>：由于暴风雨，所有航班被取消。<br><br><b>规则：</b>Wegen des Unwetters <b>wurden</b> alle Flüge gestrichen. Wegen=原因，wurden gestrichen=被动态过去时。'},
{q:'Der Antrag ___ bis morgen ___ werden.',o:['muss/eingereicht','hat/eingereicht','ist/eingereicht','wird/einreichen'],a:0,f:'<b>Modalverb müssen + Passiv</b>：申请必须明天前被提交。<br><br><b>规则：</b>muss + PII (eingereicht) + werden = 必须被提交。einreichen→PII=eingereicht。'},
{q:'Er tat, ___ nichts ___.',o:['als ob/wäre','als/wäre','dass/ist','ob/sei'],a:0,f:'<b>als ob + KII (irrealer Vergleich)</b>：他装作什么都没发生的样子。<br><br><b>规则：</b>als ob + KII = 仿佛/好像（非现实比较）。sein KII = wäre。'},
{q:'___ die Sonne ___, ___ die Blumen blühen.',o:['Wenn/scheint/dann','Obwohl/scheint/dennoch','Weil/scheint/deshalb','Damit/scheint/so'],a:0,f:'<b>Konditionalsatz: Wenn..., dann...</b>：如果阳光照耀，那么花就会开放。<br><br><b>规则：</b>Wenn + Nebensatz (动词末位), dann + Hauptsatz (动词第二)。'},
{q:'Das Buch ist ___. (lesen→-bar)',o:['lesbar','leslich','gelesen','lesend'],a:0,f:'<b>-bar Passiversatz: lesbar</b>：这本书是可读的。<br><br><b>规则：</b>lesen + -bar = <b>lesbar</b> = kann gelesen werden。❌ leslich=易读的(字体清晰)，不是可读的。'},
{q:'Die Polizei ___ den Täter ___ (festnehmen→Perfekt)',o:['hat/festgenommen','ist/festgenommen','hat/festgenahmt','wurde/festgenommen'],a:0,f:'<b>festnehmen Perfekt: haben + festgenommen</b>。nehmen→genommen (强变化)，可分前缀fest-。'},
{q:'___ größer die Wohnung, ___ teurer die Miete.',o:['Je/desto','Je/je','Wenn/dann','Ob/desto'],a:0,f:'<b>je...desto (越...越)</b>：公寓越大，租金越贵。<br><br><b>规则：</b>Je + Komparativ + ..., desto + Komparativ + ...。❌ Je/je是错误的。'},
{q:'Die Rechnung ___ innerhalb von 30 Tagen ___ werden.',o:['muss/beglichen','hat/beglichen','ist/beglichen','wird/begleichen'],a:0,f:'<b>müssen + Passiv: begleichen (清偿)</b>：账单须在30天内被结清。<br><br><b>规则：</b>muss + PII (beglichen) + werden。begleichen→PII=beglichen (强变化: ei→i)。'},
{q:'Er ___ den Unfall ___. (verursachen→Perfekt)',o:['hat/verursacht','ist/verursacht','hat/geursacht','ist/geursacht'],a:0,f:'<b>verursachen Perfekt: haben + verursacht</b>。不可分前缀ver-→PII无ge-。'},
{q:'Das Produkt ist nicht mehr ___. (liefern→-bar)',o:['lieferbar','lieferlich','geliefert','liefernd'],a:0,f:'<b>-bar = kann + PII + werden</b>：该产品不再可供货。<br><br><b>规则：</b>liefer- + -bar = <b>lieferbar</b> = kann geliefert werden。nicht lieferbar = 不可供货。'},
{q:'die zu ___ (erledigen) Arbeit',o:['erledigende','erledigte','erledigen','zu erledigt'],a:0,f:'<b>zu + Partizip I (Gerundiv): 要完成的工作</b>：待处理的工作。<br><br><b>规则：</b>zu + Infinitiv + -d + 词尾 = die zu <b>erledigende</b> Arbeit = die Arbeit, die erledigt werden muss. zu+PI = 被动必要性(必须被...的)。'},
{q:'Ich ___ zu Hause ___. (bleiben→Perfekt)',o:['bin/geblieben','habe/geblieben','bin/bleiben','habe/gebleibt'],a:0,f:'<b>bleiben Perfekt: sein + geblieben</b>。bleiben用sein (状态动词)。'},
{q:'Die Regierung ___ das Gesetz ___ (verabschieden→Perfekt)',o:['hat/verabschiedet','ist/verabschiedet','wurde/verabschiedet','hat/verabschieden'],a:0,f:'<b>verabschieden Perfekt: haben + verabschiedet</b>。及物动词→用haben。不可分ver-→PII无ge-。'},
{q:'___ des Protests blieb die Straße gesperrt.',o:['Wegen','Trotz','Aufgrund','Während'],a:2,f:'<b>Aufgrund + Genitiv — formelle Kausalangabe</b>：由于抗议活动，街道保持封锁。Wegen和Aufgrund都行，但正式书面语用Aufgrund。'},
{q:'Es ___ noch viel zu ___.',o:['gibt/tun','ist/tun','hat/getan','wird/tun'],a:0,f:'<b>Es gibt + zu + Infinitiv</b>：还有很多事要做。<br><br><b>规则：</b>Es <b>gibt</b> viel zu <b>tun</b>. = Es gibt viel, was getan werden muss. geben+zu+Inf.=有...需要被做。'},
{q:'Das Gerät ___ einfach zu ___. (bedienen→sein+zu)',o:['ist/bedienen','hat/bedient','wird/bedienen','ist/bedient'],a:0,f:'<b>sein + zu + Infinitiv: 可被操作</b>：这设备很容易操作。<br><br><b>规则：</b>Das Gerät <b>ist</b> einfach zu <b>bedienen</b>. = kann einfach bedient werden。'},
{q:'___ er rechtzeitig ___, ___ er den Zug nicht verpasst.',o:['Wäre/gekommen/hätte','Hätte/gekommen/wäre','Ist/gekommen/hat','War/gekommen/hat'],a:0,f:'<b>Irrealer Konditionalsatz KII Vergangenheit (省wenn)</b>：如果他及时到了，就不会错过火车。<br><br><b>规则：</b>Wäre er rechtzeitig <b>gekommen</b>, <b>hätte</b> er den Zug nicht verpasst. kommen用sein→KII=wäre。'},
{q:'Das Experiment ___ fehlgeschlagen ___. (sein→Vermutung dürfte)',o:['dürfte/sein','darf/sein','kann/gewesen','muss/worden'],a:0,f:'<b>dürfte + Infinitiv Perfekt: 很可能已失败</b>：实验很可能失败了。<br><br><b>规则：</b>dürfte + PII + sein = 对过去谨慎推测。fehlschlagen PII=fehlgeschlagen，用sein。'},
{q:'die noch nicht ___ (bearbeiten) Anträge',o:['bearbeiteten','bearbeitenden','zu bearbeiten','bearbeitet'],a:0,f:'<b>PII als Adjektiv (noch nicht + PII)</b>：尚未处理的那些申请。<br><br><b>规则：</b>bearbeiten→PII=<b>bearbeitet</b> (不可分，无ge-)。noch nicht bearbeiteten Anträge = Anträge, die noch nicht bearbeitet wurden。'},
{q:'Er ___ die Prüfung beim ersten Mal ___. (bestehen→Perfekt)',o:['hat/bestanden','ist/bestanden','hat/besteht','wurde/bestanden'],a:0,f:'<b>bestehen Perfekt: haben + bestanden</b>。bestehen (及物: 通过考试) 用haben。'},
{q:'___ Kritik ___ er mit Verständnis.',o:['Auf/reagierte','Über/reagierte','An/reagierte','Zu/reagierte'],a:0,f:'<b>reagieren auf + Akkusativ (对...做出反应)</b>：他对批评做出了理解的反应。<br><br><b>规则：</b>reagieren + <b>auf</b> + Akk.。❌ über/an/zu都不正确。'},
{q:'Das Gesetz tritt ___ 1. Januar ___ Kraft.',o:['am/in','im/in','am/zu','zum/in'],a:0,f:'<b>in Kraft treten + am + Datum (生效)</b>：法律于1月1日生效。<br><br><b>规则：</b>in Kraft treten = 生效。am 1. Januar = 在1月1日。日期用am。'},
{q:'Die ___ (wachsen) Wirtschaft sorgt für Optimismus.',o:['wachsende','gewachsene','wachsene','wachsendene'],a:0,f:'<b>Partizip I: wachsen → wachsend (正在进行)</b>：正在增长的经济带来乐观情绪。<br><br><b>规则：</b>PI = wachsend (主动/进行)。PII = gewachsen (已增长完)。这里强调"正在进行"→PI。'},
{q:'Die Verluste ___ im Vorjahr ___. (entstehen→Perfekt)',o:['sind/entstanden','haben/entstanden','wurden/entstanden','sind/entstehet'],a:0,f:'<b>entstehen Perfekt: sein + entstanden</b>。entstehen (产生/出现) = 状态变化→用sein。不可分ent-→PII无ge-。'},
{q:'___ guter Vorbereitung ___ er die Präsentation.',o:['Trotz/versemmelte','Wegen/versemmelte','Dank/gelang','Trotz/gelang'],a:0,f:'<b>Trotz + Genitiv — Konzessivangabe</b>：尽管准备充分，他还是搞砸了演示。<br><br><b>规则：</b>充分准备→预期成功→但失败了→反预期→Trotz。'},
{q:'Der Täter soll das Geld ___ (stehlen→subjektives Modalverb Perfekt)',o:['gestohlen haben','stehlen','gestohlen worden','gestohlen sein'],a:0,f:'<b>sollen + PII + haben = 据称已偷</b>：据说犯人偷了钱。<br><br><b>规则：</b>sollen + PII + haben/sein = 据传已做某事。stehlen PII=gestohlen, 用haben。'},
{q:'Sie ___ sich an das kalte Klima ___ (gewöhnen→Perfekt)',o:['hat/gewöhnt','ist/gewöhnt','hat/gewöhnen','ist/gewöhnen'],a:0,f:'<b>sich gewöhnen Perfekt: haben + gewöhnt</b>。反身动词用haben。sich gewöhnen an + Akk. = 习惯于。'},
{q:'___ der Sitzung ___ keine Entscheidung getroffen.',o:['Während/wurde','Trotz/wurde','Wegen/wurde','Aufgrund/wurde'],a:0,f:'<b>Während + Gen. + Passiv Präteritum</b>：会议期间未做出任何决定。<br><br><b>规则：</b>Während + Gen. = 在...期间。wurde getroffen = 被做出(被动)。'},
{q:'Die Datei ist leider nicht ___. (öffnen→-bar)',o:['zu öffnen','öffbar','geöffnet','öffenbar'],a:1,f:'<b>-bar = kann geöffnet werden</b>：文件可惜打不开。<br><br><b>规则：</b>öffnen → öffen- + -bar = <b>öffbar</b>。但此词不常用，更常用的是"nicht zu öffnen"或"lässt sich nicht öffnen"。実際上öffbar是存在的专业词汇。'},
{q:'Sie ___ einen Brief an die Behörde ___ (verfassen→Perfekt)',o:['hat/verfasst','ist/verfasst','hat/verfassen','wurde/verfasst'],a:0,f:'<b>verfassen Perfekt: haben + verfasst</b>。不可分ver-→PII无ge-。'},
{q:'Ich ___ dir ___. (helfen→Präteritum)',o:['half/--','hilfte/--','half/geholfen','helfte/--'],a:0,f:'<b>helfen Präteritum: half (强变化!)</b>：我帮了你。<br><br><b>规则：</b>helfen → half → hat geholfen (e→a→o)。❌ hilfte不存在！'},
{q:'Der Erfolg ist ___ gute Teamarbeit ___. (zurückführen auf→Passiversatz)',o:['auf/zurückzuführen','auf/zurückgeführt','durch/zurückgeführt','mit/zurückzuführen'],a:0,f:'<b>zurückzuführen sein auf + Akk. (可归因于)</b>：成功可归因于好的团队合作。<br><br><b>规则：</b>ist <b>auf</b>... <b>zurückzuführen</b> = kann auf...zurückgeführt werden。auf是固定介词。'},
{q:'Es ___ einen Systemfehler ___ haben. (können→Vermutung Perfekt)',o:['könnte/gegeben','kann/geben','konnte/gegeben','könnte/geben'],a:0,f:'<b>könnte + PII + haben = 可能已发生</b>：可能是系统故障。<br><br><b>规则：</b>könnte + PII + haben = 对过去的推测。Es <b>könnte</b> einen Systemfehler <b>gegeben</b> haben.'},
{q:'Sie ___ einen bedeutenden Beitrag zur Forschung ___ (leisten→Perfekt)',o:['hat/geleistet','ist/geleistet','hat/leisten','wurde/geleistet'],a:0,f:'<b>einen Beitrag leisten: Perfekt mit haben</b>：她为研究做出了重要贡献。leisten→PII=geleistet。'},
{q:'___ der Insolvenz ___ alle Mitarbeiter entlassen.',o:['Infolge/wurden','Trotz/wurden','Während/wurden','Dank/wurden'],a:0,f:'<b>infolge + Gen. — Konsekutiv (结果/因此)</b>：由于破产，所有员工被解雇。<br><br><b>规则：</b>infolge = 因...的结果（强调因果链）。wurden entlassen = 被解雇(被动)。'},
{q:'Das Risiko ist nicht zu ___ (unterschätzen→Gerundiv)',o:['unterschätzen','unterschätzt','unterschätzend','unterschätzbar'],a:2,f:'<b>nicht zu + Partizip I (Gerundiv): 不可低估的风险</b>。<br><br><b>规则：</b>nicht zu <b>unterschätzendes</b> Risiko = Risiko, das nicht unterschätzt werden darf. zu+PI = 被动必要性。'},
{q:'___ sie die Wahrheit ___, ___ sie es uns sagen.',o:['Hätte/gewusst/hätte','Habe/gewusst/habe','Hat/gewusst/hat','Würde/wissen/würde'],a:0,f:'<b>Irrealer Konditionalsatz KII Vergangenheit</b>：如果她知道真相，她早就告诉我们了。<br><br><b>规则：</b>Hätte sie die Wahrheit gewusst, hätte sie es uns gesagt. 省wenn→动词第一位，对过去的非现实用KII+hätte/wäre+PII。'},
{q:'Ich ___ den Vertrag ___ (unterschreiben→Perfekt)',o:['habe/unterschrieben','bin/unterschrieben','habe/untergeschrieben','habe/unterschreiben'],a:2,f:'<b>unterschreiben Perfekt: haben + untergeschrieben</b>。unterschreiben(不可分动词)→PII=unter<b>ge</b>schrieben，不是*unterschrieben！'},
{q:'Diese Idee ___ in der Theorie gut, aber in der Praxis nicht ___. (funktionieren→KII)',o:['würde/funktionieren','funktioniert/funktioniert','hat/funktioniert','wird/funktionieren'],a:0,f:'<b>würde + Infinitiv = KII (假设/可能性)</b>：这个想法在理论上可行，但实践中不行。<br><br><b>规则：</b>würde funktionieren = 会运行(KII假设)。表达纯理论上的可能性，不含事实陈述。'},
{q:'Er ___ das Geld ___ (zurückzahlen → wollen subjektiv)',o:['will/zurückgezahlt haben','will/zurückzahlen','möchte/zurückzahlen','will/gezahlt zurück'],a:0,f:'<b>wollen + PII + haben = 自称已做</b>：他自称已还了钱(但我存疑)。<br><br><b>规则：</b>wollen + PII + haben = 主语自称做了某事，说话人存疑。⚠️ 区分：sollen + PII + haben = 别人说他做了。'},
{q:'___ lange die Diskussion auch ___, wir müssen zu einer Einigung kommen.',o:['Wie/dauert','Wenn/dauert','Obwohl/dauert','So/dauert'],a:0,f:'<b>Konzessivsatz: wie lange...auch (无论多久)</b>。<br><br><b>规则：</b>Wie + Adj. + auch + Subjekt + Verb = 无论多么/多久。'},
{q:'Die Flüge ___ wegen des ___ gestrichen. (Nebel→Passiv Perfekt)',o:['sind/worden','wurden/worden','haben/werden','sind/geworden'],a:0,f:'<b>Passiv Perfekt: sind + PII + worden</b>。Die Flüge <b>sind</b> gestrichen <b>worden</b>。被动完成时用worden不用geworden！'},
{q:'die sich ständig ___ (verändern) Welt',o:['verändernde','veränderte','veränderliche','verändert'],a:0,f:'<b>Partizip I mit Reflexiv: sich verändernd</b>：不断在变化的世界。<br><br><b>规则：</b>sich verändern → PI = <b>sich verändernd</b>。反身PI必须保留sich！'},
{q:'Dieser Fehler ___ leicht zu ___ (vermeiden).',o:['ist/vermeiden','hat/vermeidet','wird/vermeiden','ist/vermeidet'],a:0,f:'<b>sein + zu + Infinitiv (Passiversatz)</b>：这个错误很容易避免。<br><br><b>规则：</b>ist + zu + <b>Infinitiv</b>，不是PII不是-bar。'},
{q:'Er ___ aus dem Unternehmen ___ (ausscheiden→Perfekt)',o:['ist/ausgeschieden','hat/ausgeschieden','ist/ausscheiden','hat/ausgeschieden'],a:0,f:'<b>ausscheiden Perfekt: sein + ausgeschieden</b>。scheiden→geschieden (强变化)。位移动词隐喻→用sein。'},
{q:'Das Konzept ___ weiterentwickelt ___. (werden→Passiv Perfekt)',o:['ist/worden','wurde/--','hat/worden','ist/geworden'],a:0,f:'<b>Passiv Perfekt: ist...worden</b>。概念已被进一步发展。<br><br><b>规则：</b>ist + weiterentwickelt + <b>worden</b>。worden ≠ geworden！'},
{q:'Die Solaranlage ___ umweltfreundliche Energie.',o:['liefert','liefert über','liefert von','liefert an'],a:0,f:'<b>liefern + Akk. (供应/提供)</b>：太阳能设备供应环保能源。<br><br><b>规则：</b>liefern是及物动词，直接加Akk.宾语，不需要介词。'},
{q:'___ die Inflation weiter ___, ___ viele ihre Ersparnisse.',o:['Sollte/steigen/verlören','Sollte/steigt/verlieren','Wenn/steigt/verlieren','Sollte/steigen/verlieren'],a:0,f:'<b>sollte + Infinitiv (省wenn条件句) + KII</b>：万一通胀继续上升，很多人会失去储蓄。<br><br><b>规则：</b>Sollte...steigen (省wenn), würden...verlieren 或 verlören (KII)。sollte在第一位表"万一"。'},
{q:'___ mir das früher ___!',o:['Hätte/gesagt','Habe/gesagt','Hat/gesagt','Würde/sagen'],a:0,f:'<b>Irrealer Wunschsatz: Hätte + PII!</b>：要是早点告诉我多好！<br><br><b>规则：</b>Hätte + mir + PII + ...! = 非现实愿望。Hätte是KII形式(KII = irreales Wünschen)。'},
{q:'Die ___ (beschreiben) Methode ist nicht mehr aktuell.',o:['beschriebene','beschreibende','beschriebte','beschriebende'],a:0,f:'<b>PII als Adjektiv: beschreiben → beschrieben</b>：所描述的方法已过时。<br><br><b>规则：</b>beschreiben → PII = <b>beschrieben</b> (强变化: ei→ie)。PI beschreibend=正在描述的；PII beschrieben=已被描述的。被动含义→PII。'},
{q:'Ich freue ___ das Wiedersehen.',o:['mich über','mir über','mich auf','mir auf'],a:2,f:'<b>sich freuen auf + Akk. = 期待(未来的)</b>：我期待重逢。<br><br><b>规则：</b>sich freuen auf (未来) vs über (现在/过去)。反身代词用Akk.(mich)不是Dat.(mir)。'},
{q:'Er ___ mit den Ergebnissen ___ (zufrieden sein→Präteritum)',o:['war/zufrieden','hat/zufrieden','wurde/zufrieden','ist/zufrieden'],a:0,f:'<b>zufrieden sein Präteritum: war zufrieden</b>：他对结果满意。sein+Adjektiv的状态结构，过去时用war。'},
{q:'___ der Rettungskräfte ___ viele Menschen gerettet.',o:['Dank/konnten','Trotz/konnten','Wegen/konnten','Aufgrund/konnten'],a:0,f:'<b>Dank + Gen./Dat. = 多亏/幸亏 (积极原因)</b>：多亏救援队，很多人获救。<br><br><b>规则：</b>Dank+Gen./Dat. 表示积极的、感谢的原因。Trotz=让步(不合)，Wegen=中性/消极原因(不合)。'},
{q:'Die Produktion ___ ins Ausland ___ (verlagern→Passiv Perfekt)',o:['ist/verlagert worden','wurde/verlagert','hat/verlagert','ist/verlagert'],a:0,f:'<b>Passiv Perfekt: ist + verlagert + worden</b>：生产已转移到国外。<br><br><b>规则：</b>Vorgangspassiv Perfekt = ist + PII + <b>worden</b>。三词结构不可或缺。'},
{q:'Eine ___ treffen (wählen)',o:['Wahl','Wähle','Wahlung','Gewählt'],a:0,f:'<b>FVG: eine Wahl treffen = wählen</b>：做出选择。<br><br><b>规则：</b>wählen → eine <b>Wahl</b> treffen。treffen + 名词 = 做出(选择/决定)。'},
{q:'Der Kandidat ___ vor, das Programm zu ___. (haben→vorhaben→trennbar)',o:['hat/ändern','hatte/ändern','hat/geändert','habe/ändern'],a:0,f:'<b>vorhaben: hat vor, zu + Infinitiv (计划/打算)</b>：候选人打算改变计划。<br><br><b>规则：</b>vorhaben→hat vor + zu不定式。hat vor, zu ändern。'},
{q:'Die Folgen sind kaum ___. (absehen→-bar)',o:['absehbar','absehlich','abgesehen','absehend'],a:0,f:'<b>-bar: absehbar = 可预见的</b>：后果几乎不可预见。<br><br><b>规则：</b>absehen → abseh- + -bar = <b>absehbar</b> = kann abgesehen werden。kaum absehbar = 几乎不可预见。'},
{q:'Das Werk ___ im 19. Jahrhundert ___ (errichten→Passiv Prät.)',o:['wurde/errichtet','war/errichtet','hat/errichtet','ist/errichtet worden'],a:0,f:'<b>Vorgangspassiv Präteritum: wurde + PII</b>：该建筑于19世纪建成。<br><br><b>规则：</b>wurde + <b>errichtet</b> (不可分，PII无ge-)。im 19. Jahrhundert = 在19世纪。'},
{q:'Sie ___ einen Antrag auf Förderung ___ (stellen→Perfekt)',o:['hat/gestellt','ist/gestellt','hat/stellen','wurde/gestellt'],a:0,f:'<b>einen Antrag stellen: Perfekt mit haben</b>：她提出了一个资助申请。<br><br><b>规则：</b>Antrag stellen (FVG: 提出申请)。stellen→PII=gestellt。'},
{q:'Der Plan ___ von allen ___ (akzeptieren→Passiv Prät.)',o:['wurde/akzeptiert','war/akzeptiert','hat/akzeptiert','ist/akzeptiert worden'],a:0,f:'<b>Vorgangspassiv Prät.: wurde + akzeptiert</b>：该计划被所有人接受了。<br><br><b>规则：</b>akzeptieren → PII = akzeptiert (规则变化，无ge-因为ieren)。wurde akzeptiert。'},
{q:'Sie ___ wohl recht ___. (haben→Vermutung)',o:['dürfte/haben','darf/haben','dürfte/gehabt','kann/sein'],a:0,f:'<b>dürfte + Infinitiv = 很可能</b>：她很可能说得对。<br><br><b>规则：</b>dürfte (KII) + recht haben = 很可能对。dürfte表谨慎推测(~80%把握)。'},
{q:'Der See ___ im Winter ___ (zufrieren→Perfekt)',o:['ist/zugefroren','hat/zugefroren','ist/zufrieren','hat/zufroren'],a:0,f:'<b>zufrieren Perfekt: sein + zugefroren</b>。frieren→gefroren (强变化)。状态变化→用sein。可分前缀zu-→ge-在中间。'},
{q:'___ wir mehr Zeit ___, ___ wir das Projekt besser machen.',o:['Hätten/hätten','Haben/werden','Hätten/würden','Haben/hätten'],a:0,f:'<b>Irrealer Konditionalsatz KII (省wenn)</b>：如果我们有更多时间，我们会把项目做得更好。<br><br><b>规则：</b>Hätten wir mehr Zeit, könnten/würden wir... 或 Hätten..., hätten...。hätten = haben KII。'},
{q:'Der Beschluss ___ einstimmig ___ (fassen→Passiv Perfekt)',o:['ist/gefasst worden','wurde/gefasst','hat/gefasst','ist/gefasst'],a:0,f:'<b>Passiv Perfekt: ist + PII + worden</b>：决议已被一致通过。<br><br><b>规则：</b>fassen→PII=gefasst。Passiv Perfekt = ist gefasst <b>worden</b>。'},
{q:'Man ___ die Regeln ___. (beachten→haben+zu)',o:['hat/zu beachten','hat/beachtet','ist/zu beachten','wird/beachten'],a:0,f:'<b>haben + zu + Infinitiv = müssen (必须)</b>：人们必须遵守规则。<br><br><b>规则：</b>Man <b>hat</b> die Regeln <b>zu beachten</b>. = Man muss die Regeln beachten. haben+zu+Inf. = 必要性/义务。'},
{q:'___ des Regens schien die Sonne.',o:['Trotz','Wegen','Aufgrund','Infolge'],a:0,f:'<b>Trotz + Genitiv — 让步 (反预期)</b>：尽管下雨，太阳还是照耀着。<br><br><b>规则：</b>下雨→预期没阳光→但有阳光→反预期→Trotz。'},
{q:'Ich ___ ihm zum Geburtstag ___ (gratulieren→Perfekt)',o:['habe/gratuliert','bin/gratuliert','habe/gratulieren','habe/gegratuliert'],a:0,f:'<b>gratulieren Perfekt: haben + gratuliert</b>。ieren结尾→PII无ge-。jdm. gratulieren (Dat.!) = 祝贺某人。'},
{q:'Das Auto ___ sich gut ___. (fahren→lassen→Passiversatz)',o:['lässt/fahren','hat/gefahren','wird/fahren','ist/gefahren'],a:0,f:'<b>sich lassen + Infinitiv: 开起来很好</b>：这车好开。<br><br><b>规则：</b>Das Auto <b>lässt sich</b> gut <b>fahren</b>. = Das Auto kann gut gefahren werden.'},
{q:'Sie ___ gestern ___ nach Hause ___ (gehen→müssen→Perfekt)',o:['hat/gehen/müssen','ist/gehen/müssen','hat/gehen/gemusst','ist/gegangen/gemusst'],a:0,f:'<b>Modalverb + Infinitiv Perfekt: hat + Infinitiv + müssen</b>：她昨天必须回家。<br><br><b>规则：</b>Modalverb完成时=haben+双Infinitiv (gehen müssen)。她回家→gehen用sein，但Modalverb完成时用haben。'},
{q:'Gesundheit geht ___ Reichtum.',o:['vor','über','nach','für'],a:0,f:'<b>gehen vor + Dativ (优先于)</b>：健康优先于财富。<br><br><b>规则：</b>vor/(nach)gehen = 优先于/在...之前。Gesundheit geht <b>vor</b> Reichtum.'},
{q:'Das Gebäude ___ um 1900 ___ (erbauen→Passiv Prät.)',o:['wurde/erbaut','war/erbaut','hat/erbaut','ist/erbaut worden'],a:0,f:'<b>Vorgangspassiv Prät.: wurde + erbaut</b>：该建筑建于1900年左右。<br><br><b>规则：</b>erbauen→PII=erbaut (不可分er-，无ge-)。wurde erbaut = 被建造。'},
{q:'Er ___ ein neues Verfahren ___ (entwickeln→Perfekt)',o:['hat/entwickelt','ist/entwickelt','hat/entwickeln','wurde/entwickelt'],a:0,f:'<b>entwickeln Perfekt: haben + entwickelt</b>。不可分ent-→PII无ge-。及物动词→用haben。'},
{q:'Die Waren ___ pünktlich ___ (liefern→Passiv Prät.)',o:['wurden/geliefert','waren/geliefert','haben/geliefert','sind/geliefert worden'],a:0,f:'<b>Vorgangspassiv Prät.: wurden + geliefert</b>：货物被准时送达。<br><br><b>规则：</b>liefern→PII=geliefert。wurden geliefert = 被送达(过程被动过去时)。'},
{q:'Ich ___ ihn ___ (kommen→sehen→Perfekt)',o:['habe/kommen sehen','bin/kommen gesehen','habe/gesehen kommen','bin/sehen gekommen'],a:0,f:'<b>sehen + Infinitiv Perfekt: Doppelinfinitiv</b>：我看见他来了。<br><br><b>规则：</b>Ich <b>habe</b> ihn <b>kommen sehen</b>. sehen+Infinitiv的完成时用双Infinitiv (类似Modalverb)。'},
{q:'Der Verdacht ___ sich ___ (bestätigen→Perfekt)',o:['hat/bestätigt','ist/bestätigt','hat/bestätigen','wurde/bestätigt'],a:0,f:'<b>sich bestätigen Perfekt: haben + bestätigt</b>：怀疑被证实了。<br><br><b>规则：</b>反身动词用haben。bestätigen→PII=bestätigt(不可分be-，无ge-)。'},
{q:'Das Denkmal ___ an die Opfer ___. (erinnern→sollen)',o:['soll/erinnern','hat/erinnert','ist/erinnern','wird/erinnern'],a:0,f:'<b>sollen + Infinitiv (应该/旨在)</b>：这座纪念碑旨在纪念受害者。<br><br><b>规则：</b>sollen表目的/功能 = 旨在/应当。soll erinnern = 应该(用来)纪念。'},
{q:'Die Lösung ___ in der Einfachheit.',o:['liegt','steht','sitzt','geht'],a:0,f:'<b>liegen in + Dativ (在于)</b>：解决方案就在于简单。<br><br><b>规则：</b>etw. <b>liegt in</b> + Dat. = 在于。固定搭配。❌ steht/sitzt/geht in 不存在。'},
{q:'Die Teilnehmer ___ um 9 Uhr ___ (eintreffen→Perfekt)',o:['sind/eingetroffen','haben/eingetroffen','sind/eintreffen','haben/eingetrifft'],a:0,f:'<b>eintreffen Perfekt: sein + eingetroffen</b>。treffen→getroffen (强变化)。位移动词隐喻→用sein。'},
{q:'___ es auch ___, wir geben nicht auf.',o:['Was/komme','Wenn/kommt','Ob/kommt','Dass/kommt'],a:0,f:'<b>Konzessivsatz: Was auch immer (无论什么)</b>：无论发生什么，我们都不放弃。<br><br><b>规则：</b>Was (auch) immer + Konjunktiv I/II 或直陈式。Was es auch sei / Was auch kommt / Was auch immer passiert。'},
{q:'die ___ (bestehen) Probleme',o:['bestehenden','bestandenen','bestehenen','bestanden'],a:0,f:'<b>Partizip I: bestehen → bestehend (现存的)</b>：现存的那些问题。<br><br><b>规则：</b>bestehen (存在) → PI = <b>bestehend</b> = 存在的/现存的。die bestehenden Probleme = 现存的问题。'},
{q:'Das Thema ___ heute diskutiert ___. (werden→Passiv Perfekt)',o:['ist/worden','wurde/--','hat/worden','ist/geworden'],a:0,f:'<b>Passiv Perfekt: ist + diskutiert + worden</b>。今天该话题已被讨论过。<br><br><b>规则：</b>ist...diskutiert <b>worden</b>。⚠️ worden不是geworden！'},
{q:'der ___ (beweisen) Sachverhalt',o:['bewiesene','beweisende','bewiesende','bewiesene'],a:0,f:'<b>PII als Adjektiv: beweisen → bewiesen</b>：已被证明的事实。<br><br><b>规则：</b>beweisen→PII=<b>bewiesen</b> (强变化: ei→ie)。被动/完成→PII。PI beweisend=正在证明的(主动)。'}
];

    text: "Die Arbeitswelt befindet sich in einem fundamentalen Umbruch. Ausgelöst durch die Corona-Pandemie, aber beschleunigt durch technologische Entwicklungen, hat sich das Konzept der Arbeit in nur wenigen Jahren radikal verändert.\n\nHomeoffice ist in vielen Branchen vom Notfallmodus zum festen Bestandteil der Arbeitskultur geworden. Laut einer Studie des Deutschen Instituts für Wirtschaftsforschung arbeiten inzwischen 42 Prozent der Beschäftigten zumindest teilweise von zu Hause aus. Die Vorteile liegen auf der Hand: Wegfall von Pendelzeiten, bessere Vereinbarkeit von Familie und Beruf sowie höhere Produktivität bei konzentrierter Einzelarbeit. Allerdings zeigen neuere Untersuchungen auch die Schattenseiten: Die Grenzen zwischen Arbeit und Privatleben verschwimmen zunehmend, und viele Beschäftigte klagen über das Gefühl ständiger Erreichbarkeit.\n\nParallel dazu wird die Vier-Tage-Woche bei vollem Lohnausgleich in immer mehr Unternehmen getestet. Erste Ergebnisse aus Pilotprojekten in Großbritannien und Island sind vielversprechend: Die Produktivität sank nicht, während die Zufriedenheit der Beschäftigten deutlich stieg. In Deutschland stehen Gewerkschaften dieser Entwicklung positiv gegenüber, während Arbeitgeberverbände vor Wettbewerbsnachteilen warnen.\n\nDie Automatisierung durch Künstliche Intelligenz wirft grundlegende Fragen auf. Anders als frühere technologische Revolutionen betrifft sie nicht nur einfache Tätigkeiten, sondern zunehmend auch wissensbasierte Berufe. Experten gehen davon aus, dass nicht ganze Berufe verschwinden, sondern sich die Tätigkeitsprofile innerhalb der Berufe verschieben werden. Lebenslanges Lernen und die Bereitschaft zur beruflichen Neuorientierung werden zu Schlüsselkompetenzen der Zukunft.",

      { q: "Was zeigen Pilotprojekte zur Vier-Tage-Woche?", a: [{text:"Produktivität sank, Zufriedenheit stieg"},{text:"Produktivität blieb gleich, Zufriedenheit stieg",correct:true},{text:"Beides sank"},{text:"Produktivität stieg, Kosten sanken"}], fb: "<b>Detailfrage:</b> Produktivität sank nicht (= blieb gleich), Zufriedenheit stieg deutlich.<br><br><b>📖 Strategie:</b> Doppelte Verneinung (sank nicht) in positive Form umformulieren." },

            } else {
              if (opts[ans.userIdx]) opts[ans.userIdx].classList.add('wrong');
              if (opts[state.questions[ri].a]) opts[state.questions[ri].a].classList.add('correct');
              if (fbEl) { fbEl.innerHTML = '❌ Richtig: <strong>'+state.questions[ri].o[state.questions[ri].a]+'</strong> — '+state.questions[ri].f; fbEl.style.display = 'block'; }
              for (var ok = 0; ok < opts.length; ok++) opts[ok].style.pointerEvents = 'none';
            }
          }
          var scEl = document.getElementById(rprefix+'-score');
          if (scEl) scEl.textContent = window.testScores[rprefix] || 0;
        }, 80);
      } catch(e) {}
    } else {
      window.testState[rprefix] = {questions: rqs, answers: new Array(rqs.length).fill(null), testType: 'Leseverstehen', readingId: pid, readingTitle: r.title, readingFb: r.fb||''};
      window.testScores[rprefix] = 0;
    }
  }
  else if (pid === 'grammar_konjunktiv1') { c.innerHTML = grammarKonjunktiv1(); }
  else if (pid === 'grammar_konjunktiv2') { c.innerHTML = grammarKonjunktiv2(); }
  else if (pid === 'grammar_passiv') { c.innerHTML = grammarPassiv(); }
  else if (pid === 'grammar_nominal') { c.innerHTML = grammarNominal(); }
  else if (pid === 'grammar_partikeln') { c.innerHTML = grammarPartikeln(); }
  else if (pid === 'grammar_partizip') { c.innerHTML = grammarPartizip(); }
  else if (pid === 'grammar_fvg') { c.innerHTML = grammarFVG(); }
  else if (pid === 'grammar_quiz') { c.innerHTML = grammarQuiz(); }
  else if (pid === 'error_review') { c.innerHTML = errorReviewPage(); }
  else if (pid === 'srs_review') { c.innerHTML = srsReviewPage(); }
  else { c.innerHTML = '<p>Inhalt wird geladen...</p>'; }

  setTimeout(() => {
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.onclick = function() {
        let pre = this.parentElement.querySelector('pre');
        if (pre) { navigator.clipboard.writeText(pre.textContent).then(() => {this.textContent='Kopiert!';setTimeout(()=>this.textContent='Kopieren',1500)}); }
      };
    });
    if (pid === 'test_b2') renderTest('test_b2', b2TestQs, 'b2t', 'B2');
    if (pid === 'test_c1') renderTest('test_c1', c1TestQs, 'c1t', 'C1');
    if (pid === 'grammar_quiz') renderGrammarQuiz();
    if (pid === 'error_review') renderErrorReviewQuiz();
    if (pid === 'srs_review') renderSRSReviewQuiz();
    if (pid === 'daily_reading') { try { renderDailyReading(); } catch(e) { var elR = document.getElementById('daily-reading-container'); if (elR) elR.innerHTML = '<div class="warn">Fehler: ' + e.message + '</div>'; } }
    if (pid === 'daily_test') {
      try { renderDailyTest(); } catch(e) {
        var el = document.getElementById('daily-test-container');
        if (el) el.innerHTML = '<div class="warn"><strong>⚠️ 测试加载失败：</strong>' + e.message + '</div>';
      }
    }
  }, 50);
  updateCountdowns();
  updateProgress();
}

function checkWriting() {
  var ta = document.getElementById('writing-textarea');
  if (!ta) return;
  var wc = ta.value.split(/\s+/).filter(function(x){return x.length>0;}).length;
  document.getElementById('word-count').textContent = wc;
  if (wc === 0) { alert('Bitte schreiben Sie zuerst einen Text.'); return; }
  alert('Wörter: ' + wc + '\n\nSelbstcheck:\n- Betreffzeile vorhanden?\n- Anrede + Gruß korrekt?\n- Alle Aufgabenpunkte abgedeckt?\n- Konjunktiv II verwendet?\n- Keine Umgangssprache?\n- Text nochmal durchgelesen?');
}

// ===== Data Sync: Export/Import for cross-device sync =====
window.exportAllData = function() {
  var data = {};
  for (var i = 0; i < localStorage.length; i++) {
    var key = localStorage.key(i);
    if (key && key.startsWith('de-')) data[key] = localStorage.getItem(key);
  }
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'deutsch-trainer-backup-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  alert('✅ Daten exportiert! Auf anderem Gerät mit "Import" wiederherstellen.');
};
window.importAllData = function() {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        var count = 0;
        for (var key in data) {
          if (key.startsWith('de-')) { localStorage.setItem(key, data[key]); count++; }
        }
        alert('✅ ' + count + ' Datensätze importiert! Seite wird neu geladen.');
        location.reload();
      } catch(ex) { alert('❌ Fehler beim Import: ' + ex.message); }
    };
    reader.readAsText(file);
  };
  input.click();
};

function init() { loadProgress(); renderNav(); renderContent(); }
init();
