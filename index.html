function renderSRSReviewQuiz() {
  var due = getDueItems();
  if (due.length === 0) return;
  var count = Math.min(10, due.length);
  var shuffled = due.sort(function(){ return Math.random() - 0.5; }).slice(0, count);

  var questions = [];
  var itemIds = [];
  var allDueForDistractors = due;

  shuffled.forEach(function(d) {
    var meta = d.entry.meta || {};
    if (meta.type === 'vbp') {
      // VBP item: show verb with blank, pick preposition
      var allVbpMeta = [];
      allDueForDistractors.forEach(function(d2) {
        var m2 = d2.entry.meta;
        if (m2 && m2.type === 'vbp' && m2.prep) allVbpMeta.push(m2.prep);
      });
      // Also use generic VBP prepositions as distractors
      var genericPreps = ['auf','an','für','mit','bei','nach','aus','von','zu','um','über','unter','vor','gegen','durch'];
      var allPreps = allVbpMeta.concat(genericPreps);
      // Remove duplicates and the correct answer
      var distractors = [];
      var seen = {};
      for (var p = 0; p < allPreps.length && distractors.length < 3; p++) {
        var prep = allPreps[p];
        if (prep !== meta.prep && !seen[prep]) { seen[prep] = true; distractors.push(prep); }
      }
      while (distractors.length < 3) distractors.push('???');
      var options = [meta.prep].concat(distractors.slice(0,3));
      // Shuffle options
      var correctIdx = 0;
      for (var s = options.length - 1; s > 0; s--) {
        var j = Math.floor(Math.random() * (s + 1));
        var tmp = options[s]; options[s] = options[j]; options[j] = tmp;
      }
      correctIdx = options.indexOf(meta.prep);
      questions.push({
        q: meta.de.replace(' ' + meta.prep + '+', ' _____'),
        o: options,
        a: correctIdx,
        f: '<b>' + meta.de + '</b> — ' + (meta.zh||'') + '<br>例句：' + (meta.ex||'')
      });
    } else {
      // Vocab item: show German, pick Chinese meaning
      var distractorsZh = [];
      var seenZh = {};
      for (var d3 = 0; d3 < allDueForDistractors.length && distractorsZh.length < 3; d3++) {
        var m3 = allDueForDistractors[d3].entry.meta;
        if (m3 && m3.zh && m3.zh !== meta.zh && !seenZh[m3.zh]) {
          seenZh[m3.zh] = true; distractorsZh.push(m3.zh);
        }
      }
      while (distractorsZh.length < 3) distractorsZh.push('???');
      var opts = [meta.zh].concat(distractorsZh.slice(0,3));
      var ci = 0;
      for (var s2 = opts.length - 1; s2 > 0; s2--) {
        var j2 = Math.floor(Math.random() * (s2 + 1));
        var tmp2 = opts[s2]; opts[s2] = opts[j2]; opts[j2] = tmp2;
      }
      ci = opts.indexOf(meta.zh);
      questions.push({
        q: '<span style="color:#f39c12;font-style:italic">' + (meta.de||'?') + '</span> ' + (meta.hint?'('+meta.hint+')':''),
        o: opts,
        a: ci,
        f: '<b>' + (meta.de||'?') + '</b> = ' + (meta.zh||'?') + (meta.ex?'<br>例句：' + meta.ex:'')
      });
    }
    itemIds.push(d.id);
  });

  window.testScores['sr'] = 0;
  window.testState['sr'] = {questions: questions, testType: 'SRS-Wiederholung', answers: new Array(questions.length).fill(null), itemIds: itemIds};

  var html = '<div style="margin-bottom:12px;color:#7b8db5">Beantwortet: <span id="sr-score">0</span>/' + count + '</div>';
  questions.forEach(function(q, i) {
    html += '<div class="quiz"><h4>' + (i+1) + '. ' + q.q + '</h4>';
    q.o.forEach(function(o, j) {
      html += '<div class="q-option" data-prefix="sr" data-idx="' + i + '" data-correct="' + (j===q.a) + '" data-useridx="' + j + '" data-itemid="' + itemIds[i] + '" onclick="answerSRSReviewQ(this)">' + String.fromCharCode(65+j) + '. ' + o + '</div>';
    });
    html += '<div class="q-feedback" id="sr-fb-' + i + '"></div></div>';
  });
  html += '<div id="sr-result" style="text-align:center;margin-top:16px;display:none"></div>';
  html += '<button class="btn btn-red" style="margin-top:10px" onclick="showSRSReviewResult()">📊 Ergebnis anzeigen</button>';

  document.getElementById('srs-review-container').innerHTML = html;
}

  var allList = '';
  var wrongCount = 0;
  for (var i = 0; i < state.answers.length; i++) {
    var ans = state.answers[i];
    var q = state.questions[i];
    var isWrong = ans && !ans.correct;
    if (isWrong) wrongCount++;
    allList += '<div style="background:#1a1a2e;border:1px solid ' + (isWrong ? '#e94560' : '#1e3a2f') + ';border-left:4px solid ' + (isWrong ? '#e94560' : '#22c55e') + ';border-radius:8px;padding:14px;margin:10px 0;text-align:left">';
    allList += '<strong style="color:' + (isWrong ? '#e94560' : '#22c55e') + '">' + (isWrong ? '❌ ' : '✅ ') + (i+1) + '. ' + q.q + '</strong><br>';
    allList += '<span style="color:#22c55e">Richtig: ' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</span><br>';
    allList += '<div style="background:#0d1b2a;border-radius:6px;padding:10px;margin-top:6px;color:#c8d0dc;font-size:.88em;line-height:1.7"><strong>📖 详细讲解：</strong>' + q.f + '</div>';
    allList += '</div>';
  }

  var stageInfo = '';
  state.answers.forEach(function(a, i) {
    if (a && a.itemId && srsData[a.itemId]) {
      var entry = srsData[a.itemId];
      stageInfo += '<span style="display:inline-block;margin:3px;padding:3px 8px;border-radius:10px;font-size:.72em;'
        + (a.correct ? 'background:#1a3a1a;color:#22c55e' : 'background:#3a1a1a;color:#e94560')
        + '">' + (i+1) + '. Stufe ' + entry.stage + ' → ' + srsNextInterval(entry.stage) + 'd</span>';
    }
  });

  var msg = pct >= 80 ? '🎉 Super! Langzeitgedächtnis wird aufgebaut!' :
            pct >= 50 ? '👍 Gut. Weiter dranbleiben.' : '📚 Dranbleiben! Wiederholung ist der Schlüssel.';

  el.style.display = 'block';
  el.innerHTML = '<h2 style="color:' + (pct>=80?'#22c55e':'#f39c12') + ';font-size:1.4em">' + score + '/' + total + ' (' + pct + '%) — ' + msg + '</h2>'
    + (stageInfo ? '<div style="margin:8px 0">' + stageInfo + '</div>' : '')
    + '<p style="color:#7b8db5;font-size:.8em">Noch ' + dueCount + ' fällige Wiederholungen in der SRS-Bank.</p>'
    + '<div style="margin-top:16px"><h3 style="color:#f39c12">📋 Vollständige Auswertung (' + total + ' Fragen)</h3>' + allList + '</div>'
    + '<p style="margin-top:8px"><button class="btn btn-red" onclick="goPage(\'srs_review\')">🔄 Nochmal wiederholen</button> '
    + '<button class="btn btn-gold" onclick="goPage(\'vocab_flashcards\')">🃏 学新词汇</button></p>';
};

  {q:'Die CO2-Emissionen sind ___. (reduzieren→-bar)',o:['reduzierbar','reduziert','reduzieren','reduzierend'],a:0,f:'<b>-bar als Passiversatz (形容词化被动替代)</b>：CO2排放是可减少的。<br><br><b>规则：</b>-bar后缀加在动词词根后构成形容词 = 可被...的 / 能被...的 = kann + PII + werden。<br>reduzier- + -bar = <b>reduzierbar</b> = kann reduziert werden.<br><br><b>常见-bar形容词：</b>lösbar (可解决的), machbar (可行的), hörbar (可听见的), lesbar (可读的), erklärbar (可解释的), trinkbar (可饮用的)。<br><br><b>注意：</b>-bar不能随意造词。有些动词用-bar，有些用-lich：verständlich (可理解的), möglich (可能的)。'},
  {q:'Er ___ einen Beitrag ___.',o:['macht/bei','leistet/zu','hat/von','gibt/für'],a:1,f:'<b>FVG: einen Beitrag leisten zu + Dativ</b>：他为...做出了贡献。<br><br><b>规则：</b>einen Beitrag <b>leisten zu</b> + Dat. = 为...做出贡献。<br>Er <b>leistet</b> einen Beitrag <b>zu</b>r Diskussion. = 他为讨论做出贡献。<br><br><b>类似FVG：</b>Beitrag leisten (贡献), Hilfe leisten (提供帮助), Widerstand leisten (进行抵抗), Arbeit leisten (完成工作), Verzicht leisten (放弃)。<br><br><b>⚠️ 常见错误：</b>❌ Beitrag machen (英语干扰: make a contribution) — 德语不这样说。❌ Beitrag haben — 不存在。'},
  {q:'etw. zum ___ bringen (ausdrücken)',o:['Sprache','Ausdruck','Wort','Satz'],a:1,f:'<b>FVG: etw. zum Ausdruck bringen</b>：表达某事。<br><br><b>规则：</b>ausdrücken (动词) → etw. zum <b>Ausdruck</b> bringen (FVG)。<br>zum Ausdruck bringen = 使...得以表达/把...表达出来 = ausdrücken。<br><br><b>结构分析：</b>zum = zu dem (介词+Dat.)。bringen + 名词(第四格) + zu + 名词(第三格) = 将...带至...的状态。<br><br><b>类似结构：</b>zur Sprache bringen (提起/讨论), zur Anwendung bringen (应用), zu Ende bringen (完成), zur Vernunft bringen (使...理智)。'},
  {q:'Das Konzert ___ ja super! (Modalpartikel)',o:['hat','war','ist','wurde'],a:1,f:'<b>Modalpartikel "ja" + sein (评价/状态)</b>：音乐会确实很赞！<br><br><b>规则：</b>sein + Adjektiv/jA... = 描述状态的系动词结构。Modalpartikel "ja" 表达<b>确认/共鸣/确实</b>。<br>Das Konzert <b>war</b> ja super!<br><br><b>为什么用war：</b>音乐会已发生（过去的），用过去时war。❌ hat/ist/wurde 都不能接形容词谓语。sein接形容词表状态/性质。<br><br><b>Modalpartikel ja vs doch：</b>ja = 确实/真的（共鸣确认）。doch = 明明（轻反驳）。Das war ja super! (共鸣) vs Das war doch super! (你怎么不觉得好？)。'},
  {q:'Er gilt ___ Experte.',o:['für','wie','als','zu'],a:2,f:'<b>gelten als + Nominativ (被视为/被认为是)</b>：他被认为是专家。<br><br><b>规则：</b>gelten <b>als</b> + <b>Nominativ</b>。注意：als后面接的是<b>第一格</b>（不是第四格！）。<br>Er gilt <b>als</b> Experte. (Experte = Nom.)<br><br><b>同类结构（都接Nominativ）：</b>gelten als + Nom. (被视为) | angesehen werden als + Nom. (被视为) | bezeichnet werden als + Nom. (被称为) | bekannt sein als + Nom. (以...身份闻名)。<br><br><b>⚠️ 关键：</b>不是"gelten für"，不是"gelten wie"，不是"gelten zu"。这是不可替换的固定搭配。'},
  {q:'___ man genug schläft, ___ kann man sich schlecht konzentrieren.',o:['Wenn/dann','Obwohl/dennoch','Weil/deshalb','Damit/so'],a:0,f:'<b>Konditionalsatz mit Korrelat (条件从句+相关词)</b>：如果睡眠不足，那么就很难集中注意力。<br><br><b>规则：</b><b>Wenn</b> + Nebensatz (动词在末), <b>dann</b> + Hauptsatz (动词在第二)。<br>全句：<b>Wenn</b> man nicht genug schläft, <b>dann</b> kann man sich schlecht konzentrieren.<br><br><b>辨析：</b>❌ Obwohl/dennoch = 让步（逻辑相反：不能说"尽管睡够了但很难集中"）。❌ Weil/deshalb = 原因（逻辑也可对，但Wenn/dann更自然表达条件关系）。<br><br><b>语序：</b>wenn从句占第一位时，主句动词紧跟：Wenn man genug schläft, <b>kann</b> (动词) man sich...。dann在动词前：<b>dann kann</b> man...。'},
  {q:'Das Auto ___ letzte Woche ___. (reparieren→Passiv)',o:['hat/repariert','ist/repariert','wurde/repariert','wird/repariert'],a:2,f:'<b>Vorgangspassiv Präteritum (过程被动过去时)</b>：车子上周被修了。<br><br><b>规则：</b>Passiv Präteritum = <b>wurde + PII</b>。reparieren → PII = repariert。<br>Das Auto <b>wurde</b> letzte Woche <b>repariert</b>.<br><br><b>辨析：</b>❌ "hat repariert" = 主动完成时（谁修的？缺少主语）。❌ "ist repariert" = Zustandspassiv现在时（车子现在已修好状态），与letzte Woche不搭配。❌ "wird repariert" = 现在时被动（与letzte Woche矛盾）。<br><br><b>时态信号词：</b>letzte Woche = 过去时间 → 必须用过去时。不管主动被动，时间信号决定时态。'},
  {q:'Ich ___ gerne ___ 19. Jahrhundert gelebt. (haben→KII)',o:['habe/im','hätte/im','würde/im','sei/im'],a:1,f:'<b>KII Vergangenheit — Irrealer Wunsch (非现实愿望)</b>：我真想在19世纪生活过。<br><br><b>规则：</b>非现实愿望 (irrealer Wunsch) 用KII Vergangenheit = <b>hätte/wäre + PII</b>。<br>Ich <b>hätte</b> gerne im 19. Jahrhundert gelebt. = 我要是曾在19世纪生活过就好了（实际上不可能）。<br><br><b>结构：</b>haben → hätte (KII) + PII。全句KII完成时。❌ "habe/gelebt" = 直陈式完成时（陈述事实，不是愿望）。❌ "würde/gelebt" = würde + PII 现代口语中可用，但标准语法用hätte。<br><br><b>Irrealer Wunsch = hätte/wäre + PII + gerne。如：</b>Wäre ich doch nur reich! (真希望我有钱！)。'},
  {q:'Der Film ___ (sehen) sich gut an. (Passiversatz)',o:['hat','wird','lässt','ist'],a:2,f:'<b>sich lassen + Infinitiv (Passiversatz)</b>：这电影很好看。<br><br><b>规则：</b>etw. <b>lässt sich</b> + Infinitiv = etw. kann + PII + werden。Der Film <b>lässt</b> sich gut an<b>sehen</b>. = Der Film kann gut angesehen werden.<br><br><b>用法：</b>lässt (lassen的第三人称现在时) + sich + 可分动词(合写)。anschauen → sich gut anschauen lassen。<br><br><b>❌ "hat sich"</b> — 不是passiversatz。❌ "wird sich" — 语法不成立。❌ "ist sich" — 不存在。<br><br><b>C1重点：</b>sich lassen是考试中最常见的Passiversatz之一，必须能主动使用。'},
  {q:'Es ___ mir leid, aber ich kann nicht kommen.',o:['ist','tut','macht','hat'],a:1,f:'<b>Es tut mir leid — 固定表达</b>：我很抱歉，但我不能来。<br><br><b>规则：</b><b>Es tut mir leid</b> = 我很抱歉/对不起。这是固定搭配，不能替换动词。<br><br><b>beachten：</b>leid 在这里是形容词，leidtun 是可分动词：leidtun → tut leid → hat leidgetan。<br><br><b>❌常见错误：</b>❌ "Es ist mir leid" — 英语干扰："It\'s sorry to me" ×。❌ "Es macht mir leid" — 不存在。❌ "Es hat mir leid" — 不存在。<br><br><b>类似表达：</b>Es tut mir weh (让我痛/伤心), Es tut mir gut (对我有好处), Es tut mir nicht leid (我不道歉)。'},
  {q:'Er wurde ___ (fördern), weil er hart arbeitete.',o:['fördert','gefördert','fördernd','förderte'],a:1,f:'<b>Vorgangspassiv mit PII (wurde + PII)</b>：他因为工作努力而得到了晋升/资助。<br><br><b>规则：</b>wurde + <b>Partizip II</b> = Vorgangspassiv Präteritum。<br>fördern → PII = <b>gefördert</b>（弱变化）。Er <b>wurde gefördert</b> = 他被晋升/资助了。<br><br><b>辨析：</b>❌ "fördert" = 现在时第三人称（与wurde不搭配）。❌ "fördernd" = PI (正在晋升的——不合逻辑，被动含义用PII)。❌ "förderte" = 主动过去时（与wurde不搭配）。<br><br><b>Passiv结构：</b>wurde (助动词) + gefördert (PII, 实义动词)。两者缺一不可。变为主动：Man förderte ihn → Er wurde gefördert。'},
  {q:'___ eines Jahres hat sie Deutsch gelernt.',o:['Während','Innerhalb','Aufgrund','Trotz'],a:1,f:'<b>Innerhalb + Genitiv (在...之内)</b>：在一年之内她学会了德语。<br><br><b>规则：</b><b>Innerhalb</b> + Gen. = 在...时间内/在...范围内。表达时间或空间的界限。<br>Innerhalb <b>eines</b> Jahres hat sie Deutsch gelernt.<br><br><b>辨析：</b>❌ Während + Gen. = 在...期间（不强调时间界限，而强调期间发生的事）。❌ Aufgrund = 由于（原因）。❌ Trotz = 尽管（让步）。<br><br><b>注意：</b>innerhalb = within（时间/空间界限内）。außerhalb = outside of。innerhalb der EU (在欧盟范围内)。'},
  {q:'Der Chef ___ den Mitarbeitern ___. (danken→richtig)',o:['dankt/für','bedankt/bei','dankt/--','dankte/sich'],a:2,f:'<b>jdm. danken — Dativ-Verb (带第三格动词)</b>：老板感谢员工们。<br><br><b>规则：</b><b>jdm. (Dat.) danken</b> = 感谢某人。danken后接<b>第三格</b>，不接介词！<br>Der Chef <b>dankt</b> <b>den</b> Mitarbeitern. (Mitarbeitern = Dat. Pl.)<br><br><b>对比：</b>❌ für etw. danken — 可以说 für etw. danken (为某事感谢)，但"感谢某人"是jdm. danken (Dat.)，不加介词。<br>❌ sich bedanken bei jdm. für etw. — 另一种"感谢"的反身用法：Ich bedanke mich bei Ihnen für Ihre Hilfe.<br>❌ dankte sich — 不存在。<br><br><b>Dativ-Verben (常见)</b>：danken, helfen, antworten, gratulieren, folgen, gefallen, gehören, passen。'},
  {q:'Ich ___ ___, das Fenster zu ___. (vergessen)',o:['habe/vergessen/schließen','habe/vergessen/geschlossen','bin/vergessen/schließen','hatte/vergessen/geschlossen'],a:0,f:'<b>Perfekt + zu-Infinitiv (vergessen + zu + Inf.)</b>：我忘了关窗。<br><br><b>规则：</b>vergessen构成完成时用<b>haben</b>（不是sein）。PII = <b>vergessen</b>（强变化，无ge前缀，因为ver-不可分）。<br>Ich <b>habe</b> <b>vergessen</b>, das Fenster zu <b>schließen</b>.<br><br><b>结构：</b>habe + vergessen + , + zu + Infinitiv。zu-不定式作vergessen的宾语。<br><br><b>类似结构：</b>vergessen, etw. zu tun / versuchen, etw. zu tun / versprechen, etw. zu tun / vergessen (忘了做) vs sich erinnern (想起来做) 都接zu-不定式。'},
  {q:'Sie ___ ihn, den Vertrag zu ___. (bitten→Präteritum)',o:['bat/unterschreiben','bat/untergeschrieben','bittete/unterschreiben','bittete/untergeschrieben'],a:0,f:'<b>Präteritum + zu-Infinitiv: jdn. bitten, etw. zu tun</b>：她请他签合同。<br><br><b>规则：</b>bitten的过去时 = <b>bat</b>（强变化，e→a, 必须牢记！不是bittete）。<br>Sie <b>bat</b> ihn, den Vertrag zu <b>unterschreiben</b>.<br><br><b>⚠️ 关键：</b>❌ bittete 不存在！bitten是不规则变化：bitten → bat → hat gebeten。这不按规则变化。<br><br><b>jdn. bitten, etw. zu tun结构：</b>bitten + Akk. + , + zu-Inf. = 请求某人做某事。注意zu-不定式和bitte之间用逗号分隔。<br><br><b>混淆词：</b>bitten (请求) vs bieten (提供) vs beten (祈祷)。bitten→bat, bieten→bot, beten→betete。'},
];

    texts: ["Ich lese jeden Morgen als Erstes die Nachrichten auf meinem Smartphone. Die gedruckte Zeitung habe ich schon vor Jahren abbestellt, weil sie mir zu umständlich war. Besonders schätze ich, dass ich unterwegs immer auf dem Laufenden bin. Allerdings ertappe ich mich oft dabei, wie ich stundenlang durch Social-Media-Feeds scrolle, ohne wirklich etwas Relevantes zu lesen.","Für mich ist das Radio nach wie vor die vertrauenswürdigste Nachrichtenquelle. Ich höre jeden Abend die Nachrichtensendung und schätze die ausführlichen Hintergrundberichte. Anders als im Internet bekomme ich hier geprüfte Informationen, ohne dass ein Algorithmus mir vorschreibt, was mich interessieren sollte. Die Gelassenheit der Radiosprecher beruhigt mich nach einem stressigen Arbeitstag.","Ich bin beruflich auf schnelle Informationen angewiesen, daher nutze ich hauptsächlich einen News-Ticker-Dienst. Mich interessieren vor allem Wirtschaftsnachrichten und Börsenkurse. Lange Artikel lese ich selten — mir reichen die Schlagzeilen und kurze Zusammenfassungen. Am Wochenende gönne ich mir allerdings eine ausführliche Wochenzeitung.","Soziale Medien sind meine Hauptnachrichtenquelle, was ich durchaus kritisch sehe. Einerseits erfahre ich dort oft als Erste von aktuellen Ereignissen, andererseits weiß ich, dass viele Beiträge nicht überprüft sind. Ich versuche deshalb, wichtige Meldungen immer bei mindestens zwei seriösen Quellen gegenzuchecken. Medienkompetenz halte ich für eine der wichtigsten Fähigkeiten unserer Zeit."],

    text: "Die Digitalisierung des deutschen Gesundheitswesens schreitet seit der Einführung der elektronischen Patientenakte (ePA) im Jahr 2021 mit wachsender Geschwindigkeit voran.\n\nBefürworter betonen die zahlreichen Vorteile: Patientendaten sind jederzeit und überall verfügbar, Doppeluntersuchungen werden vermieden und die Kommunikation zwischen Hausärzten, Fachärzten und Krankenhäusern wird erheblich verbessert. Besonders in ländlichen Regionen, wo Fachärzte oft schwer erreichbar sind, ermöglicht die Telemedizin eine bessere Versorgung. Videosprechstunden haben sich während der Corona-Pandemie bewährt und sind aus dem Alltag vieler Praxen nicht mehr wegzudenken.\n\nAllerdings gibt es auch erhebliche Bedenken. Datenschützer warnen vor den Risiken zentralisierter Gesundheitsdaten. Ein Hackerangriff auf einen großen Krankenhausverbund im vergangenen Jahr legte sämtliche Systeme für zwei Wochen lahm und zeigte, wie verwundbar die digitale Infrastruktur ist. Kritiker bemängeln zudem, dass ältere Patienten ohne digitale Kompetenz von der Entwicklung abgehängt werden könnten.\n\nEine aktuelle Umfrage der Krankenkasse Barmer zeigt, dass 67 Prozent der Versicherten die Digitalisierung grundsätzlich begrüßen, aber nur 34 Prozent uneingeschränkt Vertrauen in die Datensicherheit haben. Die Bundesregierung hat inzwischen ein Gesetz zur Stärkung der IT-Sicherheit im Gesundheitswesen auf den Weg gebracht. Experten sind sich einig, dass die Digitalisierung unvermeidlich ist, aber mit Augenmaß und unter Einbeziehung aller Beteiligten gestaltet werden muss.",

function renderContent() {
  let pid = currentPage;
  let c = document.getElementById('content');

  if (P[pid] && typeof P[pid] === 'function') {
    try { c.innerHTML = P[pid](); } catch(e) { c.innerHTML = '<div class="warn"><strong>Seitenfehler:</strong> ' + e.message + '</div>'; }
  }
  else if (P[pid]) { c.innerHTML = P[pid]; }
  else if (vocabDecks[pid]) { c.innerHTML = vocabPage(
    nav.find(n=>n.id===pid).title.replace(/^[^\s]+\s/, ''),
    vocabDecks[pid], pid.replace('vocab_','')
  );}
  else if (pid === 'vocab_flashcards') { c.innerHTML = allFlashcards(); }
  else if (pid === 'vbp') { c.innerHTML = vbpPage(); }
  else if (readingTexts[pid]) {
    let r = readingTexts[pid];
    c.innerHTML = readingPage(r.title, r.text, r.qs, r.type, r.type==='match'?{texts:r.texts,statements:r.statements,fb:r.fb}:null);
    // Initialize test state for reading pages (fix: options were not clickable)
    var rprefix = r.type === 'match' ? 'match' : (r.type === 'comprehension' ? 'readc' : 'reads');
    var rqs = [];
    if (r.type === 'match') {
      r.statements.forEach(function(s, i) {
        rqs.push({q: (i+1)+'. '+s.text, o: r.texts.map(function(_,j){return 'Person '+j;}), a: s.match, f: 'Richtige Zuordnung: Person '+s.match, type:'matching'});
      });
    } else {
      (r.qs||[]).forEach(function(rq) {
        var cIdx = rq.a.findIndex(function(a){return a.correct;});
        rqs.push({q: rq.q, o: rq.a.map(function(a){return a.text;}), a: cIdx>=0?cIdx:0, f: rq.fb||'', type:'comprehension'});
      });
    }
    // Restore saved progress if available
    var savedRP = localStorage.getItem('de-readstate-'+pid);
    if (savedRP) {
      try {
        var parsed = JSON.parse(savedRP);
        window.testState[rprefix] = parsed.state;
        window.testScores[rprefix] = parsed.score || 0;
        // Restore visual state: apply correct/wrong classes
        setTimeout(function() {
          var state = window.testState[rprefix];
          if (!state) return;
          for (var ri = 0; ri < state.answers.length; ri++) {
            var ans = state.answers[ri];
            if (ans === null || ans === undefined) continue;
            var fbEl = document.getElementById(rprefix+'-fb-'+ri);
            var opts = document.querySelectorAll('.q-option[data-prefix="'+rprefix+'"][data-idx="'+ri+'"]');
            if (ans.correct) {
              if (opts[state.questions[ri].a]) opts[state.questions[ri].a].classList.add('correct');
              if (fbEl) { fbEl.textContent = '✅ ' + state.questions[ri].f; fbEl.style.display = 'block'; }
            } else {
              if (opts[ans.userIdx]) opts[ans.userIdx].classList.add('wrong');
              if (opts[state.questions[ri].a]) opts[state.questions[ri].a].classList.add('correct');
              if (fbEl) { fbEl.innerHTML = '❌ Richtig: <strong>'+state.questions[ri].o[state.questions[ri].a]+'</strong> — '+state.questions[ri].f; fbEl.style.display = 'block'; }
              for (var ok = 0; ok < opts.length; ok++) opts[ok].style.pointerEvents = 'none';
            }
          }
          var scEl = document.getElementById(rprefix+'-score');
          if (scEl) scEl.textContent = window.testScores[rprefix] || 0;
        }, 80);
      } catch(e) {}
    } else {
      window.testState[rprefix] = {questions: rqs, answers: new Array(rqs.length).fill(null), testType: 'Leseverstehen', readingId: pid, readingTitle: r.title, readingFb: r.fb||''};
      window.testScores[rprefix] = 0;
    }
  }
  else if (pid === 'grammar_konjunktiv1') { c.innerHTML = grammarKonjunktiv1(); }
  else if (pid === 'grammar_konjunktiv2') { c.innerHTML = grammarKonjunktiv2(); }
  else if (pid === 'grammar_passiv') { c.innerHTML = grammarPassiv(); }
  else if (pid === 'grammar_nominal') { c.innerHTML = grammarNominal(); }
  else if (pid === 'grammar_partikeln') { c.innerHTML = grammarPartikeln(); }
  else if (pid === 'grammar_partizip') { c.innerHTML = grammarPartizip(); }
  else if (pid === 'grammar_fvg') { c.innerHTML = grammarFVG(); }
  else if (pid === 'grammar_quiz') { c.innerHTML = grammarQuiz(); }
  else if (pid === 'error_review') { c.innerHTML = errorReviewPage(); }
  else if (pid === 'srs_review') { c.innerHTML = srsReviewPage(); }
  else { c.innerHTML = '<p>Inhalt wird geladen...</p>'; }

  setTimeout(() => {
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.onclick = function() {
        let pre = this.parentElement.querySelector('pre');
        if (pre) { navigator.clipboard.writeText(pre.textContent).then(() => {this.textContent='Kopiert!';setTimeout(()=>this.textContent='Kopieren',1500)}); }
      };
    });
    if (pid === 'test_b2') renderTest('test_b2', b2TestQs, 'b2t', 'B2');
    if (pid === 'test_c1') renderTest('test_c1', c1TestQs, 'c1t', 'C1');
    if (pid === 'grammar_quiz') renderGrammarQuiz();
    if (pid === 'error_review') renderErrorReviewQuiz();
    if (pid === 'srs_review') renderSRSReviewQuiz();
    if (pid === 'daily_reading') { try { renderDailyReading(); } catch(e) { var elR = document.getElementById('daily-reading-container'); if (elR) elR.innerHTML = '<div class="warn">Fehler: ' + e.message + '</div>'; } }
    if (pid === 'daily_test') {
      try { renderDailyTest(); } catch(e) {
        var el = document.getElementById('daily-test-container');
        if (el) el.innerHTML = '<div class="warn"><strong>⚠️ 测试加载失败：</strong>' + e.message + '</div>';
      }
    }
  }, 50);
  updateCountdowns();
  updateProgress();
}

function checkWriting() {
  var ta = document.getElementById('writing-textarea');
  if (!ta) return;
  var wc = ta.value.split(/\s+/).filter(function(x){return x.length>0;}).length;
  document.getElementById('word-count').textContent = wc;
  if (wc === 0) { alert('Bitte schreiben Sie zuerst einen Text.'); return; }
  alert('Wörter: ' + wc + '\n\nSelbstcheck:\n- Betreffzeile vorhanden?\n- Anrede + Gruß korrekt?\n- Alle Aufgabenpunkte abgedeckt?\n- Konjunktiv II verwendet?\n- Keine Umgangssprache?\n- Text nochmal durchgelesen?');
}

// ===== PWA: Service Worker (offline cache) =====
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  var swCode = 'self.addEventListener("install",function(e){e.waitUntil(caches.open("de-v1").then(function(c){return c.addAll(["/"])}));self.skipWaiting()});self.addEventListener("activate",function(e){e.waitUntil(clients.claim())});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).then(function(resp){if(resp.ok){var clone=resp.clone();caches.open("de-v1").then(function(c){c.put(e.request,clone)});}return resp})}))});';
  var swBlob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob), {scope:'/'}).catch(function(){});
}

// ===== Data Sync: Export/Import for cross-device sync =====
window.exportAllData = function() {
  var data = {};
  for (var i = 0; i < localStorage.length; i++) {
    var key = localStorage.key(i);
    if (key && key.startsWith('de-')) data[key] = localStorage.getItem(key);
  }
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'deutsch-trainer-backup-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  alert('✅ Daten exportiert! Auf anderem Gerät mit "Import" wiederherstellen.');
};
window.importAllData = function() {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        var count = 0;
        for (var key in data) {
          if (key.startsWith('de-')) { localStorage.setItem(key, data[key]); count++; }
        }
        alert('✅ ' + count + ' Datensätze importiert! Seite wird neu geladen.');
        location.reload();
      } catch(ex) { alert('❌ Fehler beim Import: ' + ex.message); }
    };
    reader.readAsText(file);
  };
  input.click();
};

function init() { loadProgress(); renderNav(); renderContent(); }
init();
</script>
